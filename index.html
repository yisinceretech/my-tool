<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 Little Body Detective v4.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ──────────────────────────────
           一、基礎全頁重置與零捲軸鎖定
           ────────────────────────────── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #090a1a 0%, #151838 50%, #0b0c20 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #ffffff;
        }

        /* ──────────────────────────────
           二、左右雙欄 16:9 儀表板 Layout (38% : 62%)
           ────────────────────────────── */
        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            padding: 12px;
            gap: 12px;
            position: relative;
        }

        /* 左側控制面板 (38%) */
        .control-panel {
            flex: 0 0 38%;
            max-width: 38%;
            height: 100%;
            background: rgba(18, 20, 48, 0.65);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(10, 10, 35, 0.37), inset 0 0 15px rgba(255, 255, 255, 0.05);
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
            overflow: hidden;
            z-index: 10;
        }

        /* 區塊分隔與字體階層 */
        .panel-block {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }
        .panel-block:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .block-title {
            font-size: 17px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        /* 通用按鈕風格 */
        button {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }

        /* 監聽按鈕特定狀態 */
        #btn-start-monitor {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            color: #6ee7b7;
        }
        #btn-start-monitor.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            box-shadow: 0 0 16px rgba(16, 185, 129, 0.6);
            animation: pulse-green 2s infinite;
        }

        #btn-stop-monitor {
            background: rgba(100, 116, 139, 0.2);
            border-color: rgba(100, 116, 139, 0.4);
            color: #cbd5e1;
        }
        #btn-stop-monitor.active {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: #ffffff;
            box-shadow: 0 0 14px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* 狀態指示燈 */
        .status-light-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            box-shadow: 0 0 5px #94a3b8;
            transition: all 0.3s;
        }
        .status-dot.standby { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .status-dot.monitoring { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-dot.stopped { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* 聽診模式按鈕 */
        .mode-btn {
            border-width: 1.5px;
        }
        .mode-btn[data-mode="heart"].active {
            border-color: #f87171;
            background: rgba(239, 68, 68, 0.25);
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.5);
            color: #fca5a5;
        }
        .mode-btn[data-mode="gut"].active {
            border-color: #34d399;
            background: rgba(16, 185, 129, 0.25);
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.5);
            color: #6ee7b7;
        }

        /* 切換角色下拉選單 */
        select {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            background: rgba(30, 35, 70, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            outline: none;
            cursor: pointer;
        }

        /* 營養狀態 5 按鈕 */
        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .nut-btn {
            padding: 6px 2px;
            font-size: 12px;
            flex-direction: column;
            gap: 2px;
        }
        .nut-btn.active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        /* BPM 滑桿 */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input[type=range] {
            flex: 1;
            accent-color: #38bdf8;
            cursor: pointer;
        }
        .bpm-val {
            font-size: 16px;
            font-weight: 700;
            color: #38bdf8;
            width: 45px;
            text-align: right;
        }

        /* 波形監視器 Canvas */
        .waveform-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(10, 12, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
        }
        canvas.wave-canvas {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            background: #050714;
        }

        /* 狀態說明與提示 */
        .info-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            line-height: 1.4;
            color: #cbd5e1;
        }

        /* ──────────────────────────────
           三、右側角色展示區 (62%) 與 3D / HUD 蓋層
           ────────────────────────────── */
        .viewport-panel {
            flex: 1;
            height: 100%;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
        }

        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* SVG 動態虛線導引層 */
        #svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 右側浮動 HUD 卡片 */
        .hud-card {
            position: absolute;
            background: rgba(18, 20, 48, 0.6);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 14px;
            z-index: 6;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .hud-top-right {
            top: 20px;
            right: 20px;
        }
        .hud-bottom-right {
            bottom: 20px;
            right: 20px;
        }

        .hud-val {
            font-size: 16px;
            font-weight: 700;
            color: #38bdf8;
        }

        /* 器官浮動標籤 */
        .floating-label {
            position: absolute;
            background: rgba(10, 15, 35, 0.75);
            border: 1px solid #60a5fa;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #93c5fd;
            pointer-events: auto;
            cursor: pointer;
            z-index: 6;
            transition: transform 0.2s, background 0.2s;
        }
        .floating-label:hover {
            background: rgba(30, 50, 100, 0.9);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="control-panel">
        
        <div class="panel-block">
            <div class="block-title">
                <span>A. 監聽控制</span>
                <div class="status-light-container">
                    <div id="status-dot" class="status-dot standby"></div>
                    <span id="status-text">待機中</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="btn-start-monitor">▶ 開始監聽</button>
                <button id="btn-stop-monitor">⏹ 停止監聽</button>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">B. 聽診模式</div>
            <div class="btn-group">
                <button class="mode-btn active" data-mode="heart">❤️ 心臟模式</button>
                <button class="mode-btn" data-mode="gut">🦠 腸胃模式</button>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">C. 角色人物</div>
            <select id="char-select">
                <option value="girl">Q 版小女孩 (images/girl.png)</option>
                <option value="custom">自訂本機圖片上傳...</option>
            </select>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
        </div>

        <div class="panel-block">
            <div class="block-title">D. 生理營養狀態</div>
            <div class="nutrition-grid">
                <button class="nut-btn active" data-nut="caffeine">☕<br>咖啡因</button>
                <button class="nut-btn" data-nut="fiber">🥦<br>高纖維</button>
                <button class="nut-btn" data-nut="sugar">🥤<br>精緻糖</button>
                <button class="nut-btn" data-nut="dehydration">💧<br>脫水</button>
                <button class="nut-btn" data-nut="sleep">😴<br>睡眠</button>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">
                <span>E. 心率 BPM 控制</span>
                <span id="bpm-val" class="bpm-val">75</span>
            </div>
            <div class="slider-row">
                <span style="font-size:12px; color:#94a3b8;">40</span>
                <input type="range" id="bpm-slider" min="40" max="180" value="75">
                <span style="font-size:12px; color:#94a3b8;">180</span>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">F. 即時波形監視器</div>
            <div class="waveform-container">
                <canvas id="ecg-canvas" class="wave-canvas"></canvas>
                <canvas id="gut-canvas" class="wave-canvas"></canvas>
            </div>
        </div>

        <div class="panel-block">
            <div class="info-card" id="info-text">
                💡 指引：點擊「▶ 開始監聽」啟動 Web Audio 音效與波形。拖曳滑鼠可旋轉角色視角。
            </div>
        </div>

    </div>

    <div class="viewport-panel">
        <canvas id="three-canvas"></canvas>
        
        <svg id="svg-overlay">
            <line id="line-heart" x1="0" y1="0" x2="0" y2="0" stroke="#f87171" stroke-width="2" stroke-dasharray="4,4" />
            <line id="line-gut" x1="0" y1="0" x2="0" y2="0" stroke="#34d399" stroke-width="2" stroke-dasharray="4,4" />
        </svg>

        <div id="label-heart" class="floating-label" style="top: 25%; right: 28%;">❤️ 心臟 (Heart)</div>
        <div id="label-gut" class="floating-label" style="top: 45%; right: 28%;">🦠 消化系統 (Gut)</div>

        <div class="hud-card hud-top-right">
            <div>聽診目標：<span id="hud-target" class="hud-val">心臟</span></div>
            <div style="margin-top:4px;">即時心率：<span id="hud-bpm" class="hud-val">75 BPM</span></div>
        </div>

        <div class="hud-card hud-bottom-right">
            <div>生理狀態：<span id="hud-state" class="hud-val">☕ 咖啡因刺激</span></div>
            <div style="margin-top:4px;">角色表情：<span id="hud-emotion" class="hud-val">驚空發抖</span></div>
        </div>
    </div>
</div>

<script>
/* ──────────────────────────────
   三、全域狀態機 (State Machine)
   ────────────────────────────── */
const state = {
    isListening: false,     // 監聽狀態 (false: 待機/停止, true: 監聽中)
    mode: 'heart',          // 'heart' | 'gut'
    bpm: 75,
    nutrition: 'caffeine',  // caffeine, fiber, sugar, dehydration, sleep
    characterKey: 'girl'
};

// 營養狀態設定檔
const NUTRITION_CONFIGS = {
    caffeine: { bpm: 120, stateText: '☕ 咖啡因刺激', emotion: '興奮抖動', info: '咖啡因使交感神經興奮，心率顯著上升，角色身體微幅抖動。' },
    fiber: { bpm: 70, stateText: '🥦 高纖維充沛', emotion: '健康微笑', info: '膳食纖維促進腸道蠕動，消化波形規律且充沛。' },
    sugar: { bpm: 55, stateText: '🥤 精緻糖昏沈', emotion: '疲倦暈眩', info: '血糖快速起伏引發暈糖反應，心跳緩慢且無力。' },
    dehydration: { bpm: 95, stateText: '💧 嚴重脫水', emotion: '口渴焦慮', info: '體液不足使血液黏稠，心率補償性加快，脈搏較微弱。' },
    sleep: { bpm: 50, stateText: '😴 深層睡眠', emotion: '平靜沉睡', info: '副交感神經主導，心率與腸道運動皆降至生理基準低點。' }
};

/* ──────────────────────────────
   四、Web Audio API 聲音引擎
   ────────────────────────────── */
let audioCtx = null;
let masterGain = null;
let heartTimer = null;

function initAudio() {
    if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// 播放 Lub-Dub 心音
function playHeartSound() {
    if (!state.isListening || state.mode !== 'heart') return;

    const now = audioCtx.currentTime;
    
    // Lub (第一心音) - 45Hz
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(50, now);
    osc1.frequency.exponentialRampToValueAtTime(20, now + 0.12);
    gain1.gain.setValueAtTime(0.8, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc1.connect(gain1);
    gain1.connect(masterGain);
    osc1.start(now);
    osc1.stop(now + 0.12);

    // Dub (第二心音) - 65Hz (延遲約 0.15 秒)
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(70, now + 0.15);
    osc2.frequency.exponentialRampToValueAtTime(25, now + 0.25);
    gain2.gain.setValueAtTime(0.6, now + 0.15);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc2.connect(gain2);
    gain2.connect(masterGain);
    osc2.start(now + 0.15);
    osc2.stop(now + 0.25);

    // 觸發視覺心臟搏動
    triggerHeartPulse();
}

// 腸胃 Borborygmi 音效 (Filtered Noise)
let gutNoiseNode = null;
let gutGainNode = null;

function startGutSound() {
    if (!audioCtx || gutNoiseNode) return;

    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }

    gutNoiseNode = audioCtx.createBufferSource();
    gutNoiseNode.buffer = buffer;
    gutNoiseNode.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 250;
    filter.Q.value = 3.0;

    gutGainNode = audioCtx.createGain();
    gutGainNode.gain.value = 0.3;

    gutNoiseNode.connect(filter);
    filter.connect(gutGainNode);
    gutGainNode.connect(masterGain);
    gutNoiseNode.start();
}

function stopGutSound() {
    if (gutNoiseNode) {
        try { gutNoiseNode.stop(); } catch(e){}
        gutNoiseNode.disconnect();
        gutNoiseNode = null;
    }
}

// 平滑淡出關閉音效 (防爆音)
function stopAudio() {
    if (masterGain && audioCtx) {
        masterGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    }
    if (heartTimer) {
        clearInterval(heartTimer);
        heartTimer = null;
    }
    stopGutSound();
}

function startAudio() {
    initAudio();
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 0.1);

    updateAudioHeartbeat();
    if (state.mode === 'gut') {
        startGutSound();
    }
}

function updateAudioHeartbeat() {
    if (heartTimer) clearInterval(heartTimer);
    if (!state.isListening) return;

    const interval = (60 / state.bpm) * 1000;
    playHeartSound();
    heartTimer = setInterval(playHeartSound, interval);
}

/* ──────────────────────────────
   五、Canvas 2D 即時波形監視器
   ────────────────────────────── */
const ecgCanvas = document.getElementById('ecg-canvas');
const gutCanvas = document.getElementById('gut-canvas');
const ecgCtx = ecgCanvas.getContext('2d');
const gutCtx = gutCanvas.getContext('2d');

let ecgX = 0, gutX = 0;
let ecgData = 0;

function resizeCanvases() {
    [ecgCanvas, gutCanvas].forEach(c => {
        c.width = c.clientWidth * window.devicePixelRatio;
        c.height = c.clientHeight * window.devicePixelRatio;
    });
}
window.addEventListener('resize', resizeCanvases);
resizeCanvases();

function triggerHeartPulse() {
    ecgData = 1.0; // 觸發 QRS 尖峰
}

function drawWaveforms() {
    requestAnimationFrame(drawWaveforms);

    const w = ecgCanvas.width;
    const h = ecgCanvas.height;

    // 清除前端繪製軌跡
    ecgCtx.fillStyle = 'rgba(5, 7, 20, 0.15)';
    ecgCtx.fillRect(ecgX, 0, 8, h);
    gutCtx.fillStyle = 'rgba(5, 7, 20, 0.15)';
    gutCtx.fillRect(gutX, 0, 8, h);

    // 心電圖 (ECG) 畫線
    ecgCtx.beginPath();
    ecgCtx.strokeStyle = '#10b981';
    ecgCtx.lineWidth = 2 * window.devicePixelRatio;

    let yEcg = h / 2;
    if (state.isListening) {
        if (ecgData > 0.1) {
            yEcg -= ecgData * (h * 0.4);
            ecgData *= 0.7; // 衰減
        } else {
            yEcg += (Math.random() - 0.5) * 3;
        }
    }

    ecgCtx.moveTo(ecgX, yEcg);
    ecgX = (ecgX + 2) % w;
    ecgCtx.lineTo(ecgX, yEcg);
    ecgCtx.stroke();

    // 腸胃波形 (Gut Wave) 畫線
    gutCtx.beginPath();
    gutCtx.strokeStyle = '#34d399';
    gutCtx.lineWidth = 2 * window.devicePixelRatio;

    let yGut = h / 2;
    if (state.isListening) {
        const freq = state.mode === 'gut' ? 0.08 : 0.02;
        yGut += Math.sin(Date.now() * freq * 0.05) * (h * 0.3) + (Math.random() - 0.5) * 4;
    }

    gutCtx.moveTo(gutX, yGut);
    gutX = (gutX + 2) % w;
    gutCtx.lineTo(gutX, yGut);
    gutCtx.stroke();
}
drawWaveforms();

/* ──────────────────────────────
   六、Three.js 2.5D 解剖場景與死鎖綁定
   ────────────────────────────── */
const container = document.querySelector('.viewport-panel');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true, antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// 強光防黑
const ambientLight = new THREE.AmbientLight(0xffffff, 1.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// 核心複合群組 (死鎖綁定容器)
const characterGroup = new THREE.Group();
scene.add(characterGroup);

// 預設縮放 1.21 (高度佔 Viewport 95% ~ 105%)
characterGroup.scale.set(1.21, 1.21, 1.21);
characterGroup.position.set(0, -3.2, 0); // 底部中心置中

// 1. 預設備用預設角色 Canvas (避免外部圖片載入失敗時黑屏)
function createProceduralGirlTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // 繪製簡單 Q 版女孩底圖
    ctx.fillStyle = '#fbcfe8';
    ctx.beginPath(); // 頭色
    ctx.arc(256, 220, 120, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#38bdf8'; // 服裝
    ctx.fillRect(176, 340, 160, 260);

    ctx.fillStyle = '#000000'; // 眼睛
    ctx.beginPath();
    ctx.arc(210, 220, 12, 0, Math.PI * 2);
    ctx.arc(302, 220, 12, 0, Math.PI * 2);
    ctx.fill();

    return new THREE.CanvasTexture(canvas);
}

const charGeo = new THREE.PlaneGeometry(3.6, 7.2);
const charMat = new THREE.MeshStandardMaterial({
    map: createProceduralGirlTexture(),
    transparent: true,
    side: THREE.DoubleSide
});
const characterMesh = new THREE.Mesh(charGeo, charMat);
characterMesh.position.set(0, 3.6, 0);
characterGroup.add(characterMesh);

// 載入預設圖片 ./images/girl.png (含純白 Alpha 自動去背)
function loadCharacterImage(url) {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        // 純白像素 Alpha 去背處理
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) {
                data[i+3] = 0;
            }
        }
        ctx.putImageData(imgData, 0, 0);
        
        const texture = new THREE.CanvasTexture(canvas);
        charMat.map = texture;
        charMat.needsUpdate = true;
    };
    img.onerror = () => {
        // 載入失敗時保留Procedural預設圖
    };
    img.src = url;
}
loadCharacterImage('./images/girl.png');

// 2. 解剖心臟 (heartMesh) - 死鎖於 characterGroup
const heartShape = new THREE.Shape();
heartShape.moveTo(0, 0.25);
heartShape.bezierCurveTo(0, 0.25, -0.25, 0.6, -0.5, 0.6);
heartShape.bezierCurveTo(-0.8, 0.6, -0.8, 0.2, -0.8, 0.2);
heartShape.bezierCurveTo(-0.8, -0.2, -0.3, -0.5, 0, -0.8);
heartShape.bezierCurveTo(0.3, -0.5, 0.8, -0.2, 0.8, 0.2);
heartShape.bezierCurveTo(0.8, 0.2, 0.8, 0.6, 0.5, 0.6);
heartShape.bezierCurveTo(0.25, 0.6, 0, 0.25, 0, 0.25);

const heartGeo = new THREE.ShapeGeometry(heartShape);
const heartMat = new THREE.MeshStandardMaterial({
    color: 0xff3355,
    emissive: 0xaa1133,
    emissiveIntensity: 0.6,
    side: THREE.DoubleSide
});
const heartMesh = new THREE.Mesh(heartGeo, heartMat);
heartMesh.scale.set(0.65, 0.65, 0.65);
heartMesh.position.set(-0.2, 4.4, 0.05); // 胸腔位置
heartMesh.name = 'heart';
characterGroup.add(heartMesh);

// 3. 解剖腸胃 (gutMesh) - 死鎖於 characterGroup
const gutShape = new THREE.Shape();
gutShape.moveTo(-0.4, 0.4);
gutShape.bezierCurveTo(-0.8, 0.4, -0.8, -0.4, -0.4, -0.4);
gutShape.bezierCurveTo(0, -0.4, 0.8, -0.3, 0.6, 0.1);
gutShape.bezierCurveTo(0.5, 0.5, 0, 0.4, -0.4, 0.4);

const gutGeo = new THREE.ShapeGeometry(gutShape);
const gutMat = new THREE.MeshStandardMaterial({
    color: 0x34d399,
    emissive: 0x059669,
    emissiveIntensity: 0.5,
    side: THREE.DoubleSide
});
const gutMesh = new THREE.Mesh(gutGeo, gutMat);
gutMesh.scale.set(0.7, 0.7, 0.7);
gutMesh.position.set(0.05, 3.2, 0.05); // 腹部位置
gutMesh.name = 'gut';
characterGroup.add(gutMesh);

// 4. 腳底橢圓陰影 (shadowMesh) - 死鎖於 characterGroup
const shadowGeo = new THREE.RingGeometry(0, 1.2, 32);
const shadowMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.35,
    side: THREE.DoubleSide
});
const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
shadowMesh.rotation.x = Math.PI / 2;
shadowMesh.position.set(0, 0.05, 0);
characterGroup.add(shadowMesh);

/* ──────────────────────────────
   七、動畫與 Raycaster 點擊互動
   ────────────────────────────── */
let heartPulseScale = 1.0;

function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.003;

    // 狀態機連動：監聽中才執行動畫
    if (state.isListening) {
        // 呼吸起伏
        characterGroup.position.y = -3.2 + Math.sin(time * 2) * 0.06;

        // 咖啡因神經發抖
        if (state.nutrition === 'caffeine') {
            characterGroup.position.x = (Math.random() - 0.5) * 0.03;
        } else {
            characterGroup.position.x = 0;
        }

        // 心臟搏動收縮動畫
        if (state.mode === 'heart') {
            heartPulseScale += (1.0 - heartPulseScale) * 0.1;
            heartMesh.scale.set(0.65 * heartPulseScale, 0.65 * (2.0 - heartPulseScale), 0.65);
            heartMat.emissiveIntensity = 0.8;
            gutMat.emissiveIntensity = 0.2;
            gutMesh.scale.set(0.7, 0.7, 0.7); // 腸胃靜止
        } 
        // 腸胃蠕動動畫
        else if (state.mode === 'gut') {
            const gutWave = 1.0 + Math.sin(time * 4) * 0.12;
            gutMesh.scale.set(0.7 * gutWave, 0.7 * (2.0 - gutWave), 0.7);
            gutMat.emissiveIntensity = 0.8;
            heartMat.emissiveIntensity = 0.2;
            heartMesh.scale.set(0.65, 0.65, 0.65); // 心臟靜止
        }
    } else {
        // 停止/待機狀態：全部歸位靜止
        characterGroup.position.set(0, -3.2, 0);
        heartMesh.scale.set(0.65, 0.65, 0.65);
        gutMesh.scale.set(0.7, 0.7, 0.7);
        heartMat.emissiveIntensity = 0.3;
        gutMat.emissiveIntensity = 0.3;
    }

    // 座標投影：動態更新右側 Floating SVG 虛線
    updateSvgLines();

    renderer.render(scene, camera);
}
animate();

// 射線 2.5D 器官點擊
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('pointerdown', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;

    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([heartMesh, gutMesh]);

    if (intersects.length > 0) {
        const clickedName = intersects[0].object.name;
        switchMode(clickedName);
    }
});

// SVG 虛線座標投影
function updateSvgLines() {
    const getScreenPos = (obj) => {
        const wp = new THREE.Vector3();
        obj.getWorldPosition(wp);
        wp.project(camera);
        const rect = renderer.domElement.getBoundingClientRect();
        return {
            x: (wp.x * 0.5 + 0.5) * rect.width + rect.left,
            y: (-(wp.y * 0.5) + 0.5) * rect.height + rect.top
        };
    };

    const heartPos = getScreenPos(heartMesh);
    const gutPos = getScreenPos(gutMesh);

    const labelHeart = document.getElementById('label-heart').getBoundingClientRect();
    const labelGut = document.getElementById('label-gut').getBoundingClientRect();

    const lineHeart = document.getElementById('line-heart');
    lineHeart.setAttribute('x1', heartPos.x);
    lineHeart.setAttribute('y1', heartPos.y);
    lineHeart.setAttribute('x2', labelHeart.left);
    lineHeart.setAttribute('y2', labelHeart.top + labelHeart.height / 2);

    const lineGut = document.getElementById('line-gut');
    lineGut.setAttribute('x1', gutPos.x);
    lineGut.setAttribute('y1', gutPos.y);
    lineGut.setAttribute('x2', labelGut.left);
    lineGut.setAttribute('y2', labelGut.top + labelGut.height / 2);
}

/* ──────────────────────────────
   八、UI 互動與事件綁定
   ────────────────────────────── */
const btnStart = document.getElementById('btn-start-monitor');
const btnStop = document.getElementById('btn-stop-monitor');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

// 開啟監聽
btnStart.addEventListener('click', () => {
    state.isListening = true;
    btnStart.classList.add('active');
    btnStop.classList.remove('active');
    statusDot.className = 'status-dot monitoring';
    statusText.innerText = '監聽中';
    startAudio();
});

// 停止監聽
btnStop.addEventListener('click', () => {
    state.isListening = false;
    btnStart.classList.remove('active');
    btnStop.classList.add('active');
    statusDot.className = 'status-dot stopped';
    statusText.innerText = '已停止';
    stopAudio();
});

// 切換聽診模式
function switchMode(newMode) {
    state.mode = newMode;
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === newMode);
    });
    document.getElementById('hud-target').innerText = newMode === 'heart' ? '心臟' : '腸胃';

    if (state.isListening) {
        if (newMode === 'gut') startGutSound();
        else stopGutSound();
    }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});
document.getElementById('label-heart').addEventListener('click', () => switchMode('heart'));
document.getElementById('label-gut').addEventListener('click', () => switchMode('gut'));

// 切換生理營養狀態
document.querySelectorAll('.nut-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nut-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        state.nutrition = btn.dataset.nut;
        const cfg = NUTRITION_CONFIGS[state.nutrition];
        state.bpm = cfg.bpm;

        document.getElementById('bpm-slider').value = cfg.bpm;
        document.getElementById('bpm-val').innerText = cfg.bpm;
        document.getElementById('hud-bpm').innerText = cfg.bpm + ' BPM';
        document.getElementById('hud-state').innerText = cfg.stateText;
        document.getElementById('hud-emotion').innerText = cfg.emotion;
        document.getElementById('info-text').innerText = '💡 生理說明：' + cfg.info;

        updateAudioHeartbeat();
    });
});

// 手動 BPM 滑桿
const bpmSlider = document.getElementById('bpm-slider');
bpmSlider.addEventListener('input', (e) => {
    state.bpm = parseInt(e.target.value);
    document.getElementById('bpm-val').innerText = state.bpm;
    document.getElementById('hud-bpm').innerText = state.bpm + ' BPM';
    updateAudioHeartbeat();
});

// 角色選擇與自訂圖片上傳
const charSelect = document.getElementById('char-select');
const fileInput = document.getElementById('file-input');

charSelect.addEventListener('change', (e) => {
    if (e.target.value === 'custom') {
        fileInput.click();
    } else {
        loadCharacterImage('./images/girl.png');
    }
});

fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => loadCharacterImage(evt.target.result);
        reader.readAsDataURL(file);
    }
});

// 響應式 Viewport 調整
window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
