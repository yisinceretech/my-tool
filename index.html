<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人體小偵探 Little Body Detective v3.5 - 精緻動漫模型版</title>
    <style>
        * { box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #040712; color: #ffffff; user-select: none;
        }
        
        #app-wrapper { display: flex; width: 100%; height: 100%; position: relative; }
        #canvas-container { position: absolute; top: 0; right: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 左側高科技毛玻璃控制面板 */
        #control-panel {
            position: relative;
            width: 400px;
            height: 100%;
            background: rgba(6, 11, 26, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 229, 255, 0.15);
            z-index: 10;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.6);
        }
        
        /* 捲軸美化 */
        #control-panel::-webkit-scrollbar { width: 6px; }
        #control-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        #control-panel::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 3px; }

        .brand-header { margin-bottom: 5px; }
        h1 { font-size: 24px; margin: 0; color: #00e5ff; font-weight: 700; text-shadow: 0 0 15px rgba(0,229,255,0.4); letter-spacing: 1px; }
        .version-badge { font-size: 11px; color: #8a9fc4; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; display: block; }
        
        .panel-section { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 14px; padding: 16px; margin-bottom: 16px; transition: border-color 0.3s; }
        .panel-section:hover { border-color: rgba(0, 229, 255, 0.3); }
        .section-title { font-size: 13px; color: #00ffcc; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        
        /* 無 CORS 檔案拖放區 */
        .file-drop-zone {
            position: relative;
            width: 100%;
            border: 2px dashed rgba(0, 229, 255, 0.3);
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            background: rgba(0, 229, 255, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-drop-zone:hover { background: rgba(0, 229, 255, 0.08); border-color: #00ffcc; box-shadow: 0 0 12px rgba(0,255,204,0.2); }
        .file-drop-text { font-size: 13px; color: #e2e8f0; font-weight: 500; }
        #model-file-picker { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        #loader-status-log { font-size: 11px; color: #a0aec0; text-align: center; margin-top: 8px; word-break: break-all; line-height: 1.4; }

        /* 主控按鈕 */
        .action-main-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .btn-state-start { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #040712; box-shadow: 0 4px 20px rgba(0,242,254,0.35); }
        .btn-state-start:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0,242,254,0.5); }
        .btn-state-stop { background: linear-gradient(135deg, #ff0844, #ffb199); color: #ffffff; box-shadow: 0 4px 20px rgba(255,8,68,0.35); }
        .btn-state-stop:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,8,68,0.5); }
        
        /* 網格選擇鈕 */
        .btn-flex-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .panel-select-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e0;
            padding: 10px 4px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 500;
        }
        .panel-select-btn:hover { background: rgba(255,255,255,0.12); color: #ffffff; }
        .panel-select-btn.active {
            background: linear-gradient(135deg, #00ffcc, #00b4db);
            border-color: #00ffcc;
            color: #040712;
            font-weight: 700;
            box-shadow: 0 0 12px rgba(0,255,204,0.4);
        }
        
        /* 2D 示波監視器 */
        #scope-display-frame { width: 100%; height: 110px; background: #02050f; border-radius: 10px; border: 1px solid rgba(0,229,255,0.25); overflow: hidden; position: relative; }
        #scope-canvas { width: 100%; height: 100%; display: block; }
        #scope-overlay-tag { position: absolute; top: 6px; left: 8px; font-size: 10px; color: #00ffcc; opacity: 0.8; font-family: monospace; letter-spacing: 0.5px; }
        
        /* 數據欄 */
        .telemetry-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: #a0aec0; }
        .telemetry-val { color: #00ffcc; font-weight: bold; font-family: monospace; }
        
        /* 滑桿 */
        .audio-slider-box { margin-top: 12px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: #a0aec0; }
        .native-range-input { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.12); height: 6px; border-radius: 3px; outline: none; }
        .native-range-input::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 6px; background: #00ffcc; cursor: pointer; box-shadow: 0 0 8px #00ffcc; }

        .panel-footer-tip { font-size: 11px; color: #52638c; line-height: 1.5; text-align: justify; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.06); }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="control-panel">
            <div class="brand-header">
                <h1>人體小偵探</h1>
                <span class="version-badge">v3.5 精緻動漫模型版</span>
            </div>
            
            <button id="main-audio-toggle" class="action-main-btn btn-state-start">▶️ 啟動聽診探針監聽</button>
            
            <div class="panel-section">
                <div class="section-title">📁 導入自訂精緻動漫 3D 模型 (.glb)</div>
                <div class="file-drop-zone">
                    <div class="file-drop-text">拖放或點擊加載精緻 GLB 檔案</div>
                    <input type="file" id="model-file-picker" accept=".glb,.gltf">
                </div>
                <div id="loader-status-log">未加載外部模型 (目前運行防彈備用幾何體)</div>
            </div>

            <div class="panel-section">
                <div class="section-title">🩺 選擇聽診器官焦點</div>
                <div class="btn-flex-grid">
                    <button class="panel-select-btn active" data-target-organ="heart">🫀 心臟瓣膜</button>
                    <button class="panel-select-btn" data-target-organ="stomach">胃部食糜</button>
                    <button class="panel-select-btn" data-target-organ="small_int">🥦 小腸蠕動</button>
                    <button class="panel-select-btn" data-target-organ="large_int">💩 大腸高頻</button>
                    <button class="panel-select-btn" data-target-organ="kidney" style="grid-column: span 2;">🧬 脾臟 / 腎臟過濾</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">🧪 飲食生理對照實驗模擬</div>
                <div class="btn-flex-grid">
                    <button class="panel-select-btn active" data-target-state="normal">🥗 正常生理</button>
                    <button class="panel-select-btn" data-target-state="caffeine">☕ 咖啡因過量</button>
                    <button class="panel-select-btn" data-target-state="sugar">🥤 高精緻糖反應</button>
                    <button class="panel-select-btn" data-target-state="dehydrate">🌵 缺水缺纖維</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">📊 實時生理訊號波形</div>
                <div id="scope-display-frame">
                    <div id="scope-overlay-tag">ECG_SIGNAL_FEED_REALTIME</div>
                    <canvas id="scope-canvas"></canvas>
                </div>
                <div style="margin-top: 12px;">
                    <div class="telemetry-row"><span>量測動態頻率</span><span id="data-freq" class="telemetry-val">72 BPM</span></div>
                    <div class="telemetry-row"><span>訊號振幅增益</span><span id="data-amp" class="telemetry-val">1.0x</span></div>
                </div>
                
                <div class="audio-slider-box">
                    <div class="slider-header"><span>🔊 聽診探針音量</span><span id="text-volume-ratio">70%</span></div>
                    <input type="range" id="volume-range-slider" class="native-range-input" min="0" max="100" value="70">
                </div>
            </div>

            <div class="panel-footer-tip">
                💡 <b>本機安全載入機制：</b> 本系統透過 HTML5 FileReader 解析二進位資料，完全繞過瀏覽器跨域 (CORS) 限制。不需架設伺服器即可直接拖曳本地端 .glb 檔案進行渲染透視。
            </div>
        </div>

        <div id="canvas-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- 狀態管理 ---
        const runtimeState = {
            audioActive: false,
            organ: 'heart',
            physiologyState: 'normal',
            volumeRatio: 0.7,
            calculatedBpm: 72,
            lfoFrequency: 3.0
        };

        // --- 初始化 3D 星空場景 ---
        const drawContainer = document.getElementById('canvas-container');
        const mainScene = new THREE.Scene();
        mainScene.background = new THREE.Color(0x040712); // 強制宇宙深藍黑

        const mainCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        mainCamera.position.set(0, 0, 7.5);

        const mainRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        mainRenderer.setSize(window.innerWidth, window.innerHeight);
        mainRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mainRenderer.shadowMap.enabled = true;
        drawContainer.appendChild(mainRenderer.domElement);

        // --- 強烈防呆打光 ---
        const lightAmbient = new THREE.AmbientLight(0xffffff, 1.6);
        mainScene.add(lightAmbient);

        const lightDir1 = new THREE.DirectionalLight(0xffffff, 1.4);
        lightDir1.position.set(5, 12, 8);
        mainScene.add(lightDir1);

        const lightDir2 = new THREE.DirectionalLight(0x88ccff, 0.8);
        lightDir2.position.set(-6, -4, 5);
        mainScene.add(lightDir2);

        // --- 星空特效 ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 600;
        const positionsArray = new Float32Array(particlesCount * 3);
        for(let i=0; i<particlesCount*3; i+=3) {
            positionsArray[i] = (Math.random() - 0.5) * 30;
            positionsArray[i+1] = (Math.random() - 0.5) * 30;
            positionsArray[i+2] = (Math.random() - 0.5) * 30;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x00f2fe, size: 0.05, transparent: true, opacity: 0.8 });
        const starFieldPoints = new THREE.Points(particlesGeometry, particlesMaterial);
        mainScene.add(starFieldPoints);

        // --- 核心模型群組 (置中防擋) ---
        const entityMasterGroup = new THREE.Group();
        mainScene.add(entityMasterGroup);
        entityMasterGroup.position.set(1.6, -0.5, 0); 

        let gltfAnimeMesh = null; 
        let anatomicalOrgans = {}; 

        // --- Fallback 防空殼人偶 ---
        let geometryFallbackBox = new THREE.Group();
        entityMasterGroup.add(geometryFallbackBox);

        function renderFallbackDoll() {
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.5 });
            const clothesMat = new THREE.MeshStandardMaterial({ color: 0xff4081, roughness: 0.4 });
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x1a237e, roughness: 0.7 });
            const pupilsMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const cheekBlushMat = new THREE.MeshBasicMaterial({ color: 0xff80ab, transparent: true, opacity: 0.45 });

            const headMesh = new THREE.Mesh(new THREE.SphereGeometry(1.15, 32, 32), skinMat);
            headMesh.position.y = 1.2;
            geometryFallbackBox.add(headMesh);

            const bunLeft = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), hairMat); bunLeft.position.set(-1.0, 2.0, 0); geometryFallbackBox.add(bunLeft);
            const bunRight = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), hairMat); bunRight.position.set(1.0, 2.0, 0); geometryFallbackBox.add(bunRight);

            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), pupilsMat); eyeL.position.set(-0.35, 0.9, 0.98); geometryFallbackBox.add(eyeL);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), pupilsMat); eyeR.position.set(0.35, 0.9, 0.98); geometryFallbackBox.add(eyeR);

            const cheekL = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.02, 16), cheekBlushMat); cheekL.position.set(-0.55, 0.65, 0.98); cheekL.rotation.x = Math.PI/2; geometryFallbackBox.add(cheekL);
            const cheekR = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.02, 16), cheekBlushMat); cheekR.position.set(0.55, 0.65, 0.98); cheekR.rotation.x = Math.PI/2; geometryFallbackBox.add(cheekR);

            const bodyCylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.65, 1.1, 32), clothesMat);
            bodyCylinder.position.y = -0.05;
            geometryFallbackBox.add(bodyCylinder);

            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.5, 16), clothesMat); armL.position.set(-0.75, -0.05, 0); armL.rotation.z = 0.4; geometryFallbackBox.add(armL);
            const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.5, 16), clothesMat); armR.position.set(0.75, -0.05, 0); armR.rotation.z = -0.4; geometryFallbackBox.add(armR);
        }
        renderFallbackDoll();

        // --- 體內發光器官 ---
        function renderInternalAnatomy() {
            const hGeo = new THREE.SphereGeometry(0.24, 32, 32); hGeo.scale(1, 1.2, 0.85);
            const hMat = new THREE.MeshBasicMaterial({ color: 0xff0033 });
            const heartMesh = new THREE.Mesh(hGeo, hMat); heartMesh.position.set(0.14, 0.12, 0.26);
            entityMasterGroup.add(heartMesh); anatomicalOrgans.heart = heartMesh;

            const sGeo = new THREE.SphereGeometry(0.28, 32, 32); sGeo.scale(1.3, 0.85, 0.85);
            const sMat = new THREE.MeshBasicMaterial({ color: 0x22ff55 });
            const stomachMesh = new THREE.Mesh(sGeo, sMat); stomachMesh.position.set(-0.16, -0.25, 0.26);
            entityMasterGroup.add(stomachMesh); anatomicalOrgans.stomach = stomachMesh;

            const siGeo = new THREE.SphereGeometry(0.25, 16, 16);
            const siMat = new THREE.MeshBasicMaterial({ color: 0xff9900 });
            const smallIntMesh = new THREE.Mesh(siGeo, siMat); smallIntMesh.position.set(0, -0.55, 0.25);
            entityMasterGroup.add(smallIntMesh); anatomicalOrgans.small_int = smallIntMesh;

            const liGeo = new THREE.SphereGeometry(0.32, 16, 16);
            const liMat = new THREE.MeshBasicMaterial({ color: 0x8b5a2b });
            const largeIntMesh = new THREE.Mesh(liGeo, liMat); largeIntMesh.position.set(0, -0.55, 0.12);
            entityMasterGroup.add(largeIntMesh); anatomicalOrgans.large_int = largeIntMesh;

            const kGeo = new THREE.SphereGeometry(0.14, 16, 16);
            const kMat = new THREE.MeshBasicMaterial({ color: 0x0077ff });
            const kidneyMesh = new THREE.Mesh(kGeo, kMat); kidneyMesh.position.set(0.28, -0.35, -0.05);
            entityMasterGroup.add(kidneyMesh); anatomicalOrgans.kidney = kidneyMesh;
        }
        renderInternalAnatomy();

        // --- 無 CORS 模型載入器 (FileReader -> ArrayBuffer -> parse) ---
        const assetLoader = new THREE.GLTFLoader();
        const uiFilePicker = document.getElementById('model-file-picker');
        const uiStatusLog = document.getElementById('loader-status-log');

        uiFilePicker.addEventListener('change', function(event) {
            const uploadedFile = event.target.files[0];
            if (!uploadedFile) return;

            uiStatusLog.innerText = "⚡ 解析檔案二進位流中...";

            const fileStreamReader = new FileReader();
            fileStreamReader.readAsArrayBuffer(uploadedFile);
            fileStreamReader.onload = function(readEvent) {
                const bufferArray = readEvent.target.result;

                assetLoader.parse(bufferArray, '', function(parsedGltf) {
                    if (geometryFallbackBox) entityMasterGroup.remove(geometryFallbackBox);
                    if (gltfAnimeMesh) entityMasterGroup.remove(gltfAnimeMesh);

                    gltfAnimeMesh = parsedGltf.scene;
                    
                    const boundingBox = new THREE.Box3().setFromObject(gltfAnimeMesh);
                    const sizeVector = boundingBox.getSize(new THREE.Vector3());
                    const targetDimension = Math.max(sizeVector.x, sizeVector.y, sizeVector.z);
                    const calculatedScale = 3.4 / targetDimension; 
                    gltfAnimeMesh.scale.set(calculatedScale, calculatedScale, calculatedScale);
                    
                    const centerPoint = boundingBox.getCenter(new THREE.Vector3());
                    gltfAnimeMesh.position.set(-centerPoint.x * calculatedScale, -centerPoint.y * calculatedScale + 0.35, -centerPoint.z * calculatedScale);

                    // X-Ray Magic: 遍歷所有網格設為半透明
                    gltfAnimeMesh.traverse((childNode) => {
                        if (childNode.isMesh) {
                            childNode.castShadow = true;
                            childNode.receiveShadow = true;
                            childNode.material.transparent = true;
                            childNode.material.opacity = 0.38; 
                            childNode.material.depthWrite = true;
                        }
                    });

                    entityMasterGroup.add(gltfAnimeMesh);
                    uiStatusLog.innerHTML = "🎉 加載成功！透視艙已包裹模型：" + uploadedFile.name;
                }, function(parseError) {
                    uiStatusLog.innerText = "❌ 解析失敗，請確認檔案格式是否正確";
                });
            };
        });

        let currentRotationTargetY = 0;
        let currentRotationTargetX = 0;
        window.addEventListener('mousemove', (mouseEvent) => {
            const horizontalCenter = window.innerWidth * 0.65;
            const verticalCenter = window.innerHeight * 0.5;
            currentRotationTargetY = ((mouseEvent.clientX - horizontalCenter) / window.innerWidth) * (Math.PI / 2.5);
            currentRotationTargetX = ((mouseEvent.clientY - verticalCenter) / window.innerHeight) * (Math.PI / 5);
        });


        // --- Web Audio API 引擎 ---
        let webAudioContext = null;
        let dspMasterGain = null;
        let dspAnalyser = null;
        let timedAudioLoop = null;

        function awakeAudioContext() {
            const AudioContextRoot = window.AudioContext || window.webkitAudioContext;
            webAudioContext = new AudioContextRoot();
            dspMasterGain = webAudioContext.createGain();
            dspMasterGain.gain.setValueAtTime(runtimeState.volumeRatio, webAudioContext.currentTime);
            dspAnalyser = webAudioContext.createAnalyser();
            dspAnalyser.fftSize = 256;
            dspMasterGain.connect(dspAnalyser);
            dspAnalyser.connect(webAudioContext.destination);
        }

        // 🫀 心跳 Lub-dub
        function playLubDubWaveform() {
            if (!runtimeState.audioActive || runtimeState.organ !== 'heart') return;

            const timeNow = webAudioContext.currentTime;
            
            const oscLub = webAudioContext.createOscillator();
            const gainLub = webAudioContext.createGain();
            oscLub.type = 'sine';
            oscLub.frequency.setValueAtTime(runtimeState.physiologyState === 'caffeine' ? 68 : 46, timeNow);
            gainLub.gain.setValueAtTime(0.001, timeNow);
            gainLub.gain.exponentialRampToValueAtTime(0.85, timeNow + 0.02);
            gainLub.gain.exponentialRampToValueAtTime(0.001, timeNow + 0.16);
            oscLub.connect(gainLub); gainLub.connect(dspMasterGain);
            oscLub.start(timeNow); oscLub.stop(timeNow + 0.18);

            setTimeout(() => {
                if (!runtimeState.audioActive || runtimeState.organ !== 'heart') return;
                const timeNowDub = webAudioContext.currentTime;
                const oscDub = webAudioContext.createOscillator();
                const gainDub = webAudioContext.createGain();
                oscDub.type = 'sine';
                oscDub.frequency.setValueAtTime(runtimeState.physiologyState === 'caffeine' ? 88 : 66, timeNowDub);
                gainDub.gain.setValueAtTime(0.001, timeNowDub);
                gainDub.gain.exponentialRampToValueAtTime(0.6, timeNowDub + 0.02);
                gainDub.gain.exponentialRampToValueAtTime(0.001, timeNowDub + 0.13);
                oscDub.connect(gainDub); gainDub.connect(dspMasterGain);
                oscDub.start(timeNowDub); oscDub.stop(timeNowDub + 0.15);
            }, 160);
        }

        // 消化系統流體不規則噪訊調變
        let dspNoiseNode = null;
        let dspNoiseGain = null;

        function startContinuousVisceralSound() {
            stopContinuousVisceralSound();
            if (!runtimeState.audioActive || runtimeState.organ === 'heart') return;

            const sampleRate = webAudioContext.sampleRate;
            const bufferSize = sampleRate * 2;
            const noiseBuffer = webAudioContext.createBuffer(1, bufferSize, sampleRate);
            const channelData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) channelData[i] = Math.random() * 2 - 1;

            dspNoiseNode = webAudioContext.createBufferSource();
            dspNoiseNode.buffer = noiseBuffer;
            dspNoiseNode.loop = true;
            dspNoiseGain = webAudioContext.createGain();
            const dspFilter = webAudioContext.createBiquadFilter();

            if (runtimeState.organ === 'stomach') {
                dspFilter.type = 'lowpass'; dspFilter.frequency.setValueAtTime(170, webAudioContext.currentTime);
                dspNoiseGain.gain.setValueAtTime(0.35, webAudioContext.currentTime);
            } else if (runtimeState.organ === 'small_int') {
                dspFilter.type = 'bandpass'; dspFilter.frequency.setValueAtTime(900, webAudioContext.currentTime);
                dspNoiseGain.gain.setValueAtTime(0.22, webAudioContext.currentTime);
            } else if (runtimeState.organ === 'large_int') {
                dspFilter.type = 'lowpass'; dspFilter.frequency.setValueAtTime(110, webAudioContext.currentTime);
                dspNoiseGain.gain.setValueAtTime(0.3, webAudioContext.currentTime);
            } else if (runtimeState.organ === 'kidney') {
                dspFilter.type = 'lowpass'; dspFilter.frequency.setValueAtTime(75, webAudioContext.currentTime);
                dspNoiseGain.gain.setValueAtTime(0.1, webAudioContext.currentTime);
            }

            if (runtimeState.physiologyState === 'sugar') {
                dspFilter.frequency.setValueAtTime(dspFilter.frequency.value * 0.5, webAudioContext.currentTime);
                dspNoiseGain.gain.setValueAtTime(dspNoiseGain.gain.value * 0.2, webAudioContext.currentTime);
            } else if (runtimeState.physiologyState === 'caffeine') {
                dspNoiseGain.gain.setValueAtTime(dspNoiseGain.gain.value * 1.7, webAudioContext.currentTime);
            }

            dspNoiseNode.connect(dspFilter); dspFilter.connect(dspNoiseGain); dspNoiseGain.connect(dspMasterGain);
            dspNoiseNode.start(0);

            applyLfoVisceralEnvelope();
        }

        function applyLfoVisceralEnvelope() {
            if (!runtimeState.audioActive || !dspNoiseGain || runtimeState.organ === 'heart') return;
            const timeSnapshot = webAudioContext.currentTime;
            let stepPeriod = 1000 / runtimeState.lfoFrequency;
            let targetEnvelopeAmp = 0.15 + Math.random() * 0.55;
            if (runtimeState.physiologyState === 'sugar') targetEnvelopeAmp *= 0.15;
            if (runtimeState.physiologyState === 'caffeine') targetEnvelopeAmp *= 1.6;
            dspNoiseGain.gain.linearRampToValueAtTime(targetEnvelopeAmp, timeSnapshot + (stepPeriod / 2000));
            setTimeout(applyLfoVisceralEnvelope, stepPeriod);
        }

        function stopContinuousVisceralSound() {
            if (dspNoiseNode) { try { dspNoiseNode.stop(); } catch(e){} dspNoiseNode.disconnect(); dspNoiseNode = null; }
            if (dspNoiseGain) { dspNoiseGain.disconnect(); dspNoiseGain = null; }
        }

        function loopAudioScheduler() {
            if (!runtimeState.audioActive) return;
            playLubDubWaveform();
            let loopInterval = (60 / runtimeState.calculatedBpm) * 1000;
            timedAudioLoop = setTimeout(loopAudioScheduler, loopInterval);
        }

        // --- 狀態數據重新計算 ---
        function executePhysiologyRecalculate() {
            if (runtimeState.physiologyState === 'normal') {
                runtimeState.calculatedBpm = 72; runtimeState.lfoFrequency = 3.0;
                document.getElementById('data-freq').innerText = runtimeState.organ === 'heart' ? "72 BPM" : "3.0 Hz";
            } else if (runtimeState.physiologyState === 'caffeine') {
                runtimeState.calculatedBpm = 135; runtimeState.lfoFrequency = 7.2;
                document.getElementById('data-freq').innerText = runtimeState.organ === 'heart' ? "135 BPM" : "7.2 Hz";
            } else if (runtimeState.physiologyState === 'sugar') {
                runtimeState.calculatedBpm = 52; runtimeState.lfoFrequency = 0.6;
                document.getElementById('data-freq').innerText = runtimeState.organ === 'heart' ? "52 BPM" : "0.6 Hz";
            } else if (runtimeState.physiologyState === 'dehydrate') {
                runtimeState.calculatedBpm = 88; runtimeState.lfoFrequency = 0.4;
                document.getElementById('data-freq').innerText = runtimeState.organ === 'heart' ? "88 BPM" : "0.4 Hz";
            }

            if (runtimeState.audioActive) {
                clearTimeout(timedAudioLoop);
                if (runtimeState.organ === 'heart') { stopContinuousVisceralSound(); loopAudioScheduler(); }
                else { startContinuousVisceralSound(); }
            }
        }

        // --- UI 事件綁定 ---
        const toggleAudioButton = document.getElementById('main-audio-toggle');
        toggleAudioButton.addEventListener('click', () => {
            if (!webAudioContext) awakeAudioContext();
            runtimeState.audioActive = !runtimeState.audioActive;
            if (runtimeState.audioActive) {
                toggleAudioButton.innerText = "⏹️ 停止聽診探針監聽"; toggleAudioButton.className = "action-main-btn btn-state-stop";
                if (runtimeState.organ === 'heart') loopAudioScheduler(); else startContinuousVisceralSound();
            } else {
                toggleAudioButton.innerText = "▶️ 啟ড়ান্ত聽診探針監聽"; toggleAudioButton.className = "action-main-btn btn-state-start";
                clearTimeout(timedAudioLoop); stopContinuousVisceralSound();
            }
        });

        document.querySelectorAll('[data-target-organ]').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('[data-target-organ]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                runtimeState.organ = e.target.getAttribute('data-target-organ');
                executePhysiologyRecalculate();
            });
        });

        document.querySelectorAll('[data-target-state]').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('[data-target-state]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                runtimeState.physiologyState = e.target.getAttribute('data-target-state');
                executePhysiologyRecalculate();
            });
        });

        const inputSliderVolume = document.getElementById('volume-range-slider');
        inputSliderVolume.addEventListener('input', (e) => {
            runtimeState.volumeRatio = e.target.value / 100;
            document.getElementById('text-volume-ratio').innerText = e.target.value + "%";
            if (dspMasterGain) dspMasterGain.gain.setValueAtTime(runtimeState.volumeRatio, webAudioContext.currentTime);
        });

        // --- 原生 2D Canvas 波形 ---
        const targetCanvas = document.getElementById('scope-canvas');
        const drawContext2d = targetCanvas.getContext('2d');
        function resizeScopeCanvas() {
            targetCanvas.width = targetCanvas.parentElement.clientWidth;
            targetCanvas.height = targetCanvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeScopeCanvas);
        resizeScopeCanvas();

        let renderingHorizontalOffset = 0;
        function renderScopeLoop() {
            requestAnimationFrame(renderScopeLoop);
            drawContext2d.fillStyle = '#02050f';
            drawContext2d.fillRect(0, 0, targetCanvas.width, targetCanvas.height);
            
            drawContext2d.strokeStyle = 'rgba(0, 229, 255, 0.08)'; drawContext2d.lineWidth = 1;
            for(let x=0; x<targetCanvas.width; x+=25) { drawContext2d.beginPath(); drawContext2d.moveTo(x, 0); drawContext2d.lineTo(x, targetCanvas.height); drawContext2d.stroke(); }
            for(let y=0; y<targetCanvas.height; y+=25) { drawContext2d.beginPath(); drawContext2d.moveTo(0, y); drawContext2d.lineTo(targetCanvas.width, y); drawContext2d.stroke(); }

            drawContext2d.beginPath();
            if (runtimeState.physiologyState === 'caffeine') drawContext2d.strokeStyle = '#ff3366';
            else if (runtimeState.physiologyState === 'sugar') drawContext2d.strokeStyle = '#3b629b';
            else drawContext2d.strokeStyle = '#00ffcc';
            drawContext2d.lineWidth = 2;

            const cWidth = targetCanvas.width; const yMid = targetCanvas.height / 2;
            drawContext2d.moveTo(0, yMid);

            for (let i = 0; i < cWidth; i++) {
                let yPos = yMid;
                if (runtimeState.audioActive) {
                    if (runtimeState.organ === 'heart') {
                        let singleHeartCycle = (60 / runtimeState.calculatedBpm) * 60;
                        let currentStep = (i + renderingHorizontalOffset) % singleHeartCycle;
                        if (currentStep < 6) yPos -= Math.sin(currentStep / 6 * Math.PI) * 7;
                        else if (currentStep >= 9 && currentStep < 12) yPos += 5;
                        else if (currentStep >= 12 && currentStep < 16) yPos -= 42 * (runtimeState.physiologyState === 'caffeine' ? 1.3 : 1.0);
                        else if (currentStep >= 16 && currentStep < 20) yPos += 14;
                        else if (currentStep >= 30 && currentStep < 42) yPos -= Math.sin((currentStep - 30) / 12 * Math.PI) * 11;
                    } else {
                        let frequencyMultiplier = runtimeState.lfoFrequency * 0.075;
                        let amplitudeMultiplier = runtimeState.physiologyState === 'caffeine' ? 22 : (runtimeState.physiologyState === 'sugar' ? 3 : 12);
                        yPos += Math.sin(i * frequencyMultiplier + renderingHorizontalOffset * 0.25) * amplitudeMultiplier;
                        yPos += Math.cos(i * 0.18 - renderingHorizontalOffset * 0.12) * (amplitudeMultiplier * 0.35);
                    }
                }
                drawContext2d.lineTo(i, yPos);
            }
            drawContext2d.stroke();
            if (runtimeState.audioActive) renderingHorizontalOffset += runtimeState.physiologyState === 'caffeine' ? 3.8 : 1.6;
        }
        renderScopeLoop();

        // --- 3D 動態渲染循環 ---
        const deltaClock = new THREE.Clock();
        function main3DRenderLoop() {
            requestAnimationFrame(main3DRenderLoop);
            const totalElapsed = deltaClock.getElapsedTime();

            starFieldPoints.rotation.y = totalElapsed * 0.012;
            entityMasterGroup.rotation.y += (currentRotationTargetY - entityMasterGroup.rotation.y) * 0.06;
            entityMasterGroup.rotation.x += (currentRotationTargetX - entityMasterGroup.rotation.x) * 0.06;

            // 暗化未選中器官
            for (let organKey in anatomicalOrgans) {
                anatomicalOrgans[organKey].material.color.setHex(
                    organKey === 'heart' ? 0x480308 : 
                    organKey === 'stomach' ? 0x054010 : 
                    organKey === 'small_int' ? 0x452500 : 
                    organKey === 'large_int' ? 0x301a05 : 0x021a45
                );
            }

            // 選中器官發光跳動
            if (anatomicalOrgans[runtimeState.organ]) {
                const currentFocusMesh = anatomicalOrgans[runtimeState.organ];
                if (runtimeState.organ === 'heart') {
                    currentFocusMesh.material.color.setHex(0xff0033);
                    if (runtimeState.audioActive) {
                        let heartCycleDuration = (60 / runtimeState.calculatedBpm);
                        let cycleProgress = (totalElapsed % heartCycleDuration) / heartCycleDuration;
                        let pulseScale = 1.0;
                        if (cycleProgress < 0.16) pulseScale = 1.28 * (runtimeState.physiologyState === 'caffeine' ? 1.15 : 1.0);
                        else if (cycleProgress >= 0.16 && cycleProgress < 0.36) pulseScale = 1.12;
                        currentFocusMesh.scale.set(pulseScale, pulseScale * 1.2, pulseScale * 0.85);
                    } else currentFocusMesh.scale.set(1, 1.2, 0.85);
                } else {
                    if (runtimeState.organ === 'stomach') currentFocusMesh.material.color.setHex(0x22ff55);
                    else if (runtimeState.organ === 'small_int') currentFocusMesh.material.color.setHex(0xffaa00);
                    else if (runtimeState.organ === 'large_int') currentFocusMesh.material.color.setHex(0xe5a65d);
                    else if (runtimeState.organ === 'kidney') currentFocusMesh.material.color.setHex(0x00b4db);

                    if (runtimeState.audioActive) {
                        let lfoPeristalsisSpeed = runtimeState.lfoFrequency * 2.5;
                        let dynamicPulseFactor = 1.0 + Math.sin(totalElapsed * lfoPeristalsisSpeed) * 0.09;
                        if(runtimeState.physiologyState === 'sugar') dynamicPulseFactor = 1.01;
                        currentFocusMesh.scale.set(dynamicPulseFactor * (runtimeState.organ==='stomach'?1.3:1), dynamicPulseFactor, dynamicPulseFactor);
                    } else currentFocusMesh.scale.set(runtimeState.organ==='stomach'?1.3:1, 1, 1);
                }
            }

            // 神經反射 (Jitter)
            if (runtimeState.physiologyState === 'caffeine' && runtimeState.audioActive) {
                entityMasterGroup.position.x = 1.6 + (Math.random() - 0.5) * 0.025;
                entityMasterGroup.position.y = -0.5 + (Math.random() - 0.5) * 0.025;
            } else {
                entityMasterGroup.position.x = 1.6; entityMasterGroup.position.y = -0.5;
            }

            mainRenderer.render(mainScene, mainCamera);
        }
        main3DRenderLoop();

        window.addEventListener('resize', () => {
            mainCamera.aspect = window.innerWidth / window.innerHeight;
            mainCamera.updateProjectionMatrix();
            mainRenderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
