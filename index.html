<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 v2.9 (專屬 Q 版女孩特仕版)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 粉紫到粉藍的馬卡龍漸層背景 */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 左側 UI 控制面板 */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            height: calc(100% - 40px);
            background: rgba(42, 42, 53, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 10;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: #fff;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #8ec5fc;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            background: #4a4a5a;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #5a5a6a; }
        button.active { background: #e0c3fc; color: #2a2a35; }
        
        .btn-start { background: #4CAF50; font-size: 1.1rem; padding: 15px; }
        .btn-start:hover { background: #45a049; }
        .btn-stop { background: #f44336; font-size: 1.1rem; padding: 15px; display: none;}
        .btn-stop:hover { background: #da190b; }

        .organ-selector {
            display: flex;
            gap: 10px;
        }

        .organ-btn {
            flex: 1;
            font-size: 1.2rem;
            padding: 15px 5px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-top: -5px;
        }

        /* 隱藏不相關的控制項 */
        .mode-heart, .mode-stomach { display: none; }
        .mode-heart.active, .mode-stomach.active { display: block; }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>身體聲音合成器 v2.9<br><small>專屬 Q 版女孩特仕版</small></h1>

        <div class="control-group">
            <div class="status-text">✅ 系統已自動生成 3D 專屬代言人</div>
            <div class="status-text" style="margin-top: 5px;">(粉紅透視 T 恤 / 淺藍短褲)</div>
        </div>

        <button id="btn-start" class="btn-start">▶️ 開始監聽</button>
        <button id="btn-stop" class="btn-stop">⏹ 停止監聽</button>

        <div class="control-group">
            <h3>🩺 聽診部位 (可直接點擊 3D 器官)</h3>
            <div class="organ-selector">
                <button id="btn-target-heart" class="organ-btn active">🫀 心跳</button>
                <button id="btn-target-stomach" class="organ-btn">🌪️ 腸胃</button>
            </div>
        </div>

        <div class="control-group mode-heart active">
            <h3>🫀 生理狀態 (心跳)</h3>
            <button id="btn-state-normal" class="active">一般心跳 (60 BPM)</button>
            <button id="btn-state-caffeine">☕ 咖啡因刺激 (神經反射)</button>
            <button id="btn-state-sugar">🍩 暈糖反應 (疲憊無力)</button>
            
            <label style="margin-top: 15px;">自訂 BPM: <span id="bpm-value">60</span></label>
            <input type="range" id="slider-bpm" min="40" max="140" value="60">
        </div>

        <div class="control-group mode-stomach">
            <h3>🌪️ 營養消化 (腸胃)</h3>
            <button id="btn-diet-normal" class="active">一般消化狀態</button>
            <button id="btn-diet-fiber">🥦 高纖維原型食物 (健康)</button>
            <button id="btn-diet-sugar">🥤 精緻糖水 (空洞沉悶)</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 核心狀態管理
        // ==========================================
        const State = {
            isPlaying: false,
            target: 'heart', // 'heart' or 'stomach'
            heartMode: 'normal',
            stomachMode: 'normal',
            bpm: 60
        };

        // ==========================================
        // 2. Web Audio API 聲音合成引擎 (DSP)
        // ==========================================
        let audioCtx;
        let sourceNode;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function stopAudio() {
            if (sourceNode) {
                sourceNode.stop();
                sourceNode.disconnect();
                sourceNode = null;
            }
        }

        function playAudio() {
            if (!State.isPlaying) return;
            initAudio();
            stopAudio();

            const sampleRate = audioCtx.sampleRate;
            const duration = 5.0; // 產生 5 秒的音軌迴圈
            const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
            const channel = buffer.getChannelData(0);

            if (State.target === 'heart') {
                // --- 心跳聲合成邏輯 ---
                const bpm = State.bpm;
                const cycleLength = 60 / bpm;
                
                // 暈糖模式的參數變化
                const isSugarCrash = State.heartMode === 'sugar';
                const freqLub = isSugarCrash ? 35 : 45;
                const freqDub = isSugarCrash ? 50 : 65;
                const delayDub = isSugarCrash ? 0.35 : 0.25;

                for (let i = 0; i < buffer.length; i++) {
                    let t = i / sampleRate;
                    let t_cycle = t % cycleLength;
                    
                    let lub = 0;
                    if (t_cycle < 0.25) {
                        lub = Math.sin(2 * Math.PI * freqLub * t_cycle) * Math.exp(-t_cycle * 25);
                    }
                    
                    let dub = 0;
                    let t_dub = t_cycle - delayDub;
                    if (t_dub >= 0 && t_dub < 0.25) {
                        dub = Math.sin(2 * Math.PI * freqDub * t_dub) * Math.exp(-t_dub * 30);
                    }
                    
                    channel[i] = lub + dub;
                }
            } else {
                // --- 腸胃聲合成邏輯 ---
                let cutoff = 200;
                let lfoPower = 4;
                
                if (State.stomachMode === 'fiber') {
                    cutoff = 250; 
                    lfoPower = 2; // 厚實持續
                } else if (State.stomachMode === 'sugar') {
                    cutoff = 100;
                    lfoPower = 8; // 空洞斷續
                }

                let lastOut = 0;
                let lastLfoOut = 0;
                
                for (let i = 0; i < buffer.length; i++) {
                    let noise = (Math.random() * 2 - 1);
                    
                    const alpha = cutoff / (sampleRate / 2);
                    let filteredNoise = lastOut + alpha * (noise - lastOut);
                    lastOut = filteredNoise;

                    let lfoNoise = (Math.random() * 2 - 1);
                    const lfoAlpha = 3 / (sampleRate / 2); 
                    let lfoEnv = lastLfoOut + lfoAlpha * (lfoNoise - lastLfoOut);
                    lastLfoOut = lfoEnv;
                    
                    let env = Math.abs(lfoEnv) * 10; 
                    if(env > 1) env = 1;
                    env = Math.pow(env, lfoPower);

                    channel[i] = filteredNoise * env;
                }
            }

            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = buffer;
            sourceNode.loop = true; 
            sourceNode.connect(audioCtx.destination);
            sourceNode.start();
        }

        // ==========================================
        // 3. Three.js 3D 渲染引擎與 Q 版女孩建模
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // 攝影機設定 (往右推移置中)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 6);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 燈光
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x666666, 0.9);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // 角色骨架參照
        const character = new THREE.Group();
        let headGroup, torso, armL, armR, legL, legR;
        let heartMesh, stomachMesh;
        let eyes = [], eyebrows = [], mouth;

        // --- 開始建立專屬 Q 版女孩 ---
        function createQGirl() {
            // 材質定義
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdcb3, roughness: 0.4 });
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }); // 烏黑頭髮
            const shirtMat = new THREE.MeshPhysicalMaterial({ 
                color: 0xffa6c9, // 粉紅色 Puma T恤
                transmission: 0.9, // 魔法透視玻璃感
                opacity: 1, 
                roughness: 0.1,
                transparent: true
            });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x87ceeb, roughness: 0.7 }); // 淺藍色波浪短褲
            const sockMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 }); // 白襪
            const shoeMat = new THREE.MeshStandardMaterial({ color: 0xadd8e6, roughness: 0.5 }); // 淺藍色運動鞋

            // 1. 軀幹 (粉色透視 T恤)
            const torsoGeo = new THREE.CapsuleGeometry(0.35, 0.6, 32, 32);
            torso = new THREE.Mesh(torsoGeo, shirtMat);
            torso.position.y = 1.3;
            character.add(torso);

            // 2. 器官 (放在軀幹內)
            const heartGeo = new THREE.SphereGeometry(0.12, 32, 32);
            const heartMat = new THREE.MeshPhysicalMaterial({ color: 0xff0000, emissive: 0xaa0000, roughness: 0.2 });
            heartMesh = new THREE.Mesh(heartGeo, heartMat);
            heartMesh.position.set(0.08, 1.45, 0.15);
            heartMesh.userData = { isOrgan: true, type: 'heart' };
            character.add(heartMesh);

            const stomachGeo = new THREE.CapsuleGeometry(0.1, 0.18, 32, 32);
            const stomachMat = new THREE.MeshPhysicalMaterial({ color: 0x00ff00, emissive: 0x008800, roughness: 0.3 });
            stomachMesh = new THREE.Mesh(stomachGeo, stomachMat);
            stomachMesh.rotation.z = Math.PI / 2;
            stomachMesh.position.set(0, 1.1, 0.15);
            stomachMesh.userData = { isOrgan: true, type: 'stomach' };
            character.add(stomachMesh);

            // 3. 頭部與臉部群組
            headGroup = new THREE.Group();
            headGroup.position.y = 2.1;
            character.add(headGroup);

            // 臉
            const headGeo = new THREE.SphereGeometry(0.45, 32, 32);
            const head = new THREE.Mesh(headGeo, skinMat);
            headGroup.add(head);

            // 烏黑長直髮與齊瀏海
            const hairBaseGeo = new THREE.SphereGeometry(0.47, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.55);
            const hairBase = new THREE.Mesh(hairBaseGeo, hairMat);
            hairBase.position.y = 0.02;
            headGroup.add(hairBase);
            
            // 後方長髮
            const backHairGeo = new THREE.CylinderGeometry(0.46, 0.5, 0.8, 32);
            const backHair = new THREE.Mesh(backHairGeo, hairMat);
            backHair.position.set(0, -0.4, -0.1);
            headGroup.add(backHair);

            // 齊瀏海
            const bangsGeo = new THREE.CylinderGeometry(0.46, 0.46, 0.2, 32, 1, false, 0, Math.PI);
            const bangs = new THREE.Mesh(bangsGeo, hairMat);
            bangs.position.set(0, 0.25, 0.02);
            headGroup.add(bangs);

            // 眼睛 (水汪汪迪士尼眼)
            const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const eyeWhiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const pupilGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

            function createEye(x) {
                const eyeGroup = new THREE.Group();
                const white = new THREE.Mesh(eyeGeo, eyeWhiteMat);
                const pupil = new THREE.Mesh(pupilGeo, pupilMat);
                pupil.position.set(0, 0, 0.04);
                eyeGroup.add(white);
                eyeGroup.add(pupil);
                eyeGroup.position.set(x, 0, 0.38);
                headGroup.add(eyeGroup);
                return eyeGroup;
            }
            eyes.push(createEye(-0.18));
            eyes.push(createEye(0.18));

            // 眉毛
            const browGeo = new THREE.CapsuleGeometry(0.015, 0.06, 8, 8);
            function createBrow(x, rotZ) {
                const brow = new THREE.Mesh(browGeo, hairMat);
                brow.rotation.z = Math.PI / 2 + rotZ;
                brow.position.set(x, 0.15, 0.42);
                headGroup.add(brow);
                return brow;
            }
            eyebrows.push(createBrow(-0.18, 0));
            eyebrows.push(createBrow(0.18, 0));

            // 嘴巴
            const mouthGeo = new THREE.CapsuleGeometry(0.02, 0.04, 8, 8);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0xaa3333 });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.rotation.z = Math.PI / 2;
            mouth.position.set(0, -0.15, 0.43);
            headGroup.add(mouth);

            // 4. 四肢
            const armGeo = new THREE.CapsuleGeometry(0.09, 0.4, 16, 16);
            armL = new THREE.Group();
            const armLMesh = new THREE.Mesh(armGeo, skinMat);
            armLMesh.position.y = -0.2;
            armL.add(armLMesh);
            armL.position.set(-0.45, 1.5, 0);
            character.add(armL);

            armR = new THREE.Group();
            const armRMesh = new THREE.Mesh(armGeo, skinMat);
            armRMesh.position.y = -0.2;
            armR.add(armRMesh);
            armR.position.set(0.45, 1.5, 0);
            character.add(armR);

            // 腿部與短褲、鞋襪
            const legGroupL = new THREE.Group();
            const legGroupR = new THREE.Group();

            // 淺藍波浪短褲
            const pantsGeo = new THREE.CylinderGeometry(0.18, 0.16, 0.3, 16);
            const pantsL = new THREE.Mesh(pantsGeo, pantsMat);
            pantsL.position.y = 0.8;
            legGroupL.add(pantsL);
            const pantsR = new THREE.Mesh(pantsGeo, pantsMat);
            pantsR.position.y = 0.8;
            legGroupR.add(pantsR);

            // 腿
            const legGeo = new THREE.CapsuleGeometry(0.1, 0.4, 16, 16);
            const legLMesh = new THREE.Mesh(legGeo, skinMat);
            legLMesh.position.y = 0.4;
            legGroupL.add(legLMesh);
            const legRMesh = new THREE.Mesh(legGeo, skinMat);
            legRMesh.position.y = 0.4;
            legGroupR.add(legRMesh);

            // 白襪
            const sockGeo = new THREE.CylinderGeometry(0.11, 0.11, 0.2, 16);
            const sockL = new THREE.Mesh(sockGeo, sockMat);
            sockL.position.y = 0.2;
            legGroupL.add(sockL);
            const sockR = new THREE.Mesh(sockGeo, sockMat);
            sockR.position.y = 0.2;
            legGroupR.add(sockR);

            // 淺藍運動鞋
            const shoeGeo = new THREE.BoxGeometry(0.24, 0.15, 0.3);
            const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
            shoeL.position.set(0, 0.075, 0.05);
            legGroupL.add(shoeL);
            const shoeR = new THREE.Mesh(shoeGeo, shoeMat);
            shoeR.position.set(0, 0.075, 0.05);
            legGroupR.add(shoeR);

            legGroupL.position.set(-0.18, 0, 0);
            legGroupR.position.set(0.18, 0, 0);
            character.add(legGroupL);
            character.add(legGroupR);

            scene.add(character);
        }
        createQGirl();

        // 射線檢測 (滑鼠點擊 3D 器官)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([heartMesh, stomachMesh]);

            if (intersects.length > 0) {
                const type = intersects[0].object.userData.type;
                switchTarget(type);
            }
        });

        // 視窗縮放處理與畫布黃金比例推移
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // 將 3D 視角中心往右平移，避免被 UI 遮擋
            if(window.innerWidth > 800) {
                camera.setViewOffset(window.innerWidth, window.innerHeight, window.innerWidth * 0.15, 0, window.innerWidth, window.innerHeight);
            } else {
                camera.clearViewOffset();
            }
        }
        window.addEventListener('resize', onWindowResize);
        onWindowResize();

        // ==========================================
        // 4. 動畫迴圈與神經反射連動
        // ==========================================
        const clock = new THREE.Clock();

        // 更新表情與姿態
        function updateExpressions(time) {
            // 重置基本狀態
            headGroup.rotation.set(0, 0, 0);
            armL.rotation.set(0, 0, 0);
            armR.rotation.set(0, 0, 0);
            eyes.forEach(e => e.scale.set(1, 1, 1));
            eyebrows[0].rotation.z = Math.PI / 2;
            eyebrows[1].rotation.z = Math.PI / 2;
            mouth.scale.set(1, 1, 1);

            if (!State.isPlaying) return;

            if (State.target === 'heart') {
                if (State.heartMode === 'caffeine') {
                    // 咖啡因：瞪大眼、挑眉、舉手、發抖
                    eyes.forEach(e => e.scale.set(1.2, 1.2, 1.2));
                    eyebrows[0].rotation.z = Math.PI / 2 + 0.2;
                    eyebrows[0].position.y = 0.18;
                    eyebrows[1].rotation.z = Math.PI / 2 - 0.2;
                    eyebrows[1].position.y = 0.18;
                    mouth.scale.set(0.5, 1.5, 1); // 驚訝 O 型嘴
                    armL.rotation.z = -Math.PI / 4;
                    armR.rotation.z = Math.PI / 4;
                    
                    const jitter = (Math.random() - 0.5) * 0.05;
                    headGroup.rotation.y = jitter;
                    armL.rotation.x = jitter;
                    armR.rotation.x = jitter;
                } else if (State.heartMode === 'sugar') {
                    // 暈糖：無力死魚眼、歪頭、垂手
                    eyes.forEach(e => e.scale.set(1, 0.4, 1)); // 半閉眼
                    eyebrows[0].rotation.z = Math.PI / 2 - 0.2;
                    eyebrows[1].rotation.z = Math.PI / 2 + 0.2;
                    mouth.scale.set(1.5, 0.2, 1); // 扁平嘴
                    headGroup.rotation.z = -0.15; // 歪頭
                    armL.rotation.z = 0.1;
                    armR.rotation.z = -0.1;
                } else {
                    // 正常心跳：微微隨呼吸起伏
                    armL.rotation.z = Math.sin(time * 2) * 0.05 + 0.1;
                    armR.rotation.z = -Math.sin(time * 2) * 0.05 - 0.1;
                }
            } else {
                if (State.stomachMode === 'fiber') {
                    // 高纖維：開心微笑、微微晃頭
                    eyes.forEach(e => e.scale.set(1, 1.1, 1));
                    eyebrows[0].rotation.z = Math.PI / 2 + 0.1;
                    eyebrows[1].rotation.z = Math.PI / 2 - 0.1;
                    mouth.scale.set(1.5, 0.8, 1); 
                    headGroup.rotation.z = Math.sin(time * 3) * 0.1;
                } else if (State.stomachMode === 'sugar') {
                    // 精緻糖：痛苦皺眉
                    eyes.forEach(e => e.scale.set(1, 0.6, 1));
                    eyebrows[0].rotation.z = Math.PI / 2 - 0.3;
                    eyebrows[1].rotation.z = Math.PI / 2 + 0.3;
                    mouth.scale.set(0.8, 0.8, 1);
                    headGroup.rotation.x = 0.1; // 低頭痛苦
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (State.isPlaying) {
                updateExpressions(time);

                // 視覺與聽覺分離：只有選擇該器官時才跳動
                if (State.target === 'heart') {
                    // 心跳動畫
                    const beatFreq = State.bpm / 60;
                    const pulse = Math.abs(Math.sin(time * Math.PI * beatFreq));
                    const scale = 1 + Math.pow(pulse, 8) * 0.4;
                    heartMesh.scale.set(scale, scale, scale);
                    stomachMesh.scale.set(1, 1, 1);

                    // 咖啡因 Jitter 心臟位移
                    if (State.heartMode === 'caffeine') {
                        const jitter = (Math.random() - 0.5) * 0.02;
                        character.position.x = jitter;
                    } else {
                        character.position.x = 0;
                    }
                } else {
                    // 腸胃蠕動動畫
                    const wobble = Math.sin(time * 5) * 0.15;
                    const scale = 1 + Math.abs(wobble);
                    stomachMesh.scale.set(1 + wobble, scale, 1 - wobble);
                    heartMesh.scale.set(1, 1, 1);
                    character.position.x = 0;
                }
            } else {
                // 停止狀態：恢復平靜
                updateExpressions(0);
                heartMesh.scale.set(1,1,1);
                stomachMesh.scale.set(1,1,1);
                character.position.x = 0;
            }

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 5. UI 互動邏輯綁定
        // ==========================================
        
        function switchTarget(target) {
            State.target = target;
            
            // UI 切換
            document.querySelectorAll('.organ-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-target-${target}`).classList.add('active');
            
            document.querySelectorAll('.mode-heart, .mode-stomach').forEach(el => el.classList.remove('active'));
            document.querySelector(`.mode-${target}`).classList.add('active');

            // 器官發光提示
            heartMesh.material.emissive.setHex(target === 'heart' ? 0xff0000 : 0x330000);
            stomachMesh.material.emissive.setHex(target === 'stomach' ? (State.stomachMode==='sugar' ? 0xff0000 : 0x00ff00) : 0x003300);

            if(State.isPlaying) playAudio();
        }

        document.getElementById('btn-target-heart').onclick = () => switchTarget('heart');
        document.getElementById('btn-target-stomach').onclick = () => switchTarget('stomach');

        // 播放控制
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');

        btnStart.onclick = () => {
            State.isPlaying = true;
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            playAudio();
        };

        btnStop.onclick = () => {
            State.isPlaying = false;
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            stopAudio();
        };

        // 心跳狀態控制
        const bpmSlider = document.getElementById('slider-bpm');
        const bpmLabel = document.getElementById('bpm-value');

        function setHeartMode(mode, bpmStr) {
            State.heartMode = mode;
            bpmSlider.value = bpmStr;
            State.bpm = parseInt(bpmStr);
            bpmLabel.innerText = bpmStr;
            
            document.getElementById('btn-state-normal').classList.toggle('active', mode === 'normal');
            document.getElementById('btn-state-caffeine').classList.toggle('active', mode === 'caffeine');
            document.getElementById('btn-state-sugar').classList.toggle('active', mode === 'sugar');
            
            if(State.isPlaying && State.target === 'heart') playAudio();
        }

        document.getElementById('btn-state-normal').onclick = () => setHeartMode('normal', 60);
        document.getElementById('btn-state-caffeine').onclick = () => setHeartMode('caffeine', 115);
        document.getElementById('btn-state-sugar').onclick = () => setHeartMode('sugar', 50);

        bpmSlider.oninput = (e) => {
            State.bpm = parseInt(e.target.value);
            bpmLabel.innerText = State.bpm;
            State.heartMode = 'normal';
            document.querySelectorAll('.mode-heart button').forEach(btn => btn.classList.remove('active'));
            if(State.isPlaying && State.target === 'heart') playAudio();
        };

        // 腸胃狀態控制
        function setStomachMode(mode) {
            State.stomachMode = mode;
            document.getElementById('btn-diet-normal').classList.toggle('active', mode === 'normal');
            document.getElementById('btn-diet-fiber').classList.toggle('active', mode === 'fiber');
            document.getElementById('btn-diet-sugar').classList.toggle('active', mode === 'sugar');
            
            // 切換燈光顏色
            if (State.target === 'stomach') {
                stomachMesh.material.color.setHex(mode === 'sugar' ? 0xff5555 : 0x00ff00);
                stomachMesh.material.emissive.setHex(mode === 'sugar' ? 0xff0000 : 0x00ff00);
            }

            if(State.isPlaying && State.target === 'stomach') playAudio();
        }

        document.getElementById('btn-diet-normal').onclick = () => setStomachMode('normal');
        document.getElementById('btn-diet-fiber').onclick = () => setStomachMode('fiber');
        document.getElementById('btn-diet-sugar').onclick = () => setStomachMode('sugar');

    </script>
</body>
</html>
