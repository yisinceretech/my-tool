<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 Little Body Detective v4.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ──────────────────────────────
           一、全頁重置與零捲軸鎖定
           ────────────────────────────── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #080a18 0%, #121535 50%, #0a0c20 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #ffffff;
        }

        /* ──────────────────────────────
           二、左右雙欄比例 Layout (38% : 62%)
           ────────────────────────────── */
        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            padding: 12px;
            gap: 12px;
            position: relative;
        }

        /* 左側控制面板 (38%) */
        .control-panel {
            flex: 0 0 38%;
            max-width: 38%;
            height: 100%;
            background: rgba(16, 18, 42, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 8px;
            overflow: hidden;
            z-index: 10;
        }

        .panel-block {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 6px;
        }
        .panel-block:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .block-title {
            font-size: 16px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        button {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* 監聽控制特定狀態 */
        #btn-start-monitor {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            color: #6ee7b7;
        }
        #btn-start-monitor.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.7);
        }

        #btn-stop-monitor {
            background: rgba(100, 116, 139, 0.2);
            border-color: rgba(100, 116, 139, 0.4);
            color: #cbd5e1;
        }
        #btn-stop-monitor.active {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
        }

        /* 狀態指示燈 */
        .status-light-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            transition: all 0.3s;
        }
        .status-dot.standby { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .status-dot.monitoring { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-dot.stopped { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* 聽診模式 */
        .mode-btn[data-mode="heart"].active {
            border-color: #f87171;
            background: rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
            color: #fca5a5;
        }
        .mode-btn[data-mode="gut"].active {
            border-color: #34d399;
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
            color: #6ee7b7;
        }

        /* 下拉選單 */
        select {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            background: rgba(25, 30, 60, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            outline: none;
            cursor: pointer;
        }

        /* 營養狀態按鈕格補 */
        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        .nut-btn {
            padding: 6px 2px;
            font-size: 12px;
            flex-direction: column;
            gap: 2px;
        }
        .nut-btn.active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        /* BPM 滑桿 */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] {
            flex: 1;
            accent-color: #38bdf8;
            cursor: pointer;
        }
        .bpm-val {
            font-size: 16px;
            font-weight: 700;
            color: #38bdf8;
            width: 40px;
            text-align: right;
        }

        /* Canvas 波形監視器 */
        .waveform-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(8, 10, 24, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 6px;
        }
        canvas.wave-canvas {
            width: 100%;
            height: 42px;
            border-radius: 6px;
            background: #04050e;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            line-height: 1.35;
            color: #cbd5e1;
        }

        /* ──────────────────────────────
           三、右側角色展示區 (62%)
           ────────────────────────────── */
        .viewport-panel {
            flex: 1;
            height: 100%;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
        }

        #three-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .hud-card {
            position: absolute;
            background: rgba(16, 18, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 13px;
            z-index: 6;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }
        .hud-top-right { top: 16px; right: 16px; }
        .hud-bottom-right { bottom: 16px; right: 16px; }

        .hud-val {
            font-size: 15px;
            font-weight: 700;
            color: #38bdf8;
        }

        .floating-label {
            position: absolute;
            background: rgba(10, 15, 35, 0.8);
            border: 1px solid #60a5fa;
            border-radius: 8px;
            padding: 5px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #93c5fd;
            cursor: pointer;
            z-index: 6;
            transition: transform 0.2s, background 0.2s;
        }
        .floating-label:hover {
            background: rgba(30, 50, 100, 0.95);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="control-panel">
        
        <div class="panel-block">
            <div class="block-title">
                <span>A. 監聽控制</span>
                <div class="status-light-container">
                    <div id="status-dot" class="status-dot standby"></div>
                    <span id="status-text">待機中</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="btn-start-monitor">▶ 開始監聽</button>
                <button id="btn-stop-monitor">⏹ 停止監聽</button>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">B. 聽診模式</div>
            <div class="btn-group">
                <button class="mode-btn active" data-mode="heart">❤️ 心臟模式</button>
                <button class="mode-btn" data-mode="gut">🦠 腸胃模式</button>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">C. 角色人物</div>
            <select id="char-select">
                <option value="girl">Q 版小女孩 (images/girl.png)</option>
                <option value="custom">自訂本機圖片上傳...</option>
            </select>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
        </div>

        <div class="panel-block">
            <div class="block-title">D. 生理營養狀態</div>
            <div class="nutrition-grid">
                <button class="nut-btn active" data-nut="caffeine">☕<br>咖啡因</button>
                <button class="nut-btn" data-nut="fiber">🥦<br>高纖維</button>
                <button class="nut-btn" data-nut="sugar">🥤<br>精緻糖</button>
                <button class="nut-btn" data-nut="dehydration">💧<br>脫水</button>
                <button class="nut-btn" data-nut="sleep">😴<br>睡眠</button>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">
                <span>E. 心率 BPM 控制</span>
                <span id="bpm-val" class="bpm-val">75</span>
            </div>
            <div class="slider-row">
                <span style="font-size:11px; color:#94a3b8;">40</span>
                <input type="range" id="bpm-slider" min="40" max="180" value="75">
                <span style="font-size:11px; color:#94a3b8;">180</span>
            </div>
        </div>

        <div class="panel-block">
            <div class="block-title">F. 即時波形監視器</div>
            <div class="waveform-container">
                <canvas id="ecg-canvas" class="wave-canvas"></canvas>
                <canvas id="gut-canvas" class="wave-canvas"></canvas>
            </div>
        </div>

        <div class="panel-block">
            <div class="info-card" id="info-text">
                💡 操作提示：點擊「▶ 開始監聽」開啟聲音與動態。可隨時切換聽診目標或營養狀態。
            </div>
        </div>

    </div>

    <div class="viewport-panel">
        <canvas id="three-canvas"></canvas>
        
        <svg id="svg-overlay">
            <line id="line-heart" x1="0" y1="0" x2="0" y2="0" stroke="#f87171" stroke-width="2" stroke-dasharray="4,4" />
            <line id="line-gut" x1="0" y1="0" x2="0" y2="0" stroke="#34d399" stroke-width="2" stroke-dasharray="4,4" />
        </svg>

        <div id="label-heart" class="floating-label" style="top: 22%; right: 26%;">❤️ 心臟 (Heart)</div>
        <div id="label-gut" class="floating-label" style="top: 42%; right: 26%;">🦠 消化系統 (Gut)</div>

        <div class="hud-card hud-top-right">
            <div>聽診目標：<span id="hud-target" class="hud-val">心臟</span></div>
            <div style="margin-top:2px;">即時心率：<span id="hud-bpm" class="hud-val">75 BPM</span></div>
        </div>

        <div class="hud-card hud-bottom-right">
            <div>生理狀態：<span id="hud-state" class="hud-val">☕ 咖啡因刺激</span></div>
            <div style="margin-top:2px;">角色反應：<span id="hud-emotion" class="hud-val">神經發抖</span></div>
        </div>
    </div>
</div>

<script>
/* ──────────────────────────────
   三、全域狀態管理
   ────────────────────────────── */
const state = {
    isListening: false,
    mode: 'heart',
    bpm: 75,
    nutrition: 'caffeine'
};

const NUTRITION_CONFIGS = {
    caffeine: { bpm: 120, stateText: '☕ 咖啡因刺激', emotion: '興奮抖動', info: '咖啡因刺激交感神經，心率升高，角色呈現輕微肌肉震顫。' },
    fiber: { bpm: 70, stateText: '🥦 高纖維充沛', emotion: '健康微笑', info: '膳食纖維促進腸道蠕動，腸音音訊與波形呈規律收縮。' },
    sugar: { bpm: 55, stateText: '🥤 精緻糖昏沈', emotion: '疲倦暈眩', info: '血糖起伏引發暈糖效應，心率下降且波形起伏趨緩。' },
    dehydration: { bpm: 95, stateText: '💧 嚴重脫水', emotion: '口渴焦慮', info: '體液不足使血液黏稠，心率補償性加快，脈搏較弱。' },
    sleep: { bpm: 50, stateText: '😴 深層睡眠', emotion: '平靜沉睡', info: '副交感神經主導，心率與腸道運動皆降至低點。' }
};

/* ──────────────────────────────
   四、Web Audio API 聲音引擎
   ────────────────────────────── */
let audioCtx = null;
let masterGain = null;
let heartInterval = null;
let gutNoiseNode = null;

function getAudioContext() {
    if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    return audioCtx;
}

function playHeartSound() {
    if (!state.isListening || state.mode !== 'heart') return;
    try {
        const ctx = getAudioContext();
        const now = ctx.currentTime;

        // Lub (第一心音)
        const osc1 = ctx.createOscillator();
        const g1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(50, now);
        osc1.frequency.exponentialRampToValueAtTime(20, now + 0.1);
        g1.gain.setValueAtTime(0.8, now);
        g1.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc1.connect(g1);
        g1.connect(masterGain);
        osc1.start(now);
        osc1.stop(now + 0.1);

        // Dub (第二心音)
        const osc2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(75, now + 0.14);
        osc2.frequency.exponentialRampToValueAtTime(25, now + 0.22);
        g2.gain.setValueAtTime(0.6, now + 0.14);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
        osc2.connect(g2);
        g2.connect(masterGain);
        osc2.start(now + 0.14);
        osc2.stop(now + 0.22);

        triggerHeartPulse();
    } catch (e) {
        console.warn("Audio Error:", e);
    }
}

function startGutSound() {
    try {
        const ctx = getAudioContext();
        if (gutNoiseNode) stopGutSound();

        const bufferSize = ctx.sampleRate * 2;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        gutNoiseNode = ctx.createBufferSource();
        gutNoiseNode.buffer = buffer;
        gutNoiseNode.loop = true;

        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 280;
        filter.Q.value = 2.5;

        const g = ctx.createGain();
        g.gain.value = 0.25;

        gutNoiseNode.connect(filter);
        filter.connect(g);
        g.connect(masterGain);
        gutNoiseNode.start();
    } catch (e) {
        console.warn("Gut Audio Error:", e);
    }
}

function stopGutSound() {
    if (gutNoiseNode) {
        try { gutNoiseNode.stop(); } catch(e){}
        gutNoiseNode.disconnect();
        gutNoiseNode = null;
    }
}

function startAudio() {
    const ctx = getAudioContext();
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 0.1);

    restartHeartLoop();
    if (state.mode === 'gut') startGutSound();
}

function stopAudio() {
    if (masterGain && audioCtx) {
        masterGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    }
    if (heartInterval) {
        clearInterval(heartInterval);
        heartInterval = null;
    }
    stopGutSound();
}

function restartHeartLoop() {
    if (heartInterval) clearInterval(heartInterval);
    if (!state.isListening) return;

    playHeartSound();
    const ms = (60 / state.bpm) * 1000;
    heartInterval = setInterval(playHeartSound, ms);
}

/* ──────────────────────────────
   五、Canvas 示波波形繪製
   ────────────────────────────── */
const ecgCanvas = document.getElementById('ecg-canvas');
const gutCanvas = document.getElementById('gut-canvas');
const ecgCtx = ecgCanvas.getContext('2d');
const gutCtx = gutCanvas.getContext('2d');

let ecgX = 0, gutX = 0;
let ecgPulse = 0;

function resizeCanvases() {
    [ecgCanvas, gutCanvas].forEach(c => {
        c.width = c.clientWidth * (window.devicePixelRatio || 1);
        c.height = c.clientHeight * (window.devicePixelRatio || 1);
    });
}
window.addEventListener('resize', resizeCanvases);
resizeCanvases();

function triggerHeartPulse() {
    ecgPulse = 1.0;
}

function drawWaveforms() {
    requestAnimationFrame(drawWaveforms);

    const w = ecgCanvas.width;
    const h = ecgCanvas.height;

    // 清除軌跡
    ecgCtx.fillStyle = 'rgba(4, 5, 14, 0.18)';
    ecgCtx.fillRect(ecgX, 0, 6, h);
    gutCtx.fillStyle = 'rgba(4, 5, 14, 0.18)';
    gutCtx.fillRect(gutX, 0, 6, h);

    // ECG 心電波形
    ecgCtx.beginPath();
    ecgCtx.strokeStyle = '#10b981';
    ecgCtx.lineWidth = 2 * (window.devicePixelRatio || 1);

    let yEcg = h / 2;
    if (state.isListening) {
        if (ecgPulse > 0.05) {
            yEcg -= ecgPulse * (h * 0.42);
            ecgPulse *= 0.72;
        } else {
            yEcg += (Math.random() - 0.5) * 2;
        }
    }

    ecgCtx.moveTo(ecgX, yEcg);
    ecgX = (ecgX + 2) % w;
    ecgCtx.lineTo(ecgX, yEcg);
    ecgCtx.stroke();

    // 腸胃波形
    gutCtx.beginPath();
    gutCtx.strokeStyle = '#34d399';
    gutCtx.lineWidth = 2 * (window.devicePixelRatio || 1);

    let yGut = h / 2;
    if (state.isListening) {
        const speed = state.mode === 'gut' ? 0.06 : 0.015;
        yGut += Math.sin(Date.now() * speed) * (h * 0.28) + (Math.random() - 0.5) * 3;
    }

    gutCtx.moveTo(gutX, yGut);
    gutX = (gutX + 2) % w;
    gutCtx.lineTo(gutX, yGut);
    gutCtx.stroke();
}
drawWaveforms();

/* ──────────────────────────────
   六、Three.js 場景與防呆貼圖
   ────────────────────────────── */
const container = document.querySelector('.viewport-panel');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true, antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

// 強光防黑
scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5, 10, 7);
scene.add(light);

// 核心死鎖綁定容器
const characterGroup = new THREE.Group();
scene.add(characterGroup);

// scale(1.21) 放大規格
characterGroup.scale.set(1.21, 1.21, 1.21);
characterGroup.position.set(0, -3.2, 0);

// 生成動態備用畫布 (絕對防黑畫面)
function createFallbackAvatarTexture() {
    const cv = document.createElement('canvas');
    cv.width = 512;
    cv.height = 1024;
    const ctx = cv.getContext('2d');

    // 頭部
    ctx.fillStyle = '#fed7aa';
    ctx.beginPath();
    ctx.arc(256, 220, 110, 0, Math.PI * 2);
    ctx.fill();

    // 瀏海與頭髮
    ctx.fillStyle = '#334155';
    ctx.beginPath();
    ctx.arc(256, 190, 120, Math.PI, Math.PI * 2);
    ctx.fill();

    // 軀幹服裝
    ctx.fillStyle = '#f472b6';
    ctx.fillRect(176, 330, 160, 280);

    // 眼睛
    ctx.fillStyle = '#0f172a';
    ctx.beginPath();
    ctx.arc(215, 220, 10, 0, Math.PI * 2);
    ctx.arc(297, 220, 10, 0, Math.PI * 2);
    ctx.fill();

    return new THREE.CanvasTexture(cv);
}

const charGeo = new THREE.PlaneGeometry(3.6, 7.2);
const charMat = new THREE.MeshStandardMaterial({
    map: createFallbackAvatarTexture(),
    transparent: true,
    side: THREE.DoubleSide
});
const characterMesh = new THREE.Mesh(charGeo, charMat);
characterMesh.position.set(0, 3.6, 0);
characterGroup.add(characterMesh);

// 載入外部圖片 (若失敗則自動留存備用 Texture)
function loadCharacterImage(url) {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = () => {
        try {
            const cv = document.createElement('canvas');
            cv.width = img.width;
            cv.height = img.height;
            const ctx = cv.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const imgData = ctx.getImageData(0, 0, cv.width, cv.height);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                if (d[i] > 240 && d[i+1] > 240 && d[i+2] > 240) d[i+3] = 0;
            }
            ctx.putImageData(imgData, 0, 0);

            charMat.map = new THREE.CanvasTexture(cv);
            charMat.needsUpdate = true;
        } catch(e) {}
    };
    img.src = url;
}
loadCharacterImage('./images/girl.png');

// 解剖心臟 (heartMesh)
const heartShape = new THREE.Shape();
heartShape.moveTo(0, 0.25);
heartShape.bezierCurveTo(0, 0.25, -0.25, 0.6, -0.5, 0.6);
heartShape.bezierCurveTo(-0.8, 0.6, -0.8, 0.2, -0.8, 0.2);
heartShape.bezierCurveTo(-0.8, -0.2, -0.3, -0.5, 0, -0.8);
heartShape.bezierCurveTo(0.3, -0.5, 0.8, -0.2, 0.8, 0.2);
heartShape.bezierCurveTo(0.8, 0.2, 0.8, 0.6, 0.5, 0.6);
heartShape.bezierCurveTo(0.25, 0.6, 0, 0.25, 0, 0.25);

const heartMat = new THREE.MeshStandardMaterial({
    color: 0xff3355,
    emissive: 0xaa1133,
    emissiveIntensity: 0.5,
    side: THREE.DoubleSide
});
const heartMesh = new THREE.Mesh(new THREE.ShapeGeometry(heartShape), heartMat);
heartMesh.scale.set(0.65, 0.65, 0.65);
heartMesh.position.set(-0.2, 4.4, 0.05);
heartMesh.name = 'heart';
characterGroup.add(heartMesh);

// 解剖腸胃 (gutMesh)
const gutShape = new THREE.Shape();
gutShape.moveTo(-0.4, 0.4);
gutShape.bezierCurveTo(-0.8, 0.4, -0.8, -0.4, -0.4, -0.4);
gutShape.bezierCurveTo(0, -0.4, 0.8, -0.3, 0.6, 0.1);
gutShape.bezierCurveTo(0.5, 0.5, 0, 0.4, -0.4, 0.4);

const gutMat = new THREE.MeshStandardMaterial({
    color: 0x34d399,
    emissive: 0x059669,
    emissiveIntensity: 0.5,
    side: THREE.DoubleSide
});
const gutMesh = new THREE.Mesh(new THREE.ShapeGeometry(gutShape), gutMat);
gutMesh.scale.set(0.7, 0.7, 0.7);
gutMesh.position.set(0.05, 3.2, 0.05);
gutMesh.name = 'gut';
characterGroup.add(gutMesh);

// 腳底陰影 (shadowMesh)
const shadowMesh = new THREE.Mesh(
    new THREE.RingGeometry(0, 1.2, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
);
shadowMesh.rotation.x = Math.PI / 2;
shadowMesh.position.set(0, 0.05, 0);
characterGroup.add(shadowMesh);

/* ──────────────────────────────
   七、動畫迴圈與動態連線
   ────────────────────────────── */
let heartPulseFactor = 1.0;

function animate() {
    requestAnimationFrame(animate);

    const t = Date.now() * 0.003;

    if (state.isListening) {
        // 呼吸
        characterGroup.position.y = -3.2 + Math.sin(t * 2) * 0.06;

        // 咖啡因抖動
        if (state.nutrition === 'caffeine') {
            characterGroup.position.x = (Math.random() - 0.5) * 0.03;
        } else {
            characterGroup.position.x = 0;
        }

        // 器官動畫
        if (state.mode === 'heart') {
            heartPulseFactor += (1.0 - heartPulseFactor) * 0.12;
            heartMesh.scale.set(0.65 * heartPulseFactor, 0.65 * (2.0 - heartPulseFactor), 0.65);
            heartMat.emissiveIntensity = 0.8;
            gutMat.emissiveIntensity = 0.2;
            gutMesh.scale.set(0.7, 0.7, 0.7);
        } else {
            const w = 1.0 + Math.sin(t * 4) * 0.1;
            gutMesh.scale.set(0.7 * w, 0.7 * (2.0 - w), 0.7);
            gutMat.emissiveIntensity = 0.8;
            heartMat.emissiveIntensity = 0.2;
            heartMesh.scale.set(0.65, 0.65, 0.65);
        }
    } else {
        // 靜止
        characterGroup.position.set(0, -3.2, 0);
        heartMesh.scale.set(0.65, 0.65, 0.65);
        gutMesh.scale.set(0.7, 0.7, 0.7);
        heartMat.emissiveIntensity = 0.3;
        gutMat.emissiveIntensity = 0.3;
    }

    updateSvgLines();
    renderer.render(scene, camera);
}
animate();

function updateSvgLines() {
    try {
        const getPos = (obj) => {
            const wp = new THREE.Vector3();
            obj.getWorldPosition(wp);
            wp.project(camera);
            const r = renderer.domElement.getBoundingClientRect();
            return {
                x: (wp.x * 0.5 + 0.5) * r.width + r.left,
                y: (-(wp.y * 0.5) + 0.5) * r.height + r.top
            };
        };

        const hp = getPos(heartMesh);
        const gp = getPos(gutMesh);

        const lh = document.getElementById('label-heart').getBoundingClientRect();
        const lg = document.getElementById('label-gut').getBoundingClientRect();

        const lineHeart = document.getElementById('line-heart');
        lineHeart.setAttribute('x1', hp.x);
        lineHeart.setAttribute('y1', hp.y);
        lineHeart.setAttribute('x2', lh.left);
        lineHeart.setAttribute('y2', lh.top + lh.height / 2);

        const lineGut = document.getElementById('line-gut');
        lineGut.setAttribute('x1', gp.x);
        lineGut.setAttribute('y1', gp.y);
        lineGut.setAttribute('x2', lg.left);
        lineGut.setAttribute('y2', lg.top + lg.height / 2);
    } catch(e) {}
}

/* ──────────────────────────────
   八、UI 與事件切換邏輯
   ────────────────────────────── */
const btnStart = document.getElementById('btn-start-monitor');
const btnStop = document.getElementById('btn-stop-monitor');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

btnStart.addEventListener('click', () => {
    state.isListening = true;
    btnStart.classList.add('active');
    btnStop.classList.remove('active');
    statusDot.className = 'status-dot monitoring';
    statusText.innerText = '監聽中';
    startAudio();
});

btnStop.addEventListener('click', () => {
    state.isListening = false;
    btnStart.classList.remove('active');
    btnStop.classList.add('active');
    statusDot.className = 'status-dot stopped';
    statusText.innerText = '已停止';
    stopAudio();
});

function switchMode(newMode) {
    state.mode = newMode;
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === newMode);
    });
    document.getElementById('hud-target').innerText = newMode === 'heart' ? '心臟' : '腸胃';

    if (state.isListening) {
        if (newMode === 'gut') startGutSound();
        else stopGutSound();
    }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});
document.getElementById('label-heart').addEventListener('click', () => switchMode('heart'));
document.getElementById('label-gut').addEventListener('click', () => switchMode('gut'));

// Raycaster 點擊器官
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('pointerdown', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;

    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([heartMesh, gutMesh]);
    if (intersects.length > 0) {
        switchMode(intersects[0].object.name);
    }
});

// 營養狀態切換
document.querySelectorAll('.nut-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nut-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        state.nutrition = btn.dataset.nut;
        const cfg = NUTRITION_CONFIGS[state.nutrition];
        state.bpm = cfg.bpm;

        document.getElementById('bpm-slider').value = cfg.bpm;
        document.getElementById('bpm-val').innerText = cfg.bpm;
        document.getElementById('hud-bpm').innerText = cfg.bpm + ' BPM';
        document.getElementById('hud-state').innerText = cfg.stateText;
        document.getElementById('hud-emotion').innerText = cfg.emotion;
        document.getElementById('info-text').innerText = '💡 生理說明：' + cfg.info;

        restartHeartLoop();
    });
});

// BPM 滑桿
document.getElementById('bpm-slider').addEventListener('input', (e) => {
    state.bpm = parseInt(e.target.value);
    document.getElementById('bpm-val').innerText = state.bpm;
    document.getElementById('hud-bpm').innerText = state.bpm + ' BPM';
    restartHeartLoop();
});

// 角色圖片選擇
const charSelect = document.getElementById('char-select');
const fileInput = document.getElementById('file-input');

charSelect.addEventListener('change', (e) => {
    if (e.target.value === 'custom') {
        fileInput.click();
    } else {
        loadCharacterImage('./images/girl.png');
    }
});

fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (evt) => loadCharacterImage(evt.target.result);
        reader.readAsDataURL(e.target.files[0]);
    }
});

// Responsive resize
window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
