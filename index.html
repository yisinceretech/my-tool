<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 v3.0.0 (人體課綱教具版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-panel {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
            background: rgba(30, 30, 40, 0.85);
            border-radius: 20px;
            padding: 25px;
            color: #fff;
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            overflow-y: auto;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 15px 0;
            color: #fff;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .section-title {
            font-size: 0.9rem;
            color: #aaa;
            margin: 15px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas#monitor {
            width: 100%;
            height: 140px;
            background: #ffffff;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            flex: 1 1 calc(50% - 10px);
            text-align: center;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button.active {
            background: #4caf50;
            border-color: #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
            font-weight: bold;
        }

        button.play-btn {
            flex: 1 1 100%;
            background: #e91e63;
            border-color: #e91e63;
            font-size: 1.1rem;
            padding: 15px;
            margin-top: 5px;
        }
        
        button.play-btn.playing {
            background: #f44336;
            border-color: #f44336;
        }

        button.track-btn {
            flex: 1 1 100%;
            background: #2196f3;
            border-color: #2196f3;
        }
        button.track-btn.active {
            background: #ff9800;
            border-color: #ff9800;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }

        .organ-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="ui-panel">
        <h1>身體聲音合成器 v3.0.0</h1>
        
        <canvas id="monitor" width="330" height="140"></canvas>

        <button id="btn-toggle-play" class="play-btn">▶️ 開始監聽</button>

        <div class="section-title">聽診器官焦點 (點擊 3D 模型亦可)</div>
        <div class="btn-group">
            <button class="organ-btn active" data-organ="heart"><span class="organ-indicator" style="background:#ff0000;"></span>🫀 心臟</button>
            <button class="organ-btn" data-organ="stomach"><span class="organ-indicator" style="background:#00ff00;"></span>🟢 胃部</button>
            <button class="organ-btn" data-organ="small_intestine"><span class="organ-indicator" style="background:#ffaa00;"></span>🟡 小腸</button>
            <button class="organ-btn" data-organ="large_intestine"><span class="organ-indicator" style="background:#553311;"></span>🟤 大腸</button>
            <button class="organ-btn" data-organ="spleen"><span class="organ-indicator" style="background:#800080;"></span>🟣 脾臟</button>
            <button class="organ-btn" data-organ="kidney"><span class="organ-indicator" style="background:#0055ff;"></span>🔵 腎臟</button>
        </div>

        <div class="section-title">教案一：對照實驗 (生理狀態)</div>
        <div class="btn-group">
            <button class="state-btn active" data-state="normal">一般狀態</button>
            <button class="state-btn" data-state="caffeine">☕ 咖啡因刺激</button>
            <button class="state-btn" data-state="fiber">🥦 高纖維消化</button>
            <button class="state-btn" data-state="sugar">🥤 精緻糖消化</button>
        </div>

        <div class="section-title">教案二：動態路徑演示</div>
        <div class="btn-group">
            <button id="btn-track" class="track-btn">🔄 營養去哪了 (自動路徑追蹤)</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心狀態管理
        // ==========================================
        let isPlaying = false;
        let currentOrgan = 'heart';
        let currentState = 'normal';
        let bpm = 60;
        let isTracking = false;
        let trackingTimeout = null;

        // ==========================================
        // Web Audio API 引擎
        // ==========================================
        let audioCtx = null;
        let activeNodes = [];
        let noiseBuffer = null;
        let analyser = null;
        let floatData = new Float32Array(256);

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 產生共通白噪音緩衝區 (5秒)
            const len = audioCtx.sampleRate * 5;
            noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for(let i=0; i<len; i++) data[i] = Math.random() * 2 - 1;
        }

        function stopAudio() {
            activeNodes.forEach(n => { 
                try { n.stop(); } catch(e){} 
                try { n.disconnect(); } catch(e){} 
            });
            activeNodes = [];
        }

        function playAudio() {
            if(!isPlaying) return;
            initAudio();
            stopAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            analyser.connect(audioCtx.destination);
            let dest = analyser;

            if (currentOrgan === 'heart') {
                // 心臟 ECG 數學合成 (確保波形尖銳真實)
                const beatLen = 60 / bpm;
                const len = Math.floor(audioCtx.sampleRate * beatLen);
                const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
                const data = buf.getChannelData(0);
                for(let i=0; i<len; i++) {
                    let t = i / audioCtx.sampleRate;
                    let val = 0;
                    if(t < 0.25) val = Math.sin(2*Math.PI*45*t) * Math.exp(-25*t); // Lub
                    let td = t - (currentState === 'sugar' ? 0.3 : 0.25); // 暈糖延遲
                    if(td > 0 && td < 0.25) val += Math.sin(2*Math.PI*65*td) * Math.exp(-30*td) * 0.8; // Dub
                    data[i] = val;
                }
                let src = audioCtx.createBufferSource();
                src.buffer = buf;
                src.loop = true;
                src.connect(dest);
                src.start();
                activeNodes.push(src);

            } else {
                // 消化道與過濾器官 (連續噪音濾波調變)
                let src = audioCtx.createBufferSource();
                src.buffer = noiseBuffer;
                src.loop = true;

                let filter = audioCtx.createBiquadFilter();
                let gain = audioCtx.createGain();

                let lfo = audioCtx.createOscillator();
                let lfoGain = audioCtx.createGain();
                lfo.type = 'sine';

                if(currentOrgan === 'stomach') {
                    filter.type = 'lowpass';
                    filter.frequency.value = 200;
                    lfo.frequency.value = 3;
                    if(currentState === 'sugar') {
                        lfo.frequency.value = 1.5;
                        filter.frequency.value = 100;
                        lfo.type = 'sawtooth'; // 斷續痛苦
                    } else if(currentState === 'fiber') {
                        lfo.frequency.value = 4;
                        filter.frequency.value = 250; // 健康厚實
                    }
                    lfo.connect(lfoGain);
                    lfoGain.connect(gain.gain);
                    lfoGain.gain.value = 0.8;
                    gain.gain.value = 0.2;

                } else if (currentOrgan === 'small_intestine') {
                    filter.type = 'bandpass';
                    filter.frequency.value = 1000;
                    lfo.frequency.value = 12; // 快速水流與氣泡
                    if(currentState === 'sugar') filter.frequency.value = 600;
                    lfo.connect(lfoGain);
                    lfoGain.connect(gain.gain);
                    lfoGain.gain.value = 0.9;
                    gain.gain.value = 0.15;

                } else if (currentOrgan === 'large_intestine') {
                    filter.type = 'lowpass';
                    filter.frequency.value = 80;
                    lfo.frequency.value = 0.5; // 極慢速蠕動
                    if(currentState === 'fiber') filter.frequency.value = 120;
                    lfo.connect(lfoGain);
                    lfoGain.connect(gain.gain);
                    lfoGain.gain.value = 0.8;
                    gain.gain.value = 0.3;

                } else if (currentOrgan === 'spleen' || currentOrgan === 'kidney') {
                    filter.type = 'lowpass';
                    filter.frequency.value = 300;
                    gain.gain.value = 0.05; // 微弱平穩過濾聲
                }

                src.connect(filter);
                filter.connect(gain);
                gain.connect(dest);

                src.start();
                if(currentOrgan !== 'spleen' && currentOrgan !== 'kidney') lfo.start();
                
                activeNodes.push(src, filter, gain, lfo, lfoGain);
            }
        }

        // ==========================================
        // 2D Canvas 監視器圖表渲染
        // ==========================================
        const canvas = document.getElementById('monitor');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        let waveHistory = new Array(W).fill(0);

        function drawMonitor() {
            requestAnimationFrame(drawMonitor);
            
            if(!isPlaying || !analyser) {
                // 待機畫面
                ctx.fillStyle = '#1e1e28';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#444';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('設備待機中 / STANDBY', W/2, H/2);
                return;
            }

            analyser.getFloatTimeDomainData(floatData);
            
            // 抓取最大振幅 (捕捉 ECG 尖峰)
            let maxVal = 0;
            for(let i=0; i<floatData.length; i++) {
                if(Math.abs(floatData[i]) > Math.abs(maxVal)) maxVal = floatData[i];
            }
            
            waveHistory.push(maxVal);
            waveHistory.shift();

            // 繪製背景與網格
            const isECG = (currentOrgan === 'heart');
            ctx.fillStyle = isECG ? '#ffffff' : '#1a1a24';
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = isECG ? 'rgba(0,0,0,0.15)' : 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let x=0; x<W; x+=20) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
            for(let y=0; y<H; y+=20) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
            ctx.stroke();

            // 繪製流動波形
            ctx.strokeStyle = isECG ? '#d32f2f' : '#00e5ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for(let x=0; x<W; x++) {
                let y = H/2 - waveHistory[x] * (H/2.5);
                if(x===0) ctx.moveTo(x,y); 
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
        }
        drawMonitor();

        // ==========================================
        // Three.js 3D 渲染與防彈級角色生成
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0.5, 5.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        // 打光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(3, 5, 5);
        scene.add(dirLight);

        // Q版女孩組合 (使用防呆幾何體)
        const girlGroup = new THREE.Group();
        girlGroup.position.set(1.5, -1.0, 0); // 防呆位移，完美置中右半部
        scene.add(girlGroup);

        const skinMat = new THREE.MeshStandardMaterial({color: 0xffdcb3, roughness: 0.4});
        const hairMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.8});
        const shirtMat = new THREE.MeshStandardMaterial({color: 0xff6699, transparent: true, opacity: 0.5, roughness: 0.1});
        const shortMat = new THREE.MeshStandardMaterial({color: 0x66aaff});
        const shoeMat = new THREE.MeshStandardMaterial({color: 0xddffff});

        // 頭部與五官
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), skinMat);
        head.position.y = 2.5;
        girlGroup.add(head);

        const hair = new THREE.Mesh(new THREE.SphereGeometry(0.52, 32, 32, 0, Math.PI*2, 0, Math.PI/2), hairMat);
        hair.position.y = 2.5;
        girlGroup.add(hair);

        const bangs = new THREE.Mesh(new THREE.CylinderGeometry(0.53, 0.53, 0.2, 32, 1, false, 0, Math.PI), hairMat);
        bangs.rotation.x = Math.PI / 2;
        bangs.position.set(0, 2.55, 0);
        girlGroup.add(bangs);

        const eyeWMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        const eyeBMat = new THREE.MeshBasicMaterial({color: 0x000000});
        const eyeGroupL = new THREE.Group();
        eyeGroupL.add(new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeWMat));
        const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), eyeBMat);
        pupilL.position.z = 0.05;
        eyeGroupL.add(pupilL);
        eyeGroupL.position.set(-0.2, 2.5, 0.42);
        
        const eyeGroupR = eyeGroupL.clone();
        eyeGroupR.position.set(0.2, 2.5, 0.42);
        girlGroup.add(eyeGroupL, eyeGroupR);

        const mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.02, 16), new THREE.MeshBasicMaterial({color: 0xaa3333}));
        mouth.rotation.x = Math.PI / 2;
        mouth.position.set(0, 2.25, 0.48);
        girlGroup.add(mouth);

        // 身體 (透視艙)
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 1.2, 32), shirtMat);
        body.position.y = 1.4;
        girlGroup.add(body);

        // 褲子與四肢
        const shorts = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.4, 32), shortMat);
        shorts.position.y = 0.6;
        girlGroup.add(shorts);

        const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.0, 16);
        const leftArm = new THREE.Mesh(armGeo, skinMat);
        leftArm.position.set(-0.6, 1.4, 0);
        leftArm.rotation.z = Math.PI / 8;
        const rightArm = new THREE.Mesh(armGeo, skinMat);
        rightArm.position.set(0.6, 1.4, 0);
        rightArm.rotation.z = -Math.PI / 8;
        girlGroup.add(leftArm, rightArm);

        const legGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.8, 16);
        const leftLeg = new THREE.Mesh(legGeo, skinMat);
        leftLeg.position.set(-0.2, 0.0, 0);
        const rightLeg = new THREE.Mesh(legGeo, skinMat);
        rightLeg.position.set(0.2, 0.0, 0);
        girlGroup.add(leftLeg, rightLeg);

        // ==========================================
        // 內臟器官擴充系統 (Organ System)
        // ==========================================
        const organsGroup = new THREE.Group();
        organsGroup.position.y = 1.4; // 對齊身體中心
        girlGroup.add(organsGroup);

        const clickableOrgans = [];
        const organsMap = {};

        function addOrgan(id, geo, color, pos, extraRot = null) {
            const mat = new THREE.MeshStandardMaterial({
                color: color, emissive: color, emissiveIntensity: 0.2, roughness: 0.5
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(pos);
            if(extraRot) mesh.rotation.copy(extraRot);
            mesh.userData = { id: id };
            organsGroup.add(mesh);
            clickableOrgans.push(mesh);
            organsMap[id] = mesh;
            return mesh;
        }

        // 🫀 心臟
        addOrgan('heart', new THREE.SphereGeometry(0.12, 32, 32), 0xff0000, new THREE.Vector3(-0.1, 0.3, 0.15));
        
        // 🟢 胃部
        const stomach = addOrgan('stomach', new THREE.SphereGeometry(0.15, 32, 32), 0x00ff00, new THREE.Vector3(0.1, 0.1, 0.15));
        stomach.scale.set(1.2, 0.8, 1.0);

        // 🟣 脾臟
        const spleen = addOrgan('spleen', new THREE.SphereGeometry(0.06, 16, 16), 0x800080, new THREE.Vector3(-0.15, 0.15, 0.05));
        spleen.scale.set(1.0, 0.5, 0.8);

        // 🟡 小腸 (多個環狀)
        const siGeo = new THREE.TorusGeometry(0.1, 0.05, 16, 32);
        const smallIntestine = addOrgan('small_intestine', siGeo, 0xffaa00, new THREE.Vector3(0, -0.2, 0.18));
        const si2 = new THREE.Mesh(siGeo, smallIntestine.material);
        si2.position.set(0.05, -0.05, -0.02);
        si2.rotation.x = Math.PI/3;
        smallIntestine.add(si2);

        // 🟤 大腸 (粗管包圍小腸)
        const liGeo = new THREE.TorusGeometry(0.22, 0.06, 16, 32, Math.PI * 1.4);
        const largeIntestine = addOrgan('large_intestine', liGeo, 0x553311, new THREE.Vector3(0, -0.2, 0.12), new THREE.Euler(0, 0, -Math.PI/1.4));

        // 🔵 腎臟 (背部兩側)
        const kidneyGeo = new THREE.SphereGeometry(0.06, 16, 16);
        const kidneyGroup = addOrgan('kidney', kidneyGeo, 0x0055ff, new THREE.Vector3(-0.12, 0.05, -0.1));
        const rightKidney = new THREE.Mesh(kidneyGeo, kidneyGroup.material);
        rightKidney.position.set(0.24, 0, 0);
        kidneyGroup.add(rightKidney);
        kidneyGroup.scale.set(1.0, 1.3, 1.0);

        // ==========================================
        // 互動與動畫邏輯
        // ==========================================
        function updateCharacterExpression() {
            eyeGroupL.scale.setScalar(1); eyeGroupR.scale.setScalar(1);
            mouth.scale.setScalar(1); mouth.rotation.x = Math.PI / 2;
            leftArm.rotation.z = Math.PI / 8; rightArm.rotation.z = -Math.PI / 8;
            bpm = 60;

            if (currentState === 'caffeine') {
                eyeGroupL.scale.set(1.3, 1.5, 1); eyeGroupR.scale.set(1.3, 1.5, 1); // 瞳孔地震
                mouth.scale.set(1.5, 2.0, 1.5); // O型嘴
                leftArm.rotation.z = Math.PI / 2; rightArm.rotation.z = -Math.PI / 2; // 舉手
                bpm = 110;
            } else if (currentState === 'sugar') {
                eyeGroupL.scale.set(1, 0.4, 1); eyeGroupR.scale.set(1, 0.4, 1); // 死魚眼
                mouth.scale.set(1.5, 0.3, 1); // 無力
                leftArm.rotation.z = 0.1; rightArm.rotation.z = -0.1; // 下垂
                bpm = 50;
            } else if (currentState === 'fiber') {
                eyeGroupL.scale.set(1, 0.2, 1); eyeGroupR.scale.set(1, 0.2, 1); // 笑眼
                mouth.scale.set(2.0, 1.0, 1.5); // 開心
            }
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 器官發光與縮放 (解耦：只跳動選中器官)
            Object.keys(organsMap).forEach(key => {
                const organ = organsMap[key];
                let scale = 1.0;
                
                if (isPlaying && key === currentOrgan) {
                    organ.material.emissiveIntensity = 1.0;
                    if (key === 'heart') {
                        let beat = (time * (bpm/60)) % 1.0;
                        scale = 1 + Math.exp(-20 * beat) * 0.25;
                    } else if (key === 'stomach' || key === 'small_intestine' || key === 'large_intestine') {
                        let speed = key === 'small_intestine' ? 10 : (key === 'large_intestine' ? 2 : 5);
                        scale = 1 + Math.sin(time * speed) * 0.08;
                    }
                } else {
                    organ.material.emissiveIntensity = 0.2; // 待機暗沉
                }

                // 保持原本特製的長寬比例
                if(key === 'stomach') organ.scale.set(1.2*scale, 0.8*scale, 1.0*scale);
                else if(key === 'spleen') organ.scale.set(1.0*scale, 0.5*scale, 0.8*scale);
                else if(key === 'kidney') organ.scale.set(1.0*scale, 1.3*scale, 1.0*scale);
                else organ.scale.setScalar(scale);
                
                // 特定營養狀態器官變色警告
                if (key === 'stomach' && currentState === 'sugar') organ.material.emissive.setHex(0xff3300);
                else if (key === 'stomach') organ.material.emissive.setHex(0x00ff00);
            });

            // 咖啡因神經發抖 (Jitter)
            if (currentState === 'caffeine' && isPlaying) {
                girlGroup.position.x = 1.5 + (Math.random()-0.5)*0.03;
                girlGroup.position.y = -1.0 + (Math.random()-0.5)*0.03;
            } else {
                girlGroup.position.set(1.5, -1.0, 0);
            }

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // UI 控制與點擊事件
        // ==========================================
        function setOrgan(organId, autoMode = false) {
            currentOrgan = organId;
            if(!autoMode && isTracking) {
                isTracking = false; // 手動點擊中斷自動路徑
                document.getElementById('btn-track').classList.remove('active');
            }
            
            document.querySelectorAll('.organ-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.organ === organId);
            });
            if (isPlaying) playAudio();
        }

        function setState(stateId) {
            currentState = stateId;
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.state === stateId);
            });
            updateCharacterExpression();
            if (isPlaying) playAudio();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('btn-toggle-play');
            if(isPlaying) {
                btn.innerText = '⏹ 停止監聽';
                btn.classList.add('playing');
                playAudio();
            } else {
                btn.innerText = '▶️ 開始監聽';
                btn.classList.remove('playing');
                stopAudio();
                isTracking = false;
                document.getElementById('btn-track').classList.remove('active');
            }
        }

        document.getElementById('btn-toggle-play').addEventListener('click', togglePlay);
        
        document.querySelectorAll('.organ-btn').forEach(btn => {
            btn.addEventListener('click', (e) => setOrgan(e.target.dataset.organ));
        });

        document.querySelectorAll('.state-btn').forEach(btn => {
            btn.addEventListener('click', (e) => setState(e.target.dataset.state));
        });

        // 教案二：消化路徑追蹤
        document.getElementById('btn-track').addEventListener('click', async (e) => {
            if(isTracking) return; // 防連點
            isTracking = true;
            e.target.classList.add('active');
            
            if(!isPlaying) togglePlay();

            const path = ['stomach', 'small_intestine', 'large_intestine'];
            for(let i=0; i<path.length; i++) {
                if(!isTracking) return; // 若中途被打斷
                setOrgan(path[i], true);
                await new Promise(r => setTimeout(r, 3000)); // 停留3秒
            }
            
            if(isTracking) {
                setOrgan('heart', true);
                isTracking = false;
                e.target.classList.remove('active');
            }
        });

        // 3D 畫面點擊 Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (event) => {
            if(event.clientX < 400) return; // 避開左側 UI
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            // 只檢測器官，穿透透視服裝
            const intersects = raycaster.intersectObjects(clickableOrgans);
            if (intersects.length > 0) {
                setOrgan(intersects[0].object.userData.id);
            }
        });

        // RWD 縮放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
