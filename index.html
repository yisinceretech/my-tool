<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Body Detective - 人體器官教學應用</title>
    <style>
        /* ================= 核心重置與版面佈局 ================= */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at 70% 50%, #1a1a2e, #0f0f1a, #000000); /* 宇宙深色漸層，確保發光器官對比 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ================= UI 面板 (毛玻璃質感) ================= */
        #ui-panel {
            position: absolute;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 360px;
            background: rgba(20, 20, 35, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        /* 滾動條美化 */
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        h1 {
            margin: 0;
            font-size: 22px;
            text-align: center;
            color: #add8e6;
            text-shadow: 0 0 10px rgba(173, 216, 230, 0.5);
            letter-spacing: 1px;
        }

        .section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            font-size: 13px;
            color: #88aaff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(136, 170, 255, 0.3);
            padding-bottom: 5px;
        }

        /* 2D 監視器 */
        #monitor-canvas {
            width: 100%;
            height: 80px;
            background: #050510;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            flex: 1 1 calc(50% - 8px);
            text-align: center;
            font-weight: bold;
        }

        button:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        button.active-organ { background: rgba(255, 200, 50, 0.3); border-color: #ffc832; box-shadow: 0 0 10px rgba(255, 200, 50, 0.4); }
        button.active-state { background: rgba(50, 200, 255, 0.3); border-color: #32c8ff; box-shadow: 0 0 10px rgba(50, 200, 255, 0.4); }

        #btn-play { background: rgba(40, 180, 100, 0.2); border-color: #28b464; color: #28b464; }
        #btn-play.is-playing { background: #28b464; color: white; box-shadow: 0 0 15px #28b464; }
        
        #btn-stop { background: rgba(220, 50, 50, 0.2); border-color: #dc3232; color: #dc3232; }
        #btn-path { flex: 1 1 100%; background: linear-gradient(45deg, #6a11cb, #2575fc); border: none; padding: 12px; font-size: 14px; box-shadow: 0 4px 15px rgba(37, 117, 252, 0.4);}
        
        /* 狀態提示 */
        #status-text {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }

        /* 鎖定遮罩 (導覽時使用) */
        #ui-blocker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            color: #00ffcc;
            font-weight: bold;
            font-size: 18px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div id="ui-blocker">追蹤導覽中...</div>
        <h1>Little Body Detective</h1>
        
        <div class="section">
            <div class="section-title">主控台</div>
            <div class="btn-group">
                <button id="btn-play">▶️ 開始監聽</button>
                <button id="btn-stop">⏹ 停止監聽</button>
            </div>
            <div id="status-text">目前狀態：靜默待機</div>
        </div>

        <div class="section">
            <div class="section-title">即時生理監測 (2D 監視器)</div>
            <canvas id="monitor-canvas" width="300" height="80"></canvas>
        </div>

        <div class="section">
            <div class="section-title">聽診器官選擇 (可點擊 3D 模型)</div>
            <div class="btn-group" id="organ-buttons">
                <button class="organ-btn" data-target="heart">🫀 心臟</button>
                <button class="organ-btn" data-target="stomach">🟢 胃部</button>
                <button class="organ-btn" data-target="smallIntestine">🟡 小腸</button>
                <button class="organ-btn" data-target="largeIntestine">🟤 大腸</button>
                <button class="organ-btn" data-target="spleen">🟣 脾臟</button>
                <button class="organ-btn" data-target="kidneys">🔵 腎臟</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">教案一：對照實驗</div>
            <div class="btn-group">
                <button class="state-btn active-state" data-state="normal">👤 一般狀態</button>
                <button class="state-btn" data-state="caffeine">☕ 咖啡因</button>
                <button class="state-btn" data-state="fiber">🥦 高纖維</button>
                <button class="state-btn" data-state="sugar">🥤 精緻糖</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">教案二：營養去哪了</div>
            <button id="btn-path">🔄 啟動消化路徑追蹤</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * Little Body Detective - 核心系統架構
         * 整合 Web Audio API, Three.js 3D 渲染, 與 2D Canvas 波形繪製
         */

        // ================= 全局狀態管理 =================
        const AppState = {
            isPlaying: false,
            activeOrgan: null,
            physiologicalState: 'normal', // normal, caffeine, fiber, sugar
            isTracking: false,
            time: 0
        };

        // ================= Web Audio API 聲音引擎 =================
        const AudioEngine = (function() {
            let ctx = null;
            let masterGain = null;
            let isInitialized = false;

            // 節點
            const nodes = {
                heart: { osc1: null, osc2: null, gain: null },
                stomach: { source: null, filter: null, gain: null },
                smallIntestine: { source: null, filter: null, gain: null },
                largeIntestine: { source: null, filter: null, dist: null, gain: null },
                spleenKidney: { source: null, gain: null }
            };

            // 產生白噪音 Buffer
            function createNoiseBuffer() {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                return buffer;
            }

            // 產生粉紅噪音 Buffer (近似)
            function createPinkNoiseBuffer() {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = buffer.getChannelData(0);
                let b0, b1, b2, b3, b4, b5, b6;
                b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                    output[i] *= 0.11; // 降低音量
                    b6 = white * 0.115926;
                }
                return buffer;
            }

            // 失真曲線產生器 (大腸用)
            function makeDistortionCurve(amount) {
                const k = typeof amount === 'number' ? amount : 50,
                    n_samples = 44100,
                    curve = new Float32Array(n_samples),
                    deg = Math.PI / 180;
                for (let i = 0; i < n_samples; ++i) {
                    const x = i * 2 / n_samples - 1;
                    curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
                }
                return curve;
            }

            function init() {
                if (isInitialized) return;
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = ctx.createGain();
                masterGain.connect(ctx.destination);
                masterGain.gain.value = 0; // 初始靜音

                const noiseBuffer = createNoiseBuffer();
                const pinkNoiseBuffer = createPinkNoiseBuffer();

                // --- 1. 胃部 (白噪音 + 低通 200Hz) ---
                nodes.stomach.source = ctx.createBufferSource();
                nodes.stomach.source.buffer = noiseBuffer;
                nodes.stomach.source.loop = true;
                nodes.stomach.filter = ctx.createBiquadFilter();
                nodes.stomach.filter.type = 'lowpass';
                nodes.stomach.filter.frequency.value = 200;
                nodes.stomach.gain = ctx.createGain();
                nodes.stomach.gain.value = 0;
                nodes.stomach.source.connect(nodes.stomach.filter).connect(nodes.stomach.gain).connect(masterGain);
                nodes.stomach.source.start();

                // --- 2. 小腸 (白噪音 + 帶通 800-1200Hz) ---
                nodes.smallIntestine.source = ctx.createBufferSource();
                nodes.smallIntestine.source.buffer = noiseBuffer;
                nodes.smallIntestine.source.loop = true;
                nodes.smallIntestine.filter = ctx.createBiquadFilter();
                nodes.smallIntestine.filter.type = 'bandpass';
                nodes.smallIntestine.filter.frequency.value = 1000;
                nodes.smallIntestine.filter.Q.value = 1.5;
                nodes.smallIntestine.gain = ctx.createGain();
                nodes.smallIntestine.gain.value = 0;
                nodes.smallIntestine.source.connect(nodes.smallIntestine.filter).connect(nodes.smallIntestine.gain).connect(masterGain);
                nodes.smallIntestine.source.start();

                // --- 3. 大腸 (白噪音 + 低通 100Hz + 失真) ---
                nodes.largeIntestine.source = ctx.createBufferSource();
                nodes.largeIntestine.source.buffer = noiseBuffer;
                nodes.largeIntestine.source.loop = true;
                nodes.largeIntestine.filter = ctx.createBiquadFilter();
                nodes.largeIntestine.filter.type = 'lowpass';
                nodes.largeIntestine.filter.frequency.value = 100;
                nodes.largeIntestine.dist = ctx.createWaveShaper();
                nodes.largeIntestine.dist.curve = makeDistortionCurve(50);
                nodes.largeIntestine.dist.oversample = '4x';
                nodes.largeIntestine.gain = ctx.createGain();
                nodes.largeIntestine.gain.value = 0;
                nodes.largeIntestine.source.connect(nodes.largeIntestine.filter).connect(nodes.largeIntestine.dist).connect(nodes.largeIntestine.gain).connect(masterGain);
                nodes.largeIntestine.source.start();

                // --- 4. 脾臟/腎臟 (粉紅噪音，極低音量背景音) ---
                nodes.spleenKidney.source = ctx.createBufferSource();
                nodes.spleenKidney.source.buffer = pinkNoiseBuffer;
                nodes.spleenKidney.source.loop = true;
                nodes.spleenKidney.gain = ctx.createGain();
                nodes.spleenKidney.gain.value = 0;
                nodes.spleenKidney.source.connect(nodes.spleenKidney.gain).connect(masterGain);
                nodes.spleenKidney.source.start();

                isInitialized = true;
                heartbeatLoop();
            }

            // 心跳排程器 (獨立運作)
            let nextBeatTime = 0;
            function heartbeatLoop() {
                if (ctx && AppState.isPlaying) {
                    let bpm = 70; // normal
                    if (AppState.physiologicalState === 'caffeine') bpm = 130;
                    if (AppState.physiologicalState === 'sugar') bpm = 55;
                    
                    const beatDuration = 60 / bpm;

                    while (nextBeatTime < ctx.currentTime + 0.1) {
                        if (AppState.activeOrgan === 'heart') {
                            playHeartbeatSound(nextBeatTime);
                        }
                        // 觸發視覺與波形更新
                        if (AppState.activeOrgan === 'heart') {
                            VisualEngine.triggerHeartPulse();
                            Monitor.triggerHeartSpike();
                        }
                        nextBeatTime += beatDuration;
                    }
                }
                setTimeout(heartbeatLoop, 50);
            }

            function playHeartbeatSound(time) {
                // 第一心音 (Lub - 45Hz)
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.value = 45;
                osc1.connect(gain1).connect(masterGain);
                gain1.gain.setValueAtTime(0, time);
                gain1.gain.linearRampToValueAtTime(1, time + 0.05);
                gain1.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                osc1.start(time);
                osc1.stop(time + 0.2);

                // 第二心音 (Dub - 65Hz)
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = 65;
                osc2.connect(gain2).connect(masterGain);
                gain2.gain.setValueAtTime(0, time + 0.25);
                gain2.gain.linearRampToValueAtTime(0.8, time + 0.3);
                gain2.gain.exponentialRampToValueAtTime(0.01, time + 0.45);
                osc2.start(time + 0.25);
                osc2.stop(time + 0.45);
            }

            // 每幀更新連續音效的參數 (LFO 模擬)
            function updateDSP(time) {
                if (!isInitialized || !AppState.isPlaying) return;

                // 狀態修飾因子
                let volMod = 1.0;
                if (AppState.physiologicalState === 'sugar') volMod = 0.3; // 精緻糖導致消化無力
                if (AppState.physiologicalState === 'fiber') volMod = 1.5; // 高纖維聲音飽滿

                // 胃部 LFO (約 3Hz)
                if (AppState.activeOrgan === 'stomach') {
                    const lfo = (Math.sin(time * 3 * Math.PI * 2) + 1) / 2; 
                    let targetVol = (AppState.physiologicalState === 'sugar') ? (Math.random() > 0.5 ? 0 : lfo * 0.5) : lfo * 0.8 * volMod; // 精緻糖造成斷續空洞
                    nodes.stomach.gain.gain.setTargetAtTime(targetVol, ctx.currentTime, 0.05);
                } else {
                    nodes.stomach.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
                }

                // 小腸 LFO (較快不規則, 液體感)
                if (AppState.activeOrgan === 'smallIntestine') {
                    const lfo = (Math.sin(time * 5) * Math.sin(time * 2.3) + 1) / 2;
                    let targetVol = (AppState.physiologicalState === 'sugar') ? (Math.random() > 0.7 ? lfo * 0.3 : 0) : lfo * 0.6 * volMod;
                    nodes.smallIntestine.gain.gain.setTargetAtTime(targetVol, ctx.currentTime, 0.05);
                } else {
                    nodes.smallIntestine.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
                }

                // 大腸 LFO (極慢 0.5Hz, 厚實)
                if (AppState.activeOrgan === 'largeIntestine') {
                    const lfo = (Math.sin(time * 0.5 * Math.PI * 2) + 1) / 2;
                    let targetVol = lfo * 0.7 * volMod;
                    nodes.largeIntestine.gain.gain.setTargetAtTime(targetVol, ctx.currentTime, 0.1);
                } else {
                    nodes.largeIntestine.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
                }

                // 脾/腎 (平穩低音)
                if (AppState.activeOrgan === 'spleen' || AppState.activeOrgan === 'kidneys') {
                    nodes.spleenKidney.gain.gain.setTargetAtTime(0.2, ctx.currentTime, 0.1);
                } else {
                    nodes.spleenKidney.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
                }
            }

            return {
                init,
                play: () => { 
                    if(ctx && ctx.state === 'suspended') ctx.resume(); 
                    if(masterGain) masterGain.gain.setTargetAtTime(1, ctx.currentTime, 0.1);
                    nextBeatTime = ctx ? ctx.currentTime + 0.1 : 0;
                },
                stop: () => { if(masterGain) masterGain.gain.setTargetAtTime(0, ctx.currentTime, 0.1); },
                updateDSP
            };
        })();

        // ================= 2D 監視器繪製 =================
        const Monitor = (function() {
            const canvas = document.getElementById('monitor-canvas');
            const ctx = canvas.getContext('2d');
            const waveData = new Array(canvas.width).fill(0);
            let heartPulseActive = 0;

            function triggerHeartSpike() {
                heartPulseActive = 1.0;
            }

            function draw(time) {
                ctx.fillStyle = '#050510';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 波形資料向左推移
                waveData.shift();
                
                let newValue = 0;

                if (!AppState.isPlaying || !AppState.activeOrgan) {
                    newValue = 0; // 靜默平線
                } else {
                    // 根據器官產生對應波形
                    switch(AppState.activeOrgan) {
                        case 'heart':
                            if (heartPulseActive > 0) {
                                // 模擬 ECG PQRST 波形簡化版
                                if (heartPulseActive > 0.8) newValue = -0.2; // Q
                                else if (heartPulseActive > 0.6) newValue = 1.0; // R
                                else if (heartPulseActive > 0.4) newValue = -0.3; // S
                                else if (heartPulseActive > 0.1) newValue = 0.2; // T
                                heartPulseActive -= 0.05;
                            } else {
                                newValue = (Math.random() * 0.05 - 0.025); // 基準線雜訊
                            }
                            break;
                        case 'stomach':
                            // 緩慢粗波塊
                            newValue = (Math.sin(time * 3 * Math.PI * 2)) * 0.5 + (Math.random()*0.2-0.1);
                            if (AppState.physiologicalState === 'sugar') newValue *= (Math.random() > 0.5 ? 0.2 : 1);
                            break;
                        case 'smallIntestine':
                            // 高頻密集波紋
                            newValue = (Math.sin(time * 15) * Math.sin(time * 5)) * 0.6 + (Math.random()*0.3-0.15);
                            break;
                        case 'largeIntestine':
                            // 超慢厚實波
                            newValue = Math.sin(time * 0.5 * Math.PI * 2) * 0.8;
                            break;
                        case 'spleen':
                        case 'kidneys':
                            // 平穩微細雜訊
                            newValue = Math.random() * 0.15 - 0.075;
                            break;
                    }
                }

                // 受到咖啡因干擾 (全局微小抖動)
                if (AppState.isPlaying && AppState.physiologicalState === 'caffeine') {
                    newValue += (Math.random() * 0.1 - 0.05);
                }

                waveData.push(newValue);

                // 決定顏色
                let strokeColor = '#00ffcc';
                if (AppState.activeOrgan === 'heart') strokeColor = '#ff3366';
                if (AppState.activeOrgan === 'stomach' && AppState.physiologicalState === 'sugar') strokeColor = '#ff3333';
                if (AppState.activeOrgan === 'smallIntestine' || AppState.activeOrgan === 'largeIntestine') {
                    strokeColor = (AppState.physiologicalState === 'fiber') ? '#aaff00' : '#ffaa00';
                }

                ctx.beginPath();
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 2;
                for (let i = 0; i < canvas.width; i++) {
                    const x = i;
                    const y = (canvas.height / 2) - (waveData[i] * canvas.height * 0.4);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // 畫掃描線
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(canvas.width - 2, 0, 2, canvas.height);
            }

            return { draw, triggerHeartSpike };
        })();

        // ================= Three.js 3D 渲染引擎 =================
        const VisualEngine = (function() {
            const container = document.getElementById('canvas-container');
            let scene, camera, renderer, raycaster, mouse;
            
            // 角色與器官群組
            let girlGroup, organs = {};
            let faceParts = {};
            
            // 動畫變數
            let clock = new THREE.Clock();
            let heartPulseScale = 1.0;

            function init() {
                scene = new THREE.Scene();
                // 不設定背景色，讓 CSS radial-gradient 透視出來，需設定 renderer alpha
                
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(0, 0, 5);

                renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(renderer.domElement);

                // 燈光
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
                dirLight.position.set(5, 5, 5);
                scene.add(dirLight);

                buildQChibiGirl();

                // Raycaster 互動
                raycaster = new THREE.Raycaster();
                mouse = new THREE.Vector2();
                window.addEventListener('mousedown', onMouseClick);
                window.addEventListener('resize', onWindowResize);
            }

            function buildQChibiGirl() {
                girlGroup = new THREE.Group();
                // 核心防呆：向右推移完美置中，不使用 ViewOffset
                girlGroup.position.x = 1.5; 
                girlGroup.position.y = -0.5;
                scene.add(girlGroup);

                const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.4 });
                
                // 1. 極巨化頭部 (SphereGeometry, 半徑 1.2)
                const headGeo = new THREE.SphereGeometry(1.2, 32, 32);
                const head = new THREE.Mesh(headGeo, skinMat);
                head.position.y = 1.6; // 提高頭部位置以符合 1:1.2 比例
                girlGroup.add(head);

                // 髮型 (棕色短髮)
                const hairMat = new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.8 });
                const hairGeo = new THREE.SphereGeometry(1.25, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.55);
                const hair = new THREE.Mesh(hairGeo, hairMat);
                head.add(hair);

                // 臉部五官 (低重心法則)
                const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
                faceParts.eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                faceParts.eyeL.position.set(-0.4, -0.2, 1.12); // 低於中心
                faceParts.eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                faceParts.eyeR.position.set(0.4, -0.2, 1.12);
                head.add(faceParts.eyeL);
                head.add(faceParts.eyeR);

                // 眉毛
                const browGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.2, 8);
                browGeo.rotateZ(Math.PI / 2);
                const browMat = new THREE.MeshStandardMaterial({ color: 0x3a2010 });
                faceParts.browL = new THREE.Mesh(browGeo, browMat);
                faceParts.browL.position.set(-0.4, 0.05, 1.15);
                faceParts.browR = new THREE.Mesh(browGeo, browMat);
                faceParts.browR.position.set(0.4, 0.05, 1.15);
                head.add(faceParts.browL);
                head.add(faceParts.browR);

                // 腮紅 (粉紅半透明壓扁圓柱)
                const blushGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 16);
                blushGeo.rotateX(Math.PI / 2);
                const blushMat = new THREE.MeshStandardMaterial({ color: 0xffb6c1, transparent: true, opacity: 0.6 });
                const blushL = new THREE.Mesh(blushGeo, blushMat);
                blushL.position.set(-0.55, -0.35, 1.05);
                const blushR = new THREE.Mesh(blushGeo, blushMat);
                blushR.position.set(0.55, -0.35, 1.05);
                head.add(blushL);
                head.add(blushR);

                // 嘴巴 (極小紅球)
                const mouthGeo = new THREE.SphereGeometry(0.06, 16, 16);
                const mouthMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
                faceParts.mouth = new THREE.Mesh(mouthGeo, mouthMat);
                faceParts.mouth.position.set(0, -0.45, 1.15);
                head.add(faceParts.mouth);

                // 2. 身體 (極短 CylinderGeometry, 淺藍色連帽衫, 半透明)
                // 絕對不使用 transmission, 使用基礎 transparent
                const bodyGeo = new THREE.CylinderGeometry(0.8, 0.9, 1.4, 32);
                const hoodieMat = new THREE.MeshStandardMaterial({ 
                    color: 0xadd8e6, transparent: true, opacity: 0.45, depthWrite: false, side: THREE.DoubleSide
                });
                const body = new THREE.Mesh(bodyGeo, hoodieMat);
                body.position.y = 0.3;
                girlGroup.add(body);

                // 衣服上的小熊圖案 (用小幾何體拼湊在胸前)
                const bearMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
                const bearHead = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16,16), bearMat);
                bearHead.position.set(0, 0.2, 0.85);
                const bearEarL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16,16), bearMat);
                bearEarL.position.set(-0.12, 0.3, 0.82);
                const bearEarR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16,16), bearMat);
                bearEarR.position.set(0.12, 0.3, 0.82);
                body.add(bearHead); body.add(bearEarL); body.add(bearEarR);

                // 短褲 (米色)
                const pantsGeo = new THREE.CylinderGeometry(0.9, 0.85, 0.5, 32);
                const pantsMat = new THREE.MeshStandardMaterial({ color: 0xf5f5dc });
                const pants = new THREE.Mesh(pantsGeo, pantsMat);
                pants.position.y = -0.65;
                girlGroup.add(pants);

                // 3. 四肢 (短胖笨拙 CylinderGeometry)
                const limbMat = skinMat;
                const armGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.9, 16);
                
                // 左手
                faceParts.armL = new THREE.Mesh(armGeo, limbMat);
                faceParts.armL.position.set(-1.1, 0.4, 0);
                faceParts.armL.rotation.z = Math.PI / 6;
                // 圓圓小手
                const handL = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16,16), limbMat);
                handL.position.y = -0.45;
                faceParts.armL.add(handL);
                girlGroup.add(faceParts.armL);

                // 右手
                faceParts.armR = new THREE.Mesh(armGeo, limbMat);
                faceParts.armR.position.set(1.1, 0.4, 0);
                faceParts.armR.rotation.z = -Math.PI / 6;
                const handR = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16,16), limbMat);
                handR.position.y = -0.45;
                faceParts.armR.add(handR);
                girlGroup.add(faceParts.armR);

                // 腿與運動鞋 (白色襪子+淺藍鞋)
                const legGeo = new THREE.CylinderGeometry(0.25, 0.2, 0.7, 16);
                const shoeGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.3, 16);
                const sockMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const shoeMat = new THREE.MeshStandardMaterial({ color: 0x88ccff });

                const legL = new THREE.Mesh(legGeo, limbMat);
                legL.position.set(-0.4, -1.2, 0);
                const sockL = new THREE.Mesh(shoeGeo, sockMat);
                sockL.position.y = -0.3;
                const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
                shoeL.position.y = -0.5;
                shoeL.position.z = 0.1;
                legL.add(sockL); legL.add(shoeL);
                girlGroup.add(legL);

                const legR = new THREE.Mesh(legGeo, limbMat);
                legR.position.set(0.4, -1.2, 0);
                const sockR = new THREE.Mesh(shoeGeo, sockMat);
                sockR.position.y = -0.3;
                const shoeR = new THREE.Mesh(shoeGeo, shoeMat);
                shoeR.position.y = -0.5;
                shoeR.position.z = 0.1;
                legR.add(sockR); legR.add(shoeR);
                girlGroup.add(legR);

                // ================= 4. 內部器官擴充 (重點) =================
                // 所有器官放入 body 內部，以確保透視
                const createOrgan = (id, geo, color, pos) => {
                    const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(pos);
                    mesh.userData = { id: id, baseScale: 1, baseEmissive: color };
                    
                    // 點光源讓身體內部發光
                    const light = new THREE.PointLight(color, 0, 1.5);
                    mesh.add(light);
                    mesh.userData.light = light;

                    body.add(mesh);
                    organs[id] = mesh;
                    return mesh;
                };

                // 心臟 (紅) - 胸口偏左 (畫面右側)
                createOrgan('heart', new THREE.SphereGeometry(0.2, 32, 32), 0xff1111, new THREE.Vector3(0.2, 0.3, 0.2));
                
                // 胃部 (綠) - 上腹部
                createOrgan('stomach', new THREE.SphereGeometry(0.25, 32, 16), 0x00ff44, new THREE.Vector3(-0.15, -0.05, 0.15));
                organs['stomach'].scale.set(1.2, 0.8, 1); // 塑形
                
                // 脾臟 (深紫扁球) - 胃的左上方
                createOrgan('spleen', new THREE.SphereGeometry(0.12, 16, 16), 0x800080, new THREE.Vector3(-0.4, 0.1, 0.05));
                organs['spleen'].scale.set(1, 0.6, 1);

                // 腎臟 (藍色豆狀) - 後腰
                createOrgan('kidneys', new THREE.SphereGeometry(0.15, 16, 16), 0x0055ff, new THREE.Vector3(0, -0.2, -0.4));
                const kid2 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), organs['kidneys'].material);
                kid2.position.set(-0.4, 0, 0); // 相對位置
                organs['kidneys'].add(kid2); // 綁在一起控制

                // 小腸 (多個環狀) - 中腹部 (黃橘)
                const siGroup = new THREE.Group();
                const siGeo = new THREE.TorusGeometry(0.15, 0.06, 16, 32);
                const siMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.2 });
                for(let i=0; i<4; i++) {
                    const ring = new THREE.Mesh(siGeo, siMat);
                    ring.position.set((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.1);
                    ring.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    siGroup.add(ring);
                }
                siGroup.position.set(0, -0.3, 0.15);
                siGroup.userData = { id: 'smallIntestine', baseScale: 1, baseEmissive: 0xffaa00 };
                const siLight = new THREE.PointLight(0xffaa00, 0, 1.5);
                siGroup.add(siLight);
                siGroup.userData.light = siLight;
                body.add(siGroup);
                organs['smallIntestine'] = siGroup;

                // 大腸 (粗管圍繞) - 深褐/綠
                const liGeo = new THREE.TorusGeometry(0.35, 0.08, 16, 32, Math.PI * 1.5);
                liGeo.rotateZ(Math.PI * 0.25);
                createOrgan('largeIntestine', liGeo, 0x556b2f, new THREE.Vector3(0, -0.3, 0.1));
            }

            // Raycaster 點擊偵測
            function onMouseClick(event) {
                // 確保點擊範圍在 3D 畫布內 (排除左側 UI 面板區)
                if (event.clientX < 380) return;

                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                // 收集所有可點擊的器官 Mesh
                const checkList = [];
                Object.values(organs).forEach(obj => {
                    if (obj.type === 'Group') {
                        obj.children.forEach(c => { if(c.type === 'Mesh') { c.userData.parentId = obj.userData.id; checkList.push(c); }});
                    } else {
                        checkList.push(obj);
                    }
                });

                const intersects = raycaster.intersectObjects(checkList);
                if (intersects.length > 0) {
                    const hit = intersects[0].object;
                    const organId = hit.userData.parentId || hit.userData.id;
                    setTargetOrgan(organId);
                }
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function triggerHeartPulse() {
                heartPulseScale = 1.3;
            }

            // 動畫渲染迴圈
            function render() {
                requestAnimationFrame(render);
                const delta = clock.getDelta();
                AppState.time += delta;
                const time = AppState.time;

                // --- 生理反射與臉部表情更新 ---
                // 重置預設表情
                faceParts.eyeL.scale.set(1, 1, 1);
                faceParts.eyeR.scale.set(1, 1, 1);
                faceParts.mouth.scale.set(1, 1, 1);
                faceParts.browL.rotation.z = 0;
                faceParts.browR.rotation.z = 0;
                faceParts.armL.rotation.z = Math.PI / 6;
                faceParts.armR.rotation.z = -Math.PI / 6;
                girlGroup.position.set(1.5, -0.5, 0); // 重置抖動

                if (AppState.isPlaying) {
                    if (AppState.physiologicalState === 'caffeine') {
                        // 驚恐、O型嘴、發抖、舉手
                        faceParts.eyeL.scale.set(1.2, 1.2, 1);
                        faceParts.eyeR.scale.set(1.2, 1.2, 1);
                        faceParts.mouth.scale.set(1.5, 1.5, 1); // O 型
                        faceParts.browL.rotation.z = Math.PI / 6; // 挑眉
                        faceParts.browR.rotation.z = -Math.PI / 6;
                        faceParts.armL.rotation.z = -Math.PI / 4; // 舉手
                        faceParts.armR.rotation.z = Math.PI / 4;
                        girlGroup.position.x = 1.5 + (Math.random() * 0.04 - 0.02);
                        girlGroup.position.y = -0.5 + (Math.random() * 0.04 - 0.02);
                    } 
                    else if (AppState.physiologicalState === 'fiber') {
                        // 彎月笑眼 (Y軸壓扁)
                        faceParts.eyeL.scale.set(1, 0.1, 1);
                        faceParts.eyeR.scale.set(1, 0.1, 1);
                        faceParts.mouth.scale.set(2, 0.5, 1); // 寬笑
                    }
                    else if (AppState.physiologicalState === 'sugar') {
                        // 皺眉、痛苦
                        faceParts.browL.rotation.z = -Math.PI / 6; 
                        faceParts.browR.rotation.z = Math.PI / 6;
                        faceParts.mouth.scale.set(0.5, 0.2, 1);
                        if (Math.random() > 0.95) girlGroup.position.x += 0.05; // 抽搐
                    }
                }

                // --- 視覺與聽覺解耦 (器官動畫) ---
                Object.keys(organs).forEach(id => {
                    const organ = organs[id];
                    const isFocus = (AppState.activeOrgan === id);
                    const isActive = isFocus && AppState.isPlaying;

                    // 基礎發光強度設定
                    let targetIntensity = isFocus ? 1.5 : 0;
                    let targetEmissive = organ.userData.baseEmissive;

                    // 特殊狀態顏色覆蓋
                    if (AppState.physiologicalState === 'sugar' && id === 'stomach') targetEmissive = 0xff0000; // 胃發紅光警告
                    if (AppState.physiologicalState === 'fiber' && (id === 'smallIntestine' || id === 'largeIntestine')) targetIntensity = 2.5; // 腸道健康亮光

                    // 更新材質發光
                    if (organ.type === 'Mesh') {
                        organ.material.emissiveIntensity += (targetIntensity - organ.material.emissiveIntensity) * 0.1;
                        organ.material.emissive.setHex(targetEmissive);
                    } else if (organ.type === 'Group') {
                        organ.children.forEach(c => {
                            if(c.type==='Mesh') {
                                c.material.emissiveIntensity += (targetIntensity - c.material.emissiveIntensity) * 0.1;
                                c.material.emissive.setHex(targetEmissive);
                            }
                        });
                    }
                    if(organ.userData.light) {
                        organ.userData.light.intensity += (targetIntensity - organ.userData.light.intensity) * 0.1;
                        organ.userData.light.color.setHex(targetEmissive);
                    }

                    // 形變動畫 (連動 LFO)
                    let scale = 1.0;
                    if (isActive) {
                        if (id === 'heart') {
                            scale = heartPulseScale;
                            heartPulseScale += (1.0 - heartPulseScale) * 0.1;
                        } 
                        else if (id === 'stomach') {
                            scale = 1 + Math.sin(time * 3 * Math.PI * 2) * 0.1;
                            if (AppState.physiologicalState === 'sugar') scale = 1 + (Math.random() > 0.5 ? 0 : 0.05); // 斷續
                        } 
                        else if (id === 'smallIntestine') {
                            scale = 1 + (Math.sin(time * 5) * Math.sin(time * 2.3)) * 0.08;
                        } 
                        else if (id === 'largeIntestine') {
                            scale = 1 + Math.sin(time * 0.5 * Math.PI * 2) * 0.05;
                        }
                        else if (id === 'spleen' || id === 'kidneys') {
                            scale = 1 + Math.sin(time * 10) * 0.02; // 微小震顫
                        }
                    }
                    organ.scale.setScalar(scale);
                });

                // 同步 DSP 與 Canvas
                AudioEngine.updateDSP(time);
                Monitor.draw(time);
                renderer.render(scene, camera);
            }

            return { init, render, triggerHeartPulse };
        })();

        // ================= UI 邏輯與事件綁定 =================
        function updateUI() {
            // Play/Stop buttons
            document.getElementById('btn-play').className = AppState.isPlaying ? 'is-playing' : '';
            
            // Organ buttons
            document.querySelectorAll('.organ-btn').forEach(btn => {
                btn.classList.toggle('active-organ', btn.dataset.target === AppState.activeOrgan);
            });

            // State buttons
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.classList.toggle('active-state', btn.dataset.state === AppState.physiologicalState);
            });

            // Status text
            const textMap = { 'normal': '一般狀態', 'caffeine': '咖啡因反應', 'fiber': '高纖維消化', 'sugar': '精緻糖負載' };
            const organMap = { 'heart':'心臟', 'stomach':'胃部', 'smallIntestine':'小腸', 'largeIntestine':'大腸', 'spleen':'脾臟', 'kidneys':'腎臟'};
            let str = AppState.isPlaying ? '🔴 監聽中' : '⏹ 靜默待機';
            if (AppState.activeOrgan) str += ` | 目標：${organMap[AppState.activeOrgan]}`;
            str += ` | 生理：${textMap[AppState.physiologicalState]}`;
            document.getElementById('status-text').innerText = str;
        }

        function setTargetOrgan(organId) {
            if (AppState.isTracking) return; // 追蹤模式鎖定
            AppState.activeOrgan = organId;
            updateUI();
        }

        function bindEvents() {
            // Play/Stop
            document.getElementById('btn-play').addEventListener('click', () => {
                AudioEngine.init();
                AudioEngine.play();
                AppState.isPlaying = true;
                if(!AppState.activeOrgan) AppState.activeOrgan = 'heart';
                updateUI();
            });

            document.getElementById('btn-stop').addEventListener('click', () => {
                AudioEngine.stop();
                AppState.isPlaying = false;
                updateUI();
            });

            // Organ selection
            document.querySelectorAll('.organ-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    setTargetOrgan(e.target.dataset.target);
                });
            });

            // State selection
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (AppState.isTracking) return;
                    AppState.physiologicalState = e.target.dataset.state;
                    updateUI();
                });
            });

            // 消化路徑追蹤 (非同步展示)
            document.getElementById('btn-path').addEventListener('click', async () => {
                if (AppState.isTracking) return;
                
                // 強制啟動播放
                if (!AppState.isPlaying) document.getElementById('btn-play').click();
                
                AppState.isTracking = true;
                AppState.physiologicalState = 'normal'; // 重置為一般狀態
                document.getElementById('ui-blocker').style.display = 'flex';
                
                const wait = ms => new Promise(res => setTimeout(res, ms));
                
                // 1. 胃
                AppState.activeOrgan = 'stomach'; updateUI();
                await wait(3000);
                
                // 2. 小腸
                AppState.activeOrgan = 'smallIntestine'; updateUI();
                await wait(3000);
                
                // 3. 大腸
                AppState.activeOrgan = 'largeIntestine'; updateUI();
                await wait(3000);

                // 結束追蹤
                AppState.isTracking = false;
                document.getElementById('ui-blocker').style.display = 'none';
                updateUI();
            });
        }

        // ================= 啟動程式 =================
        window.onload = () => {
            VisualEngine.init();
            bindEvents();
            updateUI();
            VisualEngine.render();
        };

    </script>
</body>
</html>
