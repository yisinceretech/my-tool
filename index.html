<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif;color:#fff}body{background:linear-gradient(135deg,#ff9bd3 0%,#c5a7ff 48%,#8bddff 100%)}#app{height:100%;display:grid;grid-template-columns:minmax(390px,38.2%) 61.8%;gap:14px;padding:18px}.panel{z-index:2;height:100%;overflow:auto;padding:18px;border:1px solid #ffffff55;border-radius:25px;background:linear-gradient(145deg,#17203dda,#25204fd0);backdrop-filter:blur(18px);box-shadow:0 20px 50px #462d6a55,inset 0 1px #fff4}.title{font-weight:900;font-size:clamp(23px,2.1vw,37px);letter-spacing:.04em;text-shadow:0 3px 15px #ff60bd}.sub{opacity:.72;margin:2px 0 14px}.card{padding:13px;margin:10px 0;border-radius:18px;background:#07112766;border:1px solid #ffffff24}.row{display:flex;gap:9px;flex-wrap:wrap}.btn{flex:1;min-width:110px;border:1px solid #ffffff4d;border-radius:14px;padding:11px 10px;color:#fff;background:#ffffff12;font-weight:800;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-2px);background:#ffffff22}.btn.active{border-color:#72e5ff;box-shadow:0 0 18px #4bd7ff88;background:#29638b88}.main{font-size:16px;background:linear-gradient(135deg,#36c983,#146a50)}.main.stop{background:linear-gradient(135deg,#ff6479,#8c304a)}.status{font-size:13px;margin-top:9px;color:#baf7d2}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#63e48d;box-shadow:0 0 12px #63e48d;margin-right:7px}.dot.off{background:#8992a5;box-shadow:none}.modes .btn{font-size:13px;min-width:90px}.label{display:flex;justify-content:space-between;font-weight:800;margin-bottom:8px}input[type=range]{width:100%;accent-color:#72d9ff}canvas#scope{width:100%;height:190px;border-radius:13px;display:block;background:#fff}.hint{font-size:12px;opacity:.72;line-height:1.55}.stage{position:relative;min-width:0;border-radius:28px;overflow:hidden}.stage canvas{display:block;width:100%;height:100%}.hud{position:absolute;top:18px;right:18px;paddi </head>
<body><div id="app">
<section class="panel">
<div class="title">身體聲音合成器 <small>v2.9.1</small></div><div class="sub">Q版女孩特仕版 · 靜默備課防護</div>
<div class="card"><div class="row"><button id="listen" class="btn main">▶️ 開始監聽</button><button class="btn organ active" data-organ="heart">❤️ 心臟</button><button class="btn organ" data-organ="gut">🫃 腸胃</button></div><div class="status"><span id="dot" class="dot off"></span><span id="status">已停止：完全靜音</span></div></div>
<div class="card"><div class="label"><span>營養狀態</span><span id="stateName">一般狀態</span></div><div class="row modes">
<button class="btn state active" data-state="normal">🍚 一般</button><button class="btn state" data-state="caffeine">☕ 咖啡因</button><button class="btn state" data-state="sugarCrash">🍩 暈糖</button><button class="btn state" data-state="fiber">🥦 高纖維</button><button class="btn state" data-state="refined">🥤 精緻糖</button></div></div>
<div class="card"><div class="label"><span>手動 BPM</span><span><b id="bpmVal">72</b> BPM</span></div><input id="bpm" type="range" min="40" max="160" value="72"></div>
<div class="card"><div class="label"><span id="scopeTitle">心跳監測 ECG</span><span id="focusLabel">❤️ 心臟模式</span></div><canvas id="scope" width="720" height="260"></canvas></div>
<div class="card hint">點擊 3D 心臟或腸胃可切換聽診焦點。停止監聽時，聲音節點與波形動畫均停止；調整狀態或 BPM 不會發聲。滑鼠拖曳可旋轉視角。</div>
</section>
<section class="stage" id="stage"><div class="hud">目前焦點：<span id="hudOrgan">❤️ 心臟</span><br>狀態：<span id="hudState">一般狀態</span><br>BPM：<span id="hudBpm">72</span></div><div class="badge">🖱️ 點擊器官切換 · 拖曳旋轉</div></section>
</div>
<script>
(()=>{
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let running=false, organ='heart', state='normal', bpm=72, ctx=null, master=null, timer=null, noise=null, scopeRAF=0, t0=0;
const cfg={normal:{name:'一般狀態',bpm:72},caffeine:{name:'咖啡因刺激',bpm:118},sugarCrash:{name:'暈糖反應',bpm:52},fiber:{name:'高纖維消化',bpm:76},refined:{name:'精緻糖消化',bpm:88}};
const scope=$('#scope'),g=scope.getContext('2d');
function setUI(){ $('#bpmVal').textContent=bpm;$('#hudBpm').textContent=bpm;$('#stateName').textContent=cfg[state].name;$('#hudState').textContent=cfg[state].name;$('#hudOrgan').textContent=organ==='heart'?'❤️ 心臟':'🫃 腸胃';$('#focusLabel').textContent=organ==='heart'?'❤️ 心臟模式':'🫃 腸胃模式';$('#scopeTitle').textContent=organ==='heart'?'心跳監測 ECG':'腸胃蠕動 Borborygmi';$$('.organ').forEach(b=>b.classList.toggle('active',b.dataset.organ===organ));drawIdle()}
function ensureAudio(){if(ctx)return;ctx=new (window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0;master.connect(ctx.destination)}
function pulse(freq,when,amp=.8,dur=.16){const o=ctx.createOscillator(),v=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(freq,when);v.gain.setValueAtTime(.0001,when);v.gain.exponentialRampToValueAtTime(amp,when+.012);v.gain.exponentialRampToValueAtTime(.0001,when+dur);o.connect(v).connect(master);o.start(when);o.stop(when+dur+.02)}
function beat(){if(!running||organ!=='heart')return;const now=ctx.currentTime, irregular=state==='sugarCrash'&&Math.random()<.36?Math.random()*.45:0;pulse(45,now+.02+irregular,.85,.18);pulse(65,now+.19+irregular,.55,.12)}
function makeNoise(){const len=ctx.sampleRate*2,b=ctx.createBuffer(1,len,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource(),lp=ctx.createBiquadFilter(),gain=ctx.createGain(),lfo=ctx.createOscillator(),lg=ctx.createGain();s.buffer=b;s.loop=true;lp.type='lowpass';lp.frequency.value=state==='refined'?145:210;gain.gain.value=0.035;lfo.frequency.value=state==='fiber'?3.6:2.2;lg.gain.value=state==='fiber'?.055:.035;lfo.connect(lg).connect(gain.gain);s.connect(lp).connect(gain).connect(master);s.start();lfo.start();noise={s,lfo,gain}}
function restartEngine(){if(!running)return;clearInterval(timer);if(noise){try{noise.s.stop();noise.lfo.stop()}catch(e){}noise=null}if(organ==='heart'){beat();timer=setInterval(beat,60000/bpm)}else makeNoise()}
function start(){ensureAudio();ctx.resume();running=true;master.gain.cancelScheduledValues(ctx.currentTime);master.gain.setTargetAtTime(.72,ctx.currentTime,.025);$('#listen').textContent='⏹ 停止監聽';$('#listen').classList.add('stop');$('#dot').classList.remove('off');$('#status').textContent='監聽中：'+cfg[state].name;restartEngine();t0=performance.now();scopeRAF=requestAnimationFrame(drawScope)}
function stop(){running=false;clearInterval(timer);timer=null;if(noise){try{noise.s.stop();noise.lfo.stop()}catch(e){}noise=null}if(master&&ctx)master.gain.setTargetAtTime(0,ctx.currentTime,.01);cancelAnimationFrame(scopeRAF);$('#listen').textContent='▶️ 開始監聽';$('#listen').classList.remove('stop');$('#dot').classList.add('off');$('#status').textContent='已停止：完全靜音';drawIdle()}
function grid(light){g.fillStyle=light?'#fff':'#071624';g.fillRect(0,0,scope.width,scope.height);g.strokeStyle=light?'#d4dbe2':'#123f4e';g.lineWidth=1;for(let x=0;x<scope.width;x+=18){g.beginPath();g.moveTo(x,0);g.lineTo(x,scope.height);g.stroke()}for(let y=0;y<scope.height;y+=18){g.beginPath();g.moveTo(0,y);g.lineTo(scope.width,y);g.stroke()}}
function drawIdle(){grid(organ==='heart');g.fillStyle=organ==='heart'?'#8d9aaa':'#58aeba';g.font='bold 22px system-ui';g.textAlign='center';g.fillText('靜默備課模式',scope.width/2,scope.height/2)}
function ecg(p){p%=1;if(p<.12)return .02*Math.sin(p*40);if(p<.18)return .15*Math.sin((p-.12)/.06*Math.PI);if(p<.22)return -.12;if(p<.26)return 1-Math.abs((p-.24)/.02);if(p<.30)return -.35*(1-(p-.26)/.04);if(p<.52)return .28*Math.sin((p-.40)/.24*Math.PI);return .02*Math.sin(p*33)}
function drawScope(now){if(!running)return;const tm=(now-t0)/1000;grid(organ==='heart');g.beginPath();for(let x=0;x<scope.width;x++){const tt=tm-(scope.width-x)/170;let y;if(organ==='heart'){let period=60/bpm,p=((tt%period)+period)%period/period;y=scope.height*.57-ecg(p)*(state==='caffeine'?92:70)}else{const dense=state==='fiber'?1.8:1, hollow=state==='refined'?0.55:1;y=scope.height/2-(Math.sin(tt*18)+Math.sin(tt*31)*.55+Math.sin(tt*7)*.8)*24*dense*hollow*(.35+.65*Math.abs(Math.sin(tt*(state==='fiber'?3.6:2.2))))}x?g.lineTo(x,y):g.moveTo(x,y)}g.strokeStyle=organ==='heart'?'#a31620':'#2ff0e6';g.lineWidth=4;g.shadowBlur=10;g.shadowColor=g.strokeStyle;g.stroke();g.shadowBlur=0;scopeRAF=requestAnimationFrame(drawScope)}
$('#listen').onclick=()=>running?stop():start();$('#bpm').oninput=e=>{bpm=+e.target.value;setUI();restartEngine()};$$('.organ').forEach(b=>b.onclick=()=>switchOrgan(b.dataset.organ));$$('.state').forEach(b=>b.onclick=()=>{state=b.dataset.state;bpm=cfg[state].bpm;$('#bpm').value=bpm;$$('.state').forEach(x=>x.classList.toggle('active',x===b));setUI();restartEngine()});
function switchOrgan(v){organ=v;setUI();restartEngine()}
// THREE.JS r128 — only stable standard materials; no transmission, ViewOffset, CapsuleGeometry.
const stage=$('#stage'),scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(34,1,.1,100),renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.outputEncoding=THREE.sRGBEncoding;stage.prepend(renderer.domElement);camera.position.set(0,2.7,11);
scene.add(new THREE.HemisphereLight(0xffffff,0x70508a,1.6));const dl=new THREE.DirectionalLight(0xffffff,1.25);dl.position.set(4,8,6);dl.castShadow=true;scene.add(dl);
const model=new THREE.Group();model.position.x=1.5;scene.add(model);const std=(c,o=1,em=0)=>new THREE.MeshStandardMaterial({color:c,roughness:.62,metalness:.02,transparent:o<1,opacity:o,emissive:em,emissiveIntensity:em?1.7:0});const skin=std(0xf3b394),hair=std(0x15121d),pink=std(0xff6fae,.5),blue=std(0x88cef2),white=std(0xffffff),dark=std(0x21172b);
function mesh(geo,mat,p,s=[1,1,1],parent=model){const m=new THREE.Mesh(geo,mat);m.position.set(...p);m.scale.set(...s);m.castShadow=m.receiveShadow=true;parent.add(m);return m}function sph(p,s,mat,parent){return mesh(new THREE.SphereGeometry(1,32,20),mat,p,s,parent)}function cyl(p,s,mat,parent,rot=[0,0,0]){const m=mesh(new THREE.CylinderGeometry(.5,.5,1,20),mat,p,s,parent);m.rotation.set(...rot);return m}
const body=new THREE.Group();model.add(body);sph([0,3.75,0],[1.28,1.18,1.05],skin,body);sph([0,3.9,-.38],[1.42,1.34,.7],hair,body);mesh(new THREE.BoxGeometry(2.2,.34,.72),hair,[0,4.48,.65],[1,1,1],body);for(let i=-4;i<=4;i++)cyl([i*.23,4.25,.77],[.38,.48,.25],hair,body,[0,0,.04*i]);sph([-1.03,3.78,.1],[.24,.34,.18],skin,body);sph([1.03,3.78,.1],[.24,.34,.18],skin,body);
const eyeL=sph([-.48,3.84,.9],[.34,.42,.12],white,body),eyeR=sph([.48,3.84,.9],[.34,.42,.12],white,body);const pupils=[];[-.48,.48].forEach(x=>{pupils.push(sph([x,3.82,1.01],[.18,.25,.08],dark,body));sph([x-.06,3.93,1.09],[.055,.07,.03],white,body)});const brows=[];[-.48,.48].forEach(x=>brows.push(cyl([x,4.28,.93],[.06,.5,.06],dark,body,[0,0,Math.PI/2])));const mouth=mesh(new THREE.TorusGeometry(.17,.045,10,24,Math.PI),std(0x9d2849),[0,3.42,1.02],[1,1,1],body);mouth.rotation.z=Math.PI;
mesh(new THREE.CylinderGeometry(.72,.9,1.6,28),pink,[0,2.42,0],[1,1,1],body);mesh(new THREE.CylinderGeometry(.88,.78,.62,28),blue,[0,1.45,0],[1,1,1],body);const arms=[];[-1,1].forEach(k=>{const a=cyl([k*1.03,2.45,0],[.34,1.65,.34],skin,body,[0,0,k*.22]);arms.push(a);sph([k*1.21,1.64,0],[.25,.28,.25],skin,body)});[-.42,.42].forEach(x=>{cyl([x,.55,0],[.48,1.7,.48],skin,body);cyl([x,-.27,0],[.53,.55,.53],white,body);const shoe=cyl([x,-.63,.22],[.72,.45,1.2],blue,body,[Math.PI/2,0,0]);});
const heart=sph([0,2.58,.83],[.32,.38,.2],std(0xff203e,1,0xff102d),body);heart.userData.organ='heart';const gut=new THREE.Group();gut.position.set(0,1.92,.82);body.add(gut);for(let i=0;i<5;i++){const q=mesh(new THREE.TorusGeometry(.23+.04*(i%2),.075,10,22),std(0x45ef83,1,0x19b851),[(-.35+i*.18),(.16-(i%2)*.25),0],[1,1,1],gut);q.userData.organ='gut'}gut.userData.organ='gut';
const floor=mesh(new THREE.CircleGeometry(3.3,48),std(0x7f52aa,.22),[1.5,-.88,0],[1,1,1],scene);floor.rotation.x=-Math.PI/2;
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();renderer.domElement.addEventListener('pointerdown',e=>{if(dragged)return;const r=renderer.domElement.getBoundingClientRect();mouse.x=(e.clientX-r.left)/r.width*2-1;mouse.y=-(e.clientY-r.top)/r.height*2+1;ray.setFromCamera(mouse,camera);const hit=ray.intersectObjects([heart,...gut.children],true)[0];if(hit){let o=hit.object.userData.organ||hit.object.parent.userData.organ;if(o)switchOrgan(o)}});let down=false,lastX=0,dragged=false;renderer.domElement.addEventListener('pointerdown',e=>{down=true;lastX=e.clientX;dragged=false});addEventListener('pointermove',e=>{if(down){const d=e.clientX-lastX;if(Math.abs(d)>2)dragged=true;model.rotation.y+=d*.006;lastX=e.clientX}});addEventListener('pointerup',()=>down=false);
function resize(){const w=stage.clientWidth,h=stage.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
function animate(n){requestAnimationFrame(animate);const t=n*.001,c=cfg[state];heart.material.emissiveIntensity=organ==='heart'?2.2:.12;gut.children.forEach(x=>{x.material.emissive.setHex(state==='refined'?0xff361d:0x19b851);x.material.color.setHex(state==='refined'?0xff694c:0x45ef83);x.material.emissiveIntensity=organ==='gut'?2:.1});let beatPhase=(t%(60/bpm))/(60/bpm),kick=Math.exp(-beatPhase*18);heart.scale.setScalar(organ==='heart'?(1+.25*kick):1);gut.scale.setScalar(organ==='gut'?(1+.055*Math.sin(t*(state==='fiber'?12:6))):1);body.position.y=Math.sin(t*1.6)*.025;body.rotation.z=0;model.position.y=0;arms[0].rotation.z=-.22;arms[1].rotation.z=.22;brows.forEach(b=>b.rotation.z=Math.PI/2);pupils.forEach(p=>p.scale.y=1);skin.color.setHex(0xf3b394);if(state==='caffeine'){skin.color.setHex(0xff9d8c);model.position.x=1.5+Math.sin(t*70)*.018;arms[0].rotation.z=-1.25;arms[1].rotation.z=1.25;brows[0].rotation.z=1.25;brows[1].rotation.z=1.9;eyeL.scale.y=eyeR.scale.y=1.18;mouth.scale.set(1.15,1.2,1)}else if(state==='sugarCrash'){skin.color.setHex(0xd8c9c0);body.rotation.z=-.09;pupils.forEach(p=>p.scale.y=.45);brows[0].rotation.z=1.95;brows[1].rotation.z=1.2}else if(state==='fiber'){eyeL.scale.y=eyeR.scale.y=.5;body.rotation.z=Math.sin(t*2)*.025;mouth.scale.set(1.25,1,1)}else if(state==='refined'){pupils.forEach(p=>p.scale.y=.65);brows[0].rotation.z=1.1;brows[1].rotation.z=2.05;body.rotation.z=Math.sin(t*17)*.014}renderer.render(scene,camera)}
setUI();drawIdle();animate(0);
})();
</script></body></html>
