<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 v4.3 (內建繪製 Q版人物與果凍器官)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #1a1a24;
            color: #eceff4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }
        /* 視覺舞台區 */
        #stage-container {
            flex: 1;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at center, #2e3440 0%, #1a1a24 100%);
        }
        #webgl-output {
            width: 100%;
            height: 100%;
        }
        /* HUD 頂部提示列 (替代 alert) */
        #hud-status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 52, 64, 0.9);
            border: 1px solid #88c0d0;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 10;
        }
        /* 右側控制面板 */
        #control-panel {
            width: 340px;
            height: 100vh;
            background: rgba(46, 52, 64, 0.95);
            border-left: 1px solid #4c566a;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .panel-section {
            background: #3b4252;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #434c5e;
        }
        .panel-section h3 {
            font-size: 14px;
            color: #88c0d0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .file-input-group label {
            font-size: 12px;
            color: #d8dee9;
        }
        input[type="file"] {
            font-size: 12px;
            color: #eceff4;
            background: #2e3440;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #4c566a;
            width: 100%;
            cursor: pointer;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .slider-group label {
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #88c0d0;
            cursor: pointer;
        }
        .btn {
            background: #5e81ac;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #81a1c1;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="stage-container">
        <div id="hud-status">內建 Q版透視人物已載入！請調整飲食參數</div>
        <div id="webgl-output"></div>
    </div>

    <div id="control-panel">
        <h2>身體聲音 v4.3</h2>

        <div class="panel-section">
            <h3>🖼️ 1. 人物圖層設定</h3>
            <div class="file-input-group">
                <label>更換自訂去背人物圖 (選填 PNG)</label>
                <input type="file" id="upload-body" accept="image/*">
            </div>
        </div>

        <div class="panel-section">
            <h3>🍔 2. 飲食狀況模擬</h3>
            <div class="slider-group">
                <label><span>咖啡因濃度 (心跳/發抖)</span><span id="val-caffeine">0%</span></label>
                <input type="range" id="slider-caffeine" min="0" max="100" value="0">
            </div>
            <div class="slider-group">
                <label><span>消化負擔 (胃蠕動/腸鳴)</span><span id="val-digestion">20%</span></label>
                <input type="range" id="slider-digestion" min="0" max="100" value="20">
            </div>
        </div>

        <div class="panel-section">
            <h3>📐 3. 器官位置與縮放微調</h3>
            <div class="slider-group">
                <label>心臟 Y 軸位置</label>
                <input type="range" id="slider-heart-y" min="-2" max="2" step="0.05" value="0.35">
            </div>
            <div class="slider-group">
                <label>腸胃 Y 軸位置</label>
                <input type="range" id="slider-stomach-y" min="-2" max="2" step="0.05" value="-0.45">
            </div>
            <div class="slider-group">
                <label>器官整體縮放比例</label>
                <input type="range" id="slider-organ-scale" min="0.5" max="1.8" step="0.05" value="1.0">
            </div>
        </div>

        <button class="btn" id="btn-audio-toggle">🔊 啟動音訊引擎</button>
    </div>

    <script>
        // --- 1. 全域變數 ---
        let scene, camera, renderer;
        let characterGroup;
        let bodyMesh, heartMesh, stomachMesh;

        // 飲食與生理狀態變數
        let caffeineLevel = 0; // 0 ~ 1
        let digestionLevel = 0.2; // 0 ~ 1
        let organScaleBase = 1.0;
        let clock = new THREE.Clock();

        // Web Audio API 變數
        let audioCtx = null;
        let isAudioActive = false;
        let heartOsc = null, stomachOsc = null;
        let heartGain = null, stomachGain = null;

        // HUD 狀態提示 (取代 alert)
        function showHUD(msg) {
            const hud = document.getElementById('hud-status');
            hud.innerText = msg;
        }

        // --- 2. 動態利用 HTML5 Canvas 程式生成 Q版透明人物貼圖 (解決沒有實體 PNG 檔案的問題) ---
        function generateProceduralChibiTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 680;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 外發光筆觸
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(136, 192, 208, 0.5)";

            // 1. Q版大頭 (透明玻璃質感外框)
            ctx.beginPath();
            ctx.arc(256, 180, 130, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(236, 239, 244, 0.15)";
            ctx.strokeStyle = "rgba(216, 222, 233, 0.8)";
            ctx.lineWidth = 6;
            ctx.fill();
            ctx.stroke();

            // 2. 可愛貓耳/頭髮裝飾線條
            ctx.beginPath();
            ctx.moveTo(150, 100); ctx.lineTo(120, 30); ctx.lineTo(190, 70);
            ctx.moveTo(362, 100); ctx.lineTo(392, 30); ctx.lineTo(322, 70);
            ctx.fillStyle = "rgba(236, 239, 244, 0.2)";
            ctx.fill();
            ctx.stroke();

            // 3. 可愛眼睛與腮紅
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#2e3440";
            ctx.beginPath(); ctx.arc(210, 180, 16, 0, Math.PI * 2); ctx.fill(); // 左眼
            ctx.beginPath(); ctx.arc(302, 180, 16, 0, Math.PI * 2); ctx.fill(); // 右眼

            // 眼神高光
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(205, 175, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(297, 175, 5, 0, Math.PI * 2); ctx.fill();

            // 腮紅
            ctx.fillStyle = "rgba(255, 107, 129, 0.4)";
            ctx.beginPath(); ctx.arc(185, 205, 14, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(327, 205, 14, 0, Math.PI * 2); ctx.fill();

            // 微笑嘴巴
            ctx.beginPath();
            ctx.arc(256, 200, 12, 0.1 * Math.PI, 0.9 * Math.PI);
            ctx.strokeStyle = "#2e3440";
            ctx.lineWidth = 4;
            ctx.stroke();

            // 4. Q版小軀幹與手腳 (玻璃透明艙)
            ctx.beginPath();
            ctx.roundRect(176, 300, 160, 240, 40);
            ctx.fillStyle = "rgba(236, 239, 244, 0.08)";
            ctx.strokeStyle = "rgba(216, 222, 233, 0.7)";
            ctx.lineWidth = 5;
            ctx.fill();
            ctx.stroke();

            // 小手臂
            ctx.beginPath();
            ctx.arc(140, 360, 25, 0, Math.PI * 2);
            ctx.arc(372, 360, 25, 0, Math.PI * 2);
            ctx.stroke();

            // 小腳
            ctx.beginPath();
            ctx.arc(210, 560, 28, 0, Math.PI * 2);
            ctx.arc(302, 560, 28, 0, Math.PI * 2);
            ctx.stroke();

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // --- 3. 初始化 Three.js 場景 ---
        function initScene() {
            const container = document.getElementById('webgl-output');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 環境光與光影
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(3, 3, 5);
            scene.add(dirLight);

            characterGroup = new THREE.Group();
            scene.add(characterGroup);

            // 創建人物 Mesh (套用內建生成的 Canvas 貼圖)
            const bodyGeo = new THREE.PlaneGeometry(3, 4);
            const bodyMat = new THREE.MeshBasicMaterial({
                map: generateProceduralChibiTexture(),
                transparent: true,
                side: THREE.DoubleSide
            });
            bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.position.z = -0.05;
            characterGroup.add(bodyMesh);

            // 繪製 Q版解剖果凍器官
            drawHTMLOrgans();

            window.addEventListener('resize', onWindowResize);
        }

        // --- 4. 繪製 Q版果凍質感心臟與腸胃 ---
        function drawHTMLOrgans() {
            // A. 手繪心臟 (ShapeGeometry + 果凍質感材質)
            const heartShape = new THREE.Shape();
            heartShape.moveTo(0, 0.25);
            heartShape.bezierCurveTo(0, 0.6, -0.55, 0.6, -0.55, 0.15);
            heartShape.bezierCurveTo(-0.55, -0.25, 0, -0.5, 0, -0.7);
            heartShape.bezierCurveTo(0, -0.5, 0.55, -0.25, 0.55, 0.15);
            heartShape.bezierCurveTo(0.55, 0.6, 0, 0.6, 0, 0.25);

            const heartGeo = new THREE.ShapeGeometry(heartShape);
            const heartMat = new THREE.MeshStandardMaterial({ 
                color: 0xff6b81, 
                emissive: 0xaa0000,
                roughness: 0.2,
                metalness: 0.4,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide 
            });
            heartMesh = new THREE.Mesh(heartGeo, heartMat);
            heartMesh.position.set(0, 0.35, 0.05);
            characterGroup.add(heartMesh);

            // B. 手繪腸胃 (ShapeGeometry)
            const stomachShape = new THREE.Shape();
            stomachShape.moveTo(-0.15, 0.3);
            stomachShape.bezierCurveTo(-0.7, 0.3, -0.7, -0.2, -0.15, -0.3);
            stomachShape.bezierCurveTo(0.5, -0.4, 0.7, 0.1, 0.4, 0.3);
            stomachShape.bezierCurveTo(0.1, 0.4, -0.1, 0.3, -0.15, 0.3);

            const stomachGeo = new THREE.ShapeGeometry(stomachShape);
            const stomachMat = new THREE.MeshStandardMaterial({ 
                color: 0xa3be8c, 
                emissive: 0x224422,
                roughness: 0.2,
                metalness: 0.4,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide 
            });
            stomachMesh = new THREE.Mesh(stomachGeo, stomachMat);
            stomachMesh.position.set(0, -0.45, 0.05);
            characterGroup.add(stomachMesh);
        }

        // --- 5. 圖片上傳邏輯 ---
        function setupUpload() {
            const textureLoader = new THREE.TextureLoader();
            document.getElementById('upload-body').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    textureLoader.load(url, (texture) => {
                        bodyMesh.material.map = texture;
                        bodyMesh.material.needsUpdate = true;
                        showHUD("自訂人物圖案已成功覆蓋！");
                    });
                }
            });
        }

        // --- 6. UI 控制與對齊微調 ---
        function setupControls() {
            document.getElementById('slider-caffeine').addEventListener('input', (e) => {
                caffeineLevel = parseFloat(e.target.value) / 100;
                document.getElementById('val-caffeine').innerText = `${e.target.value}%`;
                updateAudio();
            });

            document.getElementById('slider-digestion').addEventListener('input', (e) => {
                digestionLevel = parseFloat(e.target.value) / 100;
                document.getElementById('val-digestion').innerText = `${e.target.value}%`;
                updateAudio();
            });

            document.getElementById('slider-heart-y').addEventListener('input', (e) => {
                if (heartMesh) heartMesh.position.y = parseFloat(e.target.value);
            });
            document.getElementById('slider-stomach-y').addEventListener('input', (e) => {
                if (stomachMesh) stomachMesh.position.y = parseFloat(e.target.value);
            });
            document.getElementById('slider-organ-scale').addEventListener('input', (e) => {
                organScaleBase = parseFloat(e.target.value);
            });

            document.getElementById('btn-audio-toggle').addEventListener('click', toggleAudio);
        }

        // --- 7. Web Audio API 音訊邏輯 ---
        function toggleAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (!isAudioActive) {
                heartOsc = audioCtx.createOscillator();
                heartGain = audioCtx.createGain();
                heartOsc.type = 'sine';
                heartOsc.frequency.setValueAtTime(60, audioCtx.currentTime);
                heartGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                heartOsc.connect(heartGain);
                heartGain.connect(audioCtx.destination);
                heartOsc.start();

                stomachOsc = audioCtx.createOscillator();
                stomachGain = audioCtx.createGain();
                stomachOsc.type = 'sawtooth';
                stomachOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
                stomachGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                stomachOsc.connect(stomachGain);
                stomachGain.connect(audioCtx.destination);
                stomachOsc.start();

                isAudioActive = true;
                document.getElementById('btn-audio-toggle').innerText = "⏸️ 暫停音訊引擎";
                showHUD("Web Audio 身體音效引擎已開啟");
            } else {
                audioCtx.suspend();
                isAudioActive = false;
                document.getElementById('btn-audio-toggle').innerText = "🔊 啟動音訊引擎";
                showHUD("音訊引擎已暫停");
            }
        }

        function updateAudio() {
            if (!isAudioActive || !audioCtx) return;
            heartOsc.frequency.setTargetAtTime(50 + (caffeineLevel * 70), audioCtx.currentTime, 0.1);
            stomachOsc.frequency.setTargetAtTime(80 + (digestionLevel * 100), audioCtx.currentTime, 0.1);
        }

        // --- 8. 動畫迴圈 (呼吸、發抖與器官脈動形變) ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // A. 全域緩慢呼吸
            characterGroup.position.y = Math.sin(elapsedTime * 1.5) * 0.03;

            // B. 咖啡因發抖
            if (caffeineLevel > 0) {
                const shake = caffeineLevel * 0.04;
                characterGroup.position.x = (Math.random() - 0.5) * shake;
                characterGroup.position.y += (Math.random() - 0.5) * shake;
            } else {
                characterGroup.position.x = 0;
            }

            // C. 心臟幾何脈動
            if (heartMesh) {
                const heartRate = 3.5 + (caffeineLevel * 7.5);
                const contraction = Math.sin(elapsedTime * heartRate) * 0.12;
                heartMesh.scale.set(
                    (0.8 - contraction) * organScaleBase,
                    (0.8 + contraction) * organScaleBase,
                    0.8
                );
            }

            // D. 腸胃蠕動
            if (stomachMesh) {
                const digestRate = 1.2 + (digestionLevel * 3.8);
                const squish = Math.cos(elapsedTime * digestRate) * 0.08;
                stomachMesh.scale.set(
                    (0.9 + squish) * organScaleBase,
                    (0.7 - squish) * organScaleBase,
                    0.9
                );
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const container = document.getElementById('webgl-output');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        window.onload = () => {
            initScene();
            setupUpload();
            setupControls();
            animate();
        };
    </script>
</body>
</html>
