<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人體小偵探 v3.6 - 互動式食育教具</title>
    <style>
        /* ================= 核心重置與佈局 ================= */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a0a2a, #0a1a3a); color: #fff; }
        
        /* 3D 畫布容器 */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 左側 UI 面板 (黃金比例 38.2%) */
        #ui-panel {
            position: absolute; top: 0; left: 0; width: 38.2%; height: 100%; z-index: 10;
            background: rgba(10, 10, 20, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }

        /* 標題與提示區 */
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #ff9cf9; text-shadow: 0 0 10px rgba(255,156,249,0.5); }
        .section-title { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 10px; margin-bottom: 10px; }
        #status-msg { font-size: 13px; color: #00ffcc; background: rgba(0,255,204,0.1); padding: 8px; border-radius: 4px; transition: 0.3s; }

        /* 2D 監視器畫布 */
        #oscilloscope { width: 100%; height: 120px; background: rgba(0, 0, 0, 0.8); border: 1px solid #333; border-radius: 8px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }

        /* 控制元件樣式 */
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 10px; align-items: center; }
        button { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; 
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 1; font-size: 14px;
        }
        button:hover { background: rgba(255,255,255,0.2); }
        button.active { background: #ff9cf9; color: #000; border-color: #ff9cf9; font-weight: bold; box-shadow: 0 0 10px rgba(255,156,249,0.5); }
        
        .btn-play { background: #00cc66; color: white; border-color: #00ff88; font-weight: bold; }
        .btn-stop { background: #cc3333; color: white; border-color: #ff4444; font-weight: bold; }

        input[type="range"] { flex: 1; }
        input[type="file"] { font-size: 12px; color: #ccc; }
        input[type="file"]::file-selector-button { background: #444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 10px; }

        /* 隱藏原生滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>人體小偵探 v3.6</h1>
        <div id="status-msg">系統就緒。請按下「開始監聽」啟動系統。</div>

        <canvas id="oscilloscope" width="400" height="120"></canvas>

        <div class="section-title">📁 3D 模型設定</div>
        <div class="control-group">
            <input type="file" id="model-upload" accept=".glb,.gltf">
            <div class="row">
                <label for="rotation-slider" style="font-size: 13px;">正面校正 (Y軸):</label>
                <input type="range" id="rotation-slider" min="-180" max="180" value="0">
                <span id="rotation-val" style="font-size: 13px; width: 30px;">0°</span>
            </div>
            <div class="row">
                <input type="checkbox" id="auto-rotate" checked>
                <label for="auto-rotate" style="font-size: 13px;">啟用 360 度環繞觀看</label>
            </div>
        </div>

        <div class="section-title">▶️ 系統主控台</div>
        <div class="row">
            <button id="btn-play" class="btn-play">▶ 開始監聽</button>
            <button id="btn-stop" class="btn-stop">⏹ 靜默停止</button>
        </div>

        <div class="section-title">🩺 器官聽診模式</div>
        <div class="control-group">
            <div class="row">
                <button class="organ-btn active" data-organ="heart">心臟</button>
                <button class="organ-btn" data-organ="stomach">胃部</button>
                <button class="organ-btn" data-organ="smallIntestine">小腸</button>
            </div>
            <div class="row">
                <button class="organ-btn" data-organ="largeIntestine">大腸</button>
                <button class="organ-btn" data-organ="spleenKidney">脾/腎</button>
            </div>
        </div>

        <div class="section-title">🧪 生理對照實驗模擬</div>
        <div class="control-group">
            <div class="row">
                <button class="state-btn active" data-state="normal">正常生理</button>
                <button class="state-btn" data-state="caffeine">☕ 咖啡因</button>
            </div>
            <div class="row">
                <button class="state-btn" data-state="sugar">🥤 高精緻糖</button>
                <button class="state-btn" data-state="dehydrated">💧 缺水缺纖維</button>
            </div>
        </div>
    </div>

    <script>
        /* ================= 全局狀態與 DOM 元素 ================= */
        const statusMsg = document.getElementById('status-msg');
        function showMsg(text, isError = false) {
            statusMsg.textContent = text;
            statusMsg.style.color = isError ? '#ff4444' : '#00ffcc';
            statusMsg.style.background = isError ? 'rgba(255,68,68,0.1)' : 'rgba(0,255,204,0.1)';
        }

        let isPlaying = false;
        let currentOrgan = 'heart';
        let currentState = 'normal';
        let time = 0; // 全局時間計數器

        /* ================= Web Audio API 聲音引擎 ================= */
        let audioCtx, masterGain;
        let nodes = {}; // 儲存所有音訊節點

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0; // 預設靜音
            masterGain.connect(audioCtx.destination);

            // 產生白噪音 Buffer (供腸胃使用)
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            // --- 1. 心臟 (Lub-dub 正弦波 + LFO 包絡) ---
            nodes.heartOsc = audioCtx.createOscillator();
            nodes.heartOsc.type = 'sine';
            nodes.heartOsc.frequency.value = 55;
            nodes.heartGain = audioCtx.createGain();
            nodes.heartGain.gain.value = 0;
            nodes.heartOsc.connect(nodes.heartGain).connect(masterGain);
            nodes.heartOsc.start();

            // --- 2. 胃部 (白噪音 + 200Hz LPF + 3Hz LFO) ---
            nodes.stomachNoise = audioCtx.createBufferSource();
            nodes.stomachNoise.buffer = noiseBuffer;
            nodes.stomachNoise.loop = true;
            nodes.stomachFilter = audioCtx.createBiquadFilter();
            nodes.stomachFilter.type = 'lowpass';
            nodes.stomachFilter.frequency.value = 200;
            nodes.stomachLfo = audioCtx.createOscillator();
            nodes.stomachLfo.frequency.value = 3;
            nodes.stomachLfoGain = audioCtx.createGain();
            nodes.stomachLfo.connect(nodes.stomachLfoGain.gain);
            nodes.stomachGain = audioCtx.createGain();
            nodes.stomachGain.gain.value = 0;
            nodes.stomachNoise.connect(nodes.stomachFilter).connect(nodes.stomachGain).connect(masterGain);
            nodes.stomachLfo.start();
            nodes.stomachNoise.start();

            // --- 3. 小腸 (白噪音 + BPF 1000Hz + 快速 LFO) ---
            nodes.siNoise = audioCtx.createBufferSource();
            nodes.siNoise.buffer = noiseBuffer;
            nodes.siNoise.loop = true;
            nodes.siFilter = audioCtx.createBiquadFilter();
            nodes.siFilter.type = 'bandpass';
            nodes.siFilter.frequency.value = 1000;
            nodes.siLfo = audioCtx.createOscillator();
            nodes.siLfo.frequency.value = 8; // 較快的水流聲
            nodes.siLfoGain = audioCtx.createGain();
            nodes.siLfo.connect(nodes.siLfoGain.gain);
            nodes.siGain = audioCtx.createGain();
            nodes.siGain.gain.value = 0;
            nodes.siNoise.connect(nodes.siFilter).connect(nodes.siGain).connect(masterGain);
            nodes.siLfo.start();
            nodes.siNoise.start();

            // --- 4. 大腸 (白噪音 + LPF 100Hz + 極慢 LFO 0.5Hz + 失真) ---
            nodes.liNoise = audioCtx.createBufferSource();
            nodes.liNoise.buffer = noiseBuffer;
            nodes.liNoise.loop = true;
            nodes.liFilter = audioCtx.createBiquadFilter();
            nodes.liFilter.type = 'lowpass';
            nodes.liFilter.frequency.value = 100;
            nodes.liDistortion = audioCtx.createWaveShaper();
            nodes.liDistortion.curve = makeDistortionCurve(50); // 輕微失真
            nodes.liLfo = audioCtx.createOscillator();
            nodes.liLfo.frequency.value = 0.5; // 極慢蠕動
            nodes.liLfoGain = audioCtx.createGain();
            nodes.liLfo.connect(nodes.liLfoGain.gain);
            nodes.liGain = audioCtx.createGain();
            nodes.liGain.gain.value = 0;
            nodes.liNoise.connect(nodes.liFilter).connect(nodes.liDistortion).connect(nodes.liGain).connect(masterGain);
            nodes.liLfo.start();
            nodes.liNoise.start();

            // --- 5. 脾/腎 (粉紅噪音感) ---
            nodes.skNoise = audioCtx.createBufferSource();
            nodes.skNoise.buffer = noiseBuffer;
            nodes.skNoise.loop = true;
            nodes.skFilter = audioCtx.createBiquadFilter();
            nodes.skFilter.type = 'lowpass';
            nodes.skFilter.frequency.value = 400;
            nodes.skGain = audioCtx.createGain();
            nodes.skGain.gain.value = 0;
            nodes.skNoise.connect(nodes.skFilter).connect(nodes.skGain).connect(masterGain);
            nodes.skNoise.start();
        }

        // 建立失真曲線 (供大腸摩擦聲使用)
        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50,
                n_samples = 44100,
                curve = new Float32Array(n_samples),
                deg = Math.PI / 180, i = 0, x;
            for ( ; i < n_samples; ++i ) {
                x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        /* 根據狀態更新音訊參數 */
        function updateAudioState() {
            if (!audioCtx || !isPlaying) return;
            const now = audioCtx.currentTime;

            // 重置所有音量
            nodes.heartGain.gain.cancelScheduledValues(now);
            nodes.stomachGain.gain.setTargetAtTime(0, now, 0.1);
            nodes.siGain.gain.setTargetAtTime(0, now, 0.1);
            nodes.liGain.gain.setTargetAtTime(0, now, 0.1);
            nodes.skGain.gain.setTargetAtTime(0, now, 0.1);

            // 狀態連動邏輯
            let bpm = 75, heartFreq = 55, stomachRate = 3, liRate = 0.5, liFilterFreq = 100;
            
            if (currentState === 'caffeine') { bpm = 135; heartFreq = 75; stomachRate = 5; }
            if (currentState === 'sugar') { bpm = 52; stomachRate = 1.5; nodes.stomachFilter.frequency.value = 150; }
            if (currentState === 'dehydrated') { liRate = 0.1; liFilterFreq = 50; } // 大腸便秘極慢

            nodes.heartOsc.frequency.setTargetAtTime(heartFreq, now, 0.1);
            nodes.stomachLfo.frequency.setTargetAtTime(stomachRate, now, 0.1);
            nodes.liLfo.frequency.setTargetAtTime(liRate, now, 0.1);
            nodes.liFilter.frequency.setTargetAtTime(liFilterFreq, now, 0.1);

            // 播放選中器官的聲音
            if (currentOrgan === 'heart') {
                // 模擬 Lub-dub 心跳包絡線
                const beatDuration = 60 / bpm;
                if (time % (beatDuration * 60) < 5) { // 簡單的定時器觸發
                    nodes.heartGain.gain.setValueAtTime(0.8, now);
                    nodes.heartGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    nodes.heartGain.gain.setValueAtTime(0.6, now + 0.2);
                    nodes.heartGain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                }
            } else if (currentOrgan === 'stomach') {
                nodes.stomachGain.gain.setTargetAtTime(0.6, now, 0.1);
            } else if (currentOrgan === 'smallIntestine') {
                nodes.siGain.gain.setTargetAtTime(0.4, now, 0.1);
            } else if (currentOrgan === 'largeIntestine') {
                nodes.liGain.gain.setTargetAtTime(0.7, now, 0.1);
            } else if (currentOrgan === 'spleenKidney') {
                nodes.skGain.gain.setTargetAtTime(0.3, now, 0.1);
            }
        }

        /* ================= 2D 監視器 (Oscilloscope) ================= */
        const canvas = document.getElementById('oscilloscope');
        const ctx = canvas.getContext('2d');
        let waveData = new Array(400).fill(60);

        function drawOscilloscope() {
            waveData.shift(); // 移除最舊
            
            let newValue = 60; // 中間基準線
            let bpm = currentState === 'caffeine' ? 135 : (currentState === 'sugar' ? 52 : 75);
            let beatFrames = Math.floor(3600 / bpm); // 60fps 下的週期幀數

            if (!isPlaying) {
                newValue = 60; // 靜止
            } else if (currentOrgan === 'heart') {
                // 模擬 ECG PQRST 波
                let phase = time % beatFrames;
                if (phase === 10) newValue = 40; // P
                else if (phase === 20) newValue = 80; // Q
                else if (phase === 22) newValue = 10; // R (spike)
                else if (phase === 24) newValue = 90; // S
                else if (phase === 40) newValue = 30; // T
                else newValue = 60 + (Math.random() * 4 - 2); // 基準雜訊
                if(currentState === 'caffeine') newValue += (Math.random() * 10 - 5); // 咖啡因心悸雜訊
            } else if (currentOrgan === 'largeIntestine' && currentState === 'dehydrated') {
                // 便秘: 幾乎無波形平線
                newValue = 60 + Math.sin(time * 0.01) * 2;
            } else {
                // 腸胃波塊 (高頻噪音 + LFO 調變)
                let noise = Math.random() * 40 - 20;
                let lfo = Math.sin(time * 0.05);
                newValue = 60 + (noise * lfo);
            }

            waveData.push(newValue);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(0, waveData[0]);
            for (let i = 1; i < waveData.length; i++) {
                ctx.lineTo(i, waveData[i]);
            }
            
            // 根據狀態改變顏色
            ctx.strokeStyle = (currentState === 'sugar' && currentOrgan === 'stomach') ? '#ff4444' : '#00ffcc';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 畫網格
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, 60); ctx.lineTo(400, 60);
            ctx.stroke();
        }

        /* ================= Three.js 3D 渲染系統 ================= */
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // 背景留空，讓 CSS 的宇宙漸層透過去
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;

        // --- 核心打光防呆 (環境光 + 平行光) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); // 強光避免模型全黑
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // --- 3D 星空粒子 ---
        const particlesGeom = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 20;
        particlesGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.8 });
        const particlesMesh = new THREE.Points(particlesGeom, particlesMat);
        scene.add(particlesMesh);

        // --- 樞紐系統與完美置中 (避開左側 UI) ---
        const pivotGroup = new THREE.Group();
        pivotGroup.position.x = 0.8; // 將整體往右移，實現黃金比例佈局
        scene.add(pivotGroup);

        let currentModel = null;
        let isFallback = true;
        const organMeshes = {}; // 存放內部發光器官

        // 建立內部發光器官 (不論是代餐還是自訂模型都會掛在 Pivot 下)
        function createInternalOrgans() {
            const matBase = { transparent: true, opacity: 0.8, emissiveIntensity: 0.5 };
            
            // 心臟 (紅)
            const heartGeom = new THREE.SphereGeometry(0.15, 16, 16);
            const heartMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, ...matBase });
            organMeshes.heart = new THREE.Mesh(heartGeom, heartMat);
            organMeshes.heart.position.set(0.1, 1.2, 0.1);
            
            // 胃部 (綠/紅)
            const stomachGeom = new THREE.SphereGeometry(0.18, 16, 16);
            const stomachMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, ...matBase });
            organMeshes.stomach = new THREE.Mesh(stomachGeom, stomachMat);
            organMeshes.stomach.position.set(-0.1, 1.0, 0.1);

            // 小腸 (黃橘)
            const siGeom = new THREE.TorusGeometry(0.15, 0.05, 16, 32);
            const siMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, ...matBase });
            organMeshes.smallIntestine = new THREE.Mesh(siGeom, siMat);
            organMeshes.smallIntestine.position.set(0, 0.7, 0.05);

            // 大腸 (深褐綠)
            const liGeom = new THREE.TorusGeometry(0.25, 0.06, 16, 32);
            const liMat = new THREE.MeshStandardMaterial({ color: 0x556b2f, emissive: 0x556b2f, ...matBase });
            organMeshes.largeIntestine = new THREE.Mesh(liGeom, liMat);
            organMeshes.largeIntestine.position.set(0, 0.7, 0);

            // 脾/腎 (紫/藍)
            const skGeom = new THREE.SphereGeometry(0.1, 16, 16);
            const skMat = new THREE.MeshStandardMaterial({ color: 0x4b0082, emissive: 0x4b0082, ...matBase });
            organMeshes.spleenKidney = new THREE.Mesh(skGeom, skMat);
            organMeshes.spleenKidney.position.set(-0.2, 1.1, -0.1);

            Object.values(organMeshes).forEach(mesh => pivotGroup.add(mesh));
        }

        // 建立預設幾何人偶代餐
        function createFallbackModel() {
            currentModel = new THREE.Group();
            const glassMat = new THREE.MeshPhysicalMaterial({ 
                color: 0xffffff, transmission: 0.8, opacity: 1, transparent: true, roughness: 0.1, metalness: 0.1
            });
            // 頭
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), glassMat);
            head.position.y = 2.0;
            // 身體
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.2, 32), glassMat);
            body.position.y = 1.0;
            currentModel.add(head, body);
            pivotGroup.add(currentModel);
            isFallback = true;
        }

        createInternalOrgans();
        createFallbackModel();

        // 載入自訂 GLB 模型系統
        const loader = new THREE.GLTFLoader();
        document.getElementById('model-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            showMsg('載入模型中...', false);

            loader.load(url, (gltf) => {
                if (currentModel) pivotGroup.remove(currentModel); // 移除舊模型/代餐
                
                currentModel = gltf.scene;
                
                // 強制套用半透明材質，實現「透視艙」效果
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshPhysicalMaterial({
                            color: child.material.color || 0xffffff,
                            transmission: 0.6, opacity: 1, transparent: true, roughness: 0.2
                        });
                    }
                });

                // --- 核心：Box3 自動置中對齊 ---
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                // 將模型實體反向推移，讓中心點歸零
                currentModel.position.x = -center.x;
                currentModel.position.y = -center.y + (size.y / 2); // 腳踩在原點上
                currentModel.position.z = -center.z;

                // 根據模型大小自動縮放
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2.5 / maxDim;
                currentModel.scale.set(scale, scale, scale);

                pivotGroup.add(currentModel);
                isFallback = false;
                
                // 重置滑桿
                document.getElementById('rotation-slider').value = 0;
                document.getElementById('rotation-val').textContent = '0°';
                currentModel.rotation.y = 0;

                showMsg('模型載入成功！已自動置中並套用透視材質。', false);
            }, undefined, (error) => {
                showMsg('模型載入失敗，請確認檔案格式是否為標準 .glb/.gltf', true);
                console.error(error);
            });
        });

        // 3D 視覺連動更新
        function update3DVisuals() {
            particlesMesh.rotation.y += 0.001;

            // 器官發光與縮放動畫 (視覺與聽覺解耦)
            Object.keys(organMeshes).forEach(key => {
                const mesh = organMeshes[key];
                if (key === currentOrgan) {
                    mesh.material.opacity = 1;
                    mesh.material.emissiveIntensity = 0.8;
                    // 跳動/蠕動邏輯
                    let scale = 1;
                    if (key === 'heart' && isPlaying) {
                        const bpm = currentState === 'caffeine' ? 135 : (currentState === 'sugar' ? 52 : 75);
                        const beatFrames = Math.floor(3600 / bpm);
                        if (time % beatFrames < 5) scale = 1.3;
                        else if (time % beatFrames > 15 && time % beatFrames < 20) scale = 1.1; // dub
                    } else if (isPlaying) {
                        // 腸胃蠕動
                        scale = 1 + Math.sin(time * 0.1) * 0.1;
                    }
                    mesh.scale.set(scale, scale, scale);

                    // 暈糖胃部變紅警示
                    if (key === 'stomach' && currentState === 'sugar') {
                        mesh.material.color.setHex(0xff0000);
                        mesh.material.emissive.setHex(0xff0000);
                    } else if (key === 'stomach') {
                        mesh.material.color.setHex(0x00ff00);
                        mesh.material.emissive.setHex(0x00ff00);
                    }

                } else {
                    // 非選中器官變暗待機
                    mesh.material.opacity = 0.2;
                    mesh.material.emissiveIntensity = 0.1;
                    mesh.scale.set(1, 1, 1);
                }
            });

            // 咖啡因全身神經微發抖 (Jitter)
            if (currentState === 'caffeine' && isPlaying) {
                pivotGroup.position.y = Math.sin(time * 50) * 0.02;
                pivotGroup.position.x = 0.8 + Math.cos(time * 45) * 0.01;
            } else {
                pivotGroup.position.y = 0;
                pivotGroup.position.x = 0.8;
            }
        }

        // 渲染迴圈
        function animate() {
            requestAnimationFrame(animate);
            time++;
            
            controls.update();
            drawOscilloscope();
            
            if (isPlaying) updateAudioState();
            update3DVisuals();

            renderer.render(scene, camera);
        }
        animate();

        /* ================= UI 事件監聽 ================= */
        // 主控台
        document.getElementById('btn-play').addEventListener('click', () => {
            initAudio();
            audioCtx.resume();
            masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); // 淡入
            isPlaying = true;
            showMsg('🟢 監聽中：請觀察波形與 3D 器官連動', false);
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            if (audioCtx) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); // 嚴格靜音
            isPlaying = false;
            showMsg('⏹ 系統停止，靜默模式。', false);
        });

        // 旋轉滑桿與 Auto-Rotate
        document.getElementById('rotation-slider').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('rotation-val').textContent = val + '°';
            if (currentModel && !isFallback) {
                currentModel.rotation.y = val * (Math.PI / 180);
            }
        });
        document.getElementById('auto-rotate').addEventListener('change', (e) => {
            controls.autoRotate = e.target.checked;
        });

        // 器官切換
        document.querySelectorAll('.organ-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.organ-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentOrgan = e.target.getAttribute('data-organ');
                showMsg(`已將聽診器焦點切換至：${e.target.innerText}`, false);
            });
        });

        // 狀態切換
        document.querySelectorAll('.state-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentState = e.target.getAttribute('data-state');
                let msg = `生理環境已切換為：${e.target.innerText}。`;
                if(currentState === 'caffeine') msg += ' (BPM 飆升，神經發抖)';
                if(currentState === 'sugar') msg += ' (心跳減緩，胃部發炎警告)';
                if(currentState === 'dehydrated') msg += ' (大腸蠕動極慢，無波形)';
                showMsg(msg, currentState !== 'normal');
            });
        });

        // 響應式視窗調整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
