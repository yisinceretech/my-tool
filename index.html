<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 v5.0 - 星空冰藍公仔版</title>
    <style>
        /* 宇宙星空與冰藍主題重置 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050814; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #e6f1ff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 冰藍毛玻璃 UI 面板 */
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 380px; max-height: 90vh; overflow-y: auto; background: rgba(10, 25, 47, 0.65); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(100, 255, 218, 0.3); border-radius: 20px; padding: 25px; z-index: 10; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(100, 255, 218, 0.05); }
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(100, 255, 218, 0.5); border-radius: 3px; }

        h1 { font-size: 22px; margin-top: 0; color: #64ffda; text-shadow: 0 0 10px rgba(100, 255, 218, 0.3); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        
        /* 2D 示波器 */
        #oscilloscope { width: 100%; height: 120px; background: rgba(2, 12, 27, 0.8); border: 1px solid rgba(100, 255, 218, 0.2); border-radius: 12px; margin-bottom: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        
        /* 狀態提示橫幅 (取代 alert) */
        #notification-banner { display: none; background: linear-gradient(135deg, #ff4422, #ff7700); color: white; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; box-shadow: 0 4px 15px rgba(255, 68, 34, 0.4); animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .control-group { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .control-group h3 { margin: 0 0 15px 0; font-size: 16px; color: #8892b0; border-bottom: 1px solid rgba(136, 146, 176, 0.2); padding-bottom: 8px; }
        
        /* 按鈕設計 */
        button { background: rgba(100, 255, 218, 0.1); color: #64ffda; border: 1px solid #64ffda; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { background: rgba(100, 255, 218, 0.2); box-shadow: 0 0 15px rgba(100, 255, 218, 0.4); transform: translateY(-2px); }
        button.active { background: #64ffda; color: #0a192f; box-shadow: 0 0 20px rgba(100, 255, 218, 0.6); }
        button.stop-btn { border-color: #ff4422; color: #ff4422; background: rgba(255, 68, 34, 0.1); }
        button.stop-btn:hover { background: rgba(255, 68, 34, 0.2); box-shadow: 0 0 15px rgba(255, 68, 34, 0.4); }

        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 10px; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }

        .slider-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #a8b2d1; }
        input[type=range] { flex-grow: 1; margin: 0 15px; accent-color: #64ffda; }
        
        .organ-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .organ-btn { border: 1px solid; background: transparent; }
        #btn-heart { border-color: #ff4422; color: #ff4422; }
        #btn-heart.active { background: #ff4422; color: white; box-shadow: 0 0 15px rgba(255, 68, 34, 0.5); }
        #btn-stomach { border-color: #00ff44; color: #00ff44; }
        #btn-stomach.active { background: #00ff44; color: #0a192f; box-shadow: 0 0 15px rgba(0, 255, 68, 0.5); }
        #btn-kidney { border-color: #00aaff; color: #00aaff; }
        #btn-kidney.active { background: #00aaff; color: white; box-shadow: 0 0 15px rgba(0, 170, 255, 0.5); }
        #btn-intestine { border-color: #ffbb00; color: #ffbb00; }
        #btn-intestine.active { background: #ffbb00; color: #0a192f; box-shadow: 0 0 15px rgba(255, 187, 0, 0.5); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>✨ 星空醫學小精靈</h1>
        
        <canvas id="oscilloscope" width="330" height="120"></canvas>
        
        <div id="notification-banner"></div>

        <div class="control-group">
            <h3>1. 系統控制</h3>
            <button id="btn-start" class="active">▶️ 啟動聲音引擎</button>
            <button id="btn-stop" class="stop-btn">⏹️ 停止監聽 (靜默)</button>
            <div class="file-upload-wrapper">
                <button>🖼️ 上傳 Q版公仔圖案 (.png)</button>
                <input type="file" id="upload-image" accept="image/png, image/jpeg" />
            </div>
        </div>

        <div class="control-group">
            <h3>2. 聽診器官切換 (也可直接點擊 3D 畫面)</h3>
            <div class="organ-selector">
                <button id="btn-heart" class="organ-btn active">❤️ 心臟 (跳動)</button>
                <button id="btn-stomach" class="organ-btn">🤢 胃部 (咕嚕)</button>
                <button id="btn-kidney" class="organ-btn">💧 腎臟 (過濾)</button>
                <button id="btn-intestine" class="organ-btn">🥨 腸道 (蠕動)</button>
            </div>
        </div>

        <div class="control-group" id="dynamic-controls">
            <h3>3. 生理狀態調節</h3>
            <div class="slider-container">
                <span>心率 (BPM)</span>
                <input type="range" id="bpm-slider" min="40" max="150" value="70">
                <span id="bpm-val">70</span>
            </div>
            <div class="slider-container">
                <span>蠕動活躍度</span>
                <input type="range" id="digestion-slider" min="1" max="10" value="5">
                <span id="digestion-val">正常</span>
            </div>
        </div>
    </div>

<script>
/**
 * 身體聲音合成器 v5.0 - 星空冰藍公仔版
 * 整合 Web Audio API DSP 與 Three.js 2.5D 疊加渲染
 */

// ==========================================
// 1. 全域變數與系統狀態
// ==========================================
let isPlaying = false;
let currentOrgan = 'heart';
let bpm = 70;
let digestionLevel = 5;

// 通知橫幅系統 (取代 alert)
function showNotification(msg, duration = 3000) {
    const banner = document.getElementById('notification-banner');
    banner.innerText = msg;
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, duration);
}

// ==========================================
// 2. Web Audio API 聲音引擎 (DSP)
// ==========================================
let audioCtx;
let masterGain;
let analyser;
let dataArray;
let canvasCtx;
let oscCanvas;

// 器官音效節點
let nodes = {
    heart: null,
    stomach: null,
    kidney: null,
    intestine: null
};

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.8;
    
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    oscCanvas = document.getElementById('oscilloscope');
    canvasCtx = oscCanvas.getContext('2d');
    drawOscilloscope();
    
    setupAudioNodes();
    isPlaying = true;
    updateAudioState();
}

function stopAudio() {
    if(masterGain) {
        masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        setTimeout(() => {
            if(audioCtx) audioCtx.suspend();
            isPlaying = false;
        }, 200);
    }
}

// 建立各器官專屬的 DSP 濾波與發聲器
function setupAudioNodes() {
    // 1. 心臟 (Lub-dub 正弦波包絡)
    nodes.heart = audioCtx.createGain();
    nodes.heart.gain.value = 0;
    nodes.heart.connect(masterGain);

    // 2. 胃部 (白噪音 + 低通 200Hz + LFO)
    const stomachFilter = audioCtx.createBiquadFilter();
    stomachFilter.type = 'lowpass';
    stomachFilter.frequency.value = 200;
    nodes.stomach = audioCtx.createGain();
    nodes.stomach.gain.value = 0;
    createNoiseNode(stomachFilter);
    stomachFilter.connect(nodes.stomach);
    nodes.stomach.connect(masterGain);

    // 3. 腎臟 (粉紅噪音模擬，微弱過濾聲)
    const kidneyFilter = audioCtx.createBiquadFilter();
    kidneyFilter.type = 'bandpass';
    kidneyFilter.frequency.value = 400;
    nodes.kidney = audioCtx.createGain();
    nodes.kidney.gain.value = 0;
    createNoiseNode(kidneyFilter);
    kidneyFilter.connect(nodes.kidney);
    nodes.kidney.connect(masterGain);

    // 4. 腸道 (高頻白噪音 + 帶通 1000Hz + 快速 LFO)
    const intestineFilter = audioCtx.createBiquadFilter();
    intestineFilter.type = 'bandpass';
    intestineFilter.frequency.value = 1000;
    nodes.intestine = audioCtx.createGain();
    nodes.intestine.gain.value = 0;
    createNoiseNode(intestineFilter);
    intestineFilter.connect(nodes.intestine);
    nodes.intestine.connect(masterGain);

    scheduleHeartbeat();
    scheduleDigestion();
}

function createNoiseNode(destination) {
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;
    noise.connect(destination);
    noise.start();
}

function scheduleHeartbeat() {
    if (!isPlaying) return;
    const interval = 60 / bpm;
    const now = audioCtx.currentTime;
    
    // Lub (第一心音)
    playTone(45, now, 0.1, nodes.heart);
    // Dub (第二心音)
    playTone(65, now + 0.3, 0.15, nodes.heart);
    
    // 通知 3D 模型跳動
    triggerOrganAnimation('heart');

    setTimeout(scheduleHeartbeat, interval * 1000);
}

function scheduleDigestion() {
    if (!isPlaying) return;
    const interval = (11 - digestionLevel) * 200; // 蠕動間隔
    const now = audioCtx.currentTime;
    
    // 隨機觸發胃或腸的音量包絡 (LFO 模擬)
    if(currentOrgan === 'stomach') {
        const env = nodes.stomach.gain;
        env.cancelScheduledValues(now);
        env.setValueAtTime(0, now);
        env.linearRampToValueAtTime(0.8, now + 0.2);
        env.exponentialRampToValueAtTime(0.01, now + 1.0);
        triggerOrganAnimation('stomach');
    } else if (currentOrgan === 'intestine') {
        const env = nodes.intestine.gain;
        env.cancelScheduledValues(now);
        env.setValueAtTime(0, now);
        env.linearRampToValueAtTime(0.5, now + 0.1);
        env.exponentialRampToValueAtTime(0.01, now + 0.5);
        triggerOrganAnimation('intestine');
    } else if (currentOrgan === 'kidney') {
        // 腎臟是平穩的低頻背景音
        nodes.kidney.gain.setTargetAtTime(0.3, now, 0.5);
        triggerOrganAnimation('kidney');
    }
    
    setTimeout(scheduleDigestion, interval);
}

function playTone(freq, time, duration, destination) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(1, time + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
    
    osc.connect(gain);
    gain.connect(destination);
    osc.start(time);
    osc.stop(time + duration);
}

function updateAudioState() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    // 靜音所有器官
    Object.values(nodes).forEach(node => {
        if(node) node.gain.setTargetAtTime(0, now, 0.1);
    });
    
    // 打開當前選中的器官
    if(isPlaying && nodes[currentOrgan]) {
        if(currentOrgan === 'heart') {
            nodes.heart.gain.setTargetAtTime(1, now, 0.1);
        } else if (currentOrgan === 'kidney') {
            nodes.kidney.gain.setTargetAtTime(0.3, now, 0.5);
        }
    }
}

// 繪製科技感示波器
function drawOscilloscope() {
    requestAnimationFrame(drawOscilloscope);
    if (!analyser || !isPlaying) {
        canvasCtx.fillStyle = 'rgba(2, 12, 27, 1)';
        canvasCtx.fillRect(0, 0, oscCanvas.width, oscCanvas.height);
        canvasCtx.beginPath();
        canvasCtx.moveTo(0, oscCanvas.height/2);
        canvasCtx.lineTo(oscCanvas.width, oscCanvas.height/2);
        canvasCtx.strokeStyle = '#334455';
        canvasCtx.stroke();
        return;
    }
    
    analyser.getByteTimeDomainData(dataArray);
    canvasCtx.fillStyle = 'rgba(2, 12, 27, 0.3)'; // 殘影效果
    canvasCtx.fillRect(0, 0, oscCanvas.width, oscCanvas.height);
    
    canvasCtx.lineWidth = 2;
    // 依據器官改變波形顏色
    const colors = { heart: '#ff4422', stomach: '#00ff44', kidney: '#00aaff', intestine: '#ffbb00' };
    canvasCtx.strokeStyle = colors[currentOrgan];
    canvasCtx.shadowBlur = 10;
    canvasCtx.shadowColor = colors[currentOrgan];
    
    canvasCtx.beginPath();
    const sliceWidth = oscCanvas.width * 1.0 / dataArray.length;
    let x = 0;
    for(let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * oscCanvas.height / 2;
        if(i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
    }
    canvasCtx.lineTo(oscCanvas.width, oscCanvas.height/2);
    canvasCtx.stroke();
    canvasCtx.shadowBlur = 0; // 重置
}


// ==========================================
// 3. Three.js 3D/2.5D 渲染引擎
// ==========================================
let scene, camera, renderer;
let characterGroup;
let characterMesh;
let organs = {};
let raycaster, mouse;
let uniforms = { time: { value: 0 } };

function initThree() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    // 宇宙深黑藍背景
    scene.background = new THREE.Color(0x050814); 

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    // 將相機稍微向右偏，把 3D 人物留在右半部 (避開左側 UI)
    camera.position.set(0, 0, 10);
    camera.setViewOffset(window.innerWidth, window.innerHeight, -window.innerWidth * 0.15, 0, window.innerWidth, window.innerHeight);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // 光源設置 (電影級打光)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(5, 10, 7);
    scene.add(mainLight);
    // 冰藍色背光輪廓
    const rimLight = new THREE.DirectionalLight(0x64ffda, 1.5);
    rimLight.position.set(-5, 5, -5);
    scene.add(rimLight);

    // 星空粒子背景
    createStarfield();

    // 建立 2.5D 角色群組
    characterGroup = new THREE.Group();
    scene.add(characterGroup);

    // 建立器官
    createAnatomicalOrgans();

    // 射線互動
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();
    window.addEventListener('click', onCanvasClick);
    window.addEventListener('resize', onWindowResize);

    animateThree();
}

function createStarfield() {
    const starGeo = new THREE.BufferGeometry();
    const starCount = 600;
    const posArray = new Float32Array(starCount * 3);
    for(let i=0; i < starCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 40;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0x88ccff, transparent: true, opacity: 0.8 });
    const starMesh = new THREE.Points(starGeo, starMat);
    scene.add(starMesh);
}

// 手工繪製 2.5D 解剖器官 (使用疊加發光材質)
function createAnatomicalOrgans() {
    // 共用的果凍發光材質生成器 (Additive Blending)
    const getOrganMaterial = (hexColor) => {
        return new THREE.MeshStandardMaterial({ 
            color: hexColor, 
            emissive: hexColor, 
            emissiveIntensity: 0.6,
            transparent: true, 
            opacity: 0.8,
            blending: THREE.AdditiveBlending, // 關鍵：讓器官像光暈一樣疊加在圖案上
            depthWrite: false
        });
    };

    // 1. 心臟 (紅/橙)
    const heartShape = new THREE.Shape();
    heartShape.moveTo(0, 0.2);
    heartShape.bezierCurveTo(0.2, 0.4, 0.4, 0.2, 0, -0.4);
    heartShape.bezierCurveTo(-0.4, 0.2, -0.2, 0.4, 0, 0.2);
    const heartGeo = new THREE.ShapeGeometry(heartShape);
    organs.heart = new THREE.Mesh(heartGeo, getOrganMaterial(0xff4422));
    organs.heart.position.set(-0.3, 1.2, 0.1);
    organs.heart.scale.set(1.2, 1.2, 1.2);
    organs.heart.userData = { id: 'heart', baseScale: 1.2 };
    characterGroup.add(organs.heart);

    // 2. 胃部 (亮綠)
    const stomachShape = new THREE.Shape();
    stomachShape.moveTo(0, 0);
    stomachShape.bezierCurveTo(0.3, 0, 0.5, -0.3, 0.2, -0.6);
    stomachShape.bezierCurveTo(-0.1, -0.7, -0.4, -0.2, -0.2, 0);
    const stomachGeo = new THREE.ShapeGeometry(stomachShape);
    organs.stomach = new THREE.Mesh(stomachGeo, getOrganMaterial(0x00ff44));
    organs.stomach.position.set(0.2, 0.5, 0.1);
    organs.stomach.userData = { id: 'stomach', baseScale: 1.0 };
    characterGroup.add(organs.stomach);

    // 3. 腎臟 (亮藍 - 對稱兩顆)
    const kidneyShape = new THREE.Shape();
    kidneyShape.moveTo(0, 0);
    kidneyShape.bezierCurveTo(0.1, 0.2, 0.2, -0.2, 0, -0.3);
    kidneyShape.bezierCurveTo(-0.1, -0.2, -0.1, 0.1, 0, 0);
    const kidneyGeo = new THREE.ShapeGeometry(kidneyShape);
    
    organs.kidney = new THREE.Group(); // 群組包裝兩顆腎
    const k1 = new THREE.Mesh(kidneyGeo, getOrganMaterial(0x00aaff));
    k1.position.set(-0.6, 0.2, 0.1);
    const k2 = new THREE.Mesh(kidneyGeo, getOrganMaterial(0x00aaff));
    k2.position.set(0.6, 0.2, 0.1);
    k2.scale.x = -1; // 鏡像
    organs.kidney.add(k1);
    organs.kidney.add(k2);
    organs.kidney.userData = { id: 'kidney', baseScale: 1.0 };
    characterGroup.add(organs.kidney);

    // 4. 腸道 (金黃/暖橙)
    const intestineShape = new THREE.Shape();
    // 畫一個彎曲的腸道雲朵輪廓
    intestineShape.moveTo(-0.5, 0);
    intestineShape.quadraticCurveTo(-0.5, 0.3, 0, 0.4);
    intestineShape.quadraticCurveTo(0.5, 0.3, 0.6, 0);
    intestineShape.quadraticCurveTo(0.6, -0.5, 0, -0.6);
    intestineShape.quadraticCurveTo(-0.6, -0.5, -0.5, 0);
    const intGeo = new THREE.ShapeGeometry(intestineShape);
    organs.intestine = new THREE.Mesh(intGeo, getOrganMaterial(0xffbb00));
    organs.intestine.position.set(0, -0.4, 0.1);
    organs.intestine.userData = { id: 'intestine', baseScale: 1.0 };
    characterGroup.add(organs.intestine);

    updateOrganVisuals();
}

function triggerOrganAnimation(organId) {
    if(!organs[organId]) return;
    const mesh = organs[organId];
    const base = mesh.userData.baseScale;
    
    if (organId === 'heart') {
        mesh.scale.set(base * 1.3, base * 1.3, base * 1.3);
    } else if (organId === 'stomach' || organId === 'intestine') {
        // 腸胃產生形變蠕動
        mesh.scale.set(base * (1 + Math.random()*0.2), base * (1 + Math.random()*0.2), 1);
    } else if (organId === 'kidney') {
        mesh.scale.set(base * 1.05, base * 1.05, 1);
    }
}

function updateOrganVisuals() {
    Object.keys(organs).forEach(key => {
        const meshGroup = organs[key];
        const isActive = (key === currentOrgan);
        
        // 遞迴設定材質強度 (處理 Group 內的 Mesh)
        meshGroup.traverse((child) => {
            if (child.isMesh) {
                child.material.opacity = isActive ? 0.9 : 0.2;
                child.material.emissiveIntensity = isActive ? 1.0 : 0.2;
            }
        });
    });
}

function animateThree(time) {
    requestAnimationFrame(animateThree);
    uniforms.time.value = time * 0.001;
    
    // 背景緩慢旋轉
    scene.children[3].rotation.y = time * 0.00005;

    // 平滑恢復器官大小 (動畫彈性衰減)
    Object.values(organs).forEach(mesh => {
        if(!mesh) return;
        const base = mesh.userData.baseScale;
        mesh.scale.lerp(new THREE.Vector3(base, base, base), 0.1);
    });

    // 角色輕微呼吸浮動
    if(characterGroup) {
        characterGroup.position.y = Math.sin(time * 0.002) * 0.05;
    }

    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    // 保持相機偏移
    camera.setViewOffset(window.innerWidth, window.innerHeight, -window.innerWidth * 0.15, 0, window.innerWidth, window.innerHeight);
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// 點擊 3D 畫面切換器官
function onCanvasClick(event) {
    if(event.clientX < 420) return; // 避開 UI 面板區域
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    // 計算射線 (考慮 ViewOffset)
    raycaster.setFromCamera(mouse, camera);
    
    // 收集所有可點擊的網格
    let intersectables = [];
    Object.values(organs).forEach(obj => {
        if(obj.isGroup) {
            intersectables.push(...obj.children);
        } else {
            intersectables.push(obj);
        }
    });

    const intersects = raycaster.intersectObjects(intersectables);
    if (intersects.length > 0) {
        // 尋找所屬器官 ID
        let hitObj = intersects[0].object;
        let targetId = null;
        Object.keys(organs).forEach(key => {
            if (organs[key] === hitObj || (organs[key].isGroup && organs[key].children.includes(hitObj))) {
                targetId = key;
            }
        });

        if (targetId) {
            selectOrgan(targetId);
        }
    }
}

// ==========================================
// 4. UI 邏輯與事件綁定
// ==========================================
function selectOrgan(organId) {
    if (!isPlaying) {
        showNotification('請先點擊「▶️ 啟動聲音引擎」解鎖聽診功能！');
        return;
    }
    currentOrgan = organId;
    document.querySelectorAll('.organ-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${organId}`).classList.add('active');
    updateAudioState();
    updateOrganVisuals();
}

window.onload = () => {
    initThree();

    // 啟動/停止按鈕
    document.getElementById('btn-start').addEventListener('click', () => {
        if(audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
            isPlaying = true;
        } else {
            initAudio();
        }
        showNotification('聲音引擎已啟動，開始生命監測！');
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
        stopAudio();
        showNotification('已停止監聽，進入靜默模式。');
    });

    // 器官按鈕綁定
    ['heart', 'stomach', 'kidney', 'intestine'].forEach(id => {
        document.getElementById(`btn-${id}`).addEventListener('click', () => selectOrgan(id));
    });

    // 滑桿綁定
    document.getElementById('bpm-slider').addEventListener('input', (e) => {
        bpm = e.target.value;
        document.getElementById('bpm-val').innerText = bpm;
    });

    document.getElementById('digestion-slider').addEventListener('input', (e) => {
        digestionLevel = parseInt(e.target.value);
        let text = '正常';
        if(digestionLevel < 3) text = '消化不良 (慢)';
        if(digestionLevel > 7) text = '腸胃翻騰 (快)';
        document.getElementById('digestion-val').innerText = text;
    });

    // 上傳 2D 圖案並作為底圖
    document.getElementById('upload-image').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        const imgURL = URL.createObjectURL(file);
        const loader = new THREE.TextureLoader();
        loader.load(imgURL, (texture) => {
            if(characterMesh) {
                characterGroup.remove(characterMesh);
            }
            
            // 依照圖片比例建立平面
            const aspect = texture.image.width / texture.image.height;
            const geo = new THREE.PlaneGeometry(6 * aspect, 6);
            const mat = new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true,
                depthWrite: false // 避免遮擋疊加發光的器官
            });
            characterMesh = new THREE.Mesh(geo, mat);
            // 將圖片往後推一點，讓發光器官在正前方疊加
            characterMesh.position.z = -0.5; 
            characterGroup.add(characterMesh);
            showNotification('Q版公仔載入成功！發光器官已自動疊加定位。');
        });
    });
};
</script>
