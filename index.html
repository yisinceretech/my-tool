<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>身體小偵探 Little Body Detective v4.5</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    /* 全頁滿版無捲軸基礎設定 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #090614 0%, #120e26 50%, #080511 100%);
      color: #ffffff;
      display: flex;
      padding: 16px;
      gap: 16px;
    }

    /* 左右雙欄版面配置 */
    #left-panel {
      flex: 0 0 42%;
      max-width: 42%;
      height: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    #right-panel {
      flex: 1;
      height: 100%;
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    /* 左側字體與卡片優化 (加大字體) */
    .title-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 14px;
      margin-bottom: 10px;
    }
    .title-area h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .version-tag {
      font-size: 13px;
      padding: 4px 10px;
      background: rgba(167, 139, 250, 0.2);
      border: 1px solid rgba(167, 139, 250, 0.4);
      border-radius: 20px;
      color: #c4b5fd;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #93c5fd;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-card {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    /* 按鈕樣式與狀態顏色變換 */
    .button-group {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.08);
      color: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    
    /* 按鈕動態狀態顏色 */
    #btn-start.active-start {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #ffffff;
      border-color: #34d399;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
      animation: pulse-green 2s infinite;
    }
    #btn-stop.active-stop {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: #ffffff;
      border-color: #f87171;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
    }

    @keyframes pulse-green {
      0% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
      50% { box-shadow: 0 0 22px rgba(16, 185, 129, 0.9); }
      100% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    }

    .mode-btn {
      padding: 10px 14px;
      font-size: 15px;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: #fff;
      border-color: #60a5fa;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    /* 營養狀態按鈕網格 */
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .nutri-btn {
      padding: 10px 6px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .nutri-btn.active {
      background: rgba(168, 85, 247, 0.35);
      border-color: #c084fc;
      color: #fff;
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
    }

    /* BPM 控制滑桿 */
    .bpm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 15px;
      color: #e2e8f0;
    }
    .bpm-value {
      font-size: 20px;
      font-weight: 800;
      color: #f472b6;
    }
    input[type=range] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      accent-color: #ec4899;
      cursor: pointer;
    }

    /* Canvas 波形繪製區 */
    .canvas-container {
      position: relative;
      width: 100%;
      height: 90px;
      background: #05030a;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin-top: 6px;
    }
    canvas.wave-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .canvas-label {
      position: absolute;
      top: 6px;
      left: 10px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.6);
      pointer-events: none;
    }

    /* 右側 3D 展示區與 HUD 卡片 (字體加大) */
    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud-card {
      position: absolute;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 18px;
      color: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    #hud-top-right {
      top: 20px;
      right: 20px;
      min-width: 180px;
    }
    #hud-bottom-right {
      bottom: 20px;
      right: 20px;
      min-width: 220px;
    }
    .hud-title {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .hud-big-num {
      font-size: 32px;
      font-weight: 900;
      color: #38bdf8;
      line-height: 1;
    }
    .hud-unit {
      font-size: 14px;
      color: #64748b;
      margin-left: 4px;
    }
    .hud-status-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.2);
      color: #7dd3fc;
    }

    /* 器官浮動標籤與 SVG 引導線 */
    #svg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .organ-tag {
      position: absolute;
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #f8fafc;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s;
    }
    .organ-tag:hover {
      transform: scale(1.08);
      border-color: #38bdf8;
    }
    .organ-tag.selected {
      border-color: #f43f5e;
      background: rgba(244, 63, 94, 0.25);
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.5);
    }
  </style>
</head>
<body>

  <div id="left-panel">
    <div>
      <div class="title-area">
        <h1>🔍 身體小偵探</h1>
        <span class="version-tag">v4.5 精準版</span>
      </div>

      <div class="control-card">
        <div class="section-title">🎧 監聽控制台</div>
        <div class="button-group">
          <button id="btn-start" class="btn">▶ 開始監聽</button>
          <button id="btn-stop" class="btn active-stop">⏹️ 停止監聽</button>
        </div>
      </div>

      <div class="control-card">
        <div class="section-title">🎯 聽診焦點部位</div>
        <div class="button-group">
          <button id="mode-heart" class="btn mode-btn active">❤️ 心臟聽診</button>
          <button id="mode-stomach" class="btn mode-btn">🦠 腸胃聽診</button>
        </div>
      </div>

      <div class="control-card">
        <div class="section-title">🥗 飲食與生理狀態</div>
        <div class="nutrition-grid">
          <button class="nutri-btn active" data-state="normal">🧘 正常平靜</button>
          <button class="nutri-btn" data-state="caffeine">☕ 咖啡因過量</button>
          <button class="nutri-btn" data-state="sugar">🍩 暴糖反應</button>
          <button class="nutri-btn" data-state="fiber">🥦 高纖消化</button>
          <button class="nutri-btn" data-state="dehydration">💧 身體缺水</button>
        </div>
      </div>

      <div class="control-card">
        <div class="bpm-header">
          <span>❤️ 即時心率調整 (BPM)</span>
          <span class="bpm-value" id="bpm-disp">72 <span style="font-size:12px;">BPM</span></span>
        </div>
        <input type="range" id="bpm-slider" min="40" max="160" value="72">
      </div>
    </div>

    <div>
      <div class="section-title">📊 即時生物電波監視器</div>
      <div class="canvas-container">
        <span class="canvas-label">ECG 心電圖 (P-QRS-T)</span>
        <canvas id="ecg-canvas" class="wave-canvas"></canvas>
      </div>
      <div class="canvas-container">
        <span class="canvas-label">BORBORYGMI 腸胃蠕動音波</span>
        <canvas id="stomach-canvas" class="wave-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <canvas id="three-canvas"></canvas>

    <svg id="svg-overlay"></svg>

    <div id="tag-heart" class="organ-tag selected" style="top: 35%; left: 18%;">❤️ 心臟 (Heart)</div>
    <div id="tag-stomach" class="organ-tag" style="top: 52%; left: 18%;">🦠 消化系統 (GUT)</div>

    <div id="hud-top-right" class="hud-card">
      <div class="hud-title">即時脈搏數據</div>
      <div><span class="hud-big-num" id="hud-bpm">72</span><span class="hud-unit">BPM</span></div>
      <div id="hud-status" class="hud-status-badge">生理狀態：正常平靜</div>
    </div>

    <div id="hud-bottom-right" class="hud-card">
      <div class="hud-title">系統診斷回饋</div>
      <div id="hud-diag" style="font-size: 15px; color: #cbd5e1; margin-top: 4px; line-height: 1.4;">
        心肌規律收縮，體內生理訊號穩定傳遞中。
      </div>
    </div>
  </div>

  <script>
    /* ==========================================
       一、全域狀態設定 (Global State)
       ========================================== */
    let isListening = false; // 按下開始監聽才開始運作
    let listenMode = 'heart'; // 'heart' | 'stomach'
    let nutritionState = 'normal';
    let bpm = 72;
    let animTime = 0;

    // 生理狀態參數庫
    const stateConfigs = {
      normal: { bpm: 72, desc: "生理狀態：正常平靜", diag: "心肌規律收縮，腸道正常蠕動，體內訊號十分平穩。", color: "#38bdf8" },
      caffeine: { bpm: 125, desc: "生理狀態：咖啡因刺激", diag: "中樞神經興奮，心跳顯著加速！全身血管微幅震顫。", color: "#f59e0b" },
      sugar: { bpm: 52, desc: "生理狀態：暴糖反應", diag: "血糖劇烈波動引發昏沉，心率放緩，胃酸分泌過度。", color: "#ef4444" },
      fiber: { bpm: 78, desc: "生理狀態：高纖消化中", diag: "膳食纖維刺激腸道益生菌，胃腸平滑肌有節奏蠕動。", color: "#10b981" },
      dehydration: { bpm: 95, desc: "生理狀態：身體嚴重缺水", diag: "血容量下降引發補償性心跳加快，腸道水分缺乏蠕動困難。", color: "#3b82f6" }
    };

    /* ==========================================
       二、DOM 元件與控制監聽
       ========================================== */
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const modeHeart = document.getElementById('mode-heart');
    const modeStomach = document.getElementById('mode-stomach');
    const bpmSlider = document.getElementById('bpm-slider');
    const bpmDisp = document.getElementById('bpm-disp');
    const hudBpm = document.getElementById('hud-bpm');
    const hudStatus = document.getElementById('hud-status');
    const hudDiag = document.getElementById('hud-diag');
    const tagHeart = document.getElementById('tag-heart');
    const tagStomach = document.getElementById('tag-stomach');

    // 開啟監聽
    btnStart.addEventListener('click', () => {
      isListening = true;
      btnStart.classList.add('active-start');
      btnStop.classList.remove('active-stop');
      initAudioContext();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    // 停止監聽
    btnStop.addEventListener('click', () => {
      isListening = false;
      btnStart.classList.remove('active-start');
      btnStop.classList.add('active-stop');
      stopAudio();
    });

    // 聽診模式切換
    function setListenMode(mode) {
      listenMode = mode;
      if (mode === 'heart') {
        modeHeart.classList.add('active');
        modeStomach.classList.remove('active');
        tagHeart.classList.add('selected');
        tagStomach.classList.remove('selected');
      } else {
        modeStomach.classList.add('active');
        modeHeart.classList.remove('active');
        tagStomach.classList.add('selected');
        tagHeart.classList.remove('selected');
      }
    }
    modeHeart.addEventListener('click', () => setListenMode('heart'));
    modeStomach.addEventListener('click', () => setListenMode('stomach'));
    tagHeart.addEventListener('click', () => setListenMode('heart'));
    tagStomach.addEventListener('click', () => setListenMode('stomach'));

    // 營養狀態切換
    document.querySelectorAll('.nutri-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.nutri-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nutritionState = btn.dataset.state;
        const cfg = stateConfigs[nutritionState];
        bpm = cfg.bpm;
        bpmSlider.value = bpm;
        updateBpmDisp();
        hudStatus.innerText = cfg.desc;
        hudDiag.innerText = cfg.diag;
        hudStatus.style.color = cfg.color;
      });
    });

    // BPM 滑桿變更
    bpmSlider.addEventListener('input', (e) => {
      bpm = parseInt(e.target.value);
      updateBpmDisp();
    });

    function updateBpmDisp() {
      bpmDisp.innerHTML = `${bpm} <span style="font-size:12px;">BPM</span>`;
      hudBpm.innerText = bpm;
    }

    /* ==========================================
       三、Web Audio API 即時聲音合成器
       ========================================== */
    let audioCtx = null;
    let masterGain = null;
    let nextBeatTime = 0;

    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        masterGain.connect(audioCtx.destination);
      }
    }

    function stopAudio() {
      if (masterGain && audioCtx) {
        masterGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
      }
    }

    // 播放 Lub-Dub 心跳聲音
    function playHeartSound(time) {
      if (!isListening || !audioCtx) return;
      masterGain.gain.setValueAtTime(0.35, audioCtx.currentTime);

      // 第一心音 Lub (低頻 45Hz)
      let osc1 = audioCtx.createOscillator();
      let gain1 = audioCtx.createGain();
      osc1.frequency.setValueAtTime(50, time);
      osc1.frequency.exponentialRampToValueAtTime(30, time + 0.08);
      gain1.gain.setValueAtTime(1, time);
      gain1.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
      osc1.connect(gain1);
      gain1.connect(masterGain);
      osc1.start(time);
      osc1.stop(time + 0.12);

      // 第二心音 Dub (略高頻 65Hz)
      let dubTime = time + 0.14;
      let osc2 = audioCtx.createOscillator();
      let gain2 = audioCtx.createGain();
      osc2.frequency.setValueAtTime(70, dubTime);
      osc2.frequency.exponentialRampToValueAtTime(35, dubTime + 0.06);
      gain2.gain.setValueAtTime(0.8, dubTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, dubTime + 0.09);
      osc2.connect(gain2);
      gain2.connect(masterGain);
      osc2.start(dubTime);
      osc2.stop(dubTime + 0.09);
    }

    // 腸胃 Borborygmi 音效（白噪音濾波）
    function playStomachSound(time) {
      if (!isListening || !audioCtx) return;
      let bufferSize = audioCtx.sampleRate * 0.3;
      let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      let data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      let noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      let filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(180 + Math.random() * 100, time);

      let gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.2, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.28);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      noise.start(time);
    }

    function audioScheduler() {
      if (isListening && audioCtx) {
        let secondsPerBeat = 60.0 / bpm;
        while (nextBeatTime < audioCtx.currentTime + 0.1) {
          if (listenMode === 'heart') {
            playHeartSound(nextBeatTime);
          } else {
            playStomachSound(nextBeatTime);
          }
          nextBeatTime += secondsPerBeat;
        }
      }
      requestAnimationFrame(audioScheduler);
    }
    requestAnimationFrame(audioScheduler);

    /* ==========================================
       四、2D Canvas 波形監視器 (ECG & 腸胃音波)
       ========================================== */
    const ecgCanvas = document.getElementById('ecg-canvas');
    const stomachCanvas = document.getElementById('stomach-canvas');
    const ecgCtx = ecgCanvas.getContext('2d');
    const stomachCtx = stomachCanvas.getContext('2d');

    let ecgX = 0, stomachX = 0;

    function resizeCanvases() {
      ecgCanvas.width = ecgCanvas.offsetWidth;
      ecgCanvas.height = ecgCanvas.offsetHeight;
      stomachCanvas.width = stomachCanvas.offsetWidth;
      stomachCanvas.height = stomachCanvas.offsetHeight;
      // 初始化背景
      ecgCtx.fillStyle = "#05030a";
      ecgCtx.fillRect(0, 0, ecgCanvas.width, ecgCanvas.height);
      stomachCtx.fillStyle = "#05030a";
      stomachCtx.fillRect(0, 0, stomachCanvas.width, stomachCanvas.height);
    }
    window.addEventListener('resize', resizeCanvases);
    setTimeout(resizeCanvases, 100);

    function drawWaveforms() {
      requestAnimationFrame(drawWaveforms);

      if (!isListening) {
        // 未監聽時，畫平坦線 (Flatline)
        drawFlatline(ecgCtx, ecgCanvas, "#ef4444");
        drawFlatline(stomachCtx, stomachCanvas, "#10b981");
        return;
      }

      // ECG P-QRS-T 數學模型
      const h = ecgCanvas.height;
      const w = ecgCanvas.width;
      const midY = h / 2;
      const speed = 2.5;

      ecgX += speed;
      if (ecgX >= w) ecgX = 0;

      // 消除前方的跡線
      ecgCtx.fillStyle = "rgba(5, 3, 10, 0.2)";
      ecgCtx.fillRect(ecgX, 0, 15, h);

      let phase = (Date.now() / (60000 / bpm)) % 1;
      let ecgY = midY;
      if (phase > 0.1 && phase < 0.15) ecgY -= 6; // P波
      else if (phase >= 0.2 && phase < 0.22) ecgY += 8; // Q波
      else if (phase >= 0.22 && phase < 0.28) ecgY -= 32; // R波 (高尖峰)
      else if (phase >= 0.28 && phase < 0.32) ecgY += 12; // S波
      else if (phase >= 0.45 && phase < 0.55) ecgY -= 10; // T波

      ecgCtx.strokeStyle = "#f43f5e";
      ecgCtx.lineWidth = 2;
      ecgCtx.beginPath();
      ecgCtx.arc(ecgX, ecgY, 1, 0, Math.PI * 2);
      ecgCtx.stroke();

      // 腸胃不規則正弦疊加波
      const sh = stomachCanvas.height;
      const sw = stomachCanvas.width;
      const smidY = sh / 2;

      stomachX += speed;
      if (stomachX >= sw) stomachX = 0;

      stomachCtx.fillStyle = "rgba(5, 3, 10, 0.2)";
      stomachCtx.fillRect(stomachX, 0, 15, sh);

      let stomachY = smidY + Math.sin(Date.now() * 0.008) * 12 + Math.cos(Date.now() * 0.015) * 8;
      if (nutritionState === 'caffeine') stomachY += (Math.random() - 0.5) * 18;

      stomachCtx.strokeStyle = "#10b981";
      stomachCtx.lineWidth = 2;
      stomachCtx.beginPath();
      stomachCtx.arc(stomachX, stomachY, 1, 0, Math.PI * 2);
      stomachCtx.stroke();
    }

    function drawFlatline(ctx, canvas, color) {
      ctx.fillStyle = "rgba(5, 3, 10, 0.15)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
    }
    drawWaveforms();

    /* ==========================================
       五、Three.js 2.5D 人物與解剖器官動畫
       ========================================== */
    const container = document.getElementById('right-panel');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 8.5);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // 光照系統
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0x60a5fa, 1.5);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xf43f5e, 1.8, 10);
    pointLight.position.set(0, 0, 2);
    scene.add(pointLight);

    // 建立 2.5D 角色一體化群組 characterGroup
    const characterGroup = new THREE.Group();
    // 🌟 人物整體放大 10% (由 1.1 提升至 1.21)
    characterGroup.scale.set(1.21, 1.21, 1.21);
    characterGroup.position.set(0, -0.3, 0);
    scene.add(characterGroup);

    // 建立 Q 版小女孩底圖 Canvas
    const charCanvas = document.createElement('canvas');
    charCanvas.width = 512;
    charCanvas.height = 768;
    const cctx = charCanvas.getContext('2d');

    function drawChibiGirl() {
      cctx.clearRect(0, 0, 512, 768);
      
      // 頭部
      cctx.fillStyle = "#fde047";
      cctx.beginPath();
      cctx.arc(256, 180, 110, 0, Math.PI * 2);
      cctx.fill();

      // 烏黑齊瀏海與長髮
      cctx.fillStyle = "#1e1b4b";
      cctx.beginPath();
      cctx.arc(256, 170, 115, Math.PI * 0.8, Math.PI * 2.2);
      cctx.fill();
      cctx.fillRect(141, 170, 230, 80); // 瀏海

      // 水汪汪大眼睛
      cctx.fillStyle = "#090514";
      cctx.beginPath();
      cctx.arc(210, 195, 18, 0, Math.PI * 2);
      cctx.arc(302, 195, 18, 0, Math.PI * 2);
      cctx.fill();

      cctx.fillStyle = "#ffffff";
      cctx.beginPath();
      cctx.arc(205, 190, 6, 0, Math.PI * 2);
      cctx.arc(297, 190, 6, 0, Math.PI * 2);
      cctx.fill();

      // 可愛腮紅
      cctx.fillStyle = "rgba(244, 63, 94, 0.4)";
      cctx.beginPath();
      cctx.ellipse(195, 215, 16, 10, 0, 0, Math.PI * 2);
      cctx.ellipse(317, 215, 16, 10, 0, 0, Math.PI * 2);
      cctx.fill();

      // 粉色高科技透視服裝軀幹
      cctx.fillStyle = "rgba(244, 114, 182, 0.75)";
      cctx.beginPath();
      cctx.roundRect(186, 280, 140, 220, 20);
      cctx.fill();

      // 淺藍色波浪短褲
      cctx.fillStyle = "#38bdf8";
      cctx.beginPath();
      cctx.roundRect(186, 490, 140, 70, 10);
      cctx.fill();

      // 腳部與運動鞋
      cctx.fillStyle = "#cbd5e1";
      cctx.fillRect(206, 560, 30, 80);
      cctx.fillRect(276, 560, 30, 80);

      cctx.fillStyle = "#60a5fa";
      cctx.beginPath();
      cctx.roundRect(196, 630, 50, 30, 8);
      cctx.roundRect(266, 630, 50, 30, 8);
      cctx.fill();
    }
    drawChibiGirl();

    const charTexture = new THREE.CanvasTexture(charCanvas);
    const charGeo = new THREE.PlaneGeometry(3.2, 4.8);
    const charMat = new THREE.MeshStandardMaterial({
      map: charTexture,
      transparent: true,
      roughness: 0.3
    });
    const charMesh = new THREE.Mesh(charGeo, charMat);
    characterGroup.add(charMesh);

    // 建立 2.5D 解剖心臟 (THREE.Shape 幾何心肌)
    const heartShape = new THREE.Shape();
    heartShape.moveTo(0, 0.25);
    heartShape.cubicBezierCurveTo(0, 0.4, -0.35, 0.5, -0.35, 0.2);
    heartShape.cubicBezierCurveTo(-0.35, -0.1, 0, -0.25, 0, -0.4);
    heartShape.cubicBezierCurveTo(0, -0.25, 0.35, -0.1, 0.35, 0.2);
    heartShape.cubicBezierCurveTo(0.35, 0.5, 0, 0.4, 0, 0.25);

    const heartGeo = new THREE.ShapeGeometry(heartShape);
    const heartMat = new THREE.MeshStandardMaterial({
      color: 0xf43f5e,
      emissive: 0x9f1239,
      emissiveIntensity: 0.6,
      roughness: 0.2
    });
    const heartMesh = new THREE.Mesh(heartGeo, heartMat);
    heartMesh.position.set(-0.2, 0.35, 0.1);
    heartMesh.scale.set(1.2, 1.2, 1.2);
    characterGroup.add(heartMesh);

    // 建立 2.5D 解剖腸胃 (THREE.Shape 腸道盤繞路徑)
    const stomachShape = new THREE.Shape();
    stomachShape.moveTo(-0.4, 0.1);
    stomachShape.quadraticCurveTo(0, 0.3, 0.4, 0.1);
    stomachShape.quadraticCurveTo(0.5, -0.2, 0.2, -0.4);
    stomachShape.quadraticCurveTo(-0.3, -0.5, -0.4, -0.2);
    stomachShape.closePath();

    const stomachGeo = new THREE.ShapeGeometry(stomachShape);
    const stomachMat = new THREE.MeshStandardMaterial({
      color: 0x10b981,
      emissive: 0x065f46,
      emissiveIntensity: 0.6,
      roughness: 0.3
    });
    const stomachMesh = new THREE.Mesh(stomachGeo, stomachMat);
    stomachMesh.position.set(0, -0.35, 0.1);
    characterGroup.add(stomachMesh);

    // 腳下發光橢圓陰影
    const shadowGeo = new THREE.PlaneGeometry(2.5, 0.8);
    const shadowMat = new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.45
    });
    const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
    shadowMesh.rotation.x = -Math.PI / 2;
    shadowMesh.position.set(0, -2.2, -0.1);
    characterGroup.add(shadowMesh);

    /* ==========================================
       六、動畫渲染循環 (Render Loop)
       ========================================== */
    function animate() {
      requestAnimationFrame(animate);

      // 按下「開始監聽」時，角色與器官才開始作動
      if (isListening) {
        animTime += 0.03;

        // 角色呼吸起伏
        characterGroup.position.y = -0.3 + Math.sin(animTime * 1.5) * 0.05;

        // 咖啡因過量神經震顫 Jitter
        if (nutritionState === 'caffeine') {
          characterGroup.position.x = (Math.random() - 0.5) * 0.04;
        } else {
          characterGroup.position.x = 0;
        }

        // 心臟解剖搏動 (X軸縮小、Y軸伸長非等比例收縮)
        let heartBeatPhase = (Date.now() / (60000 / bpm)) % 1;
        if (listenMode === 'heart') {
          if (heartBeatPhase < 0.15) {
            let scaleFactor = 1 + Math.sin(heartBeatPhase * Math.PI / 0.15) * 0.25;
            heartMesh.scale.set(1.2 / scaleFactor, 1.2 * scaleFactor, 1.2);
            heartMesh.rotation.z = Math.sin(heartBeatPhase * Math.PI) * 0.1;
          } else {
            heartMesh.scale.set(1.2, 1.2, 1.2);
            heartMesh.rotation.z = 0;
          }
          stomachMesh.scale.set(1.0, 1.0, 1.0);
        } else {
          // 腸胃聽診模式蠕動
          let stomachScale = 1.0 + Math.sin(animTime * 2.5) * 0.12;
          stomachMesh.scale.set(stomachScale, 2.0 - stomachScale, 1.0);
          heartMesh.scale.set(1.2, 1.2, 1.2);
        }
      } else {
        // 未開啟監聽時保持靜止
        characterGroup.position.set(0, -0.3, 0);
        heartMesh.scale.set(1.2, 1.2, 1.2);
        stomachMesh.scale.set(1.0, 1.0, 1.0);
      }

      renderer.render(scene, camera);
    }
    animate();

    // 視窗 Resize 適應
    window.addEventListener('resize', () => {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });
  </script>
</body>
</html>
