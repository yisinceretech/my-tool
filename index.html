<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 v2.9 (Q版女孩特仕版)</title>
    <!-- 引入 Three.js 核心函式庫 (升級至 r135 以支援 CapsuleGeometry) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.135.0/build/three.min.js"></script>
    <style>
        /* 基礎重置與漸層背景 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
        }
        
        /* 左側玻璃透視 UI 控制面板 */
        #ui-panel {
            position: absolute; left: 0; top: 0; width: 38%; min-width: 350px; height: 100%;
            background: rgba(42, 42, 53, 0.85); backdrop-filter: blur(15px);
            color: white; padding: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.15); overflow-y: auto;
        }

        h1 { font-size: 1.6rem; color: #ffb6c1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); text-align: center; margin-bottom: 5px;}
        .subtitle { text-align: center; font-size: 0.95rem; color: #b8c1ec; margin-top: -15px; margin-bottom: 10px;}
        
        .section { background: rgba(0, 0, 0, 0.35); padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .section-title { font-size: 1.05rem; color: #aaddff; margin-bottom: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;}
        
        /* 2D 監視器畫布 */
        #monitor-container {
            width: 100%; height: 200px; border-radius: 8px; overflow: hidden; position: relative;
            border: 2px solid #555; transition: all 0.3s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #oscilloscope { width: 100%; height: 100%; display: block; }
        
        /* 動態主題切換 */
        .heart-mode-bg { background: #ffffff !important; border-color: #ddaaaa !important;}
        .stomach-mode-bg { background: #1a1a24 !important; border-color: #445566 !important;}

        /* 控制按鈕與滑桿 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button {
            padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); background: #4a4a5a; color: white; font-size: 0.95rem;
        }
        button:hover { background: #6a6a7a; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2);}
        button:active { transform: translateY(0); }
        button.active { background: #ff99cc; color: #111; box-shadow: 0 0 15px rgba(255,153,204,0.4); }
        
        .main-btn { grid-column: span 2; padding: 18px; font-size: 1.2rem; background: #44c46d; color: white; border-radius: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .main-btn:hover { background: #4edb7a; }
        .main-btn.stop { background: #e05252; }
        .main-btn.stop:hover { background: #fa5c5c; }

        .slider-container { display: flex; align-items: center; gap: 15px; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;}
        input[type="range"] { flex-grow: 1; accent-color: #ff99cc; height: 6px; border-radius: 3px; outline: none; }
        #bpm-val { font-weight: bold; color: #ff99cc; width: 40px; text-align: right; font-size: 1.1rem;}

        /* 3D 畫布容器 */
        #canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .instruction { font-size: 0.85rem; color: #aaa; text-align: center; margin-top: auto; line-height: 1.6; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px;}
        .highlight { color: #ff7777; font-weight: bold; }
        .highlight-green { color: #77ff77; font-weight: bold; }
        
        /* RWD 適應小螢幕 */
        @media (max-width: 800px) {
            #ui-panel { width: 100%; height: 50%; top: 50%; min-width: auto; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);}
            #canvas-container { height: 50%; }
        }
    </style>
</head>
<body>

    <!-- 左側 UI 控制面板 -->
    <div id="ui-panel">
        <div>
            <h1>身體聲音合成器 v2.9</h1>
            <p class="subtitle">互動式營養生理監視器</p>
        </div>

        <button id="toggle-play" class="main-btn">▶️ 開始監聽</button>

        <div class="section" id="monitor-section">
            <div class="section-title">
                <span id="monitor-title">🫀 心跳監視器</span>
                <span style="font-size: 0.8rem; font-weight: normal; color:#888;">(點擊右側3D器官切換)</span>
            </div>
            <div id="monitor-container" class="heart-mode-bg">
                <canvas id="oscilloscope"></canvas>
            </div>
        </div>

        <div class="section">
            <div class="section-title">生理狀態模擬</div>
            <div class="btn-grid">
                <button class="state-btn active" data-state="normal">一般狀態</button>
                <button class="state-btn" data-state="caffeine">☕ 咖啡因刺激</button>
                <button class="state-btn" data-state="sugarcrash">🍩 暈糖反應</button>
                <button class="state-btn" data-state="highfiber">🥦 高纖維消化</button>
                <button class="state-btn" data-state="refinedsugar">🥤 精緻糖消化</button>
            </div>
            <div style="margin-top: 20px;">
                <label style="font-size: 0.95rem; color: #ddd;">手動 BPM 速率控制:</label>
                <div class="slider-container">
                    <input type="range" id="bpm-slider" min="40" max="160" value="60">
                    <span id="bpm-val">60</span>
                </div>
            </div>
        </div>

        <div class="instruction">
            💡 提示: 滑鼠左鍵可拖曳旋轉視角。直接點擊右側 3D 模型的 <span class="highlight">心臟</span> 或 <span class="highlight-green">腸胃</span> 可瞬間切換聽診部位。<br>
            [靜默備課模式]：停止監聽時，調整參數不會發出聲音。
        </div>
    </div>

    <!-- 右側 3D 渲染區域 -->
    <div id="canvas-container"></div>

<script>
/**
 * ==========================================
 * 身體聲音合成器 v2.9 (防彈穩定修正版)
 * 整合 Web Audio API (DSP), Three.js (3D), 2D Canvas (ECG)
 * ==========================================
 */

// 系統全域狀態
const AppState = {
    isPlaying: false,
    mode: 'heart', // 'heart' 或 'stomach'
    nutritionState: 'normal',
    bpm: 60,
    audioCtx: null,
    sourceNodes: [],
    // 渲染同步變數
    ecgTime: 0,
    stomachNoisePos: 0
};

// ==========================================
// 1. Web Audio API 數位訊號處理 (DSP) 聲音引擎
// ==========================================
function initAudio() {
    if (!AppState.audioCtx) {
        AppState.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function stopAudio() {
    AppState.sourceNodes.forEach(node => {
        try { node.stop(); node.disconnect(); } catch(e){}
    });
    AppState.sourceNodes = [];
}

// 合成心跳聲 (Lub-dub 雙重節拍 + 指數衰減包絡)
function generateHeartBuffer(bpm, irregularity = 0, isDehydrated = false) {
    const sampleRate = AppState.audioCtx.sampleRate;
    const beatDuration = 60 / bpm;
    // 產生兩秒/兩週期的緩衝區以確保無縫 Loop
    const duration = beatDuration * 2; 
    const buffer = AppState.audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < sampleRate * duration; i++) {
        const t = i / sampleRate;
        const cycleT = t % beatDuration;
        
        let val = 0;
        // 第一心音 Lub (約 45Hz)
        if (cycleT < 0.25) {
            val += Math.sin(2 * Math.PI * 45 * cycleT) * Math.exp(-cycleT * 25);
        }
        // 第二心音 Dub (約 65Hz) - 帶有不規則延遲參數
        const tDub = cycleT - 0.25 - (Math.random() * irregularity);
        if (tDub >= 0 && tDub < 0.25) {
            val += Math.sin(2 * Math.PI * 65 * tDub) * Math.exp(-tDub * 30) * 0.8;
        }
        
        // 嚴重缺水時加入微小高頻摩擦白噪音
        if (isDehydrated && (cycleT < 0.25 || (tDub >= 0 && tDub < 0.25))) {
            val += (Math.random() - 0.5) * 0.05;
        }
        data[i] = val;
    }
    return buffer;
}

// 合成腸胃消化聲 (白噪音 + 低通濾波 + LFO 隨機包絡)
function generateStomachBuffer(filterFreq, lfoPower) {
    const sampleRate = AppState.audioCtx.sampleRate;
    const duration = 5.0; // 5秒循環長音軌
    const buffer = AppState.audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < sampleRate * duration; i++) {
        // 基底白噪音
        let noise = (Math.random() * 2 - 1) * 0.5;
        
        // 超低頻 (LFO) 隨機包絡調變，製造水泡與腸道摩擦的斷續感
        const t = i / sampleRate;
        let lfo = (Math.sin(2 * Math.PI * 0.8 * t) + Math.sin(2 * Math.PI * 2.5 * t + 1)) / 2;
        lfo = (lfo + 1) / 2; // 正規化至 0~1
        lfo = Math.pow(lfo, lfoPower); // 極化：次方越高越斷續
        
        data[i] = noise * lfo * 0.9; 
    }
    return buffer;
}

function playCurrentState() {
    if (!AppState.isPlaying) return;
    stopAudio();
    initAudio();

    const source = AppState.audioCtx.createBufferSource();
    let buffer;

    // 依據狀態決定合成參數
    if (AppState.mode === 'heart') {
        let irregularity = AppState.nutritionState === 'sugarcrash' ? 0.08 : 0;
        let isDehydrated = AppState.nutritionState === 'refinedsugar'; // 精緻糖模擬輕微脫水摩擦音
        buffer = generateHeartBuffer(AppState.bpm, irregularity, isDehydrated);
    } else {
        let filterFreq = 200, lfoPower = 4;
        if (AppState.nutritionState === 'highfiber') { filterFreq = 250; lfoPower = 2; } // 厚實持續
        if (AppState.nutritionState === 'refinedsugar') { filterFreq = 100; lfoPower = 8; } // 沉悶斷續空洞
        buffer = generateStomachBuffer(filterFreq, lfoPower);
    }

    source.buffer = buffer;
    source.loop = true;
    
    // 加上硬體濾波器讓聲音更像在體內共鳴
    const filter = AppState.audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = AppState.mode === 'heart' ? 400 : (AppState.nutritionState === 'refinedsugar' ? 120 : 250);

    source.connect(filter);
    filter.connect(AppState.audioCtx.destination);
    source.start();
    AppState.sourceNodes.push(source);
}

// ==========================================
// 2. 2D Canvas 真實流動監視器 (時間軸從右到左)
// ==========================================
const canvas = document.getElementById('oscilloscope');
const ctx = canvas.getContext('2d');
let animFrame;
// 儲存波形歷史點，陣列越長波形越密
const HISTORY_LENGTH = 400;
const historyData = new Array(HISTORY_LENGTH).fill(0); 

function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawOscilloscope() {
    animFrame = requestAnimationFrame(drawOscilloscope);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!AppState.isPlaying) {
        // 停止時只畫背景網格，波形歸零
        drawGrid(AppState.mode === 'heart');
        return;
    }

    let newVal = 0;
    
    if (AppState.mode === 'heart') {
        drawGrid(true); // 白色背景與黑色格線
        
        // 模擬 ECG 訊號 (PQRST波)
        const beatDuration = 60 / AppState.bpm;
        AppState.ecgTime += 0.016; // 假設 60fps 推進
        const cycleT = AppState.ecgTime % beatDuration;
        
        let y = 0;
        // P 波
        if (cycleT > 0.1 && cycleT < 0.2) y += Math.sin((cycleT-0.1)*Math.PI*10) * 0.15;
        // QRS 複合波
        if (cycleT > 0.25 && cycleT < 0.28) y -= 0.2;
        if (cycleT > 0.28 && cycleT < 0.32) y += 1.2; // R 尖峰
        if (cycleT > 0.32 && cycleT < 0.35) y -= 0.3;
        // T 波
        if (cycleT > 0.45 && cycleT < 0.6) y += Math.sin((cycleT-0.45)*Math.PI*(1/0.15)) * 0.25;
        
        // 暈糖不規則雜訊
        if (AppState.nutritionState === 'sugarcrash' && Math.random() < 0.05) y *= 0.6;

        newVal = -y * (canvas.height * 0.35); 
        ctx.strokeStyle = '#cc0000'; // 醫療深紅色墨水
        ctx.lineWidth = 2.5;

    } else {
        drawGrid(false); // 深色背景與幽暗格線
        
        // 模擬腸胃 LFO 噪音波塊
        AppState.stomachNoisePos += 0.05;
        let lfoPower = AppState.nutritionState === 'highfiber' ? 2 : (AppState.nutritionState === 'refinedsugar' ? 8 : 4);
        let lfo = (Math.sin(AppState.stomachNoisePos * 0.8) + Math.sin(AppState.stomachNoisePos * 2.5)) / 2;
        lfo = Math.pow((lfo + 1) / 2, lfoPower);
        
        newVal = (Math.random() - 0.5) * canvas.height * 0.7 * lfo;
        ctx.strokeStyle = '#00e5ff'; // 數位青藍色
        ctx.lineWidth = 2;
    }

    // 將新資料點推入陣列最右側，移除最左側
    historyData.push(newVal);
    historyData.shift();

    // 開始繪製波形線條
    ctx.beginPath();
    ctx.lineJoin = 'round';
    const stepX = canvas.width / HISTORY_LENGTH;
    for (let i = 0; i < HISTORY_LENGTH; i++) {
        const x = i * stepX;
        const y = canvas.height / 2 + historyData[i];
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

// 繪製背景網格
function drawGrid(isEcg) {
    ctx.lineWidth = 1;
    const gridAmt = isEcg ? 15 : 30; // ECG 網格較密
    const majorColor = isEcg ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.15)';
    const minorColor = isEcg ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
    
    // 垂直線 (時間軸向右滾動感)
    const offsetX = (Date.now() / 20) % gridAmt;
    for (let x = -gridAmt; x < canvas.width; x += gridAmt) {
        let drawX = x + (isEcg ? 0 : offsetX); // 只有腸胃模式背景會飄移
        ctx.strokeStyle = Math.round(drawX) % (gridAmt*5) < gridAmt ? majorColor : minorColor;
        ctx.beginPath(); ctx.moveTo(drawX, 0); ctx.lineTo(drawX, canvas.height); ctx.stroke();
    }
    // 水平線
    for (let y = 0; y < canvas.height; y += gridAmt) {
        ctx.strokeStyle = y % (gridAmt*5) === 0 ? majorColor : minorColor;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
}

// ==========================================
// 3. Three.js 3D 渲染與 Q版潮玩女孩建立
// ==========================================
const scene = new THREE.Scene();
// 調整攝影機視角，確保不會變形
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
// 讓顏色顯示更柔和自然 (皮克斯風格關鍵)
renderer.outputEncoding = THREE.sRGBEncoding;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// 燈光設置：明亮的全局光與溫暖的平行光
const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffeedd, 0.6);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight(0xddddff, 0.4);
backLight.position.set(-5, 5, -7);
scene.add(backLight);

// ---- 創建 Q 版女孩群組 ----
const girlGroup = new THREE.Group();
// 【防彈級排版修正】：不使用 ViewOffset，直接將模型實體移至 x=1.5 完美置中於右半部
girlGroup.position.set(1.5, -1.8, 0); 
scene.add(girlGroup);

// 定義共用材質
const skinColor = 0xffe0bd;
const skinMaterial = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.4, metalness: 0.1 });
const hairMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
// 【防彈級材質修正】：不使用易隱形的 transmission，改用最穩定支援的半透明 StandardMaterial
const shirtMaterial = new THREE.MeshStandardMaterial({ color: 0xff99cc, transparent: true, opacity: 0.55, roughness: 0.1, metalness: 0.1 });
const shortsMaterial = new THREE.MeshStandardMaterial({ color: 0x66aaff, roughness: 0.8 });
const sockMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
const shoeMaterial = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.5 });

// 1. 頭部與臉部群組
const headGroup = new THREE.Group();
headGroup.position.y = 3.6;
girlGroup.add(headGroup);

// 圓潤的臉
const head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), skinMaterial);
headGroup.add(head);

// 黑色齊瀏海與長髮
const hairBack = new THREE.Mesh(new THREE.SphereGeometry(1.25, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.7), hairMaterial);
headGroup.add(hairBack);
const bangs = new THREE.Mesh(new THREE.CylinderGeometry(1.23, 1.23, 0.6, 32, 1, false, 0, Math.PI), hairMaterial);
bangs.position.set(0, 0.4, 0);
bangs.rotation.x = -Math.PI / 2;
headGroup.add(bangs);

// 水汪汪的靈魂之窗 (Disney Eyes)
const eyeGroupL = new THREE.Group(); eyeGroupL.position.set(-0.4, 0.05, 1.05);
const eyeGroupR = new THREE.Group(); eyeGroupR.position.set(0.4, 0.05, 1.05);
headGroup.add(eyeGroupL, eyeGroupR);

const scleraMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // 眼白
const irisMat = new THREE.MeshBasicMaterial({ color: 0x111111 });   // 瞳孔
const scleraGeom = new THREE.SphereGeometry(0.28, 16, 16);
const irisGeom = new THREE.SphereGeometry(0.20, 16, 16);
const catchlightGeom = new THREE.SphereGeometry(0.06, 8, 8);

// 左眼
const eyeL = new THREE.Mesh(scleraGeom, scleraMat);
const irisL = new THREE.Mesh(irisGeom, irisMat); irisL.position.z = 0.12;
const hlL = new THREE.Mesh(catchlightGeom, scleraMat); hlL.position.set(0.06, 0.08, 0.28);
eyeGroupL.add(eyeL, irisL, hlL);
// 右眼
const eyeR = new THREE.Mesh(scleraGeom, scleraMat);
const irisR = new THREE.Mesh(irisGeom, irisMat); irisR.position.z = 0.12;
const hlR = new THREE.Mesh(catchlightGeom, scleraMat); hlR.position.set(0.06, 0.08, 0.28);
eyeGroupR.add(eyeR, irisR, hlR);

// 腮紅
const blushMat = new THREE.MeshBasicMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.6 });
const blushL = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), blushMat); blushL.position.set(-0.55, -0.2, 1.12);
const blushR = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), blushMat); blushR.position.set(0.55, -0.2, 1.12);
headGroup.add(blushL, blushR);

// 生動的眉毛
const browGeom = new THREE.CapsuleGeometry(0.05, 0.25, 4, 8);
const browL = new THREE.Mesh(browGeom, hairMaterial); browL.position.set(-0.4, 0.45, 1.18); browL.rotation.z = Math.PI/2;
const browR = new THREE.Mesh(browGeom, hairMaterial); browR.position.set(0.4, 0.45, 1.18); browR.rotation.z = Math.PI/2;
headGroup.add(browL, browR);

// 嘴巴
const mouthMat = new THREE.MeshBasicMaterial({ color: 0x661111 });
const mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 16), mouthMat);
mouth.position.set(0, -0.4, 1.16);
mouth.rotation.x = Math.PI/2;
headGroup.add(mouth);

// 2. 身體 (粉紅高科技透視 T恤)
const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.95, 2.2, 32), shirtMaterial);
torso.position.y = 1.3;
girlGroup.add(torso);

// 3. 四肢與服裝配件
// 手臂
const armGeom = new THREE.CapsuleGeometry(0.25, 1.2, 16, 16);
const armL = new THREE.Mesh(armGeom, skinMaterial); armL.position.set(-1.25, 1.4, 0); armL.rotation.z = Math.PI/10;
const armR = new THREE.Mesh(armGeom, skinMaterial); armR.position.set(1.25, 1.4, 0); armR.rotation.z = -Math.PI/10;
girlGroup.add(armL, armR);

// 淺藍波浪短褲
const shorts = new THREE.Mesh(new THREE.CylinderGeometry(0.96, 1.05, 0.7, 32), shortsMaterial);
shorts.position.y = 0.15;
girlGroup.add(shorts);

// 腿部 (含白襪與藍鞋)
const legGroupL = new THREE.Group(); legGroupL.position.set(-0.45, -0.8, 0);
const legGroupR = new THREE.Group(); legGroupR.position.set(0.45, -0.8, 0);
girlGroup.add(legGroupL, legGroupR);

const legGeom = new THREE.CylinderGeometry(0.28, 0.22, 1.2, 16);
const legSkinL = new THREE.Mesh(legGeom, skinMaterial); legSkinL.position.y = 0.2;
const legSkinR = new THREE.Mesh(legGeom, skinMaterial); legSkinR.position.y = 0.2;
legGroupL.add(legSkinL); legGroupR.add(legSkinR);

const sockGeom = new THREE.CylinderGeometry(0.23, 0.23, 0.4, 16);
const sockL = new THREE.Mesh(sockGeom, sockMaterial); sockL.position.y = -0.4;
const sockR = new THREE.Mesh(sockGeom, sockMaterial); sockR.position.y = -0.4;
legGroupL.add(sockL); legGroupR.add(sockR);

const shoeGeom = new THREE.CapsuleGeometry(0.3, 0.4, 16, 16);
const shoeL = new THREE.Mesh(shoeGeom, shoeMaterial); shoeL.position.set(0, -0.7, 0.1); shoeL.rotation.x = Math.PI/2;
const shoeR = new THREE.Mesh(shoeGeom, shoeMaterial); shoeR.position.set(0, -0.7, 0.1); shoeR.rotation.x = Math.PI/2;
legGroupL.add(shoeL); legGroupR.add(shoeR);

// 4. 內臟 (光暈與互動目標)
const heartMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xaa0000, emissiveIntensity: 1.5 });
const heart = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), heartMat);
heart.position.set(0.25, 1.7, 0.2); // 偏左上方胸腔
heart.userData = { type: 'heart' };
girlGroup.add(heart);

const stomachMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, emissiveIntensity: 0.2 });
const stomach = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), stomachMat);
stomach.position.set(0, 0.8, 0.1); // 腹腔中心
stomach.userData = { type: 'stomach' };
girlGroup.add(stomach);

// 調整攝影機距離
camera.position.z = 8;
camera.position.y = 0.5;

// ==========================================
// 4. 互動邏輯與神經反射動畫
// ==========================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// 射線點擊切換器官
window.addEventListener('mousedown', (event) => {
    // 防止點擊 UI 觸發 3D 互動
    if(event.clientX < window.innerWidth * 0.38 && window.innerWidth > 800) return; 

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    const intersects = raycaster.intersectObjects([heart, stomach]);
    if (intersects.length > 0) {
        setMode(intersects[0].object.userData.type);
    }
});

// 即時更新表情與肢體 (神經反射)
function updateModelExpression() {
    // 基礎重置
    headGroup.rotation.z = 0;
    headGroup.rotation.x = 0;
    armL.rotation.z = Math.PI/10; armL.position.y = 1.4;
    armR.rotation.z = -Math.PI/10; armR.position.y = 1.4;
    eyeGroupL.scale.set(1, 1, 1); eyeGroupL.position.y = 0.05;
    eyeGroupR.scale.set(1, 1, 1); eyeGroupR.position.y = 0.05;
    browL.rotation.z = Math.PI/2; browR.rotation.z = Math.PI/2;
    mouth.scale.set(1, 1, 1);
    skinMaterial.color.setHex(skinColor);
    blushMat.opacity = 0.6;
    
    // 依據狀態施加變化
    if (AppState.nutritionState === 'caffeine') {
        // 驚嚇/興奮：大眼、O型嘴、挑眉、舉手、臉紅
        eyeGroupL.scale.set(1.4, 1.4, 1.4); eyeGroupR.scale.set(1.4, 1.4, 1.4);
        browL.rotation.z = Math.PI/3; browR.rotation.z = -Math.PI/3; 
        mouth.scale.set(1.5, 2.5, 1); 
        armL.rotation.z = -Math.PI/3; armL.position.y = 1.8;
        armR.rotation.z = Math.PI/3; armR.position.y = 1.8;
        skinMaterial.color.setHex(0xffcccc); blushMat.opacity = 1.0;
    } 
    else if (AppState.nutritionState === 'sugarcrash') {
        // 暈糖/疲憊：死魚眼、八字眉、垂手、歪頭、蒼白
        eyeGroupL.scale.set(1, 0.25, 1); eyeGroupR.scale.set(1, 0.25, 1);
        browL.rotation.z = -Math.PI/4; browR.rotation.z = Math.PI/4; 
        mouth.scale.set(1.5, 0.2, 1);
        headGroup.rotation.z = 0.25; headGroup.rotation.x = 0.15;
        armL.rotation.z = Math.PI/20; armR.rotation.z = -Math.PI/20;
        skinMaterial.color.setHex(0xe0e0e0); blushMat.opacity = 0.1;
    } 
    else if (AppState.nutritionState === 'highfiber') {
        // 開心/健康：彎月笑眼、大笑
        eyeGroupL.scale.set(1, 0.15, 1); eyeGroupL.position.y = 0.15;
        eyeGroupR.scale.set(1, 0.15, 1); eyeGroupR.position.y = 0.15;
        mouth.scale.set(2.5, 0.8, 1); 
        stomachMat.color.setHex(0x00ff00); stomachMat.emissive.setHex(0x00aa00);
    } 
    else if (AppState.nutritionState === 'refinedsugar') {
        // 痛苦/發炎：皺眉、嘴扁
        browL.rotation.z = -Math.PI/3; browR.rotation.z = Math.PI/3;
        mouth.scale.set(1.8, 0.2, 1);
        stomachMat.color.setHex(0xff4400); stomachMat.emissive.setHex(0xcc2200); // 警告紅光
    }
}

// 3D 渲染迴圈
function animate() {
    requestAnimationFrame(animate);

    // 人物基礎待機呼吸浮動
    const time = Date.now() * 0.001;
    girlGroup.position.y = -1.8 + Math.sin(time * 2.5) * 0.04;

    // 器官發光焦點控制
    heartMat.emissiveIntensity = AppState.mode === 'heart' ? 2.0 : 0.3;
    stomachMat.emissiveIntensity = AppState.mode === 'stomach' ? 2.0 : 0.3;

    if (AppState.isPlaying) {
        // 【視覺解耦】聽診心臟時，心臟跳動
        if (AppState.mode === 'heart') {
            const beatDuration = 60 / AppState.bpm;
            const cycleT = AppState.ecgTime % beatDuration;
            let scale = 1.0;
            if (cycleT < 0.15) scale = 1.25; // 第一心音收縮
            else if (cycleT > 0.25 && cycleT < 0.35) scale = 1.15; // 第二心音
            heart.scale.set(scale, scale, scale);
            
            // 咖啡因 Jitter 物理發抖反射
            if (AppState.nutritionState === 'caffeine') {
                girlGroup.position.x = 1.5 + (Math.random() - 0.5) * 0.06;
            } else {
                girlGroup.position.x = 1.5;
            }
        } else {
            heart.scale.set(1, 1, 1); // 靜止
            girlGroup.position.x = 1.5;
        }

        // 【視覺解耦】聽診腸胃時，腸胃蠕動
        if (AppState.mode === 'stomach') {
            let lfoPower = AppState.nutritionState === 'highfiber' ? 2 : (AppState.nutritionState === 'refinedsugar' ? 8 : 4);
            let lfo = (Math.sin(AppState.stomachNoisePos * 0.8) + Math.sin(AppState.stomachNoisePos * 2.5)) / 2;
            lfo = Math.pow((lfo + 1) / 2, lfoPower);
            const scale = 1.0 + lfo * 0.35; // 氣球般脹縮
            stomach.scale.set(scale, scale, scale);
            
            // 高纖維開心搖頭
            if (AppState.nutritionState === 'highfiber') {
                headGroup.rotation.z = Math.sin(time * 4) * 0.1;
            }
        } else {
            stomach.scale.set(1, 1, 1);
        }
    } else {
        // 靜默備課模式：完全靜止
        heart.scale.set(1, 1, 1);
        stomach.scale.set(1, 1, 1);
        girlGroup.position.x = 1.5;
    }

    renderer.render(scene, camera);
}

// ==========================================
// 5. UI DOM 事件綁定與狀態管理
// ==========================================
const btnPlay = document.getElementById('toggle-play');
const sliderBpm = document.getElementById('bpm-slider');
const valBpm = document.getElementById('bpm-val');
const stateBtns = document.querySelectorAll('.state-btn');
const monitorContainer = document.getElementById('monitor-container');
const monitorTitle = document.getElementById('monitor-title');

function setMode(newMode) {
    AppState.mode = newMode;
    if (newMode === 'heart') {
        monitorContainer.className = 'heart-mode-bg';
        monitorTitle.innerText = '🫀 心電圖 (ECG) 監視器';
    } else {
        monitorContainer.className = 'stomach-mode-bg';
        monitorTitle.innerText = '🌪️ 腸鳴音頻譜分析儀';
    }
    updateModelExpression();
    if (AppState.isPlaying) playCurrentState();
    else drawGrid(AppState.mode === 'heart'); // 靜默時切換也要重畫背景網格
}

btnPlay.addEventListener('click', () => {
    AppState.isPlaying = !AppState.isPlaying;
    if (AppState.isPlaying) {
        btnPlay.innerText = '⏹ 停止監聽';
        btnPlay.classList.add('stop');
        initAudio(); // 瀏覽器要求由使用者手勢解鎖 AudioContext
        if(AppState.audioCtx.state === 'suspended') AppState.audioCtx.resume();
        playCurrentState();
        drawOscilloscope(); // 啟動波形繪製引擎
    } else {
        btnPlay.innerText = '▶️ 開始監聽';
        btnPlay.classList.remove('stop');
        stopAudio();
        cancelAnimationFrame(animFrame);
        historyData.fill(0); // 清空歷史波形
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        drawGrid(AppState.mode === 'heart'); // 畫回乾淨網格
    }
});

sliderBpm.addEventListener('input', (e) => {
    AppState.bpm = parseInt(e.target.value);
    valBpm.innerText = AppState.bpm;
    // 只有在監聽心臟且正在播放時才即時更新聲音
    if (AppState.isPlaying && AppState.mode === 'heart') playCurrentState();
});

stateBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
        stateBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        AppState.nutritionState = e.target.dataset.state;
        
        // 智慧連動 BPM (教學展示用)
        if (AppState.nutritionState === 'caffeine') { sliderBpm.value = 125; AppState.bpm = 125; }
        else if (AppState.nutritionState === 'sugarcrash') { sliderBpm.value = 52; AppState.bpm = 52; }
        else if (AppState.nutritionState === 'normal') { sliderBpm.value = 60; AppState.bpm = 60; }
        valBpm.innerText = AppState.bpm;

        updateModelExpression();
        if (AppState.isPlaying) playCurrentState();
    });
});

// 初始化：繪製乾淨的網格並啟動 3D 渲染
drawGrid(true);
animate();

// 滑鼠拖曳旋轉 3D 視角控制 (簡易版 OrbitControls)
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
document.getElementById('canvas-container').addEventListener('mousedown', () => isDragging = true);
document.addEventListener('mouseup', () => isDragging = false);
document.addEventListener('mousemove', (e) => {
    if (isDragging) {
        const deltaMove = { x: e.offsetX - previousMousePosition.x };
        girlGroup.rotation.y += deltaMove.x * 0.01;
    }
    previousMousePosition = { x: e.offsetX, y: e.offsetY };
});
</script>
</body>
</html>
