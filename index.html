<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 - 2.5D 魔法立體書版</title>
    <style>
        /* ================= CSS 樣式佈局 ================= */
        :root {
            --glass-bg: rgba(20, 25, 40, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #ff6b9e;
            --text-color: #e0e6ed;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        /* 狀態提示橫幅 (取代 alert) */
        #status-msg {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 158, 0.9);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(255, 107, 158, 0.4);
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 340px;
            height: calc(100vh - 40px);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        h1 {
            margin: 0;
            font-size: 1.4rem;
            color: #fff;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 0.9rem;
            color: #a0aab5;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button, label.upload-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 8px;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
        }
        button:hover, label.upload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        button.active {
            background: var(--accent-color);
            border-color: #ff8eb5;
            box-shadow: 0 0 15px rgba(255, 107, 158, 0.5);
        }
        button.danger { background: #ff4757; }
        button.danger:hover { background: #ff6b81; }
        
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 60%;
            accent-color: var(--accent-color);
        }
        input[type="file"] { display: none; }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="status-msg"></div>

    <div id="ui-panel">
        <h1>2.5D 身體聲音魔法書</h1>
        
        <div class="section">
            <div class="section-title">📁 1. 載入 2D 人物圖片</div>
            <label class="upload-btn">
                <input type="file" id="imageUpload" accept="image/*">
                📸 選擇照片 / 圖片
            </label>
        </div>

        <div class="section">
            <div class="section-title">🎧 2. 主控台</div>
            <button id="btn-start" class="active">▶️ 開始監聽</button>
            <button id="btn-stop" class="danger">⏹️ 靜默停止</button>
        </div>

        <div class="section">
            <div class="section-title">🩺 3. 聽診器官 (視覺分離)</div>
            <button id="btn-heart" class="active">🫀 心臟 (Heart)</button>
            <button id="btn-stomach">🥬 腸胃 (Stomach)</button>
        </div>

        <div class="section">
            <div class="section-title">🧪 4. 生理反應對照實驗</div>
            <button id="btn-normal" class="active">😊 正常平靜 (60 BPM)</button>
            <button id="btn-caffeine">☕ 咖啡因刺激 (135 BPM)</button>
            <button id="btn-sugar">🥤 暈糖反應 (50 BPM)</button>
        </div>

        <div class="section">
            <div class="section-title">⚙️ 5. 器官位置微調 (配合圖片)</div>
            <div class="control-group">
                <span>上下位置</span>
                <input type="range" id="slider-y" min="-3" max="3" step="0.1" value="0">
            </div>
            <div class="control-group">
                <span>器官大小</span>
                <input type="range" id="slider-scale" min="0.5" max="2" step="0.1" value="1">
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        /* ================= 系統與 UI 狀態管理 ================= */
        const state = {
            isRunning: false,
            currentOrgan: 'heart', // 'heart' | 'stomach'
            condition: 'normal',   // 'normal' | 'caffeine' | 'sugar'
            bpm: 60,
            imageLoaded: false
        };

        function showMessage(text) {
            const msgEl = document.getElementById('status-msg');
            msgEl.textContent = text;
            msgEl.style.opacity = 1;
            setTimeout(() => { msgEl.style.opacity = 0; }, 2500);
        }

        /* ================= Three.js 3D 渲染引擎 ================= */
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // 加入星空粒子增添科技感
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 500;
        const posArray = new Float32Array(starsCount * 3);
        for(let i=0;i<starsCount*3;i++) { posArray[i] = (Math.random() - 0.5) * 20; }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMat = new THREE.PointsMaterial({size: 0.05, color: 0xffffff, transparent: true, opacity: 0.8});
        const starMesh = new THREE.Points(starsGeo, starsMat);
        scene.add(starMesh);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        // 限制旋轉角度，保持「立體書」正面觀看體驗
        controls.minAzimuthAngle = -Math.PI / 6;
        controls.maxAzimuthAngle = Math.PI / 6;
        controls.minPolarAngle = Math.PI / 3;
        controls.maxPolarAngle = Math.PI / 1.5;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 5);
        scene.add(dirLight);

        // 群組架構 (為畫布右移做準備)
        const pivotGroup = new THREE.Group();
        pivotGroup.position.x = 1.2; // 讓主體往右偏，不被左側 UI 遮擋
        scene.add(pivotGroup);

        // 2D 圖片載體 (Plane)
        let characterMesh = null;
        const characterGroup = new THREE.Group();
        pivotGroup.add(characterGroup);

        // 預設佔位符號 (還沒傳圖片時)
        const placeholderGeo = new THREE.PlaneGeometry(3, 4);
        const placeholderMat = new THREE.MeshBasicMaterial({ color: 0x2a2a35, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
        characterMesh = new THREE.Mesh(placeholderGeo, placeholderMat);
        characterGroup.add(characterMesh);

        // 器官群組 (疊加在圖片前方)
        const organGroup = new THREE.Group();
        organGroup.position.z = 0.2; // 讓器官浮在圖片前方
        pivotGroup.add(organGroup);

        // 建立 3D 發光心臟
        const heartGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const heartMat = new THREE.MeshStandardMaterial({ 
            color: 0xff3366, emissive: 0xff0033, emissiveIntensity: 0.8, 
            roughness: 0.2, metalness: 0.1
        });
        const heartMesh = new THREE.Mesh(heartGeo, heartMat);
        heartMesh.position.set(0.15, 0.4, 0); // 預設在胸腔左側
        organGroup.add(heartMesh);

        // 建立 3D 發光腸胃
        const stomachGeo = new THREE.TorusGeometry(0.3, 0.15, 16, 100);
        const stomachMat = new THREE.MeshStandardMaterial({ 
            color: 0x33ff66, emissive: 0x00ff33, emissiveIntensity: 0.5, 
            roughness: 0.4, metalness: 0.1
        });
        const stomachMesh = new THREE.Mesh(stomachGeo, stomachMat);
        stomachMesh.position.set(0, -0.6, 0); // 預設在腹部
        stomachMesh.scale.set(1.5, 0.8, 1);
        organGroup.add(stomachMesh);

        /* ================= 圖片上傳邏輯 ================= */
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    // 根據圖片比例建立畫布大小
                    const aspect = img.width / img.height;
                    const height = 5; 
                    const width = height * aspect;
                    
                    if(characterMesh) characterGroup.remove(characterMesh);
                    const geo = new THREE.PlaneGeometry(width, height);
                    const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                    characterMesh = new THREE.Mesh(geo, mat);
                    characterGroup.add(characterMesh);
                    state.imageLoaded = true;
                    showMessage('✅ 圖片載入成功！');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        /* ================= UI 控制邏輯 ================= */
        const btns = {
            start: document.getElementById('btn-start'),
            stop: document.getElementById('btn-stop'),
            heart: document.getElementById('btn-heart'),
            stomach: document.getElementById('btn-stomach'),
            normal: document.getElementById('btn-normal'),
            caffeine: document.getElementById('btn-caffeine'),
            sugar: document.getElementById('btn-sugar')
        };

        function updateBtnState(group, activeBtn) {
            group.forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        btns.start.addEventListener('click', () => {
            if(!state.isRunning) {
                initAudio();
                state.isRunning = true;
                masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
                showMessage('▶️ 聲音引擎已啟動');
            }
        });

        btns.stop.addEventListener('click', () => {
            if(state.isRunning) {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                state.isRunning = false;
                showMessage('⏹️ 系統已靜默');
            }
        });

        // 器官切換 (視覺與聲音分離)
        [btns.heart, btns.stomach].forEach(btn => {
            btn.addEventListener('click', (e) => {
                updateBtnState([btns.heart, btns.stomach], e.target);
                state.currentOrgan = e.target.id === 'btn-heart' ? 'heart' : 'stomach';
                
                // 3D 視覺分離：選中的變亮變大，未選中的變暗縮小
                if(state.currentOrgan === 'heart') {
                    heartMat.emissiveIntensity = 0.8;
                    stomachMat.emissiveIntensity = 0.1;
                    heartMesh.visible = true;
                    stomachMesh.visible = false;
                } else {
                    heartMat.emissiveIntensity = 0.1;
                    stomachMat.emissiveIntensity = 0.8;
                    heartMesh.visible = false;
                    stomachMesh.visible = true;
                }
            });
        });

        // 狀態切換
        [btns.normal, btns.caffeine, btns.sugar].forEach(btn => {
            btn.addEventListener('click', (e) => {
                updateBtnState([btns.normal, btns.caffeine, btns.sugar], e.target);
                if(e.target.id === 'btn-normal') { state.condition = 'normal'; state.bpm = 60; }
                if(e.target.id === 'btn-caffeine') { state.condition = 'caffeine'; state.bpm = 135; }
                if(e.target.id === 'btn-sugar') { state.condition = 'sugar'; state.bpm = 50; }
            });
        });

        // 器官位置與大小微調
        document.getElementById('slider-y').addEventListener('input', (e) => {
            organGroup.position.y = parseFloat(e.target.value);
        });
        document.getElementById('slider-scale').addEventListener('input', (e) => {
            organGroup.scale.setScalar(parseFloat(e.target.value));
        });

        /* ================= Web Audio API 聲音引擎 ================= */
        let audioCtx, masterGain, heartOsc, heartGain, stomachNoise, stomachFilter, stomachGain;
        let nextNoteTime = 0;

        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0; // 初始靜音

            // --- 心跳系統 ---
            heartOsc = audioCtx.createOscillator();
            heartGain = audioCtx.createGain();
            heartOsc.type = 'sine';
            heartOsc.frequency.value = 50; // 低頻重音
            heartOsc.connect(heartGain);
            heartGain.connect(masterGain);
            heartGain.gain.value = 0;
            heartOsc.start();

            // --- 腸胃系統 ---
            const bufferSize = audioCtx.sampleRate * 2; 
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1; // 白噪音
            }
            stomachNoise = audioCtx.createBufferSource();
            stomachNoise.buffer = noiseBuffer;
            stomachNoise.loop = true;
            
            stomachFilter = audioCtx.createBiquadFilter();
            stomachFilter.type = 'lowpass';
            stomachFilter.frequency.value = 200; // 悶悶的低頻聲

            stomachGain = audioCtx.createGain();
            stomachGain.gain.value = 0;

            stomachNoise.connect(stomachFilter);
            stomachFilter.connect(stomachGain);
            stomachGain.connect(masterGain);
            stomachNoise.start();

            nextNoteTime = audioCtx.currentTime + 0.1;
            audioScheduler();
        }

        function audioScheduler() {
            if(!state.isRunning) {
                requestAnimationFrame(audioScheduler);
                return;
            }

            // 聲音通道混音控制
            if(state.currentOrgan === 'heart') {
                stomachGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            } else {
                heartGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                // 根據狀態改變腸胃聲
                let vol = state.condition === 'sugar' ? 0.2 : 0.8;
                let freq = state.condition === 'caffeine' ? 400 : 200;
                stomachFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.5);
                stomachGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.5);
            }

            // 心跳節拍器 (排程)
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                if(state.currentOrgan === 'heart') {
                    // Lub-dub 包絡線
                    heartOsc.frequency.setValueAtTime(55, nextNoteTime);
                    heartGain.gain.setValueAtTime(0, nextNoteTime);
                    heartGain.gain.linearRampToValueAtTime(1, nextNoteTime + 0.05);
                    heartGain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + 0.2);

                    heartOsc.frequency.setValueAtTime(65, nextNoteTime + 0.3);
                    heartGain.gain.setValueAtTime(0, nextNoteTime + 0.3);
                    heartGain.gain.linearRampToValueAtTime(0.8, nextNoteTime + 0.35);
                    heartGain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + 0.5);
                }
                nextNoteTime += (60.0 / state.bpm); // 計算下一拍時間
            }
            requestAnimationFrame(audioScheduler);
        }

        /* ================= 渲染與動畫迴圈 ================= */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            controls.update();
            starMesh.rotation.y = time * 0.05;

            // --- 2.5D 人物圖片動態 (呼吸與神經反射) ---
            if(characterMesh && state.imageLoaded) {
                // 1. 基礎呼吸起伏 (Sine Wave)
                let scaleY = 1 + Math.sin(time * 2) * 0.015;
                let posX = 0;
                let posY = 0;
                let rotZ = 0;

                // 2. 狀態連動 (神經反射)
                if (state.isRunning) {
                    if (state.condition === 'caffeine') {
                        // 咖啡因：神經發抖 (Jitter)
                        posX = (Math.random() - 0.5) * 0.04;
                        posY = (Math.random() - 0.5) * 0.04;
                        scaleY = 1 + Math.sin(time * 4) * 0.02; // 呼吸急促
                    } else if (state.condition === 'sugar') {
                        // 暈糖：無力下垂 (Droop)
                        rotZ = Math.sin(time) * 0.03 - 0.05; 
                        scaleY = 1 + Math.sin(time) * 0.005; // 呼吸微弱
                    }
                }

                characterMesh.scale.set(1, scaleY, 1);
                characterMesh.position.set(posX, posY, 0);
                characterMesh.rotation.z = rotZ;
            }

            // --- 器官動畫 ---
            if(state.isRunning) {
                if(state.currentOrgan === 'heart') {
                    // 心臟收縮與舒張 (配合 BPM)
                    const beatFreq = (state.bpm / 60) * Math.PI;
                    const pulse = Math.pow(Math.abs(Math.sin(time * beatFreq)), 8); // 產生尖銳的脈衝
                    heartMesh.scale.setScalar(1 + pulse * 0.3);
                } else if(state.currentOrgan === 'stomach') {
                    // 腸胃蠕動
                    let speed = state.condition === 'caffeine' ? 8 : (state.condition === 'sugar' ? 2 : 4);
                    stomachMesh.scale.x = 1.5 + Math.sin(time * speed) * 0.15;
                    stomachMesh.scale.y = 0.8 + Math.cos(time * speed * 0.8) * 0.15;
                }
            } else {
                // 待機狀態平緩
                heartMesh.scale.setScalar(1);
                stomachMesh.scale.set(1.5, 0.8, 1);
            }

            renderer.render(scene, camera);
        }

        // 響應式視窗縮放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 手機版自動將畫布置中
            if(window.innerWidth < 800) {
                pivotGroup.position.x = 0;
            } else {
                pivotGroup.position.x = 1.2;
            }
        });

        // 啟動迴圈
        animate();
    </script>
</body>
</html>
