<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Little Body Detective v3.0 - Holographic Audio Center</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            padding: 15px;
            margin-bottom: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffff;
        }
        .data-row {
            font-size: 14px;
            margin: 5px 0;
            color: #aaffff;
        }
        .highlight { color: #00ffaa; font-weight: bold; }
        button {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 8px 15px;
            margin: 5px 5px 5px 0;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button:hover, button.active {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px #00ffff;
        }
        #waveform-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 100px;
        }
        canvas#waveform {
            width: 100%;
            height: 100%;
            border-bottom: 2px solid #00ffaa;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #start-btn {
            font-size: 24px;
            padding: 15px 40px;
            border-color: #00ffaa;
            color: #00ffaa;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(0, 255, 170, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 255, 170, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(0, 255, 170, 0.5); }
        }
        #controls { width: 350px; }
        .hud-target { position: absolute; pointer-events: none; border: 1px solid rgba(0,255,255,0.5); border-radius: 50%; display: none; transform: translate(-50%, -50%); transition: all 0.1s; }
    </style>
    <!-- 引入指定版本的 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 36px; text-shadow: 0 0 15px #00ffaa;">SYSTEM BOOT...</h1>
        <p style="color: #888; margin-bottom: 30px;">Holographic Audio Diagnostics V3.0</p>
        <button id="start-btn">INITIALIZE AUDIO SENSORS</button>
    </div>

    <div id="canvas-container"></div>
    <div class="hud-target" id="crosshair" style="width: 50px; height: 50px;"></div>

    <div id="ui-layer">
        <div class="panel" id="controls">
            <h1>Diagnostic Monitor</h1>
            <div class="data-row">Target: <span id="ui-target" class="highlight">NONE</span></div>
            <div class="data-row">Status: <span id="ui-status" class="highlight">STANDBY</span></div>
            <div class="data-row">Frequency: <span id="ui-freq">-- Hz</span></div>
            <hr style="border: 0; border-top: 1px dashed #00ffff; margin: 10px 0;">
            
            <div class="data-row"><strong>Global State (DSP Overrides)</strong></div>
            <button id="btn-rest" class="active">Rest Mode</button>
            <button id="btn-exercise">Exercise Mode</button>
            
            <div id="bowel-controls" style="display:none; margin-top:10px;">
                <div class="data-row"><strong>Bowel Conveyor State</strong></div>
                <button id="btn-bowel-normo" class="active">Normoactive</button>
                <button id="btn-bowel-hyper">Hyperactive</button>
                <button id="btn-bowel-hypo">Hypoactive</button>
            </div>
        </div>

        <div class="panel" id="waveform-container">
            <div class="data-row" style="position:absolute; top:-10px; left:0; background:#050510; padding:0 5px;">LIVE WAVEFORM</div>
            <canvas id="waveform"></canvas>
        </div>
    </div>

<script>
/**
 * 核心系統模組
 */
const App = {
    state: {
        mode: 'rest', // rest, exercise
        bowelState: 'normo', // normo, hyper, hypo
        activeOrgan: null,
        bpm: 60
    },
    audio: {
        ctx: null,
        masterGain: null,
        analyser: null,
        nodes: {},
        intervals: []
    },
    three: {
        scene: null, camera: null, renderer: null, modelGroup: null, 
        raycaster: null, mouse: null, organs: {}, ripples: []
    }
};

// ==========================================
// Web Audio API 引擎 (DSP 邏輯)
// ==========================================
function initAudio() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    App.audio.ctx = new AudioContext();
    const ctx = App.audio.ctx;

    App.audio.masterGain = ctx.createGain();
    App.audio.masterGain.gain.value = 0.8;
    App.audio.masterGain.connect(ctx.destination);

    App.audio.analyser = ctx.createAnalyser();
    App.audio.analyser.fftSize = 1024;
    App.audio.masterGain.connect(App.audio.analyser);

    // 建立白噪音 Buffer
    const bufferSize = ctx.sampleRate * 2;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }

    // 建立各器官音效節點鏈
    setupHeartAudio(ctx);
    setupLungAudio(ctx, noiseBuffer);
    setupBowelAudio(ctx, noiseBuffer);
    setupKidneyAudio(ctx, noiseBuffer);

    startHeartbeatTimer();
    drawWaveform();
}

function createNoiseSource(ctx, buffer) {
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;
    src.start();
    return src;
}

function setupHeartAudio(ctx) {
    App.audio.nodes.heart = { gain: ctx.createGain() };
    App.audio.nodes.heart.gain.gain.value = 0; // 預設靜音，選中時調高
    App.audio.nodes.heart.gain.connect(App.audio.masterGain);
}

function triggerHeartbeatPulse() {
    if (!App.audio.ctx || App.state.activeOrgan !== 'heart') return;
    const ctx = App.audio.ctx;
    const t = ctx.currentTime;
    
    // Lub (60Hz)
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.frequency.value = 60;
    osc1.connect(gain1);
    gain1.connect(App.audio.nodes.heart.gain);
    
    osc1.start(t);
    gain1.gain.setValueAtTime(1, t);
    gain1.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    osc1.stop(t + 0.15);

    // Dub (80Hz) - 延遲發生
    const delay = App.state.bpm > 90 ? 0.2 : 0.3; 
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.frequency.value = 80;
    osc2.connect(gain2);
    gain2.connect(App.audio.nodes.heart.gain);

    osc2.start(t + delay);
    gain2.gain.setValueAtTime(1, t + delay);
    gain2.gain.exponentialRampToValueAtTime(0.01, t + delay + 0.15);
    osc2.stop(t + delay + 0.15);
}

function startHeartbeatTimer() {
    App.audio.intervals.forEach(clearInterval);
    App.audio.intervals = [];
    const intervalTime = 60000 / App.state.bpm;
    const id = setInterval(triggerHeartbeatPulse, intervalTime);
    App.audio.intervals.push(id);
}

function setupLungAudio(ctx, noiseBuffer) {
    const src = createNoiseSource(ctx, noiseBuffer);
    
    // Bandpass 100Hz - 2000Hz (以 1000Hz 為中心，調整 Q 值)
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1000;
    filter.Q.value = 0.5;

    const gainNode = ctx.createGain();
    gainNode.gain.value = 0;

    // LFO 0.15Hz 控制呼吸起伏
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.15;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.5; // 振幅
    
    // LFO -> gainNode.gain
    lfo.connect(lfoGain);
    lfoGain.connect(gainNode.gain);
    lfo.start();

    // 偏移量以避免完全無聲
    const offsetGain = ctx.createConstantSource();
    offsetGain.offset.value = 0.5;
    offsetGain.connect(gainNode.gain);
    offsetGain.start();

    src.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(App.audio.masterGain);

    App.audio.nodes.lungs = { gain: gainNode, lfo: lfo, filter: filter, src: src, offset: offsetGain };
}

function setupBowelAudio(ctx, noiseBuffer) {
    const src = createNoiseSource(ctx, noiseBuffer);
    
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400; // 悶悶的水聲

    const gainNode = ctx.createGain();
    gainNode.gain.value = 0;

    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.3; // Normo預設
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.8;
    
    lfo.connect(lfoGain);
    lfoGain.connect(gainNode.gain);
    lfo.start();

    const offsetGain = ctx.createConstantSource();
    offsetGain.offset.value = 0.2;
    offsetGain.connect(gainNode.gain);
    offsetGain.start();

    src.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(App.audio.masterGain);

    App.audio.nodes.bowel = { gain: gainNode, lfo: lfo, filter: filter, offset: offsetGain };
}

function setupKidneyAudio(ctx, noiseBuffer) {
    const src = createNoiseSource(ctx, noiseBuffer);
    
    // 模擬 Pink Noise (用 Lowpass 過濾 White Noise)
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 250;

    const gainNode = ctx.createGain();
    gainNode.gain.value = 0; // 極低 Gain 設置，營造平穩運作

    src.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(App.audio.masterGain);

    App.audio.nodes.kidney = { gain: gainNode };
}

function updateAudioRouting() {
    if(!App.audio.ctx) return;
    const active = App.state.activeOrgan;
    
    // Reset all gains to 0 (muting them unless selected)
    Object.keys(App.audio.nodes).forEach(key => {
        // 心臟音量控制另外處理，因為它是打點的。肺腸腎是連續的。
        if(key === 'heart' && active !== 'heart') App.audio.nodes[key].gain.gain.value = 0;
        if(key === 'heart' && active === 'heart') App.audio.nodes[key].gain.gain.value = 1;

        if(key !== 'heart') {
            const targetGain = (key === active) ? (key === 'kidney' ? 0.3 : 1) : 0;
            // 由於 Lung/Bowel 有 LFO 控制 gain，我們修改 offset 以實現淡入淡出
            if(App.audio.nodes[key].offset) {
                App.audio.nodes[key].offset.offset.linearRampToValueAtTime(targetGain * 0.5, App.audio.ctx.currentTime + 0.5);
            } else if (App.audio.nodes[key].gain.gain) {
                App.audio.nodes[key].gain.gain.linearRampToValueAtTime(targetGain, App.audio.ctx.currentTime + 0.5);
            }
        }
    });
}

function applyStateModifiers() {
    if(!App.audio.ctx) return;
    const ctx = App.audio.ctx;
    
    // 運動模式 vs 靜止模式
    if(App.state.mode === 'exercise') {
        App.state.bpm = 120;
        App.audio.nodes.lungs.lfo.frequency.linearRampToValueAtTime(0.4, ctx.currentTime + 1); // 呼吸變快
    } else {
        App.state.bpm = 60;
        App.audio.nodes.lungs.lfo.frequency.linearRampToValueAtTime(0.15, ctx.currentTime + 1);
    }
    startHeartbeatTimer();

    // 腸鳴音狀態
    const bowel = App.audio.nodes.bowel;
    if(App.state.bowelState === 'normo') {
        bowel.lfo.frequency.value = 0.3;
        bowel.filter.type = 'lowpass';
        bowel.filter.frequency.value = 400;
    } else if(App.state.bowelState === 'hyper') {
        bowel.lfo.frequency.value = 0.8;
        bowel.filter.type = 'highpass';
        bowel.filter.frequency.value = 800; // 尖銳感
    } else if(App.state.bowelState === 'hypo') {
        bowel.lfo.frequency.value = 0.05;
        bowel.filter.type = 'lowpass';
        bowel.filter.frequency.value = 150; // 低音頻悶聲
    }
}

// 波形繪製
function drawWaveform() {
    requestAnimationFrame(drawWaveform);
    if(!App.audio.analyser) return;

    const canvas = document.getElementById('waveform');
    const canvasCtx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;

    const bufferLength = App.audio.analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    App.audio.analyser.getByteTimeDomainData(dataArray);

    canvasCtx.fillStyle = '#050510';
    canvasCtx.fillRect(0, 0, width, height);
    canvasCtx.lineWidth = 2;
    canvasCtx.strokeStyle = '#00ffaa';
    canvasCtx.beginPath();

    const sliceWidth = width * 1.0 / bufferLength;
    let x = 0;

    for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * height / 2;
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
    }
    canvasCtx.lineTo(width, height / 2);
    canvasCtx.stroke();
}


// ==========================================
// Three.js 3D 視覺引擎
// ==========================================
function init3D() {
    const container = document.getElementById('canvas-container');
    const w = window.innerWidth;
    const h = window.innerHeight;

    App.three.scene = new THREE.Scene();
    App.three.scene.fog = new THREE.FogExp2(0x050510, 0.05);

    App.three.camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
    App.three.camera.position.set(0, 0, 15);

    App.three.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    App.three.renderer.setSize(w, h);
    container.appendChild(App.three.renderer.domElement);

    // 燈光設定
    const ambient = new THREE.AmbientLight(0x002244, 1);
    App.three.scene.add(ambient);
    const pointLight = new THREE.PointLight(0x00ffff, 1.5, 50);
    pointLight.position.set(5, 5, 5);
    App.three.scene.add(pointLight);

    // 模型群組 (X 軸向右推移 1.5 確保符合規範)
    App.three.modelGroup = new THREE.Group();
    App.three.modelGroup.position.x = 1.5;
    App.three.scene.add(App.three.modelGroup);

    // 共用全息材質
    const holoMaterial = new THREE.MeshPhongMaterial({
        color: 0x00ffff,
        emissive: 0x004444,
        wireframe: true,
        transparent: true,
        opacity: 0.6,
        shininess: 100
    });

    // 1. Heart (中央動力節奏站) - Sphere
    const heartGeo = new THREE.SphereGeometry(1, 16, 16);
    const heart = new THREE.Mesh(heartGeo, holoMaterial.clone());
    heart.position.set(0, 3, 0.5);
    heart.userData = { id: 'heart', name: 'Heart (Central Pump)', freq: '60Hz / 80Hz Osc' };
    App.three.modelGroup.add(heart);
    App.three.organs.heart = heart;

    // 2. Lungs (空氣氣體交換站) - Cylinders (禁止使用 Capsule)
    const lungGeo = new THREE.CylinderGeometry(0.8, 0.8, 3, 16, 8);
    // 讓 Cylinder 看起來圓潤一點的縮放技巧
    const leftLung = new THREE.Mesh(lungGeo, holoMaterial.clone());
    leftLung.scale.set(1, 1, 0.6);
    leftLung.position.set(-1.5, 2.5, 0);
    leftLung.rotation.z = Math.PI / 12;
    leftLung.userData = { id: 'lungs', name: 'Lungs (Gas Exchange)', freq: '100-2000Hz Bandpass' };
    App.three.modelGroup.add(leftLung);
    
    const rightLung = new THREE.Mesh(lungGeo, holoMaterial.clone());
    rightLung.scale.set(1, 1, 0.6);
    rightLung.position.set(1.5, 2.5, 0);
    rightLung.rotation.z = -Math.PI / 12;
    rightLung.userData = leftLung.userData;
    App.three.modelGroup.add(rightLung);
    App.three.organs.lungs = [leftLung, rightLung]; // Grouped for interaction

    // 3. Bowel (精準分揀輸送帶) - Torus (堆疊組合模擬腸道)
    const bowelGroup = new THREE.Group();
    const torusGeo = new THREE.TorusGeometry(1.5, 0.4, 8, 24);
    for(let i=0; i<3; i++) {
        const torus = new THREE.Mesh(torusGeo, holoMaterial.clone());
        torus.position.y = -i * 0.8;
        torus.rotation.x = Math.PI / 2 + (i*0.2);
        torus.rotation.y = (i*0.5);
        bowelGroup.add(torus);
    }
    bowelGroup.position.set(0, -1, 0.5);
    // Add an invisible hitbox sphere for easier clicking
    const bowelHitbox = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({visible:false}));
    bowelHitbox.userData = { id: 'bowel', name: 'Bowel (Sorting Conveyor)', freq: '0.3Hz LFO Mod' };
    bowelGroup.add(bowelHitbox);
    App.three.modelGroup.add(bowelGroup);
    App.three.organs.bowel = bowelHitbox;

    // 4. Kidney/Spleen (數據過濾站) - Spheres
    const kidneyGeo = new THREE.SphereGeometry(0.6, 12, 12);
    const leftKidney = new THREE.Mesh(kidneyGeo, holoMaterial.clone());
    leftKidney.position.set(-1.2, 0, -1);
    leftKidney.userData = { id: 'kidney', name: 'Filtration Station', freq: 'Pink Noise Hum' };
    
    const rightKidney = new THREE.Mesh(kidneyGeo, holoMaterial.clone());
    rightKidney.position.set(1.2, 0, -1);
    rightKidney.userData = leftKidney.userData;
    
    App.three.modelGroup.add(leftKidney);
    App.three.modelGroup.add(rightKidney);
    App.three.organs.kidney = [leftKidney, rightKidney];

    // Interaction Setup
    App.three.raycaster = new THREE.Raycaster();
    App.three.mouse = new THREE.Vector2();

    window.addEventListener('resize', onWindowResize, false);
    document.addEventListener('pointerdown', onPointerDown, false);

    animate();
}

function onWindowResize() {
    App.three.camera.aspect = window.innerWidth / window.innerHeight;
    App.three.camera.updateProjectionMatrix();
    App.three.renderer.setSize(window.innerWidth, window.innerHeight);
    
    const canvas = document.getElementById('waveform');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}

function createRipple(position) {
    const geo = new THREE.RingGeometry(0.1, 0.2, 32);
    const mat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 1, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(geo, mat);
    ring.position.copy(position);
    ring.position.z += 0.5; // 稍微往前推以免穿插
    App.three.scene.add(ring);
    App.three.ripples.push({ mesh: ring, scale: 1, opacity: 1 });
}

function onPointerDown(event) {
    if(!App.audio.ctx) return;
    
    App.three.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    App.three.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    App.three.raycaster.setFromCamera(App.three.mouse, App.three.camera);
    
    // 收集所有可點擊物件
    let targets = [];
    Object.values(App.three.organs).forEach(obj => {
        if(Array.isArray(obj)) targets.push(...obj);
        else targets.push(obj);
    });

    const intersects = App.three.raycaster.intersectObjects(targets);

    if (intersects.length > 0) {
        const object = intersects[0].object;
        const data = object.userData;
        
        // 生成視覺漣漪
        createRipple(intersects[0].point);

        // 更新狀態
        App.state.activeOrgan = data.id;
        
        // 更新 UI
        document.getElementById('ui-target').innerText = data.name;
        document.getElementById('ui-freq').innerText = data.freq;
        document.getElementById('ui-status').innerText = 'MONITORING';
        
        document.getElementById('bowel-controls').style.display = (data.id === 'bowel') ? 'block' : 'none';

        // 模型高光處理
        targets.forEach(t => {
            if(t.material && t.material.emissive) t.material.emissive.setHex(0x004444);
        });
        
        // 點亮當前選取的器官
        const highlightObj = (Array.isArray(App.three.organs[data.id])) ? App.three.organs[data.id] : [object];
        highlightObj.forEach(o => {
            if(o.material && o.material.emissive) o.material.emissive.setHex(0x00ffaa);
        });

        // 更新聲音路由
        updateAudioRouting();
    }
}

function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.001;

    // 基礎自轉與浮動
    if(App.three.modelGroup) {
        App.three.modelGroup.rotation.y = Math.sin(time * 0.5) * 0.2;
        App.three.modelGroup.position.y = Math.cos(time) * 0.2;
    }

    // 心臟跳動動畫 (綁定 BPM)
    if(App.three.organs.heart) {
        const beatFreq = App.state.bpm / 60;
        const scale = 1 + 0.1 * Math.pow(Math.sin(time * Math.PI * beatFreq), 8);
        App.three.organs.heart.scale.set(scale, scale, scale);
    }

    // 肺部呼吸動畫
    if(App.three.organs.lungs) {
        const respFreq = App.state.mode === 'exercise' ? 0.4 : 0.15;
        const lungScale = 1 + 0.1 * Math.sin(time * Math.PI * 2 * respFreq);
        App.three.organs.lungs.forEach(l => l.scale.set(1, 1, lungScale * 0.6));
    }

    // 更新漣漪動畫
    for(let i = App.three.ripples.length - 1; i >= 0; i--) {
        const r = App.three.ripples[i];
        r.scale += 0.1;
        r.opacity -= 0.02;
        r.mesh.scale.set(r.scale, r.scale, r.scale);
        r.mesh.material.opacity = r.opacity;
        if(r.opacity <= 0) {
            App.three.scene.remove(r.mesh);
            r.mesh.geometry.dispose();
            r.mesh.material.dispose();
            App.three.ripples.splice(i, 1);
        }
    }

    App.three.renderer.render(App.three.scene, App.three.camera);
}

// UI 互動綁定
// ==========================================
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    initAudio();
    
    // 初始化 Canvas 大小
    const canvas = document.getElementById('waveform');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
});

// 模式切換
document.getElementById('btn-rest').addEventListener('click', (e) => {
    App.state.mode = 'rest';
    e.target.classList.add('active');
    document.getElementById('btn-exercise').classList.remove('active');
    applyStateModifiers();
});
document.getElementById('btn-exercise').addEventListener('click', (e) => {
    App.state.mode = 'exercise';
    e.target.classList.add('active');
    document.getElementById('btn-rest').classList.remove('active');
    applyStateModifiers();
});

// 腸鳴音切換
const bBtns = ['normo', 'hyper', 'hypo'];
bBtns.forEach(type => {
    document.getElementById(`btn-bowel-${type}`).addEventListener('click', (e) => {
        App.state.bowelState = type;
        bBtns.forEach(t => document.getElementById(`btn-bowel-${t}`).classList.remove('active'));
        e.target.classList.add('active');
        applyStateModifiers();
    });
});

// 啟動 3D 引擎
init3D();
