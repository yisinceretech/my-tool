<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Body Detective v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }
        #scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 100%;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 25px;
            box-sizing: border-box;
            z-index: 10;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 5px 0 20px rgba(0,0,0,0.3);
            overflow-y: auto;
        }
        h1 {
            font-size: 1.6rem;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            color: #a2d2ff;
        }
        h3 {
            font-size: 1.05rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            margin-top: 25px;
            color: #ffafcc;
        }
        #waveform-canvas {
            width: 100%;
            height: 140px;
            background: #111118;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            display: block;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            flex-grow: 1;
            text-align: center;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #fff;
        }
        button.active {
            background: rgba(162, 210, 255, 0.4);
            border-color: #a2d2ff;
            box-shadow: 0 0 10px rgba(162, 210, 255, 0.5);
        }
        #btn-play { background: rgba(40, 167, 69, 0.3); border-color: #28a745; }
        #btn-play:hover, #btn-play.active { background: rgba(40, 167, 69, 0.6); }
        #btn-stop { background: rgba(220, 53, 69, 0.3); border-color: #dc3545; }
        #btn-stop:hover, #btn-stop.active { background: rgba(220, 53, 69, 0.6); }
        #btn-digest-path { background: rgba(255, 165, 0, 0.3); border-color: #ffa500; font-weight: bold; width: 100%; }
        #btn-digest-path:hover { background: rgba(255, 165, 0, 0.6); }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>Little Body Detective</h1>
        
        <canvas id="waveform-canvas"></canvas>
        
        <div class="btn-group">
            <button id="btn-play">▶️ 開始監聽</button>
            <button id="btn-stop" class="active">⏹ 停止監聽</button>
        </div>

        <h3>聽診器官選擇</h3>
        <div class="btn-group">
            <button class="organ-btn active" data-organ="heart">心臟🫀</button>
            <button class="organ-btn" data-organ="stomach">胃部🟢</button>
            <button class="organ-btn" data-organ="smallInt">小腸🟡</button>
            <button class="organ-btn" data-organ="largeInt">大腸🟤</button>
            <button class="organ-btn" data-organ="spleen">脾臟🟣</button>
            <button class="organ-btn" data-organ="kidney">腎臟🔵</button>
        </div>

        <h3>教案一：對照實驗</h3>
        <div class="btn-group">
            <button class="state-btn active" data-state="normal">一般狀態</button>
            <button class="state-btn" data-state="caffeine">☕ 咖啡因</button>
            <button class="state-btn" data-state="highFiber">🥦 高纖維</button>
            <button class="state-btn" data-state="refinedSugar">🥤 精緻糖</button>
        </div>

        <h3>教案二：營養去哪了</h3>
        <button id="btn-digest-path">🔄 消化路徑追蹤</button>
    </div>

    <div id="scene-container"></div>

<script>
/** ==========================================
 * 1. 系統狀態與參數控制
 * ========================================== */
let isPlaying = false;
let currentOrgan = 'heart';
let currentState = 'normal';
let heartBPM = 60;
let time = 0;
let digestPathTimeouts = [];

/** ==========================================
 * 2. THREE.JS 3D 渲染引擎 (防彈版)
 * ========================================== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
// 攝影機固定在正中央，將 3D 模型向右推移
camera.position.set(0, 1.5, 6.5);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('scene-container').appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// --- Q版女孩實體生成 ---
const girlGroup = new THREE.Group();
girlGroup.position.set(1.5, 0, 0); // 防呆修正：直接向右推移完美置中
scene.add(girlGroup);

// 材質庫
const materialSkin = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.4 });
const materialHair = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.8 });
// 透視衣服：使用最穩定的 MeshStandardMaterial 確保不隱形
const materialClothes = new THREE.MeshStandardMaterial({ color: 0xffb6c1, transparent: true, opacity: 0.4, roughness: 0.2, depthWrite: false });
const materialShorts = new THREE.MeshStandardMaterial({ color: 0xadd8e6, roughness: 0.6 });
const materialShoes = new THREE.MeshStandardMaterial({ color: 0x87cefa, roughness: 0.7 });
const materialSocks = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });

// 頭部
const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), materialSkin);
head.position.y = 2.4;
girlGroup.add(head);

// 瀏海與頭髮
const hair = new THREE.Mesh(new THREE.SphereGeometry(0.72, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.8), materialHair);
hair.position.y = 2.4;
girlGroup.add(hair);
const bangs = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 0.4, 32, 1, false, 0, Math.PI), materialHair);
bangs.rotation.x = Math.PI / 2;
bangs.position.set(0, 2.6, 0.1);
girlGroup.add(bangs);

// 五官 (眼睛、眉毛、嘴巴、腮紅)
const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(-0.25, 2.45, 0.63);
const rightEye = leftEye.clone(); rightEye.position.set(0.25, 2.45, 0.63);
girlGroup.add(leftEye, rightEye);

const browGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.18, 8);
const leftBrow = new THREE.Mesh(browGeo, eyeMat); leftBrow.position.set(-0.25, 2.6, 0.65); leftBrow.rotation.z = Math.PI / 2;
const rightBrow = leftBrow.clone(); rightBrow.position.set(0.25, 2.6, 0.65); rightBrow.rotation.z = Math.PI / 2;
girlGroup.add(leftBrow, rightBrow);

const mouth = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.05, 16), new THREE.MeshStandardMaterial({ color: 0xaa2222 }));
mouth.rotation.x = Math.PI / 2; mouth.position.set(0, 2.25, 0.66);
mouth.scale.set(1, 0.2, 1); // 預設微笑
girlGroup.add(mouth);

const blushMat = new THREE.MeshStandardMaterial({ color: 0xff8888, transparent: true, opacity: 0.5 });
const leftBlush = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02, 16), blushMat); leftBlush.rotation.x = Math.PI / 2; leftBlush.position.set(-0.35, 2.3, 0.62);
const rightBlush = leftBlush.clone(); rightBlush.position.set(0.35, 2.3, 0.62);
girlGroup.add(leftBlush, rightBlush);

// 身體與四肢 (禁用 CapsuleGeometry，改用 CylinderGeometry)
const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.4, 32), materialClothes);
torso.position.y = 1.0;
girlGroup.add(torso);

const shorts = new THREE.Mesh(new THREE.CylinderGeometry(0.51, 0.51, 0.4, 32), materialShorts);
shorts.position.y = 0.2;
girlGroup.add(shorts);

const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.1), materialSkin);
leftArm.position.set(-0.65, 1.1, 0); leftArm.rotation.z = Math.PI / 8;
const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.1), materialSkin);
rightArm.position.set(0.65, 1.1, 0); rightArm.rotation.z = -Math.PI / 8;
girlGroup.add(leftArm, rightArm);

const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.12, 1.0), materialSkin); leftLeg.position.set(-0.25, -0.5, 0);
const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.12, 1.0), materialSkin); rightLeg.position.set(0.25, -0.5, 0);
girlGroup.add(leftLeg, rightLeg);

const leftSock = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.3), materialSocks); leftSock.position.set(-0.25, -0.85, 0);
const rightSock = leftSock.clone(); rightSock.position.set(0.25, -0.85, 0);
girlGroup.add(leftSock, rightSock);

const shoeGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.35, 16);
const leftShoe = new THREE.Mesh(shoeGeo, materialShoes); leftShoe.rotation.x = Math.PI / 2; leftShoe.position.set(-0.25, -1.05, 0.1);
const rightShoe = leftShoe.clone(); rightShoe.position.set(0.25, -1.05, 0.1);
girlGroup.add(leftShoe, rightShoe);

// --- 內部器官群組 ---
const organsGroup = new THREE.Group();
organsGroup.position.set(0, 1.0, 0.1);
girlGroup.add(organsGroup);

const heart = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), new THREE.MeshStandardMaterial({color: 0xff0000, emissive: 0xff0000}));
heart.position.set(0, 0.35, 0.15); heart.userData = { id: 'heart' };
organsGroup.add(heart);

const stomach = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshStandardMaterial({color: 0x00ff00, emissive: 0x002200}));
stomach.position.set(-0.15, 0.05, 0.15); stomach.userData = { id: 'stomach' };
organsGroup.add(stomach);

const smallIntGroup = new THREE.Group();
for(let i=0; i<4; i++) {
   const torus = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.04, 8, 16), new THREE.MeshStandardMaterial({color: 0xffa500, emissive: 0x221100}));
   torus.position.set((Math.random()-0.5)*0.15, -0.25 + (Math.random()-0.5)*0.1, 0.15 + (Math.random()-0.5)*0.05);
   torus.rotation.x = Math.random()*Math.PI;
   smallIntGroup.add(torus);
}
smallIntGroup.userData = { id: 'smallInt' };
organsGroup.add(smallIntGroup);

const largeInt = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.06, 8, 24, Math.PI * 1.4), new THREE.MeshStandardMaterial({color: 0x654321, emissive: 0x110800}));
largeInt.rotation.z = Math.PI / 4; largeInt.position.set(0, -0.22, 0.1);
largeInt.userData = { id: 'largeInt' };
organsGroup.add(largeInt);

const spleen = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({color: 0x800080, emissive: 0x110011}));
spleen.scale.set(1, 0.5, 0.5); spleen.position.set(-0.35, 0.15, 0.05);
spleen.userData = { id: 'spleen' };
organsGroup.add(spleen);

const kidneyMat = new THREE.MeshStandardMaterial({color: 0x0000ff, emissive: 0x000022});
const kidneyL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), kidneyMat); kidneyL.position.set(-0.25, -0.05, -0.15); kidneyL.userData = { id: 'kidney' };
const kidneyR = kidneyL.clone(); kidneyR.position.set(0.25, -0.05, -0.15); kidneyR.userData = { id: 'kidney' };
organsGroup.add(kidneyL, kidneyR);


/** ==========================================
 * 3. WEB AUDIO API 聲音引擎
 * ========================================== */
let audioCtx, masterGain;
let heartGain, stomachGain, smallIntGain, largeIntGain, bgHumGain;
let stomachFilter, stomachLFO, smallIntFilter, smallIntLFO, largeIntFilter, largeIntLFO;

function createNoiseBuffer(type) {
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    if (type === 'white') {
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    } else { // Pink Noise
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        for (let i = 0; i < bufferSize; i++) {
            let white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179; b1 = 0.99332 * b1 + white * 0.0750759;
            b2 = 0.96900 * b2 + white * 0.1538520; b3 = 0.86650 * b3 + white * 0.3104856;
            b4 = 0.55000 * b4 + white * 0.5329522; b5 = -0.7616 * b5 - white * 0.0168980;
            data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
            b6 = white * 0.115926;
        }
    }
    return buffer;
}

function makeDistortionCurve(amount) {
    let n_samples = 44100, curve = new Float32Array(n_samples), deg = Math.PI / 180;
    for (let i = 0; i < n_samples; ++i) {
        let x = i * 2 / n_samples - 1;
        curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x));
    }
    return curve;
}

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0; // 預設靜音
    masterGain.connect(audioCtx.destination);

    // --- 心臟 (Lub-dub 定時調度) ---
    heartGain = audioCtx.createGain(); heartGain.gain.value = 0; heartGain.connect(masterGain);
    function scheduleHeartbeat() {
        if (!audioCtx) return;
        if (isPlaying && currentOrgan === 'heart') {
            const t = audioCtx.currentTime;
            // Lub
            let osc1 = audioCtx.createOscillator(), g1 = audioCtx.createGain();
            osc1.frequency.value = 45; osc1.connect(g1); g1.connect(heartGain);
            g1.gain.setValueAtTime(0, t); g1.gain.linearRampToValueAtTime(1, t + 0.05); g1.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
            osc1.start(t); osc1.stop(t + 0.25);
            // Dub
            let osc2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
            osc2.frequency.value = 65; osc2.connect(g2); g2.connect(heartGain);
            g2.gain.setValueAtTime(0, t + 0.25); g2.gain.linearRampToValueAtTime(0.8, t + 0.3); g2.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc2.start(t + 0.25); osc2.stop(t + 0.5);
        }
        setTimeout(scheduleHeartbeat, (60 / heartBPM) * 1000);
    }
    scheduleHeartbeat();

    // --- 胃部 (白噪音 + 低通 200Hz + 3Hz LFO) ---
    stomachGain = audioCtx.createGain(); stomachGain.gain.value = 0; stomachGain.connect(masterGain);
    let stomNoise = audioCtx.createBufferSource(); stomNoise.buffer = createNoiseBuffer('white'); stomNoise.loop = true;
    stomachFilter = audioCtx.createBiquadFilter(); stomachFilter.type = 'lowpass'; stomachFilter.frequency.value = 200;
    let stomLfoGain = audioCtx.createGain(); stomLfoGain.gain.value = 0;
    stomachLFO = audioCtx.createOscillator(); stomachLFO.frequency.value = 3;
    let stomLfoScale = audioCtx.createGain(); stomLfoScale.gain.value = 0.5; stomachLFO.connect(stomLfoScale); stomLfoScale.connect(stomLfoGain.gain);
    let stomBias = audioCtx.createConstantSource(); stomBias.offset.value = 0.5; stomBias.connect(stomLfoGain.gain);
    stomNoise.connect(stomachFilter); stomachFilter.connect(stomLfoGain); stomLfoGain.connect(stomachGain);
    stomNoise.start(); stomachLFO.start(); stomBias.start();

    // --- 小腸 (白噪音 + 帶通 1000Hz + 5Hz LFO) ---
    smallIntGain = audioCtx.createGain(); smallIntGain.gain.value = 0; smallIntGain.connect(masterGain);
    let siNoise = audioCtx.createBufferSource(); siNoise.buffer = createNoiseBuffer('white'); siNoise.loop = true;
    smallIntFilter = audioCtx.createBiquadFilter(); smallIntFilter.type = 'bandpass'; smallIntFilter.frequency.value = 1000;
    let siLfoGain = audioCtx.createGain(); siLfoGain.gain.value = 0;
    smallIntLFO = audioCtx.createOscillator(); smallIntLFO.frequency.value = 5;
    let siLfoScale = audioCtx.createGain(); siLfoScale.gain.value = 0.5; smallIntLFO.connect(siLfoScale); siLfoScale.connect(siLfoGain.gain);
    let siBias = audioCtx.createConstantSource(); siBias.offset.value = 0.5; siBias.connect(siLfoGain.gain);
    siNoise.connect(smallIntFilter); smallIntFilter.connect(siLfoGain); siLfoGain.connect(smallIntGain);
    siNoise.start(); smallIntLFO.start(); siBias.start();

    // --- 大腸 (白噪音 + 低通 100Hz + 極慢 LFO + 失真) ---
    largeIntGain = audioCtx.createGain(); largeIntGain.gain.value = 0; largeIntGain.connect(masterGain);
    let liNoise = audioCtx.createBufferSource(); liNoise.buffer = createNoiseBuffer('white'); liNoise.loop = true;
    largeIntFilter = audioCtx.createBiquadFilter(); largeIntFilter.type = 'lowpass'; largeIntFilter.frequency.value = 100;
    let liLfoGain = audioCtx.createGain(); liLfoGain.gain.value = 0;
    largeIntLFO = audioCtx.createOscillator(); largeIntLFO.frequency.value = 0.5;
    let liLfoScale = audioCtx.createGain(); liLfoScale.gain.value = 0.5; largeIntLFO.connect(liLfoScale); liLfoScale.connect(liLfoGain.gain);
    let liBias = audioCtx.createConstantSource(); liBias.offset.value = 0.5; liBias.connect(liLfoGain.gain);
    let dist = audioCtx.createWaveShaper(); dist.curve = makeDistortionCurve(50);
    liNoise.connect(largeIntFilter); largeIntFilter.connect(liLfoGain); liLfoGain.connect(dist); dist.connect(largeIntGain);
    liNoise.start(); largeIntLFO.start(); liBias.start();

    // --- 脾臟/腎臟 (粉紅噪音 + 低通背景 Hum) ---
    bgHumGain = audioCtx.createGain(); bgHumGain.gain.value = 0; bgHumGain.connect(masterGain);
    let humNoise = audioCtx.createBufferSource(); humNoise.buffer = createNoiseBuffer('pink'); humNoise.loop = true;
    let humFilter = audioCtx.createBiquadFilter(); humFilter.type = 'lowpass'; humFilter.frequency.value = 400;
    humNoise.connect(humFilter); humFilter.connect(bgHumGain);
    humNoise.start();
}

function updateAudioChannels() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [heartGain, stomachGain, smallIntGain, largeIntGain, bgHumGain].forEach(g => g.gain.setTargetAtTime(0, t, 0.1));
    
    if (isPlaying) {
        if (currentOrgan === 'heart') heartGain.gain.setTargetAtTime(1, t, 0.1);
        if (currentOrgan === 'stomach') stomachGain.gain.setTargetAtTime(1, t, 0.1);
        if (currentOrgan === 'smallInt') smallIntGain.gain.setTargetAtTime(1.5, t, 0.1);
        if (currentOrgan === 'largeInt') largeIntGain.gain.setTargetAtTime(1.2, t, 0.1);
        if (currentOrgan === 'spleen' || currentOrgan === 'kidney') bgHumGain.gain.setTargetAtTime(0.5, t, 0.1);
    }
}


/** ==========================================
 * 4. 生理連動、視覺解耦與神經反射
 * ========================================== */
function updateOrganVisuals() {
    let colors = { heart: 0xff0000, stomach: 0x00ff00, smallInt: 0xffa500, largeInt: 0x654321, spleen: 0x800080, kidney: 0x0000ff };
    
    // 對照實驗狀態覆蓋
    if (currentState === 'highFiber') {
        colors.smallInt = 0xffff00; colors.largeInt = 0x00ff00;
    } else if (currentState === 'refinedSugar') {
        colors.stomach = 0xff0000; colors.smallInt = 0x550000; colors.largeInt = 0x330000;
    }

    heart.material.emissive.setHex(currentOrgan === 'heart' ? colors.heart : 0x220000);
    stomach.material.emissive.setHex(currentOrgan === 'stomach' ? colors.stomach : 0x002200);
    smallIntGroup.children.forEach(c => c.material.emissive.setHex(currentOrgan === 'smallInt' ? colors.smallInt : 0x221100));
    largeInt.material.emissive.setHex(currentOrgan === 'largeInt' ? colors.largeInt : 0x110800);
    spleen.material.emissive.setHex(currentOrgan === 'spleen' ? colors.spleen : 0x110011);
    kidneyL.material.emissive.setHex(currentOrgan === 'kidney' ? colors.kidney : 0x000022);
    kidneyR.material.emissive.setHex(currentOrgan === 'kidney' ? colors.kidney : 0x000022);
}

function applyState(state) {
    currentState = state;
    
    // 初始化表情參數
    leftEye.scale.set(1,1,1); rightEye.scale.set(1,1,1);
    mouth.scale.set(1,0.2,1); mouth.rotation.x = Math.PI / 2;
    leftBrow.position.y = 2.6; leftBrow.rotation.z = Math.PI / 2;
    rightBrow.position.y = 2.6; rightBrow.rotation.z = Math.PI / 2;
    leftArm.rotation.z = Math.PI / 8; rightArm.rotation.z = -Math.PI / 8;
    materialSkin.color.setHex(0xffe0bd); blushMat.opacity = 0.5;

    const t = audioCtx ? audioCtx.currentTime : 0;

    if (state === 'normal') {
        heartBPM = 60;
        if(audioCtx) {
            stomachFilter.frequency.setTargetAtTime(200, t, 0.1); stomachLFO.frequency.setTargetAtTime(3, t, 0.1);
            smallIntFilter.frequency.setTargetAtTime(1000, t, 0.1); largeIntFilter.frequency.setTargetAtTime(100, t, 0.1);
        }
    } 
    else if (state === 'caffeine') {
        heartBPM = 120;
        // 驚恐/激動表情
        leftEye.scale.set(1.4, 1.4, 1.4); rightEye.scale.set(1.4, 1.4, 1.4);
        mouth.scale.set(1, 1.2, 1);
        leftBrow.position.y = 2.65; leftBrow.rotation.z = Math.PI / 2 - 0.2;
        rightBrow.position.y = 2.65; rightBrow.rotation.z = Math.PI / 2 + 0.2;
        leftArm.rotation.z = Math.PI / 2; rightArm.rotation.z = -Math.PI / 2;
        materialSkin.color.setHex(0xffcccc); blushMat.opacity = 1.0;
    } 
    else if (state === 'highFiber') {
        heartBPM = 60;
        if(audioCtx) {
            stomachFilter.frequency.setTargetAtTime(250, t, 0.1); stomachLFO.frequency.setTargetAtTime(3, t, 0.1);
            largeIntFilter.frequency.setTargetAtTime(150, t, 0.1);
        }
        // 開心笑眼
        leftEye.scale.set(1, 0.2, 1); rightEye.scale.set(1, 0.2, 1);
        mouth.scale.set(1.5, 0.6, 1);
    } 
    else if (state === 'refinedSugar') {
        heartBPM = 50; // 暈糖疲憊
        if(audioCtx) {
            stomachFilter.frequency.setTargetAtTime(100, t, 0.1); stomachLFO.frequency.setTargetAtTime(8, t, 0.1);
            smallIntFilter.frequency.setTargetAtTime(1500, t, 0.1);
        }
        // 痛苦抽搐/死魚眼
        leftEye.scale.set(1, 0.4, 1); rightEye.scale.set(1, 0.4, 1);
        mouth.scale.set(0.8, 0.1, 1);
        leftBrow.position.y = 2.58; leftBrow.rotation.z = Math.PI / 2 + 0.3;
        rightBrow.position.y = 2.58; rightBrow.rotation.z = Math.PI / 2 - 0.3;
        leftArm.rotation.z = Math.PI / 16; rightArm.rotation.z = -Math.PI / 16;
        materialSkin.color.setHex(0xe0d0cc); blushMat.opacity = 0;
    }
    
    updateOrganVisuals();
}


/** ==========================================
 * 5. 2D 示波器畫布渲染
 * ========================================== */
const canvas = document.getElementById('waveform-canvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
let waveformHistory = new Array(canvas.width).fill(0);

function drawWaveform() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 如果停止監聽，強制清空且不繪製波形
    if (!isPlaying) {
        ctx.fillStyle = '#111118';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        return;
    }
    
    let t = time;
    let currentVal = 0;

    // 背景格線 (ECG專用)
    if (currentOrgan === 'heart') {
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<canvas.width; i+=15) { ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); }
        for(let j=0; j<canvas.height; j+=15) { ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); }
        ctx.stroke();
    } else {
        ctx.fillStyle = '#111118'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 模擬當前感測數值
    if (currentOrgan === 'heart') {
        let phase = (t * heartBPM / 60) % 1;
        if (phase < 0.05) currentVal = Math.sin(phase * Math.PI * 20) * 0.8;
        else if (phase > 0.25 && phase < 0.3) currentVal = Math.sin((phase - 0.25) * Math.PI * 20) * 0.35;
        else currentVal = (Math.random()-0.5) * 0.02;
    } else if (currentOrgan === 'stomach') {
        let lfo = Math.sin(t * (currentState === 'refinedSugar' ? 8 : 3));
        currentVal = (Math.random()-0.5) * 0.5 * (lfo > 0 ? lfo : 0.1);
    } else if (currentOrgan === 'smallInt') {
        let lfo = Math.sin(t * 5);
        currentVal = (Math.random()-0.5) * 0.8 * (lfo > 0 ? 1 : 0.2);
    } else if (currentOrgan === 'largeInt') {
        let lfo = Math.sin(t * 0.5);
        currentVal = (Math.random()-0.5) * 0.3 * (lfo > 0 ? lfo : 0.1);
    } else {
        currentVal = (Math.random()-0.5) * 0.1;
    }

    waveformHistory.push(currentVal);
    waveformHistory.shift();

    // 繪製波浪線
    ctx.beginPath();
    ctx.lineWidth = 2.5;
    if (currentOrgan === 'heart') ctx.strokeStyle = '#dc3545';
    else if (currentOrgan === 'stomach') ctx.strokeStyle = '#00ff00';
    else if (currentOrgan === 'smallInt') ctx.strokeStyle = '#ffa500';
    else if (currentOrgan === 'largeInt') ctx.strokeStyle = '#88ff88';
    else ctx.strokeStyle = '#ff00ff';

    for(let i=0; i<canvas.width; i++) {
        let y = canvas.height/2 - waveformHistory[i] * (canvas.height/2);
        if(i===0) ctx.moveTo(i, y);
        else ctx.lineTo(i, y);
    }
    ctx.stroke();
}


/** ==========================================
 * 6. 主循環與動畫解耦
 * ========================================== */
function animate() {
    requestAnimationFrame(animate);
    time += 0.016;

    // 器官動畫復位
    heart.scale.set(1,1,1);
    stomach.scale.set(1,1,1);
    smallIntGroup.scale.set(1,1,1);
    largeInt.scale.set(1,1,1);
    spleen.scale.set(1,0.5,0.5);
    kidneyL.scale.set(1,1,1); kidneyR.scale.set(1,1,1);

    if (isPlaying) {
        // 解耦邏輯：僅當前選中的器官跳動
        if (currentOrgan === 'heart') {
            let phase = (time * heartBPM / 60) % 1;
            let s = 1;
            if (phase < 0.1) s = 1 + Math.sin(phase * Math.PI * 10) * 0.2;
            else if (phase > 0.25 && phase < 0.35) s = 1 + Math.sin((phase - 0.25) * Math.PI * 10) * 0.15;
            heart.scale.set(s,s,s);
        } else if (currentOrgan === 'stomach') {
            let s = 1 + Math.sin(time * (currentState === 'refinedSugar' ? 8 : 3)) * 0.1;
            stomach.scale.set(s,s,s);
        } else if (currentOrgan === 'smallInt') {
            let s = 1 + Math.sin(time * 5) * 0.05;
            smallIntGroup.scale.set(s,s,s);
        } else if (currentOrgan === 'largeInt') {
            let s = 1 + Math.sin(time * 0.5) * 0.08;
            largeInt.scale.set(s,s,s);
        } else if (currentOrgan === 'spleen') {
            let s = 1 + Math.sin(time * 2) * 0.02;
            spleen.scale.set(s, 0.5*s, 0.5*s);
        } else if (currentOrgan === 'kidney') {
            let s = 1 + Math.sin(time * 2) * 0.02;
            kidneyL.scale.set(s,s,s); kidneyR.scale.set(s,s,s);
        }
    }

    // 全身神經反射動畫
    if (currentState === 'caffeine' && isPlaying) {
        girlGroup.position.x = 1.5 + (Math.random()-0.5)*0.03;
        girlGroup.position.y = (Math.random()-0.5)*0.03;
    } else if (currentState === 'refinedSugar' && isPlaying) {
        girlGroup.position.x = 1.5 + (Math.random()-0.5)*0.015 * (Math.random() > 0.9 ? 1 : 0);
    } else {
        girlGroup.position.x = 1.5;
        girlGroup.position.y = 0;
    }

    renderer.render(scene, camera);
    drawWaveform();
}
animate();


/** ==========================================
 * 7. 事件綁定與 Raycaster 互動
 * ========================================== */
function selectOrgan(organ) {
    currentOrgan = organ;
    document.querySelectorAll('.organ-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.organ === organ);
    });
    updateOrganVisuals();
    updateAudioChannels();
}

// 播放 / 停止控制
document.getElementById('btn-play').addEventListener('click', () => {
    isPlaying = true;
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
    document.getElementById('btn-play').classList.add('active');
    document.getElementById('btn-stop').classList.remove('active');
    updateAudioChannels();
});

document.getElementById('btn-stop').addEventListener('click', () => {
    isPlaying = false;
    if (audioCtx) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    document.getElementById('btn-play').classList.remove('active');
    document.getElementById('btn-stop').classList.add('active');
    // 清除自動路徑
    digestPathTimeouts.forEach(clearTimeout);
});

// 器官切換按鈕
document.querySelectorAll('.organ-btn').forEach(btn => {
    btn.addEventListener('click', (e) => selectOrgan(e.target.dataset.organ));
});

// 對照實驗狀態切換
document.querySelectorAll('.state-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        applyState(e.target.dataset.state);
    });
});

// 消化路徑追蹤
document.getElementById('btn-digest-path').addEventListener('click', () => {
    digestPathTimeouts.forEach(clearTimeout);
    
    if (!isPlaying) document.getElementById('btn-play').click();
    
    selectOrgan('stomach');
    digestPathTimeouts.push(setTimeout(() => {
        selectOrgan('smallInt');
        digestPathTimeouts.push(setTimeout(() => {
            selectOrgan('largeInt');
        }, 3000));
    }, 3000));
});

// Raycaster 滑鼠點擊 3D 器官
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('click', (event) => {
    if (event.clientX < 380) return; // 忽略點擊左側 UI
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    
    const intersects = raycaster.intersectObjects(organsGroup.children, true);
    if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.id) obj = obj.parent;
        if (obj && obj.userData.id) selectOrgan(obj.userData.id);
    }
});

// 響應式縮放
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    waveformHistory = new Array(canvas.width).fill(0);
});

// 初始化
updateOrganVisuals();
</script>
