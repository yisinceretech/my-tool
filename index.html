<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人體小偵探 - 器官教學互動應用</title>
    <style>
        /* ================= 核心重置與版面佈局 ================= */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at 75% 50%, #0d1127, #070814, #000000); /* 深邃宇宙星空漸層，絕對禁止白色或亮色系 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ================= UI 面板 (半透明深色毛玻璃質感) ================= */
        #ui-panel {
            position: absolute;
            left: 20px;
            top: 20px;
            bottom: 20px;
            width: 360px;
            background: rgba(10, 12, 26, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        /* 滾動條美化 */
        #ui-panel::-webkit-scrollbar { width: 6px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
            color: #add8e6;
            text-shadow: 0 0 12px rgba(173, 216, 230, 0.4);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .section {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .section-title {
            font-size: 13px;
            color: #88aaff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(136, 170, 255, 0.25);
            padding-bottom: 5px;
            font-weight: bold;
        }

        /* 2D 波形監視器 */
        #monitor-canvas {
            width: 100%;
            height: 80px;
            background: #020208;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 12px rgba(0,0,0,0.9);
            display: block;
        }

        /* 按鈕群組樣式 */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1 1 calc(50% - 8px);
            text-align: center;
            font-weight: bold;
        }

        button:hover { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px); 
        }
        button:active { transform: translateY(1px); }
        
        button.active-organ { background: rgba(255, 190, 40, 0.25); border-color: #ffbe28; box-shadow: 0 0 12px rgba(255, 190, 40, 0.35); color: #fff; }
        button.active-state { background: rgba(0, 210, 255, 0.25); border-color: #00d2ff; box-shadow: 0 0 12px rgba(0, 210, 255, 0.35); color: #fff; }

        #btn-play { background: rgba(40, 190, 110, 0.15); border-color: #28be6e; color: #28be6e; }
        #btn-play.is-playing { background: #28be6e; color: white; box-shadow: 0 0 15px rgba(40, 190, 110, 0.6); }
        
        #btn-stop { background: rgba(230, 60, 60, 0.15); border-color: #e63c3c; color: #e63c3c; }
        #btn-path { flex: 1 1 100%; background: linear-gradient(135deg, #5b11db, #2566fc); border: none; padding: 12px; font-size: 14px; box-shadow: 0 4px 18px rgba(37, 102, 252, 0.35); color: white;}
        #btn-path:hover { background: linear-gradient(135deg, #6c1fff, #3a76ff); box-shadow: 0 6px 22px rgba(37, 102, 252, 0.5); }
        
        #status-text {
            font-size: 12px;
            color: #8fa0c4;
            text-align: center;
            margin-top: 5px;
            line-height: 1.4;
        }

        /* 導覽防擾鎖定遮罩 */
        #ui-blocker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 5, 15, 0.6);
            border-radius: 20px;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            color: #00ffcc;
            font-weight: bold;
            font-size: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div id="ui-blocker">🔄 消化路徑追蹤自動導覽中...</div>
        <h1>人體小偵探</h1>
        
        <div class="section">
            <div class="section-title">系統主控台</div>
            <div class="btn-group">
                <button id="btn-play">▶️ 開始監聽</button>
                <button id="btn-stop">⏹ 停止監聽</button>
            </div>
            <div id="status-text">系統狀態：靜默待機中</div>
        </div>

        <div class="section">
            <div class="section-title">即時生理波形監測</div>
            <canvas id="monitor-canvas" width="310" height="80"></canvas>
        </div>

        <div class="section">
            <div class="section-title">聽診器官切換 (亦可點擊 3D 器官)</div>
            <div class="btn-group" id="organ-buttons">
                <button class="organ-btn" data-target="heart">🫀 心臟</button>
                <button class="organ-btn" data-target="stomach">🟢 胃部</button>
                <button class="organ-btn" data-target="smallIntestine">🟡 小腸</button>
                <button class="organ-btn" data-target="largeIntestine">🟤 大腸</button>
                <button class="organ-btn" data-target="spleen">🟣 脾臟</button>
                <button class="organ-btn" data-target="kidneys">🔵 腎臟</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">【教案一】對照實驗狀態</div>
            <div class="btn-group">
                <button class="state-btn active-state" data-state="normal">👤 一般狀態</button>
                <button class="state-btn" data-state="caffeine">☕ 咖啡因</button>
                <button class="state-btn" data-state="fiber">🥦 高纖維</button>
                <button class="state-btn" data-state="sugar">🥤 精緻糖</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">【教案二】消化道動態路徑</div>
            <button id="btn-path">🔄 啟動消化路徑追蹤展示</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ================= 應用程式全域狀態 =================
        const AppState = {
            isPlaying: false,
            activeOrgan: null,
            physiologicalState: 'normal', // normal, caffeine, fiber, sugar
            isTracking: false,
            time: 0
        };

        // ================= Web Audio API 聲學模擬引擎 =================
        const AudioEngine = (function() {
            let audioCtx = null;
            let masterGain = null;
            let initialized = false;

            // 各器官 DSP 音訊結構群組
            const nodes = {
                stomach: { source: null, filter: null, gain: null },
                smallIntestine: { source: null, filter: null, gain: null },
                largeIntestine: { source: null, filter: null, dist: null, gain: null },
                spleenKidney: { source: null, gain: null }
            };

            // 白噪音 Buffer 生產器 (胃、小腸、大腸動態物理摩擦專用)
            function generateWhiteNoise() {
                const size = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < size; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                return buffer;
            }

            // 粉紅噪音 Buffer 模擬器 (用於脾、腎微弱血液過濾背景嗡嗡聲)
            function generatePinkNoise() {
                const size = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                let b0, b1, b2, b3, b4, b5, b6;
                b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
                for (let i = 0; i < size; i++) {
                    let white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                    data[i] *= 0.11; // 適度限幅
                    b6 = white * 0.115926;
                }
                return buffer;
            }

            // 非線性歪曲波形曲線 (大腸殘渣蠕動感)
            function getDistortionCurve(amount = 50) {
                const k = amount, n = 44100, curve = new Float32Array(n);
                for (let i = 0; i < n; ++i) {
                    const x = i * 2 / n - 1;
                    curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x));
                }
                return curve;
            }

            function setupEngine() {
                if (initialized) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                masterGain.gain.setValueAtTime(0, audioCtx.currentTime); // 靜默初始

                const whiteNoiseBuf = generateWhiteNoise();
                const pinkNoiseBuf = generatePinkNoise();

                // --- 1. 胃部 DSP 連鎖 (低通濾波約 200Hz 咕嚕聲) ---
                nodes.stomach.source = audioCtx.createBufferSource();
                nodes.stomach.source.buffer = whiteNoiseBuf;
                nodes.stomach.source.loop = true;
                nodes.stomach.filter = audioCtx.createBiquadFilter();
                nodes.stomach.filter.type = 'lowpass';
                nodes.stomach.filter.frequency.value = 200;
                nodes.stomach.gain = audioCtx.createGain();
                nodes.stomach.gain.value = 0;
                nodes.stomach.source.connect(nodes.stomach.filter).connect(nodes.stomach.gain).connect(masterGain);
                nodes.stomach.source.start();

                // --- 2. 小腸 DSP 連鎖 (高頻帶通濾波約 1000Hz 液體推进聲) ---
                nodes.smallIntestine.source = audioCtx.createBufferSource();
                nodes.smallIntestine.source.buffer = whiteNoiseBuf;
                nodes.smallIntestine.source.loop = true;
                nodes.smallIntestine.filter = audioCtx.createBiquadFilter();
                nodes.smallIntestine.filter.type = 'bandpass';
                nodes.smallIntestine.filter.frequency.value = 1000;
                nodes.smallIntestine.filter.Q.value = 2.0;
                nodes.smallIntestine.gain = audioCtx.createGain();
                nodes.smallIntestine.gain.value = 0;
                nodes.smallIntestine.source.connect(nodes.smallIntestine.filter).connect(nodes.smallIntestine.gain).connect(masterGain);
                nodes.smallIntestine.source.start();

                // --- 3. 大腸 DSP 連鎖 (低通 100Hz + 過載失真 蠕動磨損聲) ---
                nodes.largeIntestine.source = audioCtx.createBufferSource();
                nodes.largeIntestine.source.buffer = whiteNoiseBuf;
                nodes.largeIntestine.source.loop = true;
                nodes.largeIntestine.filter = audioCtx.createBiquadFilter();
                nodes.largeIntestine.filter.type = 'lowpass';
                nodes.largeIntestine.filter.frequency.value = 100;
                nodes.largeIntestine.dist = audioCtx.createWaveShaper();
                nodes.largeIntestine.dist.curve = getDistortionCurve(40);
                nodes.largeIntestine.dist.oversample = '4x';
                nodes.largeIntestine.gain = audioCtx.createGain();
                nodes.largeIntestine.gain.value = 0;
                nodes.largeIntestine.source.connect(nodes.largeIntestine.filter).connect(nodes.largeIntestine.dist).connect(nodes.largeIntestine.gain).connect(masterGain);
                nodes.largeIntestine.source.start();

                // --- 4. 脾/腎 背景音連鎖 (粉紅噪音極低量微弱蜂鳴) ---
                nodes.spleenKidney.source = audioCtx.createBufferSource();
                nodes.spleenKidney.source.buffer = pinkNoiseBuf;
                nodes.spleenKidney.source.loop = true;
                nodes.spleenKidney.gain = audioCtx.createGain();
                nodes.spleenKidney.gain.value = 0;
                nodes.spleenKidney.source.connect(nodes.spleenKidney.gain).connect(masterGain);
                nodes.spleenKidney.source.start();

                initialized = true;
                heartbeatClock();
            }

            // 心跳異步調度時間軸 (Lub-dub 指數包絡合成)
            let nextBeatTime = 0;
            function heartbeatClock() {
                if (audioCtx && AppState.isPlaying) {
                    let bpm = 72;
                    if (AppState.physiologicalState === 'caffeine') bpm = 135; // 咖啡因心跳極快
                    if (AppState.physiologicalState === 'sugar') bpm = 52;     // 精緻糖心跳微弱遲緩
                    
                    const interval = 60 / bpm;
                    while (nextBeatTime < audioCtx.currentTime + 0.08) {
                        if (AppState.activeOrgan === 'heart') {
                            synthesizeHeartbeat(nextBeatTime);
                            VisualEngine.pulseHeart();
                            Monitor.kickSpike();
                        }
                        nextBeatTime += interval;
                    }
                }
                setTimeout(heartbeatClock, 40);
            }

            function synthesizeHeartbeat(time) {
                // 第一心音 Lub (低沉 45Hz)
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(45, time);
                osc1.connect(gain1).connect(masterGain);
                gain1.gain.setValueAtTime(0, time);
                gain1.gain.linearRampToValueAtTime(1.0, time + 0.04);
                gain1.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc1.start(time);
                osc1.stop(time + 0.2);

                // 第二心音 Dub (略高 65Hz)
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(65, time + 0.24);
                osc2.connect(gain2).connect(masterGain);
                gain2.gain.setValueAtTime(0, time + 0.24);
                gain2.gain.linearRampToValueAtTime(0.75, time + 0.28);
                gain2.gain.exponentialRampToValueAtTime(0.001, time + 0.42);
                osc2.start(time + 0.24);
                osc2.stop(time + 0.45);
            }

            // 動態 LFO 調變與生理狀態連動邏輯
            function frameDSPModulation(time) {
                if (!initialized || !AppState.isPlaying) return;

                let modifier = 1.0;
                if (AppState.physiologicalState === 'sugar') modifier = 0.25; // 糖分導致運作癱軟
                if (AppState.physiologicalState === 'fiber') modifier = 1.6;  // 高纖維大幅增加腸道動力

                const now = audioCtx.currentTime;

                // 胃部 3Hz LFO
                if (AppState.activeOrgan === 'stomach') {
                    const lfo = (Math.sin(time * 3 * Math.PI * 2) + 1) * 0.4;
                    let vol = (AppState.physiologicalState === 'sugar') ? (Math.random() > 0.6 ? lfo * 0.2 : 0) : lfo * modifier; 
                    nodes.stomach.gain.gain.setTargetAtTime(vol, now, 0.04);
                } else {
                    nodes.stomach.gain.gain.setTargetAtTime(0, now, 0.08);
                }

                // 小腸 快速不規則水流感
                if (AppState.activeOrgan === 'smallIntestine') {
                    const lfo = (Math.sin(time * 6) * Math.cos(time * 3.1) + 1) * 0.35;
                    let vol = (AppState.physiologicalState === 'sugar') ? (Math.random() > 0.75 ? 0.1 : 0) : lfo * modifier;
                    nodes.smallIntestine.gain.gain.setTargetAtTime(vol, now, 0.04);
                } else {
                    nodes.smallIntestine.gain.gain.setTargetAtTime(0, now, 0.08);
                }

                // 大腸 極慢 0.5Hz 厚重蠕動
                if (AppState.activeOrgan === 'largeIntestine') {
                    const lfo = (Math.sin(time * 0.5 * Math.PI * 2) + 1) * 0.4;
                    let vol = lfo * modifier;
                    nodes.largeIntestine.gain.gain.setTargetAtTime(vol, now, 0.08);
                } else {
                    nodes.largeIntestine.gain.gain.setTargetAtTime(0, now, 0.08);
                }

                // 脾臟與腎臟 平穩微弱血液過濾背景音
                if (AppState.activeOrgan === 'spleen' || AppState.activeOrgan === 'kidneys') {
                    nodes.spleenKidney.gain.gain.setTargetAtTime(0.18, now, 0.1);
                } else {
                    nodes.spleenKidney.gain.gain.setTargetAtTime(0, now, 0.08);
                }
            }

            return {
                init: setupEngine,
                turnOn: () => {
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    if (masterGain) masterGain.gain.setTargetAtTime(1.0, audioCtx.currentTime, 0.05);
                    nextBeatTime = audioCtx ? audioCtx.currentTime + 0.02 : 0;
                },
                turnOff: () => {
                    if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                },
                frameDSPModulation
            };
        })();

        // ================= 2D 監視器繪製面板 (Canvas 滾動示波) =================
        const Monitor = (function() {
            const canvas = document.getElementById('monitor-canvas');
            const ctx = canvas.getContext('2d');
            const history = new Array(canvas.width).fill(0);
            let spikeTimer = 0;

            function kickSpike() { spikeTimer = 1.0; }

            function refreshWave(time) {
                ctx.fillStyle = '#020208';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                history.shift();
                let v = 0;

                if (AppState.isPlaying && AppState.activeOrgan) {
                    switch (AppState.activeOrgan) {
                        case 'heart':
                            if (spikeTimer > 0) {
                                // ECG 典型特徵心電圖模擬
                                if (spikeTimer > 0.8) v = -0.15;
                                else if (spikeTimer > 0.6) v = 1.0; // R波
                                else if (spikeTimer > 0.45) v = -0.25; // S波
                                else if (spikeTimer > 0.15) v = 0.2; // T波
                                spikeTimer -= 0.06;
                            } else {
                                v = Math.random() * 0.04 - 0.02;
                            }
                            break;
                        case 'stomach':
                            // 緩慢粗獷胃部波動
                            v = Math.sin(time * 3 * Math.PI * 2) * 0.45 + (Math.random() * 0.14 - 0.07);
                            if (AppState.physiologicalState === 'sugar') v *= (Math.random() > 0.45 ? 0.1 : 0.9);
                            break;
                        case 'smallIntestine':
                            // 高頻密集氣泡液體微小波紋
                            v = (Math.sin(time * 18) * Math.cos(time * 6)) * 0.5 + (Math.random() * 0.2 - 0.1);
                            break;
                        case 'largeIntestine':
                            // 寬深殘渣推進波
                            v = Math.sin(time * 0.5 * Math.PI * 2) * 0.75 + (Math.random() * 0.06 - 0.03);
                            break;
                        case 'spleen':
                        case 'kidneys':
                            // 細微密集之血液過濾雜訊
                            v = Math.random() * 0.14 - 0.07;
                            break;
                    }
                }

                // 疊加咖啡因全局發抖雜訊
                if (AppState.isPlaying && AppState.physiologicalState === 'caffeine') {
                    v += (Math.random() * 0.12 - 0.06);
                }

                history.push(v);

                // 根器聽診狀態決定示波線彩度
                let strokeColor = '#00ffcc';
                if (AppState.activeOrgan === 'heart') strokeColor = '#ff2b5d';
                if (AppState.activeOrgan === 'stomach' && AppState.physiologicalState === 'sugar') strokeColor = '#ff2222';
                if (AppState.activeOrgan === 'smallIntestine' || AppState.activeOrgan === 'largeIntestine') {
                    strokeColor = (AppState.physiologicalState === 'fiber') ? '#adff2f' : '#ff9f1a';
                }

                ctx.beginPath();
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 2;
                ctx.lineJoin = 'round';
                
                for (let i = 0; i < canvas.width; i++) {
                    const x = i;
                    const y = (canvas.height / 2) - (history[i] * canvas.height * 0.42);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // 繪製最右側即時掃描標記線
                ctx.fillStyle = 'rgba(0, 255, 204, 0.25)';
                ctx.fillRect(canvas.width - 3, 0, 3, canvas.height);
            }

            return { draw: refreshWave, kickSpike };
        })();

        // ================= Three.js 3D 萌系幼態女孩引擎 =================
        const VisualEngine = (function() {
            const container = document.getElementById('canvas-container');
            let scene, camera, renderer, raycaster, mouse;
            
            let girlGroup; 
            const organs = {};
            const faceParts = {};
            
            const clock = new THREE.Clock();
            let heartPulse = 1.0;

            function setup3D() {
                scene = new THREE.Scene();
                // 保持背景透明，透出外部精美的宇宙深色 Grad 漸層
                
                camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(0, 0, 5.2);

                renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // 佈置高科技環境光影
                const ambient = new THREE.AmbientLight(0xffffff, 0.65);
                scene.add(ambient);
                const directional = new THREE.DirectionalLight(0xffffff, 0.45);
                directional.position.set(4, 6, 4);
                scene.add(directional);

                assembleChibiGirl();

                raycaster = new THREE.Raycaster();
                mouse = new THREE.Vector2();

                window.addEventListener('mousedown', handleClickDetect);
                window.addEventListener('resize', handleWindowResize);
            }

            function assembleChibiGirl() {
                girlGroup = new THREE.Group();
                // 防呆必備：拒絕使用 ViewOffset，實體右移 1.5 置中
                girlGroup.position.set(1.5, -0.55, 0); 
                scene.add(girlGroup);

                const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe2c6, roughness: 0.45 });

                // 1. 極巨化頭部 (SphereGeometry 半徑 1.25, 體現超萌兩頭身)
                const headGeo = new THREE.SphereGeometry(1.25, 36, 36);
                const head = new THREE.Mesh(headGeo, skinMat);
                head.position.y = 1.65;
                girlGroup.add(head);

                // 蓬鬆的棕色短髮
                const hairMat = new THREE.MeshStandardMaterial({ color: 0x5a3825, roughness: 0.75 });
                const hairTopGeo = new THREE.SphereGeometry(1.3, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.55);
                const hairTop = new THREE.Mesh(hairTopGeo, hairMat);
                head.add(hairTop);
                
                // 齊瀏海/側髮修飾群組 (使用矮圓柱拼接)
                const bangGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.4, 16);
                const bangL = new THREE.Mesh(bangGeo, hairMat);
                bangL.position.set(-0.5, 0.3, 1.1);
                bangL.rotation.z = Math.PI/4;
                const bangR = bangL.clone();
                bangR.position.x = 0.5;
                bangR.rotation.z = -Math.PI/4;
                head.add(bangL); head.add(bangR);

                // 2. 臉部五官 (嚴格遵循低重心無辜法則)
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
                const eyeGeo = new THREE.SphereGeometry(0.125, 16, 16);
                
                faceParts.eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                faceParts.eyeL.position.set(-0.42, -0.22, 1.16);
                faceParts.eyeR = faceParts.eyeL.clone();
                faceParts.eyeR.position.x = 0.42;
                head.add(faceParts.eyeL); head.add(faceParts.eyeR);

                // 靈魂重點：眼斜下方壓扁的粉紅半透明圓柱體腮紅
                const blushGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.04, 16);
                blushGeo.rotateX(Math.PI / 2);
                const blushMat = new THREE.MeshStandardMaterial({ color: 0xffa0b5, transparent: true, opacity: 0.65, roughness: 0.5 });
                const blushL = new THREE.Mesh(blushGeo, blushMat);
                blushL.position.set(-0.58, -0.38, 1.08);
                const blushR = blushL.clone();
                blushR.position.x = 0.58;
                head.add(blushL); head.add(blushR);

                // 極小紅幾何體嘴巴 (貼近下巴)
                const mouthGeo = new THREE.SphereGeometry(0.05, 12, 12);
                const mouthMat = new THREE.MeshStandardMaterial({ color: 0xe64a4a });
                faceParts.mouth = new THREE.Mesh(mouthGeo, mouthMat);
                faceParts.mouth.position.set(0, -0.5, 1.18);
                head.add(faceParts.mouth);

                // 粗短笨拙的眉毛
                const browGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.22, 8);
                browGeo.rotateZ(Math.PI / 2);
                const browMat = new THREE.MeshStandardMaterial({ color: 0x3d2518 });
                faceParts.browL = new THREE.Mesh(browGeo, browMat);
                faceParts.browL.position.set(-0.4, 0.06, 1.2);
                faceParts.browR = faceParts.browL.clone();
                faceParts.browR.position.x = 0.4;
                head.add(faceParts.browL); head.add(faceParts.browR);

                // 3. 身體與服飾 (極短圓柱, 寬鬆淺藍色連帽衫, 基礎不報錯半透明)
                const bodyGeo = new THREE.CylinderGeometry(0.75, 0.88, 1.35, 32);
                const hoodieMat = new THREE.MeshStandardMaterial({ 
                    color: 0x99ccff, transparent: true, opacity: 0.48, depthWrite: false, side: THREE.DoubleSide, roughness: 0.3
                });
                const body = new THREE.Mesh(bodyGeo, hoodieMat);
                body.position.y = 0.35;
                girlGroup.add(body);

                // 連帽衫上的可愛小熊圖案拼貼
                const bearMat = new THREE.MeshStandardMaterial({ color: 0x946242, roughness: 0.6 });
                const bearFace = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), bearMat);
                bearFace.position.set(0, 0.18, 0.84);
                const bearEarL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), bearMat);
                bearEarL.position.set(-0.11, 0.28, 0.8);
                const bearEarR = bearEarL.clone();
                bearEarR.position.x = 0.11;
                body.add(bearFace); body.add(bearEarL); body.add(bearEarR);

                // 米色短褲
                const pantsGeo = new THREE.CylinderGeometry(0.89, 0.84, 0.45, 32);
                const pantsMat = new THREE.MeshStandardMaterial({ color: 0xeadeb8, roughness: 0.6 });
                const pants = new THREE.Mesh(pantsGeo, pantsMat);
                pants.position.y = -0.62;
                girlGroup.add(pants);

                // 4. 短胖笨拙之四肢 (手腳長度絕不超過軀幹)
                const armGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.8, 16);
                
                // 左手臂與圓圓球形小手
                faceParts.armL = new THREE.Mesh(armGeo, skinMat);
                faceParts.armL.position.set(-1.05, 0.4, 0);
                faceParts.armL.rotation.z = Math.PI / 5;
                const handL = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), skinMat);
                handL.position.y = -0.4;
                faceParts.armL.add(handL);
                girlGroup.add(faceParts.armL);

                // 右手臂與圓圓球形小手
                faceParts.armR = new THREE.Mesh(armGeo, skinMat);
                faceParts.armR.position.set(1.05, 0.4, 0);
                faceParts.armR.rotation.z = -Math.PI / 5;
                const handR = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), skinMat);
                handR.position.y = -0.4;
                faceParts.armR.add(handR);
                girlGroup.add(faceParts.armR);

                // 粗短腳與運動鞋
                const legGeo = new THREE.CylinderGeometry(0.24, 0.22, 0.65, 16);
                const shoeMat = new THREE.MeshStandardMaterial({ color: 0x77b5ff, roughness: 0.5 });
                const sockMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

                // 左腳連鞋
                const legL = new THREE.Mesh(legGeo, skinMat);
                legL.position.set(-0.38, -1.15, 0);
                const sockL = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.2, 16), sockMat);
                sockL.position.y = -0.25;
                const shoeL = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), shoeMat);
                shoeL.position.set(0, -0.38, 0.12);
                shoeL.scale.set(1, 0.8, 1.3); // 擠壓出包頭運動鞋感
                legL.add(sockL); legL.add(shoeL);
                girlGroup.add(legL);

                // 右腳連鞋
                const legR = new THREE.Mesh(legGeo, skinMat);
                legR.position.set(0.38, -1.15, 0);
                const sockR = sockL.clone();
                const shoeR = shoeL.clone();
                legR.add(sockR); legR.add(shoeR);
                girlGroup.add(legR);

                // ================= 5. 內部高發光器官擴充 (重點) =================
                const deployOrgan = (id, geo, color, localPos, shapeScale = null) => {
                    // 發光強度初始為0.1，依靠點光源和自發光與黑夜背景形成劇烈對比
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: color, emissive: color, emissiveIntensity: 0.15, roughness: 0.2 
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(localPos);
                    if (shapeScale) mesh.scale.copy(shapeScale);
                    mesh.userData = { id: id, baseColor: color, baseEmissive: color };
                    
                    // 點光源灌注發光艙體
                    const glowLight = new THREE.PointLight(color, 0, 1.4);
                    mesh.add(glowLight);
                    mesh.userData.light = glowLight;

                    body.add(mesh);
                    organs[id] = mesh;
                    return mesh;
                };

                // 心臟🫀 (發紅光) - 胸口偏左
                deployOrgan('heart', new THREE.SphereGeometry(0.18, 24, 24), 0xff1e1e, new THREE.Vector3(0.18, 0.32, 0.18));
                
                // 胃部🟢 (發綠光) - 上腹部扁圓
                deployOrgan('stomach', new THREE.SphereGeometry(0.24, 24, 24), 0x22ff55, new THREE.Vector3(-0.16, -0.04, 0.16), new THREE.Vector3(1.2, 0.78, 1));
                
                // 脾臟🟣 (發深紫光) - 胃的左上方小扁橢圓
                deployOrgan('spleen', new THREE.SphereGeometry(0.11, 16, 16), 0xa020f0, new THREE.Vector3(-0.4, 0.1, 0.08), new THREE.Vector3(1, 0.55, 1));

                // 腎臟🔵 (發藍光) - 後腰側左右各一雙豆狀球體
                const kidRoot = deployOrgan('kidneys', new THREE.SphereGeometry(0.14, 16, 16), 0x2288ff, new THREE.Vector3(0.22, -0.16, -0.32), new THREE.Vector3(0.8, 1.2, 0.8));
                const kidLeft = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), kidRoot.material);
                kidLeft.position.set(-0.55, 0, 0);
                kidLeft.scale.set(1, 1, 1);
                kidRoot.add(kidLeft);

                // 小腸🟡 (發黃橘光) - 中腹部多褶皺環狀體
                const siGroup = new THREE.Group();
                const siTorusGeo = new THREE.TorusGeometry(0.14, 0.05, 12, 24);
                const siMat = new THREE.MeshStandardMaterial({ color: 0xffbb00, emissive: 0xffbb00, emissiveIntensity: 0.15, roughness: 0.3 });
                for(let i = 0; i < 4; i++) {
                    const r = new THREE.Mesh(siTorusGeo, siMat);
                    r.position.set((Math.random() - 0.5) * 0.18, (Math.random() - 0.5) * 0.16, (Math.random() - 0.5) * 0.08);
                    r.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                    siGroup.add(r);
                }
                siGroup.position.set(0, -0.32, 0.16);
                siGroup.userData = { id: 'smallIntestine', baseColor: 0xffbb00, baseEmissive: 0xffbb00 };
                const siLight = new THREE.PointLight(0xffbb00, 0, 1.4);
                siGroup.add(siLight);
                siGroup.userData.light = siLight;
                body.add(siGroup);
                organs['smallIntestine'] = siGroup;

                // 大腸🟤 (發深褐/綠光) - 粗管外圍環繞拼接
                const liGeo = new THREE.TorusGeometry(0.36, 0.075, 14, 28, Math.PI * 1.48);
                liGeo.rotateZ(Math.PI * 0.26); // 環繞外框
                deployOrgan('largeIntestine', liGeo, 0x6b8e23, new THREE.Vector3(0, -0.3, 0.12));
            }

            // Raycaster 滑鼠點擊人體發光器官事件檢測
            function handleClickDetect(event) {
                if (event.clientX < 380) return; // 避開左側 UI 面板區

                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const targets = [];
                Object.values(organs).forEach(obj => {
                    if (obj.type === 'Group') {
                        obj.children.forEach(c => { if (c.type === 'Mesh') { c.userData.proxyId = obj.userData.id; targets.push(c); } });
                    } else {
                        targets.push(obj);
                    }
                });

                const hits = raycaster.intersectObjects(targets);
                if (hits.length > 0) {
                    const targetMesh = hits[0].object;
                    const finalId = targetMesh.userData.proxyId || targetMesh.userData.id;
                    userSelectOrgan(finalId);
                }
            }

            function handleWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function pulseHeart() { heartPulse = 1.35; }

            // 核心動態渲染迴圈 (處理生理連動形變與光影)
            function loop() {
                requestAnimationFrame(loop);
                
                const dt = clock.getDelta();
                if (AppState.isPlaying) AppState.time += dt;
                const time = AppState.time;

                // --- 生理狀態聯動反射 (臉部表情/四肢Jitter) ---
                faceParts.eyeL.scale.set(1, 1, 1);
                faceParts.eyeR.scale.set(1, 1, 1);
                faceParts.mouth.scale.set(1, 1, 1);
                faceParts.browL.rotation.z = 0;
                faceParts.browR.rotation.z = 0;
                faceParts.armL.rotation.z = Math.PI / 5;
                faceParts.armR.rotation.z = -Math.PI / 5;
                girlGroup.position.set(1.5, -0.55, 0); // 重置發抖位移

                if (AppState.isPlaying) {
                    if (AppState.physiologicalState === 'caffeine') {
                        // ☕ 咖啡因：眼睜大、驚恐O型嘴、全身微幅劇烈抽搐顫抖、手臂驚恐舉起
                        faceParts.eyeL.scale.set(1.22, 1.22, 1);
                        faceParts.eyeR.scale.set(1.22, 1.22, 1);
                        faceParts.mouth.scale.set(1.4, 1.5, 1);
                        faceParts.browL.rotation.z = Math.PI / 7;
                        faceParts.browR.rotation.z = -Math.PI / 7;
                        faceParts.armL.rotation.z = -Math.PI / 3;
                        faceParts.armR.rotation.z = Math.PI / 3;
                        girlGroup.position.x += (Math.random() * 0.04 - 0.02);
                        girlGroup.position.y += (Math.random() * 0.04 - 0.02);
                    } 
                    else if (AppState.physiologicalState === 'fiber') {
                        // 🥦 高纖維：女孩呈現滿足之彎月笑眼 (Y軸劇烈扁平化)
                        faceParts.eyeL.scale.set(1.1, 0.12, 1);
                        faceParts.eyeR.scale.set(1.1, 0.12, 1);
                        faceParts.mouth.scale.set(1.8, 0.6, 1);
                    }
                    else if (AppState.physiologicalState === 'sugar') {
                        // 🥤 精緻糖：皺眉表情、痛苦痛苦、小幅間歇性痛苦抽動
                        faceParts.browL.rotation.z = -Math.PI / 6;
                        faceParts.browR.rotation.z = Math.PI / 6;
                        faceParts.mouth.scale.set(0.6, 0.25, 1);
                        if (Math.random() > 0.94) girlGroup.position.x += 0.04;
                    }
                }

                // --- 視覺與聽覺解耦控制項目 (特定聽診器官亮起縮放，其餘暗淡) ---
                Object.keys(organs).forEach(id => {
                    const organ = organs[id];
                    const isFocus = (AppState.activeOrgan === id);
                    const isActive = isFocus && AppState.isPlaying;

                    let targetIntensity = isFocus ? 1.6 : 0.02;
                    let targetEmissiveHex = organ.userData.baseEmissive;

                    // 對照實驗特殊光色突顯
                    if (AppState.physiologicalState === 'sugar' && id === 'stomach') {
                        targetEmissiveHex = 0xff0000; // 精緻糖使胃部發出警告紅光
                        if (isFocus) targetIntensity = 2.0;
                    }
                    if (AppState.physiologicalState === 'fiber' && (id === 'smallIntestine' || id === 'largeIntestine')) {
                        if (isFocus) targetIntensity = 2.6; // 高纖維狀態下腸道散射強烈健康螢光
                    }

                    // 漸變過渡自發光及點光源
                    if (organ.type === 'Mesh') {
                        organ.material.emissiveIntensity += (targetIntensity - organ.material.emissiveIntensity) * 0.12;
                        organ.material.emissive.setHex(targetEmissiveHex);
                    } else if (organ.type === 'Group') {
                        organ.children.forEach(c => {
                            if (c.type === 'Mesh') {
                                c.material.emissiveIntensity += (targetIntensity - c.material.emissiveIntensity) * 0.12;
                                c.material.emissive.setHex(targetEmissiveHex);
                            }
                        });
                    }
                    if (organ.userData.light) {
                        organ.userData.light.intensity += (targetIntensity - organ.userData.light.intensity) * 0.12;
                        organ.userData.light.color.setHex(targetEmissiveHex);
                    }

                    // 器官專屬聲學形變聯動
                    let scale = 1.0;
                    if (isActive) {
                        if (id === 'heart') {
                            scale = heartPulse;
                            heartPulse += (1.0 - heartPulse) * 0.12; // 跳動回彈
                        } 
                        else if (id === 'stomach') {
                            scale = 1.0 + Math.sin(time * 3 * Math.PI * 2) * 0.08;
                            if (AppState.physiologicalState === 'sugar') scale = 1.0 + (Math.random() > 0.5 ? 0.04 : 0);
                        } 
                        else if (id === 'smallIntestine') {
                            scale = 1.0 + (Math.sin(time * 6) * Math.cos(time * 3.1)) * 0.08;
                        } 
                        else if (id === 'largeIntestine') {
                            scale = 1.0 + Math.sin(time * 0.5 * Math.PI * 2) * 0.06;
                        }
                        else if (id === 'spleen' || id === 'kidneys') {
                            scale = 1.0 + Math.sin(time * 8) * 0.02; // 背景穩定微顫
                        }
                    } else {
                        scale = 1.0;
                    }
                    organ.scale.setScalar(scale);
                });

                // 連動餵給音訊與監視畫布
                AudioEngine.frameDSPModulation(time);
                Monitor.draw(time);
                renderer.render(scene, camera);
            }

            return { init: setup3D, render: loop, pulseHeart };
        })();

        // ================= UI 邏輯控制與事件驅動監聽 =================
        function renderUIState() {
            // 更新主監聽按鈕外觀
            document.getElementById('btn-play').className = AppState.isPlaying ? 'is-playing' : '';
            
            // 更新聽診按鈕狀態
            document.querySelectorAll('.organ-btn').forEach(btn => {
                btn.classList.toggle('active-organ', btn.dataset.target === AppState.activeOrgan);
            });

            // 更新教案一狀態按鈕
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.classList.toggle('active-state', btn.dataset.state === AppState.physiologicalState);
            });

            // 底部多國語意文字綜合重組
            const stateLabels = { 'normal': '👤 一般狀態', 'caffeine': '☕ 咖啡因反應', 'fiber': '🥦 高纖維充載', 'sugar': '🥤 精緻糖負荷' };
            const organLabels = { 'heart':'心臟 🫀', 'stomach':'胃部 🟢', 'smallIntestine':'小腸 🟡', 'largeIntestine':'大腸 🟤', 'spleen':'脾臟 🟣', 'kidneys':'腎臟 🔵'};
            
            let statusStr = AppState.isPlaying ? '🔴 正在監聽生理訊號' : '⏹ 系統完全靜默中';
            if (AppState.activeOrgan) statusStr += ` | 焦點器官：${organLabels[AppState.activeOrgan]}`;
            statusStr += ` | 教案實驗：${stateLabels[AppState.physiologicalState]}`;
            document.getElementById('status-text').innerText = statusStr;
        }

        function userSelectOrgan(id) {
            if (AppState.isTracking) return; // 消化路徑導覽期間鎖定按鈕
            AppState.activeOrgan = id;
            renderUIState();
        }

        function bindDashboardEvents() {
            // 開始監聽
            document.getElementById('btn-play').addEventListener('click', () => {
                AudioEngine.init();
                AudioEngine.turnOn();
                AppState.isPlaying = true;
                if (!AppState.activeOrgan) AppState.activeOrgan = 'heart';
                renderUIState();
            });

            // 停止監聽 (完全靜默)
            document.getElementById('btn-stop').addEventListener('click', () => {
                AudioEngine.turnOff();
                AppState.isPlaying = false;
                renderUIState();
            });

            // 器官選擇鈕
            document.querySelectorAll('.organ-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    userSelectOrgan(e.target.dataset.target);
                });
            });

            // 對照實驗切換
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (AppState.isTracking) return;
                    AppState.physiologicalState = e.target.dataset.state;
                    renderUIState();
                });
            });

            // 教案二：🔄 消化路徑追蹤 (自動序列過渡)
            document.getElementById('btn-path').addEventListener('click', async () => {
                if (AppState.isTracking) return;
                
                // 確保啟動音訊脈衝
                if (!AppState.isPlaying) {
                    document.getElementById('btn-play').click();
                }

                AppState.isTracking = true;
                AppState.physiologicalState = 'normal'; // 路徑導覽重置為健康一般狀態
                document.getElementById('ui-blocker').style.display = 'flex';
                
                const delay = ms => new Promise(resolve => setTimeout(res => resolve(), ms));
                
                // 階段一：胃部停留 3 秒
                AppState.activeOrgan = 'stomach'; renderUIState();
                await delay(3000);
                
                // 階段二：小腸停留 3 秒
                AppState.activeOrgan = 'smallIntestine'; renderUIState();
                await delay(3000);
                
                // 階段三：大腸停留 3 秒
                AppState.activeOrgan = 'largeIntestine'; renderUIState();
                await delay(3000);

                // 解除導覽鎖定
                AppState.isTracking = false;
                document.getElementById('ui-blocker').style.display = 'none';
                renderUIState();
            });
        }

        // ================= 核心啟動入口 =================
        window.addEventListener('DOMContentLoaded', () => {
            VisualEngine.init();
            bindDashboardEvents();
            renderUIState();
            VisualEngine.render();
        });
    </script>
</body>
</html>
