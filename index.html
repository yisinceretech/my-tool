<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人體小偵探 - 身體聲音合成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050814; /* 嚴格遵守宇宙深藍黑背景 */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
        }
        /* UI 介面可視性 (毛玻璃防呆設計) */
        #ui-panel {
            width: 38%;
            min-width: 340px;
            max-width: 420px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            box-shadow: 5px 0 20px rgba(0,0,0,0.6);
            overflow-y: auto;
        }
        #canvas-container {
            flex: 1;
            position: relative;
        }
        h1 {
            font-size: 26px;
            margin: 0 0 5px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 14px;
            color: #a8c0ff;
            margin-bottom: 15px;
        }
        .control-group {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #4facfe;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-size: 14px;
        }
        button:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }
        button.active {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            box-shadow: 0 0 10px rgba(255, 8, 68, 0.5);
        }
        button.state-btn.active {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }
        #status-display {
            font-size: 15px;
            color: #ffb199;
            font-weight: bold;
            text-align: center;
            min-height: 22px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        /* 2D 示波器 */
        #oscilloscope {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            border: 2px solid #4facfe;
            margin-top: 5px;
        }
        .main-controls {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div>
            <h1>🔍 人體小偵探</h1>
            <div class="subtitle">第一堂：食物的體內旅行與變身術</div>
        </div>
        
        <div id="status-display">系統待機中... 請點擊「開始監聽」</div>
        
        <div class="main-controls">
            <button onclick="startSystem()" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">▶️ 開始監聽</button>
            <button onclick="stopAudio()" style="background: linear-gradient(135deg, #ed213a 0%, #93291e 100%);">⏹️ 停止</button>
        </div>

        <div class="control-group">
            <h3>聽診器官 (可點擊 3D 模型切換)</h3>
            <button id="btn-heart" onclick="setOrgan('heart')">❤️ 心臟 (Lub-dub)</button>
            <button id="btn-stomach" onclick="setOrgan('stomach')">🤢 胃部 (低頻咕嚕聲)</button>
            <button id="btn-small_intestine" onclick="setOrgan('small_intestine')">🌊 小腸 (水流氣泡聲)</button>
            <button id="btn-large_intestine" onclick="setOrgan('large_intestine')">💩 大腸 (厚實蠕動摩擦聲)</button>
            <button id="btn-spleen_kidney" onclick="setOrgan('spleen_kidney')">🛡️ 脾腎 (微弱過濾背景音)</button>
        </div>

        <div class="control-group">
            <h3>對照實驗 (生理狀態連動)</h3>
            <button id="state-normal" class="state-btn active" onclick="setState('normal')">✅ 正常健康狀態</button>
            <button id="state-caffeine" class="state-btn" onclick="setState('caffeine')">☕ 咖啡因過量 (心跳/發抖)</button>
            <button id="state-fiber" class="state-btn" onclick="setState('fiber')">🥦 高纖維 (健康發光/開心)</button>
            <button id="state-sugar" class="state-btn" onclick="setState('sugar')">🥤 暈糖反應 (疲憊/紅光/抽搐)</button>
        </div>

        <div class="control-group">
            <h3>2D 生理監視器</h3>
            <canvas id="oscilloscope"></canvas>
        </div>
    </div>

    <div id="canvas-container"></div>

<script>
/**
 * 系統架構：
 * 1. Web Audio API (器官專屬 DSP 聲音合成)
 * 2. Three.js (3D Q版人物與星空防呆渲染)
 * 3. 生理狀態與視覺連動邏輯
 */

// ==========================================
// 1. Web Audio API 聲音引擎
// ==========================================
let audioCtx = null;
let masterGain = null;
let audioAnalyser = null;
let dataArray = null;

// 音訊節點追蹤 (方便停止)
let activeNodes = [];
let nextBeatTime = 0;
let beatTimer = null;

let currentOrgan = 'none'; 
let currentState = 'normal';
let isRunning = false;

// 生理參數 (根據狀態變動)
const params = {
    bpm: 60,
    stomachFreq: 200,
    stomachLfo: 3,
    siFreqCenter: 1000,
    siLfo: 8,
    liFreq: 100,
    liLfo: 0.5,
    soundIntensity: 1.0
};

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        
        audioAnalyser = audioCtx.createAnalyser();
        audioAnalyser.fftSize = 2048;
        masterGain.connect(audioAnalyser);
        
        const bufferLength = audioAnalyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);
        drawOscilloscope();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function stopAudio() {
    isRunning = false;
    clearTimeout(beatTimer);
    activeNodes.forEach(node => {
        try { node.stop(); } catch(e) {}
        try { node.disconnect(); } catch(e) {}
    });
    activeNodes = [];
    currentOrgan = 'none';
    document.getElementById('status-display').innerText = "系統已停止。";
    highlightBtn('btn-', '');
}

function startSystem() {
    initAudio();
    isRunning = true;
    if(currentOrgan === 'none') {
        setOrgan('heart');
    } else {
        playSound(currentOrgan);
    }
}

// 產生白噪音 Buffer
function createNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }
    return buffer;
}

// 失真曲線 (WaveShaper)
function makeDistortionCurve(amount) {
    const k = typeof amount === 'number' ? amount : 50,
        n_samples = 44100,
        curve = new Float32Array(n_samples),
        deg = Math.PI / 180;
    for (let i = 0; i < n_samples; ++i ) {
        const x = i * 2 / n_samples - 1;
        curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
    }
    return curve;
}

function applyStateParams() {
    // 重置基準
    params.bpm = 60;
    params.soundIntensity = 1.0;
    params.stomachLfo = 3;
    
    if (currentState === 'caffeine') {
        params.bpm = 135;
        params.soundIntensity = 1.5;
    } else if (currentState === 'fiber') {
        params.soundIntensity = 1.2;
    } else if (currentState === 'sugar') {
        params.bpm = 45;
        params.soundIntensity = 0.6;
        params.stomachLfo = 1; // 蠕動減緩
    }
}

function setState(state) {
    currentState = state;
    applyStateParams();
    highlightBtn('state-', state);
    const stateNames = { 'normal': '健康', 'caffeine': '咖啡因過量', 'fiber': '高纖維消化', 'sugar': '暈糖反應' };
    document.getElementById('status-display').innerText = `狀態切換：${stateNames[state]}`;
    if (isRunning && currentOrgan !== 'none') {
        playSound(currentOrgan); // 重啟音效套用新參數
    }
}

function setOrgan(organ) {
    if (!isRunning) initAudio();
    isRunning = true;
    currentOrgan = organ;
    applyStateParams();
    playSound(organ);
    highlightBtn('btn-', organ);
    const organNames = { 'heart': '心臟', 'stomach': '胃部', 'small_intestine': '小腸', 'large_intestine': '大腸', 'spleen_kidney': '脾腎' };
    document.getElementById('status-display').innerText = `聽診中：${organNames[organ]}`;
}

function highlightBtn(prefix, id) {
    document.querySelectorAll(`[id^="${prefix}"]`).forEach(b => b.classList.remove('active'));
    if(id && document.getElementById(prefix + id)) document.getElementById(prefix + id).classList.add('active');
}

// 核心 DSP 聲音合成邏輯
function playSound(organ) {
    // 清除舊音軌
    clearTimeout(beatTimer);
    activeNodes.forEach(node => { try{node.stop()}catch(e){} node.disconnect(); });
    activeNodes = [];
    masterGain.gain.value = params.soundIntensity * 0.8;

    if (organ === 'heart') {
        // 心臟：低頻正弦波 + 指數衰減
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 55;
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;
        osc.connect(gainNode);
        gainNode.connect(masterGain);
        osc.start();
        activeNodes.push(osc, gainNode);

        const beatInterval = 60 / params.bpm;
        nextBeatTime = audioCtx.currentTime + 0.1;

        function scheduleBeat() {
            if (currentOrgan !== 'heart' || !isRunning) return;
            // Lub (45Hz)
            osc.frequency.setValueAtTime(45, nextBeatTime);
            gainNode.gain.setValueAtTime(0, nextBeatTime);
            gainNode.gain.linearRampToValueAtTime(1, nextBeatTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, nextBeatTime + 0.15);
            // Dub (65Hz)
            osc.frequency.setValueAtTime(65, nextBeatTime + 0.25);
            gainNode.gain.setValueAtTime(0, nextBeatTime + 0.25);
            gainNode.gain.linearRampToValueAtTime(0.8, nextBeatTime + 0.3);
            gainNode.gain.exponentialRampToValueAtTime(0.01, nextBeatTime + 0.45);

            nextBeatTime += beatInterval;
            beatTimer = setTimeout(scheduleBeat, (beatInterval * 1000) - 200);
        }
        scheduleBeat();

    } else if (organ === 'stomach') {
        // 胃部：白噪音 + 低通濾波 (200Hz) + LFO 調變
        const noise = audioCtx.createBufferSource();
        noise.buffer = createNoiseBuffer();
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = params.stomachFreq;

        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;

        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = params.stomachLfo;
        const lfoGain = audioCtx.createGain();
        // 暈糖時聲音空洞不規律
        lfoGain.gain.value = currentState === 'sugar' ? 0.3 : 0.8; 

        lfo.connect(lfoGain);
        lfoGain.connect(gainNode.gain);

        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(masterGain);

        noise.start();
        lfo.start();
        activeNodes.push(noise, filter, gainNode, lfo, lfoGain);

    } else if (organ === 'small_intestine') {
        // 小腸：帶通濾波器 (800-1200Hz) + 較快 LFO 模擬水流
        const noise = audioCtx.createBufferSource();
        noise.buffer = createNoiseBuffer();
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = params.siFreqCenter;
        filter.Q.value = 1.5;

        const gainNode = audioCtx.createGain();
        
        const lfo = audioCtx.createOscillator();
        lfo.type = 'triangle';
        lfo.frequency.value = currentState === 'sugar' ? 2 : params.siLfo; 
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 0.7;

        lfo.connect(lfoGain);
        lfoGain.connect(gainNode.gain);

        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(masterGain);

        noise.start();
        lfo.start();
        activeNodes.push(noise, filter, gainNode, lfo, lfoGain);

    } else if (organ === 'large_intestine') {
        // 大腸：低通濾波 (100Hz) + WaveShaper 失真 + 極慢 LFO
        const noise = audioCtx.createBufferSource();
        noise.buffer = createNoiseBuffer();
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = params.liFreq;

        const distortion = audioCtx.createWaveShaper();
        distortion.curve = makeDistortionCurve(40);
        distortion.oversample = '4x';

        const gainNode = audioCtx.createGain();

        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = params.liLfo;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 0.9;

        lfo.connect(lfoGain);
        lfoGain.connect(gainNode.gain);

        noise.connect(distortion);
        distortion.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(masterGain);

        noise.start();
        lfo.start();
        activeNodes.push(noise, filter, distortion, gainNode, lfo, lfoGain);

    } else if (organ === 'spleen_kidney') {
        // 脾/腎：粉紅噪音近似(強低通白噪音) + 極低音量平穩包絡
        const noise = audioCtx.createBufferSource();
        noise.buffer = createNoiseBuffer();
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 80; // 沉悶的嗡嗡聲

        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.15; // 低音量

        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(masterGain);

        noise.start();
        activeNodes.push(noise, filter, gainNode);
    }
}

// 2D Canvas 示波器
const canvasCtx = document.getElementById('oscilloscope').getContext('2d');
function drawOscilloscope() {
    requestAnimationFrame(drawOscilloscope);
    if(!audioAnalyser) return;
    
    audioAnalyser.getByteTimeDomainData(dataArray);
    const canvas = document.getElementById('oscilloscope');
    const width = canvas.width;
    const height = canvas.height;

    canvasCtx.fillStyle = 'rgb(0, 0, 0)';
    canvasCtx.fillRect(0, 0, width, height);
    canvasCtx.lineWidth = 2;

    // 依據器官設定波形顏色
    const colorMap = {
        'heart': 'rgb(255, 50, 50)',
        'stomach': 'rgb(50, 255, 50)',
        'small_intestine': 'rgb(255, 200, 50)',
        'large_intestine': 'rgb(150, 100, 50)',
        'spleen_kidney': 'rgb(150, 50, 255)',
        'none': 'rgb(100, 100, 100)'
    };
    canvasCtx.strokeStyle = colorMap[currentOrgan] || colorMap['none'];
    canvasCtx.beginPath();

    const sliceWidth = width * 1.0 / dataArray.length;
    let x = 0;
    for(let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * height / 2;
        if(i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
    }
    canvasCtx.lineTo(width, height / 2);
    canvasCtx.stroke();
}


// ==========================================
// 2. Three.js 3D 渲染與防彈級穩定度
// ==========================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
// 【強制防呆背景】宇宙深藍黑
scene.background = new THREE.Color(0x050814); 

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 0, 10);

// 【防呆設定】alpha: false 杜絕 CSS 跑版白底
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false }); 
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// 【打光防呆機制】強烈環境光與平行光，確保材質不隱形
const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 5, 8);
scene.add(dirLight);

// 【3D 星空特效】
const starGeo = new THREE.BufferGeometry();
const starCount = 600;
const starPos = new Float32Array(starCount * 3);
for(let i = 0; i < starCount * 3; i++) {
    starPos[i] = (Math.random() - 0.5) * 25; 
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
const stars = new THREE.Points(starGeo, starMat);
stars.position.z = -5;
scene.add(stars);

// ==========================================
// 極致可愛 Q 版人物設計 (純 Sphere/Cylinder)
// ==========================================
const qGirl = new THREE.Group();
// 【核心防呆】捨棄 ViewOffset，直接推移 X 軸置中
qGirl.position.x = 1.5; 
scene.add(qGirl);

// 材質庫 (穩定 StandardMaterial)
const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.4 });
const hairMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
const shirtMat = new THREE.MeshStandardMaterial({ color: 0xff99cc, transparent: true, opacity: 0.45, roughness: 0.2 }); 
const shortsMat = new THREE.MeshStandardMaterial({ color: 0x66b2ff, roughness: 0.6 });

// 1. 頭部 (極大半徑 1.2)
const headGroup = new THREE.Group();
headGroup.position.y = 1.3;
qGirl.add(headGroup);

const head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), skinMat);
headGroup.add(head);

const hair = new THREE.Mesh(new THREE.SphereGeometry(1.25, 32, 32, 0, Math.PI*2, 0, Math.PI/1.8), hairMat);
headGroup.add(hair);

// 五官 (低重心法則)
const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.45, -0.2, 1.12);
const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.45, -0.2, 1.12);
headGroup.add(leftEye, rightEye);

// 嘴巴 (極小)
const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshBasicMaterial({ color: 0xdd3333 }));
mouth.position.set(0, -0.5, 1.18);
headGroup.add(mouth);

// 腮紅 (粉色壓扁圓柱體)
const blushGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 16);
const blushMat = new THREE.MeshBasicMaterial({ color: 0xff6699, transparent: true, opacity: 0.6 });
const leftBlush = new THREE.Mesh(blushGeo, blushMat);
leftBlush.rotation.x = Math.PI / 2;
leftBlush.position.set(-0.55, -0.35, 1.15);
const rightBlush = new THREE.Mesh(blushGeo, blushMat);
rightBlush.rotation.x = Math.PI / 2;
rightBlush.position.set(0.55, -0.35, 1.15);
headGroup.add(leftBlush, rightBlush);

// 2. 身體 (極短圓柱)
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 1.2, 32), shirtMat);
body.position.y = -0.3;
qGirl.add(body);

const shorts = new THREE.Mesh(new THREE.CylinderGeometry(0.82, 0.82, 0.4, 32), shortsMat);
shorts.position.y = -1.0;
qGirl.add(shorts);

// 3. 四肢 (【絕不使用】CapsuleGeometry，全用 Cylinder)
const armGeo = new THREE.CylinderGeometry(0.22, 0.22, 1.0, 16);
const leftArm = new THREE.Mesh(armGeo, skinMat);
leftArm.position.set(-1.1, -0.3, 0);
leftArm.rotation.z = Math.PI / 8;
const rightArm = new THREE.Mesh(armGeo, skinMat);
rightArm.position.set(1.1, -0.3, 0);
rightArm.rotation.z = -Math.PI / 8;

const legGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.2, 16);
const leftLeg = new THREE.Mesh(legGeo, skinMat);
leftLeg.position.set(-0.4, -1.7, 0);
const rightLeg = new THREE.Mesh(legGeo, skinMat);
rightLeg.position.set(0.4, -1.7, 0);
qGirl.add(leftArm, rightArm, leftLeg, rightLeg);

// ==========================================
// 內部器官擴充 (具備發光屬性)
// ==========================================
const organs = new THREE.Group();
organs.position.y = -0.3; // 對齊身體
qGirl.add(organs);

// 心臟
const meshHeart = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x880000 })
);
meshHeart.position.set(0.2, 0.3, 0.3); 
meshHeart.userData = { name: 'heart' };
organs.add(meshHeart);

// 胃部
const meshStomach = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x008800 })
);
meshStomach.position.set(-0.15, 0.05, 0.4); 
meshStomach.userData = { name: 'stomach' };
organs.add(meshStomach);

// 小腸 (多個球體組合模擬彎曲)
const meshSI = new THREE.Group();
meshSI.userData = { name: 'small_intestine' };
const siMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x885500 });
for(let i=0; i<5; i++){
    let seg = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), siMat);
    seg.position.set((Math.random()-0.5)*0.5, -0.25 + (Math.random()-0.5)*0.2, 0.4 + Math.random()*0.1);
    meshSI.add(seg);
}
organs.add(meshSI);

// 大腸 (粗管外圍)
const meshLI = new THREE.Mesh(
    new THREE.TorusGeometry(0.4, 0.12, 16, 32, Math.PI * 1.5),
    new THREE.MeshStandardMaterial({ color: 0x654321, emissive: 0x332211 })
);
meshLI.rotation.z = Math.PI / 4;
meshLI.position.set(0, -0.2, 0.3);
meshLI.userData = { name: 'large_intestine' };
organs.add(meshLI);

// 脾/腎 (後方小球)
const meshSK = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0x8a2be2, emissive: 0x441188 })
);
meshSK.position.set(-0.35, 0.1, -0.2);
meshSK.userData = { name: 'spleen_kidney' };
organs.add(meshSK);

const allOrgans = [meshHeart, meshStomach, meshSI, meshLI, meshSK];

// ==========================================
// 互動射線檢測 (Raycaster)
// ==========================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

container.addEventListener('click', (event) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    // 遞迴檢測群組內的子物件
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(organs.children, true);

    if (intersects.length > 0) {
        // 如果點到的是小腸的子節點，需找回父群組的 userData
        let obj = intersects[0].object;
        let organName = obj.userData.name;
        if (!organName && obj.parent && obj.parent.userData.name) {
            organName = obj.parent.userData.name;
        }
        if(organName) setOrgan(organName);
    }
});

// ==========================================
// 核心動畫與生理連動邏輯
// ==========================================
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const elapsedTime = clock.getElapsedTime();

    // 星空緩慢旋轉
    stars.rotation.y = elapsedTime * 0.02;

    // --- 視覺與聽覺解耦：發光器官未選中時變暗 ---
    allOrgans.forEach(org => {
        const isSelected = (org.userData.name === currentOrgan);
        
        // 處理 Group (小腸) 與 Mesh 的材質
        if (org.isGroup) {
            org.children.forEach(c => {
                c.material.emissiveIntensity = (isSelected && isRunning) ? 2.0 : 0.3;
            });
        } else {
            org.material.emissiveIntensity = (isSelected && isRunning) ? 2.0 : 0.3;
        }
        // 重置縮放
        org.scale.set(1, 1, 1);
    });

    // --- 器官跳動連動 ---
    if (isRunning) {
        if (currentOrgan === 'heart') {
            const beatFreq = params.bpm / 60;
            const s = 1 + 0.15 * Math.abs(Math.sin(elapsedTime * Math.PI * beatFreq * 2));
            meshHeart.scale.set(s, s, s);
        } else if (currentOrgan === 'stomach') {
            const s = 1 + 0.1 * Math.sin(elapsedTime * params.stomachLfo * Math.PI);
            meshStomach.scale.set(s, s, s);
        } else if (currentOrgan === 'small_intestine') {
            const s = 1 + 0.12 * Math.sin(elapsedTime * params.siLfo * Math.PI);
            meshSI.scale.set(s, s, s);
        } else if (currentOrgan === 'large_intestine') {
            const s = 1 + 0.08 * Math.sin(elapsedTime * params.liLfo * Math.PI);
            meshLI.scale.set(s, s, s);
        }
    }

    // --- 對照實驗狀態連動 (生理反射) ---
    // 預設恢復
    qGirl.position.y = 0;
    headGroup.rotation.z = 0;
    leftEye.scale.set(1, 1, 1);
    rightEye.scale.set(1, 1, 1);
    mouth.scale.set(1, 1, 1);
    leftArm.rotation.z = Math.PI / 8;
    rightArm.rotation.z = -Math.PI / 8;
    meshStomach.material.emissive.setHex(0x008800); // 胃預設綠
    
    // 正常呼吸
    body.scale.y = 1 + 0.015 * Math.sin(elapsedTime * 2);

    if (currentState === 'caffeine') {
        // 心跳極快，女孩表情驚恐(O型嘴/挑眉)，全身微發抖
        qGirl.position.y = Math.sin(elapsedTime * 40) * 0.03; // 發抖
        leftEye.scale.set(1.4, 1.4, 1.4);
        rightEye.scale.set(1.4, 1.4, 1.4);
        mouth.scale.set(1.5, 2.5, 1.5); // O型嘴
        leftArm.rotation.z = Math.PI / 2.5; // 舉手
        rightArm.rotation.z = -Math.PI / 2.5;
        
    } else if (currentState === 'fiber') {
        // 高纖維：小腸與大腸發出明亮光芒，彎月笑眼
        leftEye.scale.set(1, 0.1, 1); // 笑眼
        rightEye.scale.set(1, 0.1, 1);
        mouth.scale.set(2, 0.5, 1); // 微笑
        if (currentOrgan === 'small_intestine') {
            meshSI.children.forEach(c => c.material.emissiveIntensity = 3.0);
        }
        if (currentOrgan === 'large_intestine') {
            meshLI.material.emissiveIntensity = 3.0;
        }

    } else if (currentState === 'sugar') {
        // 精緻糖：胃部紅光，心跳遲緩，皺眉痛苦，抽搐
        meshStomach.material.emissive.setHex(0xcc0000); // 警告紅光
        if(currentOrgan === 'stomach' && isRunning) meshStomach.material.emissiveIntensity = 3.0;
        
        headGroup.rotation.z = 0.2; // 歪頭疲憊
        leftEye.scale.set(1, 0.3, 1); // 死魚眼
        rightEye.scale.set(1, 0.3, 1);
        leftArm.rotation.z = 0.05; // 無力下垂
        rightArm.rotation.z = -0.05;
        
        // 間歇性抽搐
        if (elapsedTime % 3 < 0.2) {
            qGirl.position.x = 1.5 + Math.sin(elapsedTime * 50) * 0.05;
        } else {
            qGirl.position.x = 1.5;
        }
    } else {
        qGirl.position.x = 1.5;
    }

    renderer.render(scene, camera);
}

// 響應式視窗縮放
window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

// 啟動渲染迴圈
animate();
</script>
</body>
</html>
