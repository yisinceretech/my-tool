<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Body Detective v3.1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #050510, #101025, #000000);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #ui-panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 380px;
            height: 100%;
            background: rgba(20, 20, 40, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0;
            font-size: 22px;
            color: #4dc9ff;
            text-align: center;
            text-shadow: 0 0 10px rgba(77, 201, 255, 0.5);
            letter-spacing: 1px;
        }
        .section {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            background: rgba(77, 201, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(77, 201, 255, 0.3);
            font-weight: bold;
            font-size: 13px;
        }
        button:hover {
            background: rgba(77, 201, 255, 0.3);
            box-shadow: 0 0 10px rgba(77, 201, 255, 0.5);
        }
        button.active {
            background: #4dc9ff;
            color: #000;
            box-shadow: 0 0 15px #4dc9ff;
        }
        .organ-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        #canvas-container {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .play-btn {
            font-size: 18px;
            padding: 15px;
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
            color: #2ecc71;
            margin-bottom: 0;
        }
        .play-btn:hover {
            background: rgba(46, 204, 113, 0.4);
            box-shadow: 0 0 15px #2ecc71;
        }
        .play-btn.playing {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
            box-shadow: 0 0 20px #e74c3c;
        }
        .lesson-btn {
            background: rgba(255, 152, 0, 0.1);
            border-color: #ff9800;
            color: #ff9800;
        }
        .lesson-btn:hover {
            background: rgba(255, 152, 0, 0.4);
            box-shadow: 0 0 15px #ff9800;
        }
        .lesson-btn.active {
            background: #ff9800;
            color: #000;
            box-shadow: 0 0 20px #ff9800;
        }
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui-panel">
    <h1>Little Body Detective</h1>
    
    <button id="btn-play" class="play-btn" onclick="togglePlay()">▶️ 開始監聽</button>
    
    <div id="canvas-container">
        <canvas id="waveCanvas" width="340" height="120"></canvas>
    </div>

    <div class="section">
        <div class="section-title">聽診器官選擇器</div>
        <div class="organ-grid">
            <button id="org-heart" onclick="selectOrgan('heart')" class="active">🫀 心臟</button>
            <button id="org-stomach" onclick="selectOrgan('stomach')">🟢 胃部</button>
            <button id="org-smallIntestine" onclick="selectOrgan('smallIntestine')">🟡 小腸</button>
            <button id="org-largeIntestine" onclick="selectOrgan('largeIntestine')">🟤 大腸</button>
            <button id="org-spleen" onclick="selectOrgan('spleen')">🟣 脾臟</button>
            <button id="org-kidneys" onclick="selectOrgan('kidneys')">🔵 腎臟</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">【教案一：對照實驗】</div>
        <button id="exp-normal" onclick="setExp('normal')" class="active">一般狀態 (基礎對照)</button>
        <button id="exp-caffeine" onclick="setExp('caffeine')">☕ 咖啡因刺激 (對比一般)</button>
        <button id="exp-fiber" onclick="setExp('fiber')">🥦 高纖維消化 (對比精緻糖)</button>
        <button id="exp-sugar" onclick="setExp('sugar')">🥤 精緻糖消化 (對比高纖維)</button>
    </div>

    <div class="section">
        <div class="section-title">【教案二：營養去哪了】</div>
        <button id="btn-track" class="lesson-btn" onclick="startTracking()">🔄 消化路徑追蹤 (胃➔小腸➔大腸)</button>
    </div>
</div>

<div id="webgl-container"></div>

<script>
/* =======================================================================
   1. 應用程式全域狀態
======================================================================== */
let isPlaying = false;
let currentOrgan = 'heart';
let currentExpState = 'normal';
let trackInterval = null;

/* =======================================================================
   2. Web Audio API 聲音引擎 (嚴格 DSP 實作)
======================================================================== */
let audioCtx, masterGain;
const nodes = {};

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 主音量控制 (確保備課時能靜默)
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0; 
    masterGain.connect(audioCtx.destination);

    const sampleRate = audioCtx.sampleRate;

    // 產生白噪音 Buffer
    const noiseBuffer = audioCtx.createBuffer(1, sampleRate * 5, sampleRate);
    const noiseData = noiseBuffer.getChannelData(0);
    for (let i = 0; i < noiseData.length; i++) {
        noiseData[i] = Math.random() * 2 - 1;
    }

    // --- 心臟 (Lub-dub 正弦波 + 指數衰減包絡線) ---
    const hbBuffer = audioCtx.createBuffer(1, sampleRate * 1, sampleRate);
    const hbData = hbBuffer.getChannelData(0);
    for(let i=0; i < hbData.length; i++) {
        let t = i / sampleRate;
        let lub = t < 0.25 ? Math.sin(2 * Math.PI * 45 * t) * Math.exp(-t * 25) : 0;
        let t_dub = t - 0.25;
        let dub = (t_dub >= 0 && t_dub < 0.25) ? Math.sin(2 * Math.PI * 65 * t_dub) * Math.exp(-t_dub * 30) : 0;
        hbData[i] = (lub + dub) * 0.8;
    }
    nodes.heart = audioCtx.createBufferSource();
    nodes.heart.buffer = hbBuffer;
    nodes.heart.loop = true;
    nodes.heartGain = audioCtx.createGain();
    nodes.heartGain.gain.value = 0;
    nodes.heart.connect(nodes.heartGain).connect(masterGain);
    nodes.heart.start();

    // --- 胃部 (咕嚕聲：白噪音 -> 低通 200Hz -> 3Hz LFO 振幅調變) ---
    nodes.stomach = audioCtx.createBufferSource();
    nodes.stomach.buffer = noiseBuffer;
    nodes.stomach.loop = true;
    nodes.stomachFilter = audioCtx.createBiquadFilter();
    nodes.stomachFilter.type = 'lowpass';
    nodes.stomachFilter.frequency.value = 200;
    nodes.stomachGain = audioCtx.createGain();
    nodes.stomachGain.gain.value = 0;
    nodes.stomachLfo = audioCtx.createOscillator();
    nodes.stomachLfo.frequency.value = 3;
    nodes.stomachLfoGain = audioCtx.createGain();
    nodes.stomachLfo.connect(nodes.stomachLfoGain.gain);
    nodes.stomach.connect(nodes.stomachFilter).connect(nodes.stomachGain).connect(masterGain);
    nodes.stomachLfo.start();
    nodes.stomach.start();

    // --- 小腸 (水流氣泡：白噪音 -> 帶通 1000Hz -> 較快不規則 8Hz LFO) ---
    nodes.si = audioCtx.createBufferSource();
    nodes.si.buffer = noiseBuffer;
    nodes.si.loop = true;
    nodes.siFilter = audioCtx.createBiquadFilter();
    nodes.siFilter.type = 'bandpass';
    nodes.siFilter.frequency.value = 1000;
    nodes.siFilter.Q.value = 1.5;
    nodes.siGain = audioCtx.createGain();
    nodes.siGain.gain.value = 0;
    nodes.siLfo = audioCtx.createOscillator();
    nodes.siLfo.frequency.value = 8;
    nodes.siLfo.connect(nodes.siGain.gain);
    nodes.si.connect(nodes.siFilter).connect(nodes.siGain).connect(masterGain);
    nodes.siLfo.start();
    nodes.si.start();

    // --- 大腸 (厚實蠕動摩擦：白噪音 -> 低通 100Hz -> 極慢 0.5Hz LFO + WaveShaper 失真) ---
    nodes.li = audioCtx.createBufferSource();
    nodes.li.buffer = noiseBuffer;
    nodes.li.loop = true;
    nodes.liFilter = audioCtx.createBiquadFilter();
    nodes.liFilter.type = 'lowpass';
    nodes.liFilter.frequency.value = 100;
    
    // WaveShaper 曲線模擬輕微 Overdrive 失真
    const curve = new Float32Array(4096);
    for (let i = 0; i < 4096; i++) {
        let x = (i * 2) / 4096 - 1;
        curve[i] = (Math.PI + 5) * x / (Math.PI + 5 * Math.abs(x));
    }
    nodes.liDist = audioCtx.createWaveShaper();
    nodes.liDist.curve = curve;
    nodes.liDist.oversample = '4x';
    
    nodes.liGain = audioCtx.createGain();
    nodes.liGain.gain.value = 0;
    nodes.liLfo = audioCtx.createOscillator();
    nodes.liLfo.frequency.value = 0.5;
    nodes.liLfo.connect(nodes.liGain.gain);
    nodes.li.connect(nodes.liFilter).connect(nodes.liDist).connect(nodes.liGain).connect(masterGain);
    nodes.liLfo.start();
    nodes.li.start();

    // --- 脾/腎 (過濾背景音：粉紅噪音近似，低通 400Hz，平穩包絡線) ---
    nodes.spleen = audioCtx.createBufferSource();
    nodes.spleen.buffer = noiseBuffer;
    nodes.spleen.loop = true;
    nodes.spleenFilter = audioCtx.createBiquadFilter();
    nodes.spleenFilter.type = 'lowpass';
    nodes.spleenFilter.frequency.value = 400; 
    nodes.spleenGain = audioCtx.createGain();
    nodes.spleenGain.gain.value = 0;
    nodes.spleen.connect(nodes.spleenFilter).connect(nodes.spleenGain).connect(masterGain);
    nodes.spleen.start();
}

function updateAudio() {
    if(!audioCtx) return;

    // 先將所有器官聲音淡出歸零
    const time = audioCtx.currentTime;
    nodes.heartGain.gain.setTargetAtTime(0, time, 0.1);
    nodes.stomachGain.gain.setTargetAtTime(0, time, 0.1);
    nodes.siGain.gain.setTargetAtTime(0, time, 0.1);
    nodes.liGain.gain.setTargetAtTime(0, time, 0.1);
    nodes.spleenGain.gain.setTargetAtTime(0, time, 0.1);

    // 如果停止監聽，主音量設為 0
    if(!isPlaying) {
        masterGain.gain.setTargetAtTime(0, time, 0.1);
        return;
    }
    
    masterGain.gain.setTargetAtTime(1, time, 0.1);

    // 重置基礎狀態參數
    nodes.heart.playbackRate.value = 1.0;
    nodes.stomachFilter.frequency.value = 200;
    nodes.stomachLfo.frequency.value = 3;
    nodes.siLfo.frequency.value = 8;
    nodes.liLfo.frequency.value = 0.5;
    nodes.liFilter.frequency.value = 100;

    // 根據教案狀態連動音效參數
    if (currentExpState === 'caffeine') {
        nodes.heart.playbackRate.value = 2.0; // 心跳極快
    } else if (currentExpState === 'fiber') {
        nodes.stomachFilter.frequency.value = 350; // 聲音飽滿厚實
        nodes.liLfo.frequency.value = 1.2; 
    } else if (currentExpState === 'sugar') {
        nodes.stomachFilter.frequency.value = 100; // 斷續空洞
        nodes.siLfo.frequency.value = 2; // 腸道無力
        nodes.liFilter.frequency.value = 50; 
    }
    
    // 開啟當前選中器官的音量
    if (currentOrgan === 'heart') nodes.heartGain.gain.setTargetAtTime(1, time, 0.1);
    else if (currentOrgan === 'stomach') nodes.stomachGain.gain.setTargetAtTime(1, time, 0.1);
    else if (currentOrgan === 'smallIntestine') nodes.siGain.gain.setTargetAtTime(1, time, 0.1);
    else if (currentOrgan === 'largeIntestine') nodes.liGain.gain.setTargetAtTime(1, time, 0.1);
    else if (currentOrgan === 'spleen' || currentOrgan === 'kidneys') nodes.spleenGain.gain.setTargetAtTime(0.3, time, 0.1);
}

/* =======================================================================
   3. UI 邏輯控制
======================================================================== */
function togglePlay() {
    const btn = document.getElementById('btn-play');
    if(!isPlaying) {
        initAudio();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        isPlaying = true;
        btn.innerHTML = '⏹ 停止監聽';
        btn.classList.add('playing');
    } else {
        isPlaying = false;
        btn.innerHTML = '▶️ 開始監聽';
        btn.classList.remove('playing');
        
        // 停止時的靜默防護
        if(masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height); // 清空波形
        
        if (trackInterval) {
            clearInterval(trackInterval);
            trackInterval = null;
            document.getElementById('btn-track').classList.remove('active');
        }
    }
    updateAudio();
}

function selectOrgan(organ, fromTracker = false) {
    if (!fromTracker && trackInterval) {
        clearInterval(trackInterval);
        trackInterval = null;
        document.getElementById('btn-track').classList.remove('active');
    }
    
    currentOrgan = organ;
    const orgBtns = ['heart', 'stomach', 'smallIntestine', 'largeIntestine', 'spleen', 'kidneys'];
    orgBtns.forEach(o => document.getElementById('org-' + o).classList.remove('active'));
    document.getElementById('org-' + organ).classList.add('active');
    
    updateAudio();
}

function setExp(exp) {
    currentExpState = exp;
    const expBtns = ['normal', 'caffeine', 'fiber', 'sugar'];
    expBtns.forEach(e => document.getElementById('exp-' + e).classList.remove('active'));
    document.getElementById('exp-' + exp).classList.add('active');
    updateAudio();
}

function startTracking() {
    if(trackInterval) {
        clearInterval(trackInterval);
        trackInterval = null;
        document.getElementById('btn-track').classList.remove('active');
        return;
    }
    
    if(!isPlaying) togglePlay();
    document.getElementById('btn-track').classList.add('active');
    
    const sequence = ['stomach', 'smallIntestine', 'largeIntestine'];
    let idx = 0;
    selectOrgan(sequence[idx], true);
    
    trackInterval = setInterval(() => {
        idx++;
        if(idx >= sequence.length) {
            clearInterval(trackInterval);
            trackInterval = null;
            document.getElementById('btn-track').classList.remove('active');
        } else {
            selectOrgan(sequence[idx], true);
        }
    }, 3000);
}

/* =======================================================================
   4. 2D 監視器畫布 (時間軸波形)
======================================================================== */
const canvas = document.getElementById('waveCanvas');
const ctx2d = canvas.getContext('2d');
const waveData = new Array(200).fill(0);

function updateWaveform(time) {
    if(!isPlaying) return;
    
    let y = 0;
    if(currentOrgan === 'heart') {
        let rate = currentExpState === 'caffeine' ? 2.0 : 1.0;
        let t = (time * rate) % 1;
        // 模擬 PQRST 波形
        if (t < 0.1) y = Math.sin(t * Math.PI * 10) * 0.4;
        else if (t > 0.15 && t < 0.2) y = -Math.sin((t-0.15) * Math.PI * 20) * 0.25;
        else if (t >= 0.2 && t < 0.25) y = Math.sin((t-0.2) * Math.PI * 20) * 1.5;
        else if (t >= 0.25 && t < 0.3) y = -Math.sin((t-0.25) * Math.PI * 20) * 0.4;
        else if (t > 0.4 && t < 0.6) y = Math.sin((t-0.4) * Math.PI * 5) * 0.3;
    } else if (currentOrgan === 'stomach') {
        let noise = Math.random() * 2 - 1;
        let env = Math.sin(time * 3 * Math.PI);
        if(currentExpState === 'sugar') env = Math.random() > 0.85 ? 1 : 0; // 空洞斷續
        else if(currentExpState === 'fiber') env = Math.sin(time * 3 * Math.PI) * 1.5; // 飽滿
        y = noise * env * 0.7;
    } else if (currentOrgan === 'smallIntestine') {
        let noise = Math.random() * 2 - 1;
        let freq = currentExpState === 'sugar' ? 2 : 8;
        y = noise * Math.sin(time * freq * Math.PI) * 0.5;
    } else if (currentOrgan === 'largeIntestine') {
        let noise = Math.random() * 2 - 1;
        let freq = currentExpState === 'fiber' ? 1.2 : 0.5;
        y = noise * Math.sin(time * freq * Math.PI) * 0.4;
    } else if (currentOrgan === 'spleen' || currentOrgan === 'kidneys') {
        y = (Math.random() * 2 - 1) * 0.15; // 穩定的微弱嗡嗡聲
    }

    waveData.push(y);
    waveData.shift();

    // 畫布背景
    ctx2d.fillStyle = currentOrgan === 'heart' ? '#ffffff' : '#0f172a';
    ctx2d.fillRect(0, 0, canvas.width, canvas.height);
    
    // 心跳專屬網格
    if(currentOrgan === 'heart') {
        ctx2d.strokeStyle = '#e2e8f0';
        ctx2d.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=20) { ctx2d.beginPath(); ctx2d.moveTo(i,0); ctx2d.lineTo(i,canvas.height); ctx2d.stroke(); }
        for(let i=0; i<canvas.height; i+=20) { ctx2d.beginPath(); ctx2d.moveTo(0,i); ctx2d.lineTo(canvas.width,i); ctx2d.stroke(); }
    }

    // 畫線
    ctx2d.beginPath();
    ctx2d.strokeStyle = currentOrgan === 'heart' ? '#e11d48' : 
                        currentOrgan === 'stomach' ? '#22c55e' :
                        currentOrgan === 'smallIntestine' ? '#f59e0b' :
                        currentOrgan === 'largeIntestine' ? '#b45309' :
                        currentOrgan === 'spleen' ? '#d946ef' : '#3b82f6';
    ctx2d.lineWidth = 2.5;
    
    for(let i=0; i<waveData.length; i++) {
        let px = (i / waveData.length) * canvas.width;
        let py = canvas.height/2 - waveData[i] * 35;
        if(i===0) ctx2d.moveTo(px, py);
        else ctx2d.lineTo(px, py);
    }
    ctx2d.stroke();
}

/* =======================================================================
   5. Three.js 3D 渲染與防彈級建模
======================================================================== */
const container = document.getElementById('webgl-container');
const scene = new THREE.Scene();

// 攝影機設定
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// 光源設定
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// 核心防呆修正：將模型實體放入 Group 並向右推移完美置中，不使用 ViewOffset
const girlGroup = new THREE.Group();
girlGroup.position.x = 1.5; 
scene.add(girlGroup);

// 材質庫 (嚴格不使用 transmission，透視衣服採用 depthWrite: false)
const matSkin = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.4 });
const matHair = new THREE.MeshStandardMaterial({ color: 0x6b4423, roughness: 0.8 });
const matHoodie = new THREE.MeshStandardMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.5, depthWrite: false }); // 淺藍色連帽衫
const matShorts = new THREE.MeshStandardMaterial({ color: 0xf5f5dc, roughness: 0.7 }); // 米色短褲
const matBlack = new THREE.MeshBasicMaterial({ color: 0x000000 });
const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });

// --- 嚴格 1:1.2 頭身比 Q版人物生成 (只使用 Sphere 與 Cylinder) ---
// 頭部 (極大)
const head = new THREE.Mesh(new THREE.SphereGeometry(1.1, 32, 32), matSkin);
head.position.y = 1.2;
girlGroup.add(head);

// 蓬鬆棕色短髮
const hair = new THREE.Mesh(new THREE.SphereGeometry(1.15, 32, 32, 0, Math.PI*2, 0, Math.PI/1.8), matHair);
hair.position.y = 1.22;
girlGroup.add(hair);
const hairBunL = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), matHair);
hairBunL.position.set(-1.0, 1.2, 0);
const hairBunR = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), matHair);
hairBunR.position.set(1.0, 1.2, 0);
girlGroup.add(hairBunL, hairBunR); // 增加短髮蓬鬆可愛感

// 五官 (低重心)
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), matBlack);
eyeL.position.set(-0.4, 0.9, 1.0);
const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), matBlack);
eyeR.position.set(0.4, 0.9, 1.0);
girlGroup.add(eyeL, eyeR);

const blushGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.05, 16);
const blushMat = new THREE.MeshBasicMaterial({ color: 0xff88aa, transparent: true, opacity: 0.6 });
const blushL = new THREE.Mesh(blushGeo, blushMat);
blushL.rotation.x = Math.PI/2;

// --- 內部器官系統 ---
const organs = {};
function createOrgan(name, geo, color, pos) {
    const mat = new THREE.MeshStandardMaterial({
        color: color, emissive: color, emissiveIntensity: 0.1, 
        transparent: true, opacity: 0.95
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData = { name: name, baseColor: color };
    girlGroup.add(mesh);
    organs[name] = mesh;
    return mesh;
}

// 根據需求建立各種器官形狀

// --- 互動射線檢測 ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('click', (e) => {
    if (e.clientX < 380) return; // 點擊 UI 不觸發 3D
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(Object.values(organs), false);
    if(intersects.length > 0) {
        selectOrgan(intersects[0].object.userData.name);
    }
});


/* =======================================================================
   6. 動態生理反射與渲染迴圈
======================================================================== */
const clock = new THREE.Clock();

function update3DModel(time) {
    // 重置所有器官發光與縮放
    for(let key in organs) {
        organs[key].material.emissiveIntensity = 0.1;
        organs[key].scale.set(1, 1, 1);
        if(key === 'stomach') organs[key].material.emissive.setHex(0x00ff00); // 預設綠光
    }
    
    // 重置臉部表情與姿勢
    mouth.scale.set(1, 1, 1);
    mouth.position.set(0, 0.6, 1.05);
    browL.rotation.z = Math.PI/2;
    browR.rotation.z = Math.PI/2;
    browL.position.y = 1.15;
    browR.position.y = 1.15;
    eyeL.scale.set(1, 1, 1);
    eyeR.scale.set(1, 1, 1);
    head.rotation.z = 0;
    girlGroup.position.x = 1.5;
    girlGroup.position.y = 0;
    armL.rotation.z = Math.PI/6;
    armR.rotation.z = -Math.PI/6;

    if(!isPlaying) return;

    // 聽覺與視覺解耦：只有被選中的器官會發光與動畫
    if(currentOrgan === 'heart') {
        let rate = currentExpState === 'caffeine' ? 2 : 1;
        let scale = 1 + 0.2 * Math.sin(time * 2 * Math.PI * rate);
        organs.heart.scale.set(scale, scale, scale);
        organs.heart.material.emissiveIntensity = 0.9;
    } 
    else if (currentOrgan === 'stomach') {
        let scale = 1 + 0.1 * Math.sin(time * 3 * 2 * Math.PI);
        organs.stomach.scale.set(scale, scale, scale);
        organs.stomach.material.emissiveIntensity = 0.8;
        if(currentExpState === 'sugar') organs.stomach.material.emissive.setHex(0xff0000); // 警告紅光
    } 
    else if (currentOrgan === 'smallIntestine') {
        organs.smallIntestine.material.emissiveIntensity = 0.7 + 0.3 * Math.sin(time * 8);
    } 
    else if (currentOrgan === 'largeIntestine') {
        organs.largeIntestine.material.emissiveIntensity = 0.7 + 0.3 * Math.sin(time * 0.5);
    } 
    else if (currentOrgan === 'spleen') {
        organs.spleen.material.emissiveIntensity = 0.6 + 0.2 * Math.sin(time * 1);
    } 
    else if (currentOrgan === 'kidneys') {
        organs.kidneys.material.emissiveIntensity = 0.6 + 0.2 * Math.sin(time * 1);
    }

    // 狀態連動 (表情與神經反射)
    if (currentExpState === 'caffeine') {
        // 驚恐 O 型嘴，挑眉
        mouth.scale.set(1.5, 1.5, 1.5);
        browL.rotation.z = Math.PI/3;
        browR.rotation.z = -Math.PI/3;
        browL.position.y = 1.2;
        browR.position.y = 1.2;
        // 舉手
        armL.rotation.z = Math.PI/2;
        armR.rotation.z = -Math.PI/2;
        // 發抖 Jitter
        girlGroup.position.x = 1.5 + (Math.random() - 0.5) * 0.03;
        girlGroup.position.y = (Math.random() - 0.5) * 0.03;
    } 
    else if (currentExpState === 'fiber') {
        // 彎月笑眼
        eyeL.scale.set(1, 0.2, 1);
        eyeR.scale.set(1, 0.2, 1);
        mouth.scale.set(1.8, 0.2, 1);
        mouth.position.y = 0.65;
        head.rotation.z = Math.sin(time * 2) * 0.1; // 開心晃腦
        if(currentOrgan === 'smallIntestine' || currentOrgan === 'largeIntestine') {
            organs[currentOrgan].material.emissiveIntensity = 1.0; // 明亮健康光芒
        }
    } 
    else if (currentExpState === 'sugar') {
        // 痛苦抽搐
        mouth.scale.set(1.5, 0.2, 1);
        mouth.position.y = 0.55;
        browL.rotation.z = -Math.PI/6;
        browR.rotation.z = Math.PI/6;
        if(Math.random() > 0.92) {
            eyeL.scale.y = 0.1; // 抽搐
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();
    update3DModel(time);
    updateWaveform(time);
    renderer.render(scene, camera);
}

// 響應式佈局
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// 啟動迴圈
animate();
</script>
