<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身體聲音合成器 v4.2 (2.5D 動態解剖版)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(20, 20, 40, 0.8);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
        }
        h2 { margin-top: 0; font-size: 1.3rem; color: #aaccff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .control-group { margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #ffccaa; font-weight: bold; }
        .control-group input[type="file"] { width: 100%; margin-bottom: 10px; font-size: 0.8rem; }
        .slider-container { display: flex; align-items: center; margin-bottom: 5px; }
        .slider-container span { width: 20px; font-size: 0.8rem; }
        .slider-container input[type="range"] { flex-grow: 1; }
        
        button {
            width: 100%;
            padding: 12px;
            background: #4a4ade;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background: #6a6afe; }
        button.active { background: #ff4a6a; }

        #status-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>🧬 2.5D 器官拼圖台</h2>
        
        <div class="control-group">
            <label>1. 上傳人物外觀 (去背 PNG)</label>
            <input type="file" id="uploadChar" accept="image/png">
        </div>

        <div class="control-group">
            <label>2. 上傳心臟 (去背 PNG)</label>
            <input type="file" id="uploadHeart" accept="image/png">
            <div class="slider-container"><span>X</span><input type="range" id="heartX" min="-2" max="2" step="0.01" value="-0.25"></div>
            <div class="slider-container"><span>Y</span><input type="range" id="heartY" min="-2" max="2" step="0.01" value="0.8"></div>
            <div class="slider-container"><span>大小</span><input type="range" id="heartS" min="0.1" max="2" step="0.01" value="0.4"></div>
        </div>

        <div class="control-group">
            <label>3. 上傳腸胃 (去背 PNG)</label>
            <input type="file" id="uploadBowel" accept="image/png">
            <div class="slider-container"><span>X</span><input type="range" id="bowelX" min="-2" max="2" step="0.01" value="0"></div>
            <div class="slider-container"><span>Y</span><input type="range" id="bowelY" min="-2" max="2" step="0.01" value="-0.2"></div>
            <div class="slider-container"><span>大小</span><input type="range" id="bowelS" min="0.1" max="3" step="0.01" value="0.9"></div>
        </div>

        <button id="btnAudio">▶️ 啟動生命引擎 (聲音與動態)</button>
    </div>

    <div id="status-bar">狀態：請依序上傳圖片建立角色</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 全域狀態 ---
        let isAudioPlaying = false;
        let audioCtx, heartOsc, stomachOsc, stomachLFO, heartGain, stomachGain;
        const statusMsg = document.getElementById('status-bar');

        // --- 1. Three.js 場景建置 ---
        const scene = new THREE.Scene();
        
        // 星空背景粒子
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 600;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 20;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0x88ccff, transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starMesh);

        // 攝影機與渲染器
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(1.5, 0, 7); // 視角向右移，避開左側UI

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. 建立 2.5D 圖層系統 ---
        const textureLoader = new THREE.TextureLoader();
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);

        // 共用材質設定 (開啟透明、雙面渲染、基礎發光)
        const baseMaterialParams = { transparent: true, side: THREE.DoubleSide, depthWrite: false };

        // 圖層 1: 人物本體 (Z=0)
        let charMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshBasicMaterial({ ...baseMaterialParams, opacity: 0 }));
        characterGroup.add(charMesh);

        // 圖層 2: 腸胃 (Z=0.05) - 放在心臟後方或同一層皆可
        let bowelMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshBasicMaterial({ ...baseMaterialParams, opacity: 0, color: 0xddffdd }));
        bowelMesh.position.set(0, -0.2, 0.05);
        bowelMesh.scale.set(0.9, 0.9, 1);
        characterGroup.add(bowelMesh);

        // 圖層 3: 心臟 (Z=0.1)
        let heartMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshBasicMaterial({ ...baseMaterialParams, opacity: 0, color: 0xffdddd }));
        heartMesh.position.set(-0.25, 0.8, 0.1);
        heartMesh.scale.set(0.4, 0.4, 1);
        characterGroup.add(heartMesh);

        // --- 3. 圖片上傳邏輯 ---
        function handleUpload(inputId, targetMesh, defaultScale) {
            document.getElementById(inputId).addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    textureLoader.load(url, (texture) => {
                        const aspect = texture.image.width / texture.image.height;
                        targetMesh.geometry.dispose();
                        targetMesh.geometry = new THREE.PlaneGeometry(3 * aspect, 3); // 固定高度基準為3
                        targetMesh.material.map = texture;
                        targetMesh.material.opacity = 1; // 顯示圖層
                        targetMesh.material.needsUpdate = true;
                        statusMsg.innerText = `狀態：成功載入 ${inputId.replace('upload', '')} 素材！`;
                    });
                }
            });
        }
        handleUpload('uploadChar', charMesh);
        handleUpload('uploadHeart', heartMesh);
        handleUpload('uploadBowel', bowelMesh);

        // --- 4. 座標與縮放綁定 ---
        function bindSlider(id, target, property, axis) {
            document.getElementById(id).addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                if (property === 'position') target.position[axis] = val;
                if (property === 'scale') target.scale.set(val, val, 1);
            });
        }
        bindSlider('heartX', heartMesh, 'position', 'x');
        bindSlider('heartY', heartMesh, 'position', 'y');
        bindSlider('heartS', heartMesh, 'scale', '');
        bindSlider('bowelX', bowelMesh, 'position', 'x');
        bindSlider('bowelY', bowelMesh, 'position', 'y');
        bindSlider('bowelS', bowelMesh, 'scale', '');

        // --- 5. Web Audio API (生命引擎) ---
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 心跳聲 (Lub-dub)
            heartOsc = audioCtx.createOscillator();
            heartGain = audioCtx.createGain();
            heartOsc.type = 'sine';
            heartOsc.frequency.value = 55;
            heartOsc.connect(heartGain);
            heartGain.connect(audioCtx.destination);
            heartGain.gain.value = 0;
            heartOsc.start();

            // 腸胃聲 (低頻濾波噪音)
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            stomachOsc = audioCtx.createBufferSource();
            stomachOsc.buffer = noiseBuffer;
            stomachOsc.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 150;

            stomachGain = audioCtx.createGain();
            stomachGain.gain.value = 0; // 初始靜音

            stomachOsc.connect(filter);
            filter.connect(stomachGain);
            stomachGain.connect(audioCtx.destination);
            stomachOsc.start();
        }

        // --- 6. 動畫迴圈與 DSP 同步 ---
        let time = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            time += delta;

            // 背景星空緩慢旋轉
            starMesh.rotation.y += delta * 0.05;

            // 整體呼吸浮動 (2.5D 生命力)
            if(charMesh.material.opacity > 0) {
                characterGroup.position.y = Math.sin(time * 1.5) * 0.05;
            }

            if (isAudioPlaying) {
                // 心跳邏輯 (BPM 70 -> 每秒 1.16 下)
                const beatTime = time % (60 / 70); 
                let currentHeartVol = 0;
                let heartScaleMod = 0;

                // Lub (第一拍)
                if (beatTime < 0.15) {
                    currentHeartVol = (0.15 - beatTime) * 6; // 音量包絡
                    heartScaleMod = Math.sin(beatTime * Math.PI * 6) * 0.15; // 幾何膨脹
                } 
                // Dub (第二拍)
                else if (beatTime > 0.25 && beatTime < 0.4) {
                    currentHeartVol = (0.4 - beatTime) * 5;
                    heartScaleMod = Math.sin((beatTime - 0.25) * Math.PI * 6) * 0.1;
                }

                if (audioCtx) heartGain.gain.setTargetAtTime(currentHeartVol, audioCtx.currentTime, 0.01);
                
                // 套用心跳縮放 (保持使用者設定的基礎縮放比例)
                const baseHS = parseFloat(document.getElementById('heartS').value);
                heartMesh.scale.set(baseHS + heartScaleMod, baseHS + heartScaleMod, 1);

                // 腸胃蠕動邏輯 (LFO 低頻振盪)
                const stomachLFOValue = Math.abs(Math.sin(time * 0.5)); // 慢速起伏
                if (audioCtx) stomachGain.gain.setTargetAtTime(stomachLFOValue * 0.5, audioCtx.currentTime, 0.1);
                
                // 腸胃視覺蠕動 (X軸與Y軸微幅交錯變形)
                const baseBS = parseFloat(document.getElementById('bowelS').value);
                bowelMesh.scale.set(
                    baseBS + Math.sin(time * 2) * 0.03, 
                    baseBS + Math.cos(time * 1.5) * 0.03, 
                    1
                );
            }

            renderer.render(scene, camera);
        }
        animate();

        // --- 7. 啟動控制 ---
        document.getElementById('btnAudio').addEventListener('click', (e) => {
            if (!audioCtx) initAudio();
            
            isAudioPlaying = !isAudioPlaying;
            if (isAudioPlaying) {
                audioCtx.resume();
                e.target.innerText = '⏸️ 暫停引擎';
                e.target.classList.add('active');
                statusMsg.innerText = '狀態：生命引擎運轉中...';
            } else {
                heartGain.gain.value = 0;
                stomachGain.gain.value = 0;
                e.target.innerText = '▶️ 啟動生命引擎 (聲音與動態)';
                e.target.classList.remove('active');
                statusMsg.innerText = '狀態：靜默模式 (待機)';
            }
        });

        // 視窗縮放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
