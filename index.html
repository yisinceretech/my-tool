<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Test v2.9</title>
    <style>
        /* 視覺風格：背景使用充滿活力的「粉紫到粉藍」馬卡龍漸層 */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* 佈局：採用黃金比例空間分割，左側 UI 面板 */
        #ui-panel { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            width: 350px; 
            background: rgba(30, 30, 40, 0.85); 
            backdrop-filter: blur(10px); 
            border-radius: 15px; 
            padding: 20px; 
            color: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            max-height: 90vh;
            overflow-y: auto;
        }
        
        h1 { 
            font-size: 20px; 
            margin: 0 0 10px 0; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 10px; 
        }
        
        .btn { 
            background: #4a4a5a; 
            color: white; 
            border: none; 
            padding: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.2s; 
            font-weight: bold; 
        }
        .btn:hover { background: #5a5a6a; }
        .btn.active { 
            background: #ff719a; 
            box-shadow: 0 0 10px rgba(255,113,154,0.5); 
        }
        
        .btn-play { background: #28a745; font-size: 16px; padding: 12px; }
        .btn-play:hover { background: #218838; }
        .btn-stop { background: #dc3545; font-size: 16px; padding: 12px; display: none; }
        .btn-stop:hover { background: #c82333; }
        
        .slider-container { display: flex; flex-direction: column; gap: 5px; }
        input[type=range] { width: 100%; }
        
        #canvas-container { 
            position: relative; 
            width: 100%; 
            height: 150px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #fff; 
            border: 2px solid #555; 
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        .mode-switch { display: flex; justify-content: space-between; gap: 10px; }
        .mode-switch .btn { flex: 1; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        #instructions { font-size: 12px; color: #ccc; text-align: center; margin-top: 10px; line-height: 1.5; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-panel">
        <h1>身體聲音合成器 v2.9</h1>
        
        <div class="mode-switch">
            <button id="btn-mode-heart" class="btn active">🫀 監聽心跳</button>
            <button id="btn-mode-stomach" class="btn">🌪️ 監聽腸胃</button>
        </div>
        
        <div id="canvas-container">
            <canvas id="osc-canvas"></canvas>
        </div>

        <button id="btn-play" class="btn btn-play">▶️ 開始監聽</button>
        <button id="btn-stop" class="btn btn-stop">⏹️ 停止監聽</button>

        <div class="slider-container">
            <label>心跳速率 (BPM): <span id="bpm-val">60</span></label>
            <input type="range" id="bpm-slider" min="40" max="160" value="60">
        </div>

        <div class="grid-2">
            <button id="btn-state-normal" class="btn active" style="grid-column: span 2;">一般狀態</button>
            <button id="btn-state-caffeine" class="btn">☕ 咖啡因</button>
            <button id="btn-state-sugarCrash" class="btn">🍩 暈糖反應</button>
            <button id="btn-state-highFiber" class="btn">🥦 高纖維</button>
            <button id="btn-state-refinedSugar" class="btn">🥤 精緻糖</button>
        </div>
        
        <div id="instructions">
            💡 提示：點擊右側 3D 模型的「心臟」或「腸胃」可直接切換聽診部位。<br>
            靜默備課模式：停止監聽時，調整參數不會發出聲音。
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 狀態管理與 UI 邏輯
        // ==========================================
        const state = {
            isPlaying: false,
            mode: 'heart', // 'heart' 或是 'stomach'
            condition: 'normal',
            bpm: 60
        };

        const ui = {
            btnPlay: document.getElementById('btn-play'),
            btnStop: document.getElementById('btn-stop'),
            btnModeHeart: document.getElementById('btn-mode-heart'),
            btnModeStomach: document.getElementById('btn-mode-stomach'),
            bpmSlider: document.getElementById('bpm-slider'),
            bpmVal: document.getElementById('bpm-val'),
            btnsCondition: {
                normal: document.getElementById('btn-state-normal'),
                caffeine: document.getElementById('btn-state-caffeine'),
                sugarCrash: document.getElementById('btn-state-sugarCrash'),
                highFiber: document.getElementById('btn-state-highFiber'),
                refinedSugar: document.getElementById('btn-state-refinedSugar')
            },
            canvas: document.getElementById('osc-canvas')
        };

        const ctx = ui.canvas.getContext('2d');
        ui.canvas.width = 310;
        ui.canvas.height = 150;

        // 波形歷史資料，用來製作從右到左滾動的效果
        const historyData = new Array(ui.canvas.width).fill(0);

        // ==========================================
        // 2. Web Audio API 聲音引擎
        // ==========================================
        let audioCtx = null;
        let currentSource = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 產生無限循環的 AudioBuffer
        function createAudioBuffer() {
            const sampleRate = audioCtx.sampleRate;
            const bufferLength = 5.0; // 產生 5 秒的音軌供循環
            const buffer = audioCtx.createBuffer(1, sampleRate * bufferLength, sampleRate);
            const data = buffer.getChannelData(0);
            
            const t = new Float32Array(sampleRate * bufferLength);
            for(let i=0; i<t.length; i++) t[i] = i / sampleRate;

            if (state.mode === 'heart') {
                // --- 心跳聲 (Lub-dub) ---
                let cycle = 60 / state.bpm;
                if(state.condition === 'sugarCrash') cycle = 60 / 50; 
                if(state.condition === 'caffeine') cycle = 60 / Math.max(100, state.bpm);

                for(let i=0; i<t.length; i++) {
                    let t_cycle = t[i] % cycle;
                    
                    // Lub (第一拍) 45Hz
                    let lub = 0;
                    if(t_cycle < 0.25) {
                        let decay = (state.condition === 'caffeine') ? 40 : 25;
                        lub = Math.sin(2 * Math.PI * 45 * t_cycle) * Math.exp(-t_cycle * decay);
                    }

                    // Dub (第二拍) 65Hz
                    let dub = 0;
                    let dubStart = 0.25;
                    if(state.condition === 'sugarCrash') dubStart = 0.3; // 不規則延遲
                    let t_dub = t_cycle - dubStart;
                    if(t_dub >= 0 && t_dub < 0.25) {
                        let decay = (state.condition === 'caffeine') ? 50 : 30;
                        dub = Math.sin(2 * Math.PI * 65 * t_dub) * Math.exp(-t_dub * decay);
                    }
                    
                    data[i] = (lub + dub) * 0.8;
                }
            } else {
                // --- 腸胃聲 (Borborygmi) ---
                let lfoFreq = 3;
                let lfoPower = 4;
                let volumeMult = 1.5;
                
                if (state.condition === 'highFiber') {
                    lfoPower = 2; // 較平緩連續
                    volumeMult = 2.0;
                } else if (state.condition === 'refinedSugar') {
                    lfoPower = 8; // 極度斷續空洞
                    volumeMult = 1.0;
                }

                // 以程式碼模擬白噪音 + 低通濾波 + LFO 包絡
                let lastNoise = 0;
                for(let i=0; i<t.length; i++) {
                    let noise = (Math.random() * 2 - 1);
                    
                    // 產生超低頻 LFO
                    let lfo = (Math.sin(2 * Math.PI * lfoFreq * t[i]) + 1) / 2; 
                    lfo = Math.pow(lfo, lfoPower);
                    
                    // 簡易一階低通濾波模擬 (200Hz 沉悶共鳴)
                    let alpha = (state.condition === 'refinedSugar') ? 0.05 : 0.1;
                    noise = (noise * alpha) + (lastNoise * (1 - alpha));
                    lastNoise = noise;

                    data[i] = noise * lfo * volumeMult;
                }
            }
            return buffer;
        }

        function playSound() {
            if(!audioCtx) initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            stopSound(); 
            
            const buffer = createAudioBuffer();
            currentSource = audioCtx.createBufferSource();
            currentSource.buffer = buffer;
            currentSource.loop = true; // 無縫接軌無限循環播放
            currentSource.connect(audioCtx.destination);
            currentSource.start();
        }

        function stopSound() {
            if(currentSource) {
                currentSource.stop();
                currentSource.disconnect();
                currentSource = null;
            }
        }

        // --- UI 事件監聽 ---
        ui.btnPlay.addEventListener('click', () => {
            state.isPlaying = true;
            ui.btnPlay.style.display = 'none';
            ui.btnStop.style.display = 'block';
            playSound();
        });

        ui.btnStop.addEventListener('click', () => {
            state.isPlaying = false;
            ui.btnStop.style.display = 'none';
            ui.btnPlay.style.display = 'block';
            stopSound();
        });

        ui.bpmSlider.addEventListener('input', (e) => {
            state.bpm = e.target.value;
            ui.bpmVal.textContent = state.bpm;
            if(state.isPlaying) playSound();
        });

        function setMode(mode) {
            state.mode = mode;
            ui.btnModeHeart.classList.toggle('active', mode === 'heart');
            ui.btnModeStomach.classList.toggle('active', mode === 'stomach');
            // 清空波形軌跡
            historyData.fill(0);
            if(state.isPlaying) playSound();
        }

        ui.btnModeHeart.addEventListener('click', () => setMode('heart'));
        ui.btnModeStomach.addEventListener('click', () => setMode('stomach'));

        function setCondition(cond) {
            state.condition = cond;
            for(let key in ui.btnsCondition) {
                ui.btnsCondition[key].classList.toggle('active', key === cond);
            }
            // 狀態連動更新 BPM 數值
            if(cond === 'caffeine') { state.bpm = 120; ui.bpmSlider.value = 120; ui.bpmVal.textContent = 120; }
            else if(cond === 'sugarCrash') { state.bpm = 50; ui.bpmSlider.value = 50; ui.bpmVal.textContent = 50; }
            else if(cond === 'normal') { state.bpm = 60; ui.bpmSlider.value = 60; ui.bpmVal.textContent = 60; }
            
            if(state.isPlaying) playSound();
        }

        for(let key in ui.btnsCondition) {
            ui.btnsCondition[key].addEventListener('click', () => setCondition(key));
        }


        // ==========================================
        // 3. Three.js 3D 渲染 (防彈級穩定度版)
        // ==========================================
        const scene = new THREE.Scene();
        // 移除 ViewOffset，改用一般透視攝影機
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.2, 6);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 光源
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.9);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- 建立 Q版女孩 3D 模型 ---
        const character = new THREE.Group();
        // 核心修正：將模型實體推向右方，確保不被 UI 遮擋且永不跑出畫面
        character.position.set(1.5, -1.2, 0); 
        scene.add(character);

        // 材質設定
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffd1b3, roughness: 0.4 });
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 }); // 烏黑
        // 核心修正：衣服透視材質使用最穩定的 MeshStandardMaterial 搭配透明度，絕不使用 transmission
        const shirtMat = new THREE.MeshStandardMaterial({ color: 0xff88bb, transparent: true, opacity: 0.6, roughness: 0.2 }); 
        const shortsMat = new THREE.MeshStandardMaterial({ color: 0x87ceeb, roughness: 0.6 });
        const socksMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const shoesMat = new THREE.MeshStandardMaterial({ color: 0xadd8e6, roughness: 0.5 });
        
        const heartMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.8 });
        const stomachMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.8 });

        // (1) 頭部與頭髮
        const headGroup = new THREE.Group();
        headGroup.position.y = 2.4;
        character.add(headGroup);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), skinMat);
        headGroup.add(head);

        // 長直髮與齊瀏海
        const hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.73, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.8), hairMat);
        headGroup.add(hairTop);
        const hairBack = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.75, 1.8, 32), hairMat);
        hairBack.position.set(0, -0.7, -0.15);
        headGroup.add(hairBack);
        const bangs = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 0.5), hairMat);
        bangs.position.set(0, 0.45, 0.55);
        headGroup.add(bangs);

        // (2) 五官 (水汪汪大眼睛、眉毛、嘴巴)
        const eyeGroupL = new THREE.Group(); eyeGroupL.position.set(-0.25, 0, 0.62);
        const eyeGroupR = new THREE.Group(); eyeGroupR.position.set(0.25, 0, 0.62);
        headGroup.add(eyeGroupL, eyeGroupR);

        const scleraGeo = new THREE.SphereGeometry(0.14, 16, 16);
        const scleraMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const irisGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const irisMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const catchlightGeo = new THREE.SphereGeometry(0.03, 8, 8);
        
        // 左眼
        const scleraL = new THREE.Mesh(scleraGeo, scleraMat); eyeGroupL.add(scleraL);
        const irisL = new THREE.Mesh(irisGeo, irisMat); irisL.position.z = 0.05; eyeGroupL.add(irisL);
        const catchL = new THREE.Mesh(catchlightGeo, scleraMat); catchL.position.set(0.04, 0.04, 0.13); eyeGroupL.add(catchL);
        // 右眼
        const scleraR = new THREE.Mesh(scleraGeo, scleraMat); eyeGroupR.add(scleraR);
        const irisR = new THREE.Mesh(irisGeo, irisMat); irisR.position.z = 0.05; eyeGroupR.add(irisR);
        const catchR = new THREE.Mesh(catchlightGeo, scleraMat); catchR.position.set(0.04, 0.04, 0.13); eyeGroupR.add(catchR);

        // 眉毛
        const browGeo = new THREE.BoxGeometry(0.22, 0.04, 0.04);
        const browL = new THREE.Mesh(browGeo, hairMat); browL.position.set(-0.25, 0.25, 0.68); headGroup.add(browL);
        const browR = new THREE.Mesh(browGeo, hairMat); browR.position.set(0.25, 0.25, 0.68); headGroup.add(browR);

        // 嘴巴
        const mouthGroup = new THREE.Group(); mouthGroup.position.set(0, -0.25, 0.68); headGroup.add(mouthGroup);
        const mouthSmile = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.025, 8, 16, Math.PI), new THREE.MeshBasicMaterial({ color: 0xff6666 }));
        mouthSmile.rotation.z = Math.PI; mouthGroup.add(mouthSmile);
        const mouthO = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.03, 8, 16), new THREE.MeshBasicMaterial({ color: 0xff6666 }));
        mouthO.visible = false; mouthGroup.add(mouthO);
        const mouthSad = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.025, 8, 16, Math.PI), new THREE.MeshBasicMaterial({ color: 0xff6666 }));
        mouthSad.visible = false; mouthGroup.add(mouthSad);

        // (3) 軀幹 (粉色透視艙) 與內臟
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.9, 16, 32), shirtMat);
        torso.position.y = 1.0;
        character.add(torso);

        const heart = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), heartMat);
        heart.position.set(0.15, 0.3, 0);
        heart.userData = { type: 'heart' };
        torso.add(heart);

        const stomach = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), stomachMat);
        stomach.position.set(0, -0.25, 0);
        stomach.userData = { type: 'stomach' };
        torso.add(stomach);

        // (4) 四肢
        const armLGroup = new THREE.Group(); armLGroup.position.set(-0.65, 1.4, 0); character.add(armLGroup);
        const armRGroup = new THREE.Group(); armRGroup.position.set(0.65, 1.4, 0); character.add(armRGroup);
        const armGeo = new THREE.CapsuleGeometry(0.12, 0.6, 8, 16);
        const armL = new THREE.Mesh(armGeo, skinMat); armL.position.y = -0.3; armLGroup.add(armL);
        const armR = new THREE.Mesh(armGeo, skinMat); armR.position.y = -0.3; armRGroup.add(armR);

        const legLGroup = new THREE.Group(); legLGroup.position.set(-0.25, 0.5, 0); character.add(legLGroup);
        const legRGroup = new THREE.Group(); legRGroup.position.set(0.25, 0.5, 0); character.add(legRGroup);
        
        // 淺藍波浪短褲
        const shortL = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.28, 0.35, 16), shortsMat);
        shortL.position.y = -0.15; legLGroup.add(shortL);
        const shortR = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.28, 0.35, 16), shortsMat);
        shortR.position.y = -0.15; legRGroup.add(shortR);

        // 腿、白襪、淺藍運動鞋
        const legGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.5);
        const legL = new THREE.Mesh(legGeo, skinMat); legL.position.y = -0.4; legLGroup.add(legL);
        const sockL = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.25), socksMat); sockL.position.y = -0.7; legLGroup.add(sockL);
        const shoeL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.18, 0.4), shoesMat); shoeL.position.set(0, -0.9, 0.1); legLGroup.add(shoeL);
        
        const legR = new THREE.Mesh(legGeo, skinMat); legR.position.y = -0.4; legRGroup.add(legR);
        const sockR = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.25), socksMat); sockR.position.y = -0.7; legRGroup.add(sockR);
        const shoeR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.18, 0.4), shoesMat); shoeR.position.set(0, -0.9, 0.1); legRGroup.add(shoeR);


        // --- 射線檢測 (Raycaster) 點擊器官互動 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([heart, stomach]);
            if (intersects.length > 0) {
                const type = intersects[0].object.userData.type;
                setMode(type);
            }
        });

        // 視窗縮放處理
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (window.innerWidth < 800) character.position.x = 0; // 小螢幕自動居中
            else character.position.x = 1.5;
        });
        if (window.innerWidth < 800) character.position.x = 0;


        // ==========================================
        // 4. 生理反射、表情連動與動畫循環
        // ==========================================
        let time = 0;

        function updateExpression() {
            // 重置全部表情與肢體
            mouthSmile.visible = false;
            mouthO.visible = false;
            mouthSad.visible = false;
            browL.rotation.z = 0; browR.rotation.z = 0;
            browL.position.y = 0.25; browR.position.y = 0.25;
            armLGroup.rotation.z = 0; armRGroup.rotation.z = 0;
            headGroup.rotation.z = 0;
            skinMat.color.setHex(0xffd1b3); // 恢復正常膚色
            eyeGroupL.scale.set(1, 1, 1); eyeGroupR.scale.set(1, 1, 1);
            
            // 器官發光亮度切換 (未選中則變暗)
            heartMat.emissiveIntensity = (state.mode === 'heart') ? 0.9 : 0.2;
            stomachMat.emissiveIntensity = (state.mode === 'stomach') ? 0.9 : 0.2;
            stomachMat.emissive.setHex((state.condition === 'refinedSugar') ? 0xff4400 : 0x00ff00);

            // 狀態連動 (聲音 + 3D 表情 + 動畫)
            if (state.condition === 'caffeine') {
                mouthO.visible = true;
                browL.rotation.z = 0.25; browR.rotation.z = -0.25; // 挑眉
                browL.position.y = 0.3; browR.position.y = 0.3;
                skinMat.color.setHex(0xffaaaa); // 泛紅
                armLGroup.rotation.z = -0.6; armRGroup.rotation.z = 0.6; // 雙手緊張舉起
                eyeGroupL.scale.set(1.3, 1.3, 1.3); eyeGroupR.scale.set(1.3, 1.3, 1.3); // 瞪大眼
            } else if (state.condition === 'sugarCrash') {
                mouthSad.visible = true;
                browL.rotation.z = -0.2; browR.rotation.z = 0.2; // 八字眉
                skinMat.color.setHex(0xcccccc); // 蒼白
                armLGroup.rotation.z = 0.15; armRGroup.rotation.z = -0.15; // 雙手無力下垂
                headGroup.rotation.z = -0.2; // 疲憊歪頭
                eyeGroupL.scale.set(1, 0.4, 1); eyeGroupR.scale.set(1, 0.4, 1); // 死魚眼
            } else if (state.condition === 'highFiber') {
                mouthSmile.visible = true;
                browL.position.y = 0.28; browR.position.y = 0.28;
                headGroup.rotation.z = Math.sin(time * 2) * 0.08; // 開心左右微晃
            } else if (state.condition === 'refinedSugar') {
                mouthSad.visible = true;
                browL.rotation.z = -0.35; browR.rotation.z = 0.35; // 眉頭深鎖
                eyeGroupL.scale.set(1, 0.6, 1); eyeGroupR.scale.set(1, 0.6, 1); // 眼皮下垂
            } else {
                mouthSmile.visible = true;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (state.isPlaying) {
                time += 0.016; // 約 60fps
                
                let cycle = 60 / state.bpm;
                if(state.condition === 'sugarCrash') cycle = 60 / 50; 
                if(state.condition === 'caffeine') cycle = 60 / Math.max(100, state.bpm);
                
                let t_cycle = time % cycle;

                // 視覺分離：聽心跳時心臟跳動，聽腸胃時心臟靜止
                if (state.mode === 'heart') {
                    // 心臟收縮動畫
                    let scale = 1.0;
                    if(t_cycle < 0.25) scale = 1.3 - (t_cycle * 1.2);
                    else if(t_cycle >= 0.25 && t_cycle < 0.5) scale = 1.2 - ((t_cycle-0.25) * 0.8);
                    heart.scale.set(scale, scale, scale);
                    stomach.scale.set(1, 1, 1);
                } else {
                    heart.scale.set(1, 1, 1);
                    // 腸胃蠕動動畫
                    let lfo = (Math.sin(2 * Math.PI * 3 * time) + 1) / 2;
                    let s = 1.0 + (lfo * 0.25);
                    if(state.condition === 'refinedSugar') s = 1.0 + (Math.random() * 0.15); // 痛苦抽搐
                    stomach.scale.set(s, s, s);
                }

                // 神經發抖 (Jitter) 動畫
                if (state.condition === 'caffeine') {
                    let baseX = window.innerWidth < 800 ? 0 : 1.5;
                    character.position.x = baseX + (Math.random() - 0.5) * 0.02;
                    character.position.y = -1.2 + (Math.random() - 0.5) * 0.02;
                } else {
                    let baseX = window.innerWidth < 800 ? 0 : 1.5;
                    character.position.x = baseX;
                    character.position.y = -1.2;
                }

                // ==========================================
                // 5. Canvas 2D 波形計算 (推入陣列尾端)
                // ==========================================
                let currentVal = 0;
                if (state.mode === 'heart') {
                    // 合成醫學 PQRST 心電圖波形
                    let ecgCycle = t_cycle / cycle;
                    if(ecgCycle > 0.1 && ecgCycle < 0.15) currentVal = 0.25; // P
                    else if(ecgCycle > 0.2 && ecgCycle < 0.22) currentVal = -0.25; // Q
                    else if(ecgCycle > 0.22 && ecgCycle < 0.25) currentVal = 1.0;  // R
                    else if(ecgCycle > 0.25 && ecgCycle < 0.28) currentVal = -0.4; // S
                    else if(ecgCycle > 0.4 && ecgCycle < 0.5) currentVal = 0.35; // T
                } else {
                    // 合成腸胃噪音波形
                    let lfo = (Math.sin(2 * Math.PI * 3 * time) + 1) / 2;
                    let pow = (state.condition === 'refinedSugar') ? 8 : (state.condition === 'highFiber' ? 2 : 4);
                    lfo = Math.pow(lfo, pow);
                    currentVal = (Math.random() * 2 - 1) * lfo;
                }
                
                // 陣列前進，實作由右至左滾動的時間軸
                historyData.push(currentVal);
                historyData.shift();
            }

            // 更新 3D 表情與燈光
            updateExpression();

            // ==========================================
            // 6. Canvas 2D 波形渲染
            // ==========================================
            ctx.clearRect(0, 0, ui.canvas.width, ui.canvas.height);
            
            if (state.mode === 'heart') {
                // 心跳模式：純白背景 + 黑色網格
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, ui.canvas.width, ui.canvas.height);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.lineWidth = 1;
                for(let i=0; i<ui.canvas.width; i+=15) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,ui.canvas.height); ctx.stroke(); }
                for(let i=0; i<ui.canvas.height; i+=15) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(ui.canvas.width,i); ctx.stroke(); }
                
                ctx.strokeStyle = '#d32f2f'; // 深紅 PQRST 波
            } else {
                // 腸胃模式：深色背景
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, ui.canvas.width, ui.canvas.height);
                ctx.strokeStyle = '#00ffff'; // 青藍連續波塊
            }

            // 繪製波形線條
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for(let i=0; i<ui.canvas.width; i++) {
                // 擴大振幅並置中
                let y = (ui.canvas.height / 2) - historyData[i] * (ui.canvas.height / 2.5);
                if(i === 0) ctx.moveTo(i, y);
                else ctx.lineTo(i, y);
            }
            ctx.stroke();

            // 渲染 3D 畫面
            renderer.render(scene, camera);
        }
        
        // 啟動動畫循環
        animate();
    </script>
</body>
</html>
